<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nexus Protocol - 2050 Balanced Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #050505;
            --cyan-neon: #00F2FF;
            --emerald-pulse: #50FA7B;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--obsidian);
            background-image: radial-gradient(circle at 10% 20%, rgba(98, 114, 164, 0.1) 0%, transparent 50%),
                              radial-gradient(circle at 90% 80%, rgba(0, 242, 255, 0.05) 0%, transparent 50%);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            padding-bottom: 45px;
        }

        /* 1. BALANCED NEURAL HEADER */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 50px; 
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center; /* Wannan zai tabbatar komai yana tsakiya daya */
            justify-content: space-between;
            padding: 0 15px;
            z-index: 1000;
        }

        /* Gyaran Rubutun Nexus (Title Case & Alignment) */
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            line-height: 30px; /* Ya yi daidai da tsayin switch */
            height: 30px; 
            display: flex;
            align-items: center;
            background: linear-gradient(90deg, #fff, var(--cyan-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: none; /* Don cire All Caps */
        }

        /* THE 2050 NEURAL SWITCH (FIXED HEIGHT) */
        .neural-switch-wrapper {
            display: flex;
            align-items: center;
            height: 30px;
        }

        .neural-switch {
            width: 90px;
            height: 30px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }

        .switch-blob {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 42px;
            height: 24px;
            background: linear-gradient(45deg, var(--cyan-neon), #0072ff);
            border-radius: 20px;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1;
            box-shadow: 0 0 20px var(--cyan-neon);
        }

        .switch-active .switch-blob {
            left: 44px;
            background: linear-gradient(45deg, var(--emerald-pulse), #00b09b);
            box-shadow: 0 0 20px var(--emerald-pulse);
        }

        .switch-label {
            flex: 1;
            font-family: 'Orbitron', sans-serif;
            font-size: 8px;
            letter-spacing: 1px;
            text-align: center;
            line-height: 28px;
            z-index: 2;
            transition: 0.3s;
            color: #fff;
            mix-blend-mode: overlay;
        }

        /* Gyaran Earning Tracker don ya yi height daya da sauran */
        .earning-tracker {
            background: rgba(80, 250, 123, 0.05);
            border: 1px solid var(--emerald-pulse);
            padding: 0px 10px;
            height: 30px; /* Balanced height */
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 0 10px rgba(80, 250, 123, 0.1);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: var(--emerald-pulse);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 2. THE CONTENT ARCHITECTURE (STRICTLY NO TOUCHING) */
        .feed-container {
            margin-top: 60px;
            padding: 0 10px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .post-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            margin-bottom: 10px;
            padding: 15px;
            position: relative;
            overflow: hidden;
        }

        .post-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan-neon), transparent);
            animation: slide-glow 3s infinite;
        }

        @keyframes slide-glow {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--cyan-neon); background: #222; }
        .username { font-family: 'Montserrat', sans-serif; font-size: 15px; color: #fff; }
        .post-content { font-size: 14px; line-height: 1.5; color: #ccc; margin-bottom: 15px; }
        .post-media { width: 100%; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--glass-border); }

        .interaction-bar {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid var(--glass-border);
            padding-top: 12px;
        }

        .btn-nexus {
            background: transparent;
            border: none;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .earning-badge { font-size: 10px; color: var(--emerald-pulse); display: block; margin-top: 5px; }

        /* FOOTER */
        .nexus-footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 45px; 
            background: rgba(5, 5, 5, 0.98);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 3000;
            padding: 0;
            transition: transform 0.5s ease;
        }

        .footer-hidden { transform: translateY(100%); }

        .footer-icon {
            color: #fff;
            opacity: 0.5;
            cursor: pointer;
            height: 100%;
            width: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer-icon.active { opacity: 1; filter: drop-shadow(0 0 5px var(--cyan-neon)); }

        .profile-img {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1.5px solid #fff;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Nexus</div>

        <div class="neural-switch-wrapper">
            <div class="neural-switch" id="nexusSwitch" onclick="toggleNeural()">
                <div class="switch-blob"></div>
                <div class="switch-label">SOCIAL</div>
                <div class="switch-label">EARN</div>
            </div>
        </div>

        <div class="earning-tracker">
            <div class="pulse-dot"></div>
            <span id="token-count" style="font-family: 'Orbitron'; font-size: 11px;">0.0000 NT</span>
        </div>
    </header>

    <div class="feed-container">
        <div class="post-card">
            <div class="post-header">
                <div class="avatar"></div>
                <div class="username">Sadiq_Alhassan</div>
            </div>
            <div class="post-content">Barka da zuwa sabuwar duniyar Nexus. Wannan shi ne farkon tafiyar mu ta shekarar 3000. 🚀</div>
            <img src="https://via.placeholder.com/500x300/111/00F2FF?text=Quantum+Visual" alt="Nexus Media" class="post-media">
            <div class="interaction-bar">
                <button class="btn-nexus" onclick="triggerPulse(this)">✦ Pulse</button>
                <button class="btn-nexus">💬 Echo</button>
                <button class="btn-nexus">🔗 Nexus</button>
            </div>
            <span class="earning-badge">+0.002 NT earned for viewing</span>
        </div>

        <div class="post-card">
            <div class="post-header">
                <div class="avatar"></div>
                <div class="username">Tech_King_Kano</div>
            </div>
            <div class="post-content">Duba yadda wannan UI din yake yawo tamkar ruwa! #NextGen #NexusProtocol</div>
            <div style="width:100%; height:400px; background:#111; border-radius:15px; display:flex; align-items:center; justify-content:center; border: 1px solid var(--glass-border);">
                <span style="color:var(--cyan-neon); font-family:'Orbitron';">Video Player Mode</span>
            </div>
            <div class="interaction-bar">
                <button class="btn-nexus" onclick="triggerPulse(this)">✦ Pulse</button>
                <button class="btn-nexus">💬 Echo</button>
                <button class="btn-nexus">🔗 Nexus</button>
            </div>
            <span class="earning-badge">+0.005 NT earned for watching</span>
        </div>
    </div>

    <nav class="nexus-footer" id="instaFooter">
        <div class="footer-icon active"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L4 9v12h5v-7h6v7h5V9l-8-6z"/></svg></div>
        <div class="footer-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></div>
        <div class="footer-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8M8 12h8"/></svg></div>
        <div class="footer-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 2v20M8 2v20M2 12h20"/></svg></div>
        <div class="footer-icon"><img src="https://via.placeholder.com/150" alt="Me" class="profile-img"></div>
    </nav>

    <script>
        let tokens = 0.0000;
        const tokenDisplay = document.getElementById('token-count');
        setInterval(() => { tokens += 0.0001; tokenDisplay.innerText = tokens.toFixed(4) + " NT"; }, 5000);

        function toggleNeural() {
            const switcher = document.getElementById('nexusSwitch');
            switcher.classList.toggle('switch-active');
            if (navigator.vibrate) navigator.vibrate([30, 10, 30]); 
        }

        function triggerPulse(btn) {
            if (navigator.vibrate) navigator.vibrate(50);
            btn.style.color = "#00F2FF";
            btn.innerHTML = "✦ Pulsed!";
            tokens += 0.0005;
            tokenDisplay.innerText = tokens.toFixed(4) + " NT";
            setTimeout(() => { btn.style.color = "#fff"; btn.innerHTML = "✦ Pulse"; }, 2000);
        }

        const footer = document.getElementById('instaFooter');
        let lastScrollTop = 0;
        window.addEventListener('scroll', () => {
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            if (scrollTop > lastScrollTop) { footer.classList.add('footer-hidden'); } 
            else { footer.classList.remove('footer-hidden'); }
            lastScrollTop = scrollTop;
        });
    </script>
</body>
</html>
