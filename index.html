<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nexus Protocol - Year 3000</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #050505;
            --cyan-neon: #00F2FF;
            --emerald-pulse: #50FA7B;
            --nebula-purple: #6272a4;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--obsidian);
            background-image: radial-gradient(circle at 10% 20%, rgba(98, 114, 164, 0.1) 0%, transparent 50%),
                              radial-gradient(circle at 90% 80%, rgba(0, 242, 255, 0.05) 0%, transparent 50%);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        /* 1. ULTRA-SMART HEADER (NO VERTICAL SPACES) */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 50px; /* Slim height */
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px; /* Horizontal padding only */
            z-index: 1000;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            line-height: 1; /* Cire space na sama da kasa */
            background: linear-gradient(90deg, #fff, var(--cyan-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .earning-tracker {
            background: rgba(80, 250, 123, 0.1);
            border: 1px solid var(--emerald-pulse);
            padding: 2px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            line-height: 1;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: var(--emerald-pulse);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 2. THE CONTENT ARCHITECTURE */
        .feed-container {
            margin-top: 70px;
            padding: 10px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .post-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            margin-bottom: 20px;
            padding: 15px;
            position: relative;
            overflow: hidden;
        }

        .post-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan-neon), transparent);
            animation: slide-glow 3s infinite;
        }

        @keyframes slide-glow {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--cyan-neon); background: #222; }
        .username { font-family: 'Montserrat', sans-serif; font-size: 15px; color: #fff; }
        .post-content { font-size: 14px; line-height: 1.5; color: #ccc; margin-bottom: 15px; }
        .post-media { width: 100%; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--glass-border); }

        /* 3. INTERACTION BUTTONS */
        .interaction-bar {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid var(--glass-border);
            padding-top: 12px;
        }

        .btn-nexus {
            background: transparent;
            border: none;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .earning-badge { font-size: 10px; color: var(--emerald-pulse); display: block; margin-top: 5px; }

        /* ULTRA-SLIM FOOTER (ZERO TOP SPACE) */
        .nexus-footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 50px; /* Slim height matched with header */
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-around;
            align-items: center; /* Manne icons a tsakiya ba tare da space ba */
            z-index: 3000;
            padding: 0; /* Cire dukkan padding */
            transition: transform 0.5s ease;
        }

        .footer-hidden { transform: translateY(100%); }

        .footer-icon {
            color: #fff;
            opacity: 0.6;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%; /* Icons su dauki dukkan tsayin footer */
            width: 50px;
        }

        .footer-icon.active { opacity: 1; }

        .profile-img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1.5px solid #fff;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">NEXUS</div>
        <div class="earning-tracker">
            <div class="pulse-dot"></div>
            <span id="token-count" style="font-family: 'Orbitron'; font-size: 14px;">0.0000 NT</span>
        </div>
    </header>

    <div class="feed-container">
        <div class="post-card">
            <div class="post-header">
                <div class="avatar"></div>
                <div class="username">Sadiq_Alhassan</div>
            </div>
            <div class="post-content">Barka da zuwa sabuwar duniyar Nexus. Wannan shi ne farkon tafiyar mu ta shekarar 3000. 🚀</div>
            <img src="https://via.placeholder.com/500x300/111/00F2FF?text=Quantum+Visual" alt="Nexus Media" class="post-media">
            <div class="interaction-bar">
                <button class="btn-nexus" onclick="triggerPulse(this)">✦ Pulse</button>
                <button class="btn-nexus">💬 Echo</button>
                <button class="btn-nexus">🔗 Nexus</button>
            </div>
            <span class="earning-badge">+0.002 NT earned for viewing</span>
        </div>

        <div class="post-card">
            <div class="post-header">
                <div class="avatar"></div>
                <div class="username">Tech_King_Kano</div>
            </div>
            <div class="post-content">Duba yadda wannan UI din yake yawo tamkar ruwa! #NextGen #NexusProtocol</div>
            <div style="width:100%; height:400px; background:#111; border-radius:15px; display:flex; align-items:center; justify-content:center; border: 1px solid var(--glass-border);">
                <span style="color:var(--cyan-neon); font-family:'Orbitron';">Video Player Mode</span>
            </div>
            <div class="interaction-bar">
                <button class="btn-nexus" onclick="triggerPulse(this)">✦ Pulse</button>
                <button class="btn-nexus">💬 Echo</button>
                <button class="btn-nexus">🔗 Nexus</button>
            </div>
            <span class="earning-badge">+0.005 NT earned for watching</span>
        </div>
    </div>

    <nav class="nexus-footer" id="instaFooter">
        <div class="footer-icon active">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L4 9v12h5v-7h6v7h5V9l-8-6z"/></svg>
        </div>
        <div class="footer-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        </div>
        <div class="footer-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8M8 12h8"/></svg>
        </div>
        <div class="footer-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 2v20M8 2v20M2 12h20"/></svg>
        </div>
        <div class="footer-icon">
            <img src="https://via.placeholder.com/150" alt="Me" class="profile-img">
        </div>
    </nav>

    <script>
        let tokens = 0.0000;
        const tokenDisplay = document.getElementById('token-count');
        setInterval(() => { tokens += 0.0001; tokenDisplay.innerText = tokens.toFixed(4) + " NT"; }, 5000);

        function triggerPulse(btn) {
            if (navigator.vibrate) navigator.vibrate(50);
            btn.style.color = "#00F2FF";
            btn.innerHTML = "✦ Pulsed!";
            tokens += 0.0005;
            tokenDisplay.innerText = tokens.toFixed(4) + " NT";
            setTimeout(() => { btn.style.color = "#fff"; btn.innerHTML = "✦ Pulse"; }, 2000);
        }

        const footer = document.getElementById('instaFooter');
        let scrollTimeout;
        let lastScrollTop = 0;

        window.addEventListener('scroll', () => {
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            if (scrollTop > lastScrollTop) { footer.classList.add('footer-hidden'); } 
            else { footer.classList.remove('footer-hidden'); }
            lastScrollTop = scrollTop;

            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => { footer.classList.remove('footer-hidden'); }, 2000);
        });

        document.querySelectorAll('.footer-icon').forEach(icon => {
            icon.addEventListener('click', function() {
                document.querySelectorAll('.footer-icon').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
                                                                                                                   </html>
