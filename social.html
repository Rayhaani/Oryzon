<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nexus Protocol - Gold & Obsidian Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* SABON TSARIN KALA (GOLD & OBSIDIAN) */
            --obsidian: #0A0A0A; 
            --premium-gold: #FDE08D;
            --deep-gold: #B8860B;
            --emerald-pulse: #50FA7B;
            --glass-bg: rgba(20, 20, 20, 0.95);
            --glass-border: rgba(253, 224, 141, 0.2);
            --gold-glow: 0 0 15px rgba(226, 176, 74, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* BACKGROUND IRIN NA HOTON DA KA TURO */
            background: var(--obsidian);
            background-image: radial-gradient(circle at center, #2a2210 0%, #0a0a0a 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            padding-bottom: 45px;
            transition: background 0.5s ease;
        }

        /* 1. PREMIUM HEADER */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 50px; 
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 1000;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            background: linear-gradient(90deg, #fff, var(--premium-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .neural-switch {
            width: 135px;
            height: 30px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            position: relative;
            display: flex;
        }

        .switch-blob {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 42px;
            height: 24px;
            background: linear-gradient(45deg, var(--premium-gold), var(--deep-gold));
            border-radius: 20px;
            z-index: 1;
            box-shadow: 0 0 10px var(--premium-gold);
        }

        .switch-label {
            flex: 1;
            font-family: 'Orbitron', sans-serif;
            font-size: 8px;
            text-align: center;
            line-height: 28px;
            z-index: 2;
            color: #fff;
        }

        /* 2. THE CONTENT (POST CARDS) */
        .feed-container {
            margin-top: 60px;
            padding: 0 10px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .post-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            margin-bottom: 15px;
            padding: 15px;
            position: relative;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--gold-glow);
        }

        /* MORPHING TRANSITION (FULL SCREEN) */
        .post-card.immersive-mode {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 5000;
            border-radius: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background: #000;
        }

        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--premium-gold); background: #222; }
        .username { font-family: 'Montserrat', sans-serif; font-size: 15px; color: #fff; font-weight: bold; }
        .post-content { font-size: 14px; line-height: 1.5; color: #eee; margin-bottom: 15px; }
        
        .post-media { 
            width: 100%; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            border: 1px solid var(--glass-border); 
            transition: all 0.5s ease;
        }

        .immersive-mode .post-media {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover;
            border-radius: 0;
            z-index: -1;
        }

        .immersive-mode .post-header, 
        .immersive-mode .post-content,
        .immersive-mode .interaction-bar {
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 20px;
        }

        .btn-nexus {
            background: transparent;
            border: none;
            color: var(--premium-gold);
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        /* FOOTER */
        .nexus-footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 45px; 
            background: rgba(10, 10, 10, 0.98);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 3000;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Nexus</div>
        <div class="neural-switch-wrapper">
            <div class="neural-switch" id="nexusSwitch">
                <div class="switch-blob"></div>
                <div class="switch-label">SOCIAL</div>
                <div class="switch-label">SHOP</div>
                <div class="switch-label">EARN</div>
            </div>
        </div>
        <div class="earning-tracker">
            <span id="token-count" style="font-family: 'Orbitron'; font-size: 11px; color: var(--emerald-pulse);">0.0000 NT</span>
        </div>
    </header>

    <div class="feed-container">
        <div class="post-card" onclick="toggleImmersive(this)">
            <div class="post-header">
                <div class="avatar"></div>
                <div class="username">Sadiq_Alhassan</div>
            </div>
            <div class="post-content">Barka da zuwa sabuwar duniyar Nexus. Wannan shi ne farkon tafiyar mu ta shekarar 3000. 🚀</div>
            <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070&auto=format&fit=crop" class="post-media" alt="Nexus Media">
            <div class="interaction-bar">
                <button class="btn-nexus">✦ Pulse</button>
                <button class="btn-nexus">💬 Echo</button>
                <button class="btn-nexus">🔗 Nexus</button>
            </div>
        </div>

        <div class="post-card" onclick="toggleImmersive(this)">
            <div class="post-header">
                <div class="avatar"></div>
                <div class="username">Tech_King_Kano</div>
            </div>
            <div class="post-content">Duba yadda wannan UI din yake yawo tamkar ruwa! #GoldEdition</div>
            <img src="https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?q=80&w=2000&auto=format&fit=crop" class="post-media" alt="Nexus Media">
            <div class="interaction-bar">
                <button class="btn-nexus">✦ Pulse</button>
                <button class="btn-nexus">💬 Echo</button>
                <button class="btn-nexus">🔗 Nexus</button>
            </div>
        </div>
    </div>

    <nav class="nexus-footer" id="instaFooter">
        <div class="footer-icon active" style="color: var(--premium-gold);"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L4 9v12h5v-7h6v7h5V9l-8-6z"/></svg></div>
        <div class="footer-icon" style="color: #fff;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 11-7.6-12.7 8.38 8.38 0 013.8.9L21 3z"/></svg></div>
        <div class="footer-icon" style="color: #fff;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg></div>
        <div class="footer-icon" style="color: #fff;"><img src="https://via.placeholder.com/150" alt="Me" style="width:26px; height:26px; border-radius:50%; border: 1.5px solid var(--premium-gold);"></div>
    </nav>

    <script>
        function toggleImmersive(card) {
            card.classList.toggle('immersive-mode');
            const footer = document.getElementById('instaFooter');
            if(card.classList.contains('immersive-mode')) {
                footer.style.display = 'none';
            } else {
                footer.style.display = 'flex';
            }
        }

        let tokens = 0.0000;
        setInterval(() => { 
            tokens += 0.0001; 
            document.getElementById('token-count').innerText = tokens.toFixed(4) + " NT"; 
        }, 5000);
    </script>
</body>
</html>
