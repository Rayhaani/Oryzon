/* Nexus Ultimate Gold Badge */
.nexus-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 14px;
    height: 14px;
    background: linear-gradient(135deg, #FDE08D 0%, #B8860B 100%);
    border-radius: 3px;
    margin-left: 6px;
    position: relative;
    transform: rotate(45deg);
    box-shadow: 0 0 10px rgba(253, 224, 141, 0.4);
    vertical-align: middle;
    border: 0.5px solid rgba(255, 255, 255, 0.4);
}

.nexus-badge i {
    transform: rotate(-45deg);
    font-size: 8px;
    color: #000;
    font-weight: 900;
}

/* Neural Pulse Effect */
.nexus-badge::after {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    border-radius: 3px;
    background: inherit;
    z-index: -1;
    animation: badgePulse 2s infinite ease-out;
}

@keyframes badgePulse {
    0% { transform: scale(1) rotate(0deg); opacity: 0.8; }
    100% { transform: scale(2.2) rotate(0deg); opacity: 0; }
}

/* Premium Shimmer Line */
.nexus-badge::before {
    content: '';
    position: absolute;
    top: -150%; left: -150%; width: 300%; height: 300%;
    background: linear-gradient(45deg, transparent, rgba(255,255,255,0.8), transparent);
    animation: nexusShimmer 3s infinite;
}

@keyframes nexusShimmer {
    0% { transform: translate(-100%, -100%) rotate(45deg); }
    100% { transform: translate(100%, 100%) rotate(45deg); }
    }

        // AIKIN FULL SCREEN (IMMERSIVE MODE)
        function toggleImmersive(card) {
            card.classList.toggle('immersive-mode');
            const footer = document.getElementById('instaFooter');
            if(card.classList.contains('immersive-mode')) {
                footer.classList.add('footer-hidden');
            } else {
                footer.classList.remove('footer-hidden');
            }
        }

        let tokens = 0.0000;
        const tokenDisplay = document.getElementById('token-count');
        setInterval(() => { tokens += 0.0001; tokenDisplay.innerText = tokens.toFixed(4) + " NT"; }, 5000);

        function triggerPulse(btn, event) {
            // Hana katsalandan din danna card (don kar ya koma full screen idan an danna like)
            if (event) event.stopPropagation(); 
            
            if (navigator.vibrate) navigator.vibrate(50);
            btn.style.color = "#FDE08D";
            btn.innerHTML = "✦ Pulsed!";
            tokens += 0.0005;
            tokenDisplay.innerText = tokens.toFixed(4) + " NT";
            setTimeout(() => { btn.style.color = "#FDE08D"; btn.innerHTML = "✦ Pulse"; }, 2000);
        }

        const footer = document.getElementById('instaFooter');
        let lastScrollTop = 0;
        window.addEventListener('scroll', () => {
            // Kada mu boye footer idan wani post yana full screen
            if (document.querySelector('.immersive-mode')) return;

            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            if (scrollTop > lastScrollTop) { footer.classList.add('footer-hidden'); } 
            else { footer.classList.remove('footer-hidden'); }
            lastScrollTop = scrollTop;
        });

function previewMedia(input) {
    const preview = document.getElementById('mediaPreview');
    const file = input.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
        // System din zai duba: Idan Video ne zai nuna Video Player, idan Hoto ne zai nuna Image
        if (file.type.includes('video')) {
            preview.innerHTML = `<video src="${e.target.result}" autoplay loop muted style="width:100%; border-radius:10px;"></video>`;
        } else {
            preview.innerHTML = `<img src="${e.target.result}" style="width:100%; border-radius:10px;">`;
        }
    }
    reader.readAsDataURL(file);
}

let currentlyPlayingVideo = null;
let globalSoundOn = false; // FALSE = muted, TRUE = sound yana kunna

const videoObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        const vid = entry.target;

        if (entry.isIntersecting) {
            // 1. Tsayar da video na baya
            if (currentlyPlayingVideo && currentlyPlayingVideo !== vid) {
                currentlyPlayingVideo.pause();
                currentlyPlayingVideo.muted = true;
                currentlyPlayingVideo.currentTime = 0;
                const prevCard = currentlyPlayingVideo.closest('.post-card');
                if (prevCard) {
                    const prevIcon = prevCard.querySelector('.mute-toggle i');
                    if (prevIcon) prevIcon.className = 'fa-solid fa-volume-xmark';
                }
            }

            // 2. Buga sabon video - tare da yanayin sound na yanzu
            vid.muted = !globalSoundOn; // Idan sound yana on, sabon video ya yi sauti kai tsaye
            vid.play().catch(() => {});
            currentlyPlayingVideo = vid;

            // 3. Gyara icon din sabon video ya nuna yanayin daidai
            const card = vid.closest('.post-card');
            if (card) {
                const icon = card.querySelector('.mute-toggle i');
                if (icon) {
                    icon.className = globalSoundOn 
                        ? 'fa-solid fa-volume-high' 
                        : 'fa-solid fa-volume-xmark';
                }
            }

        } else {
            // Video ya fita - tsayar da shi kawai, ba sauyi sound state ba
            vid.pause();
            vid.muted = true;
            vid.currentTime = 0;
            const card = vid.closest('.post-card');
            if (card) {
                const icon = card.querySelector('.mute-toggle i');
                if (icon) icon.className = 'fa-solid fa-volume-xmark';
            }
            if (currentlyPlayingVideo === vid) currentlyPlayingVideo = null;
        }
    });
}, { threshold: [0, 0.1] });

    /**
 * NEXUS PROTOCOL - ADVANCED VIDEO FEED ENGINE
 * Features: Viewport Priority, Pre-fetching, & Intelligent Scroll
 */

// 1. Saitin Intersection Observer don Loda Bidiyo Tun Kafin su Bayyana (Pre-fetching)
const videoOptions = {
    root: null,
    rootMargin: '400px 0px', // Fara loda bidiyo pixels 400 kafin ya shigo screen
    threshold: 0.01
};

const nexusObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        const video = entry.target;
        
        if (entry.isIntersecting) {
            // Fara loda bidiyo a boye (Buffer)
            video.preload = "auto";
        } else {
            // Idan ya fita nesa, dakatar da shi don rage nauyi
            video.pause();
        }
    });
}, videoOptions);

// 2. Viewport Priority Logic: Gano bidiyon da yake tsakiya daidai
function handleVideoPriority() {
    const videos = document.querySelectorAll('.post-media');
    let focusVideo = null;
    let minDistance = Infinity;
    const screenCenter = window.innerHeight / 2;

    videos.forEach(video => {
        if (video.tagName === 'VIDEO') {
            const rect = video.getBoundingClientRect();
            const videoCenter = rect.top + (rect.height / 2);
            const distanceFromCenter = Math.abs(screenCenter - videoCenter);

            // Duba idan bidiyon yana cikin screen akalla da kashi 50%
            if (rect.top < window.innerHeight && rect.bottom > 0) {
                if (distanceFromCenter < minDistance) {
                    minDistance = distanceFromCenter;
                    focusVideo = video;
                }
            }
            // Kashe duka sauran bidiyoyin
            if (video !== focusVideo) {
                video.pause();
            }
        }
    });

    // Kunna bidiyo mafi kusa da tsakiya
    if (focusVideo) {
        const playPromise = focusVideo.play();
        if (playPromise !== undefined) {
            playPromise.catch(error => {
                // Autoplay block prevention
            });
        }
    }
}

async function renderNexusFeed() {
    const feedContainer = document.querySelector('.feed-container');
    
    // Kamo Saved Posts na Sadiq_Alhassan
    try {
        const savedSnapshot = await db.collection("saved_posts")
            .where("userId", "==", "Sadiq_Alhassan")
            .get();
        window.userSavedPosts = savedSnapshot.docs.map(doc => doc.data().postId);
    } catch(e) { console.log("Saved posts error:", e); }

    // Sauraran Firebase don sabbin posts
    db.collection("posts").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
        let allPostsHTML = ''; 

        if (snapshot.empty) {
            feedContainer.innerHTML = '<div class="empty-feed">No posts yet...</div>';
            return;
        }

        snapshot.forEach((doc) => {
            const post = { id: doc.id, ...doc.data() };
            allPostsHTML += generatePostHTML(post);
        });

        // Saka posts a page
        feedContainer.innerHTML = allPostsHTML;

        // Kunna sa ido akan sabbin bidiyoyin da aka saka
        const newVideos = feedContainer.querySelectorAll('video');
        newVideos.forEach(v => nexusObserver.observe(v));

        // Kira priority check bayan an gama lodi
        setTimeout(handleVideoPriority, 500);
    });
}
