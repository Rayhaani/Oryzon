/* Nexus Ultimate Gold Badge */
.nexus-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 14px;
    height: 14px;
    background: linear-gradient(135deg, #FDE08D 0%, #B8860B 100%);
    border-radius: 3px;
    margin-left: 6px;
    position: relative;
    transform: rotate(45deg);
    box-shadow: 0 0 10px rgba(253, 224, 141, 0.4);
    vertical-align: middle;
    border: 0.5px solid rgba(255, 255, 255, 0.4);
}

.nexus-badge i {
    transform: rotate(-45deg);
    font-size: 8px;
    color: #000;
    font-weight: 900;
}

/* Neural Pulse Effect */
.nexus-badge::after {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    border-radius: 3px;
    background: inherit;
    z-index: -1;
    animation: badgePulse 2s infinite ease-out;
}

@keyframes badgePulse {
    0% { transform: scale(1) rotate(0deg); opacity: 0.8; }
    100% { transform: scale(2.2) rotate(0deg); opacity: 0; }
}

/* Premium Shimmer Line */
.nexus-badge::before {
    content: '';
    position: absolute;
    top: -150%; left: -150%; width: 300%; height: 300%;
    background: linear-gradient(45deg, transparent, rgba(255,255,255,0.8), transparent);
    animation: nexusShimmer 3s infinite;
}

@keyframes nexusShimmer {
    0% { transform: translate(-100%, -100%) rotate(45deg); }
    100% { transform: translate(100%, 100%) rotate(45deg); }
    }

.follow-text-link {

 <script>
  let userSavedPosts = []; // Wannan zai rinka rike duk abin da ka taba saving
  let tokens = 0.0000;
  let currentlyPlayingVideo = null;
  let globalSoundOn = false; // FALSE = muted, TRUE = sound yana kunna
  let scrollTimeout;

      // 1. Bayyana currentUser a matsayin Global Variable ta yadda kowa zai iya amfani da shi
  const currentUser = localStorage.getItem("nexus_user_session");

  // Global variables da ke kawo matsala idan ba a bayyana su ba (An magance blank page anan)
  let tokens = 0.0000;
  let scrollTimeout;
  let currentlyPlayingVideo = null;
  let globalSoundOn = false;

  // Check nan take idan babu session, a tura shi login
  if (!currentUser) {
      window.location.href = "login.html";
  }

  // AIKIN FULL SCREEN (IMMERSIVE MODE)
  function toggleImmersive(card) {
      card.classList.toggle('immersive-mode');
      const footer = document.getElementById('instaFooter');
      if(card.classList.contains('immersive-mode')) {
          footer.classList.add('footer-hidden');
      } else {
          footer.classList.remove('footer-hidden');
      }
  }

  const tokenDisplay = document.getElementById('token-count');
  setInterval(() => { tokens += 0.0001; if(tokenDisplay) tokenDisplay.innerText = tokens.toFixed(4) + " NT"; }, 5000);

  const footer = document.getElementById('instaFooter');
  let lastScrollTop = 0;
  window.addEventListener('scroll', () => {
      if (document.querySelector('.immersive-mode')) return;
      let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
      if (scrollTop > lastScrollTop) { if(footer) footer.classList.add('footer-hidden'); } 
      else { if(footer) footer.classList.remove('footer-hidden'); }
      lastScrollTop = scrollTop;
  });

  function stopProp(e) { e.stopPropagation(); }

  // Aikin Like button
  function triggerPulse(btn, e) {
      if (e) e.stopPropagation(); 
      const icon = btn.querySelector('i');
      if(icon.classList.contains('fa-regular')) {
          icon.classList.replace('fa-regular', 'fa-solid');
          icon.style.color = "#ff4757"; // Jan Like
          if(navigator.vibrate) navigator.vibrate(50);
          tokens += 0.0005;
          if(tokenDisplay) tokenDisplay.innerText = tokens.toFixed(4) + " NT";
      } else {
          icon.classList.replace('fa-solid', 'fa-regular');
          icon.style.color = "#fff";
      }
  }

  // Aikin Save button
  async function toggleSave(btn, postId) {
      const icon = btn.querySelector('i');
      const text = btn.querySelector('span'); 

      icon.classList.toggle('fa-solid');
      icon.classList.toggle('fa-regular');

      if (icon.classList.contains('fa-solid')) {
          text.innerText = "Saved"; 
          btn.style.color = "var(--premium-gold)"; 
          try {
              await db.collection("saved_posts").doc(`Sadiq_${postId}`).set({
                  userId: "Sadiq_Alhassan",
                  postId: postId,
                  savedAt: firebase.firestore.FieldValue.serverTimestamp()
              });
          } catch (e) { console.error("Error saving:", e); }
      } else {
          text.innerText = "Save"; 
          btn.style.color = "#fff"; 
          try {
              await db.collection("saved_posts").doc(`Sadiq_${postId}`).delete();
          } catch (e) { console.error("Error removing:", e); }
      }
  }

  function generatePostHTML(post) {
      const vBadge = `<span class="nexus-badge"><i class="fa-solid fa-check"></i></span>`;
      let mediaHTML = '';

      const defaultAvatar = "https://api.dicebear.com/7.x/bottts/svg?seed=Sadiq";
      const savedProfilePic = localStorage.getItem('userProfilePic');

      let currentPic = defaultAvatar;
      if (post.username && currentUser && post.username.toLowerCase() === currentUser.toLowerCase() && savedProfilePic) {
          currentPic = savedProfilePic;
      } else {
          currentPic = post.userProfilePic || "https://api.dicebear.com/7.x/bottts/svg?seed=" + (post.username || "User");
      }
      
      const profilePicHTML = `<img src="${currentPic}" class="avatar" style="width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 2px solid #fde08d; position: absolute; top:0; left:0;">`;
      
      if (post.mediaUrl) {
          if (post.mediaType === 'video') {
              mediaHTML = `
                  <div style="position:relative; width:100%;">
                      <video src="${post.mediaUrl}" class="post-media" loop playsinline autoplay muted></video>
                      <div class="mute-toggle" onclick="toggleVideoSound(event, this)">
                          <i class="fa-solid fa-volume-xmark"></i>
                      </div>
                  </div>`;
          } else {
              mediaHTML = `<img src="${post.mediaUrl}" class="post-media" loading="eager">`;
          }
      }

      return `
      <div class="post-card" onclick="toggleImmersive(this)">
          <div class="post-header" style="display: flex; align-items: center; justify-content: space-between; padding: 0 15px 0 0; height: 50px; position: relative;">
              <div style="display: flex; align-items: center; gap: 0; flex: 1;">
                  <a href="me.html" onclick="event.stopPropagation()" class="avatar-container" style="position: relative; width: 42px; height: 50px; flex-shrink: 0; display: block; cursor: pointer;">
                       ${profilePicHTML} 
                  </a>
                 <div class="username" style="font-size: 13px; font-weight: 600; display: flex; align-items: center; margin-left: 7px;">
                      <a href="me.html" onclick="event.stopPropagation()" style="color: inherit; text-decoration: none; display: flex; align-items: center;">
                          <span>${post.username || 'User'}</span>
                      </a>
                      ${vBadge}
                  </div>
              </div>
              <div class="header-actions" onclick="stopProp(event)" style="display: flex; align-items: center; gap: 12px;">
                  <button class="follow-text-link" onclick="handleFollow(this)">Follow</button>
                  <div class="gift-btn-nexus" onclick="openGiftPanel('${post.username}')">
                      <span class="gift-emoji">🎁</span>
                      <span style="font-size: 10px;">Gift</span>
                  </div>
              </div>
          </div>
          <div class="post-content" style="padding: 4px 10px;">${post.content}</div>
          ${mediaHTML}
          <div class="interaction-bar" onclick="stopProp(event)">
              <div class="action-capsules">
                  <div class="capsule" onclick="triggerPulse(this, event)">
                      <i class="fa-regular fa-heart"></i>
                      <span>${post.likes || 0}</span>
                  </div>
                  <div class="capsule"><i class="fa-regular fa-comment"></i><span>12</span></div>
                  <div class="capsule"><i class="fa-solid fa-arrows-rotate"></i><span>5</span></div>
                  <div class="capsule"><i class="fa-regular fa-paper-plane"></i></div>
              </div>
              <div class="action-capsules save-capsule">
                  <div class="capsule" onclick="toggleSave(this, '${post.id}')">
                      <i class="fa-regular fa-bookmark"></i>
                      <span>Save</span>
                  </div>
              </div>
          </div>
      </div>`;
  }

  function openPostOverlay() {
      document.getElementById('postOverlay').style.display = 'flex';
  }

  function closePostOverlay() {
      document.getElementById('postOverlay').style.display = 'none';
  }

  function previewMedia(input) {
      const preview = document.getElementById('mediaPreview');
      const file = input.files[0];
      const reader = new FileReader();

      reader.onload = function(e) {
          if (file.type.includes('video')) {
              preview.innerHTML = `<video src="${e.target.result}" autoplay loop muted style="width:100%; border-radius:10px;"></video>`;
          } else {
              preview.innerHTML = `<img src="${e.target.result}" style="width:100%; border-radius:10px;">`;
          }
      }
      reader.readAsDataURL(file);
  }
          
  async function publishPost() { 
      const text = document.getElementById('postText').value;
      const fileInput = document.getElementById('fileUpload');
      const file = fileInput.files[0];
      const publishBtn = document.querySelector('.publish-btn');

      if (!text && !file) return alert("Saka rubutu ko bidiyo!");

      publishBtn.innerText = "Ina turawa (Uploading)...";
      publishBtn.disabled = true;

      try {
          let mediaUrl = "";
          let mediaType = "none";

          if (file) {
              const cloudName = "diixjieyp";
              const uploadPreset = "oryzon_media"; 
              const formData = new FormData();
              formData.append('file', file);
              formData.append('upload_preset', uploadPreset);

              const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/upload`, {
                  method: 'POST',
                  body: formData
              });

              if (!response.ok) throw new Error("Cloudinary upload failed");
              const data = await response.json();
              mediaUrl = data.secure_url;
              mediaType = file.type.includes('video') ? 'video' : 'image';
          }

          const selectedCategory = document.querySelector('input[name="postType"]:checked').value;

          await db.collection("posts").add({
              username: currentUser, 
              content: text,
              mediaUrl: mediaUrl,
              mediaType: mediaType,
              category: selectedCategory, 
              timestamp: firebase.firestore.FieldValue.serverTimestamp(),
              likes: 0
          });
          
          alert("An riga an tura saƙon naka! 🚀");
          location.reload();

      } catch (error) {
          console.error(error);
          alert("An samu matsala: " + error.message);
      } finally {
          publishBtn.innerText = "Publish Post";
          publishBtn.disabled = false;
      }
  }
</script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDExSOnFbN-wJbT1UFgB-kBs37bEa3KiWc",
    authDomain: "oryzon-50ea4.firebaseapp.com",
    projectId: "oryzon-50ea4",
    storageBucket: "oryzon-50ea4.firebasestorage.app",
    messagingSenderId: "782106742622",
    appId: "1:782106742622:web:902d512bfe42dd4cf289cf",
    measurementId: "G-K5085DLL2W"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const storage = firebase.storage();
  const analytics = firebase.analytics();

  console.log("Oryzon Cloud is now active! 🚀");

  // Kira Feed da sauran ayyuka bayan lodi
  window.addEventListener('DOMContentLoaded', () => {
      renderNexusFeed();
      loadFooterProfile();
      
      const savedProfile = localStorage.getItem('userProfilePic');
      const storyAvatar = document.getElementById('story-avatar-preview');
      if (savedProfile && storyAvatar) {
          storyAvatar.src = savedProfile;
      }
      observeVideos();

      if (currentUser) {
          db.collection("users").doc(currentUser).get()
          .then((doc) => {
              if (doc.exists) {
                  const data = doc.data();
                  if (document.getElementById("userProfileName")) {
                      document.getElementById("userProfileName").innerText = data.fullName;
                  }
              }
          })
          .catch((err) => {
              console.error("Error fetching user data:", err);
          });
      }
  });

  document.addEventListener('click', function(e) {
      if (e.target.tagName === 'VIDEO') {
          if (e.target.paused) { e.target.play(); } 
          else { e.target.pause(); } // AN GYARA NAN: an cire .paused() zuwa .pause()
      }
  });

  function handleFollow(btn) {
      if (btn.innerText === "Follow") {
          btn.innerText = "Following";
          btn.classList.add('active');
          if (navigator.vibrate) navigator.vibrate(10);
      } else {
          btn.innerText = "Follow";
          btn.classList.remove('active');
      }
  }

  function openGiftPanel(username) {
      alert("Kyautar NT tokens tana kan hanya zuwa ga " + username);
  }
      
  const videoObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
          const vid = entry.target;
          if (entry.isIntersecting) {
              if (currentlyPlayingVideo && currentlyPlayingVideo !== vid) {
                  currentlyPlayingVideo.pause();
                  currentlyPlayingVideo.muted = true;
                  currentlyPlayingVideo.currentTime = 0;
                  const prevCard = currentlyPlayingVideo.closest('.post-card');
                  if (prevCard) {
                      const prevIcon = prevCard.querySelector('.mute-toggle i');
                      if (prevIcon) prevIcon.className = 'fa-solid fa-volume-xmark';
                  }
              }
              vid.muted = !globalSoundOn;
              vid.play().catch(() => {});
              currentlyPlayingVideo = vid;

              const card = vid.closest('.post-card');
              if (card) {
                  const icon = card.querySelector('.mute-toggle i');
                  if (icon) {
                      icon.className = globalSoundOn ? 'fa-solid fa-volume-high' : 'fa-solid fa-volume-xmark';
                  }
              }
          } else {
              vid.pause();
              vid.muted = true;
              vid.currentTime = 0;
              const card = vid.closest('.post-card');
              if (card) {
                  const icon = card.querySelector('.mute-toggle i');
                  if (icon) icon.className = 'fa-solid fa-volume-xmark';
              }
              if (currentlyPlayingVideo === vid) currentlyPlayingVideo = null;
          }
      });
  }, { threshold: [0, 0.1] });

  function toggleVideoSound(event, btn) {
      if (event) event.stopPropagation();
      const card = btn.closest('.post-card');
      const vid = card ? card.querySelector('video') : null;
      if (!vid) return;
      const icon = btn.querySelector('i');

      globalSoundOn = !globalSoundOn;

      if (globalSoundOn) {
          document.querySelectorAll('video').forEach(other => {
              if (other !== vid) {
                  other.muted = true;
                  const otherIcon = other.closest('.post-card')?.querySelector('.mute-toggle i');
                  if (otherIcon) otherIcon.className = 'fa-solid fa-volume-xmark';
              }
          });
          vid.muted = false;
          icon.className = 'fa-solid fa-volume-high';
      } else {
          vid.muted = true;
          icon.className = 'fa-solid fa-volume-xmark';
      }
  }

  function observeVideos() {
      videoObserver.disconnect();
      document.querySelectorAll('video').forEach(vid => {
          vid.muted = true;
          videoObserver.observe(vid);
      });
  }

  function loadFooterProfile() {
      const savedPic = localStorage.getItem('userProfilePic');
      const footerImg = document.getElementById('footerProfileImg');
      if (savedPic && footerImg) {
          footerImg.src = savedPic;
      } else {
          if(footerImg) footerImg.src = "https://api.dicebear.com/7.x/bottts/svg?seed=Sadiq";
      }
  }

  const videoOptions = { root: null, rootMargin: '400px 0px', threshold: 0.01 };

  const nexusObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
          const video = entry.target;
          if (entry.isIntersecting) { video.preload = "auto"; } 
          else { video.pause(); }
      });
  }, videoOptions);

  function handleVideoPriority() {
      const videos = document.querySelectorAll('.post-media');
      let focusVideo = null;
      let minDistance = Infinity;
      const screenCenter = window.innerHeight / 2;

      videos.forEach(video => {
          if (video.tagName === 'VIDEO') {
              const rect = video.getBoundingClientRect();
              const videoCenter = rect.top + (rect.height / 2);
              const distanceFromCenter = Math.abs(screenCenter - videoCenter);

              if (rect.top < window.innerHeight && rect.bottom > 0) {
                  if (distanceFromCenter < minDistance) {
                      minDistance = distanceFromCenter;
                      focusVideo = video;
                  }
              }
              if (video !== focusVideo) { video.pause(); }
          }
      });

      if (focusVideo) {
          const playPromise = focusVideo.play();
          if (playPromise !== undefined) { playPromise.catch(e => {}); }
      }
  }

  async function renderNexusFeed() {
      const feedContainer = document.querySelector('.feed-container');
      try {
          const savedSnapshot = await db.collection("saved_posts")
              .where("userId", "==", "Sadiq_Alhassan")
              .get();
          window.userSavedPosts = savedSnapshot.docs.map(doc => doc.data().postId);
      } catch(e) { console.log("Saved posts error:", e); }

      db.collection("posts").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
          let allPostsHTML = ''; 

          if (snapshot.empty) {
              feedContainer.innerHTML = '<div class="empty-feed" style="text-align:center; padding:20px; color:#aaa;">No posts yet...</div>';
              return;
          }

          snapshot.forEach((doc) => {
              const post = { id: doc.id, ...doc.data() };
              allPostsHTML += generatePostHTML(post);
          });

          feedContainer.innerHTML = allPostsHTML;

          const newVideos = feedContainer.querySelectorAll('video');
          newVideos.forEach(v => nexusObserver.observe(v));
          setTimeout(handleVideoPriority, 500);
      });
  }

  window.addEventListener('scroll', () => {
      clearTimeout(scrollTimeout);
      scrollTimeout = setTimeout(handleVideoPriority, 150);
  }, { passive: true });

  function openStory(storyId) {
      if (navigator.vibrate) navigator.vibrate(15);
      if (storyId === 'live_now') {
          alert("Shiga tsarin Synergy Live Stream... 🎥🔥");
      } else if (storyId === 'your_story') {
          alert("Wannan sashin story ɗinka ne! ⚡");
      } else {
          alert("Ana loda labarin Synergy Story na (" + storyId + ")... ⚡");
      }
    }
    
  
    </script>
