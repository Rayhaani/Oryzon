<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nexus Protocol - Debug Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --obsidian: #050505;
            --cyan-neon: #FDE08D; 
            --emerald-pulse: #50FA7B;
            --glass-bg: rgba(10, 10, 10, 0.8); 
            --glass-border: rgba(253, 224, 141, 0.2); 
            --premium-gold: #ffd700;
        }
        body {
            background-color: #050505 !important; 
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 60px;
            overflow-x: hidden;
        } 
        header {
            position: fixed; top: 0; width: 100vw; height: 50px; z-index: 5000;
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px;
            background: rgba(245, 245, 247, 0.35) !important; backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important; border-bottom: 1px solid rgba(255, 255, 255, 0.12) !important;
        }     
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: #fff; }
        .feed-container { margin-top: 70px; padding: 0 10px; max-width: 500px; margin-left: auto; margin-right: auto; }
        .nexus-footer {
            position: fixed; bottom: 0; width: 100%; height: 50px; 
            background: rgba(5, 5, 5, 0.95); border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: space-around; align-items: center; z-index: 9999;
        }
        .footer-icon { color: #fff; opacity: 0.5; cursor: pointer; }
        .footer-icon.active { opacity: 1; }
        .error-log-box { background: #ff0055; color: white; padding: 10px; border-radius: 5px; margin: 10px 0; display: none; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <div class="logo">Nexus</div>
    <div style="font-size: 12px; color: var(--emerald-pulse);">System Live</div>
</header>

<div class="feed-container">
    <div id="errorLog" class="error-log-box"></div>
    <h2 style="font-family: 'Orbitron'; font-size: 16px; margin-bottom: 15px;">Nexus Feed Container</h2>
    <p style="color: #aaa; font-size: 14px;">Idan kana ganin wannan rubutun, to shafin ya buɗe lafiya lau. Matsalar tana cikin loda posts ne daga Firebase ko kuma wani script na waje.</p>
</div>

<nav class="nexus-footer">
    <div class="footer-icon active"><i class="fa-solid fa-house"></i></div>
    <div class="footer-icon"><i class="fa-solid fa-comment"></i></div>
    <div class="footer-icon"><i class="fa-solid fa-plus"></i></div>
    <div class="footer-icon"><i class="fa-solid fa-compass"></i></div>
    <div class="footer-icon"><i class="fa-solid fa-user"></i></div>
</nav>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
  // Kama ko wane irin kuskure ne kafin komai ya mutu
  window.onerror = function(message, source, lineno, colno, error) {
      const errorBox = document.getElementById('errorLog');
      if(errorBox) {
          errorBox.style.display = 'block';
          errorBox.innerHTML = `<strong>Error Detected:</strong> ${message} <br>Line: ${lineno} in ${source}`;
      }
      return false;
  };

  const firebaseConfig = {
    apiKey: "AIzaSyDExSOnFbN-wJbT1UFgB-kBs37bEa3KiWc",
    authDomain: "oryzon-50ea4.firebaseapp.com",
    projectId: "oryzon-50ea4",
    storageBucket: "oryzon-50ea4.firebasestorage.app",
    messagingSenderId: "782106742622",
    appId: "1:782106742622:web:902d512bfe42dd4cf289cf"
  };

  try {
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();
      console.log("Firebase Connected Successfully!");
  } catch(e) {
      console.error("Firebase Init Error:", e);
  }

  window.addEventListener('DOMContentLoaded', () => {
      console.log("DOM Fully Loaded and Parsed.");
  });
</script>
</body>
</html>
