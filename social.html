<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nexus Protocol - 2050 Balanced Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="post-card-template.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #050505;
            --cyan-neon: #FDE08D; 
            --emerald-pulse: #50FA7B;
            --glass-bg: rgba(10, 10, 10, 0.8); 
            --glass-border: rgba(253, 224, 141, 0.2); 
            --premium-gold: #ffd700;
            --gold-glow: 0 0 15px rgba(226, 176, 74, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #050505 !important; 
            background-image: none !important;    
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            padding-bottom: 60px;
        } 

        /* ====== GYARAN HEADER DOMIN YA RIKE MENU ICON A GEFEN DAMA ====== */
        header {
            position: fixed;
            top: 0;
            width: 100vw; 
            height: 50px; 
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            box-sizing: border-box;
            background: rgba(245, 245, 247, 0.35) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12) !important;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4) !important;
        }     
            
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            line-height: 30px; 
            height: 30px; 
            display: flex;
            align-items: center;
            background: linear-gradient(90deg, #FFFFFF 0%, #FDE08D 50%, #B8860B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: none; 
        }

        .neural-switch-wrapper {
            display: flex;
            align-items: center;
            height: 30px;
        }

        .neural-switch {
            width: 135px;
            height: 30px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            box-shadow: 0 0 15px rgba(253, 224, 141, 0.1);
        }

        .switch-blob {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 42px;
            height: 24px;
            background: linear-gradient(45deg, #FDE08D, #B8860B);
            border-radius: 20px;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1;
            box-shadow: 0 0 20px rgba(253, 224, 141, 0.4);
        }

        .switch-active .switch-blob {
            left: 91px;
            background: linear-gradient(45deg, var(--emerald-pulse), #00b09b);
            box-shadow: 0 0 20px var(--emerald-pulse);
        }

        .switch-label {
            flex: 1;
            font-family: 'Orbitron', sans-serif;
            font-size: 8px;
            letter-spacing: 0.5px;
            text-align: center;
            line-height: 28px;
            z-index: 2;
            transition: 0.3s;
            color: #fff;
            mix-blend-mode: overlay;
        }

        /* Wannan sashen ne ke rike da Earning tracker da Menu Icon a jere */
        .header-right-cluster {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .earning-tracker {
            background: rgba(80, 250, 123, 0.05);
            border: 1px solid var(--emerald-pulse);
            padding: 0px 10px;
            height: 30px; /* Mun gyara tsayinsa ya daidaita da Menu Icon */
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 0 10px rgba(80, 250, 123, 0.1);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: var(--emerald-pulse);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ====== STYLE NA MENU ICON DIN KA ====== */
        .menu-container {
            position: relative;
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(253, 224, 141, 0.2);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .menu-container::before {
            content: '';
            position: absolute;
            inset: -1.5px;
            border-radius: 9px;
            background: linear-gradient(135deg, #00f2fe, #FDE08D, #050505, #00f2fe);
            background-size: 300% 300%;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease, filter 0.4s ease;
        }

        .menu-trigger {
            position: relative;
            width: 18px;
            height: 14px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .menu-line {
            display: block;
            height: 2px;
            background: linear-gradient(90deg, #ffffff, #FDE08D);
            border-radius: 10px;
            transition: all 0.4s cubic-bezier(0.68, -0.60, 0.32, 1.60);
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.1);
        }

        .line-top { width: 65%; align-self: flex-start; }
        .line-middle { width: 100%; background: linear-gradient(90deg, #FDE08D, #B8860B); }
        .line-bottom { width: 65%; align-self: flex-end; }

        .menu-container:hover {
            transform: scale(1.05);
            border-color: rgba(253, 224, 141, 0.5);
            box-shadow: 0 0 12px rgba(253, 224, 141, 0.3);
        }

        .menu-container:hover::before {
            opacity: 1;
            filter: blur(4px);
            animation: pulseGlow 4s linear infinite;
        }

        .menu-container:hover .line-top,
        .menu-container:hover .line-bottom { width: 100%; }

        .menu-container.is-active .line-top {
            width: 100%;
            transform: translateY(6px) rotate(45deg);
            background: linear-gradient(90deg, #FDE08D, #ffffff);
        }

        .menu-container.is-active .line-middle {
            width: 0%; opacity: 0; transform: translateX(-10px);
        }

        .menu-container.is-active .line-bottom {
            width: 100%;
            transform: translateY(-6px) rotate(-45deg);
            background: linear-gradient(90deg, #FDE08D, #ffffff);
        }

        @keyframes pulseGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
            
        /* ====== PREFERENCES NA FEED DA POST CARDS ====== */
        .feed-container {
            margin-top: 4px;
            padding: 0 10px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .post-card {
            background: rgba(255, 255, 255, 0.06) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border: 1px solid #fde08d; 
            overflow: hidden;
            border-radius: 20px;
            margin-bottom: 10px;
            padding-bottom: 0 !important;
            position: relative;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--gold-glow);
        }


        .post-card.immersive-mode {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 5000;
            border-radius: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background: #000;
        }
        

        .post-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--premium-gold), transparent);
            animation: slide-glow 3s infinite;
        }

        @keyframes slide-glow {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .post-header { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            padding: 15px 15px 10px 15px; 
            margin: 0 0 10px 0;
            background: linear-gradient(180deg, rgba(253, 224, 141, 0.12) 0%, transparent 100%);
            border-bottom-left-radius: 40px 15px; 
            border-bottom-right-radius: 40px 15px;
            border-bottom: 1px solid rgba(253, 224, 141, 0.2);
            position: relative;
        }
        
        .post-content {
            padding: 0px 12px 8px 12px; 
            margin-top: -5px; 
            text-align: justify;
            text-justify: inter-word;
            font-size: 14px;
            line-height: 1.4; 
            color: #efefef;
        }
        
        .avatar {
            position: absolute; 
            top: 0px; 
            left: 0px; 
            width: 42px; 
            height: 42px; 
            border: 2px solid #fde08d; 
            border-radius: 50%; 
            z-index: 10; 
            background: #111;
            object-fit: cover;
        }

        .username { 
            font-size: 18px; 
            color: #fff; 
            font-weight: 800;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        .post-media { 
            width: 100%; 
            max-height: 550px;
            min-height: 250px;
            background-color: #111; 
            object-fit: cover;
            border-radius: 12px; 
            margin-top: 10px;
            display: block;  
            transition: all 0.3s ease;
        }
        
        .immersive-mode .post-media {
            position: absolute;
            top: 0; 
            left: 0; 
            width: 100vw !important; 
            height: 100vh !important; 
            max-height: none !important; 
            object-fit: cover;
            border-radius: 0;
            z-index: -1;
        }

        .immersive-mode .post-header, 
.immersive-mode .post-content,
.immersive-mode .interaction-bar {
    position: relative;
    z-index: 5001;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
}

.immersive-mode .post-content,
.immersive-mode .interaction-bar {
    padding: 10px 20px;
}
        
        .interaction-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 8px !important;
            background: rgba(10, 10, 10, 0.5);
            backdrop-filter: blur(10px);
            margin-bottom: 0 !important;
            border-top: none !important; 
        }

        .action-capsules {
            display: flex;
            gap: 6px; 
        }

        .capsule {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 50px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            justify-content: center; 
            gap: 5px;
            min-width: 45px; 
            height: 32px;    
            cursor: pointer;
            transition: all 0.3s ease;
            color: #ffffff;
        }

        .capsule i { 
            font-size: 16px; 
            line-height: 1;
        }

        .capsule span { 
            font-size: 11px; 
            font-weight: 600;
        }

        .save-capsule {
            margin-left: auto;
        }

        .save-capsule .capsule {
            min-width: 70px; 
        }
        
        .nexus-footer {
            position: fixed; bottom: 0; width: 100%; height: 50px; 
            background: rgba(5, 5, 5, 0.95); border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 9999; padding: 0; transition: transform 0.4s ease;
            backdrop-filter: blur(10px);
        }
        .footer-hidden { transform: translateY(100%); }
        .footer-icon { color: #fff; opacity: 0.5; cursor: pointer; height: 100%; width: 50px; display: flex; align-items: center; justify-content: center; }
        .footer-icon.active { opacity: 1; filter: drop-shadow(0 0 5px var(--cyan-neon)); }
        .profile-img { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid #fff; object-fit: cover; }
        
        .post-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 6000;
        }

        .overlay-content {
            background: var(--obsidian);
            width: 90%;
            max-width: 450px;
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 20px;
            box-shadow: var(--gold-glow);
            max-height: 90vh; 
            overflow-y: auto; 
            position: relative;
        }

        .overlay-header {
            position: sticky;
            top: 0;
            background: var(--obsidian);
            z-index: 10;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .overlay-header h3 { font-family: 'Orbitron'; font-size: 14px; color: var(--premium-gold); }
        .close-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }

        #postText {
            width: 100%;
            height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 15px;
            color: white;
            padding: 15px;
            font-family: 'Inter';
            resize: none;
        }

        .media-preview {
            margin-top: 15px;
            border-radius: 15px;
            overflow: hidden;
            width: 100%;
            max-height: 250px; 
            background: rgba(0,0,0,0.2);
            display: flex;
            border: 1px dashed var(--glass-border);
        }

        .media-preview img {
            width: 100%;
            height: 250px; 
            object-fit: cover;
        }
        
        .overlay-actions {
            margin: 20px 0;
            display: flex;
            gap: 15px;
        }

        .action-item {
            background: rgba(253, 224, 141, 0.1);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--premium-gold);
            font-size: 13px;
        }

        .publish-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #FDE08D, #B8860B);
            border: none;
            border-radius: 30px;
            color: black;
            font-weight: bold;
            font-family: 'Orbitron';
            cursor: pointer;
        }

        .post-category-selector { margin-top: 15px; }
        .category-options { display: flex; gap: 10px; }
        .cat-chip input { display: none; }
        .cat-chip span {
            padding: 8px 15px;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            display: inline-block;
            transition: 0.3s;
        }
        .cat-chip input:checked + span {
            background: var(--premium-gold);
            color: black;
            border-color: var(--premium-gold);
            box-shadow: var(--gold-glow);
        }

        video::-webkit-media-controls { display:none !important; }
        video::-webkit-media-controls-start-playback-button { display: none !important; -webkit-appearance: none; }

        /* Blue check badge style */
        .nexus-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 15px;
            height: 15px;
            background-color: #1d9bf0; 
            clip-path: polygon(50% 0%, 61% 5%, 72% 0%, 80% 9%, 91% 9%, 91% 20%, 100% 28%, 95% 39%, 100% 50%, 95% 61%, 100% 72%, 91% 80%, 91% 91%, 80% 91%, 72% 100%, 61% 95%, 50% 100%, 39% 95%, 28% 100%, 20% 91%, 9% 91%, 9% 80%, 0% 72%, 5% 61%, 0% 50%, 5% 39%, 0% 28%, 9% 20%, 9% 9%, 20% 9%, 28% 0%, 39% 5%);
            margin-left: 5px;
            vertical-align: middle;
        }
        .nexus-badge i {
    font-size: 9px;
    color: #ffffff !important;
    font-weight: 900;
        }
                                        
        .header-actions { display: flex; align-items: center; gap: 10px; margin-left: auto; }

        .follow-text-link {
            position: relative;
            padding: 6px 18px;
            font-family: 'Montserrat', sans-serif;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: #fde08d;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01));
            border: 1.5px solid #fde08d;
            border-radius: 50px; 
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .follow-text-link::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(253, 224, 141, 0.2) 0%, transparent 70%);
            opacity: 0; transition: 0.8s;
        }

        .follow-text-link:hover {
            color: #111; background: #fde08d; transform: scale(1.05);
            box-shadow: 0 0 30px rgba(253, 224, 141, 0.6); letter-spacing: 4px;
        }

        .follow-text-link:hover::after { opacity: 1; transform: scale(1); }

        .gift-btn-nexus {
            display: flex; align-items: center; gap: 5px;
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d); 
            border: 1px solid rgba(253, 224, 141, 0.2); 
            padding: 0 10px; height: 28px; border-radius: 8px; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .gift-btn-nexus:active { transform: scale(0.92); }
        .gift-emoji { font-size: 14px; filter: drop-shadow(0 0 4px rgba(253, 224, 141, 0.5)); animation: giftWobble 4s infinite; }
        .gift-btn-nexus span:last-child { font-size: 10px; color: #ffffff; font-weight: 600; letter-spacing: 0.2px; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }

        @keyframes giftWobble {
            0%, 90%, 100% { transform: rotate(0deg); }
            92% { transform: rotate(15deg); }
            95% { transform: rotate(-15deg); }
            98% { transform: rotate(15deg); }
        }

        .gift-btn-nexus span { white-space: nowrap; }
        .post-username {
    font-size: 15px !important;
    font-weight: 700 !important;
    color: #fff !important;
    margin-top: 4px !important;
    display: block !important;
        }


        .post-time {
    font-size: 12px !important;
    color: rgba(255, 255, 255, 0.75) !important;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    margin-top: 3px !important;
    margin-bottom: 4px !important;
    display: block !important;
    text-transform: capitalize !important;
        }
        
        .mute-toggle {
            position: absolute; bottom: 15px; right: 15px; width: 30px; height: 30px;
            background: rgba(0, 0, 0, 0.6); border-radius: 50%; display: flex; align-items: center;
            justify-content: center; color: white; z-index: 100; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .mute-toggle i { font-size: 14px; }

        /* STORIES STRUCTURE */
        .nexus-stories-container {
    margin-top: 50px !important;
    position: relative !important;
    z-index: 100 !important;
    display: flex !important;
    flex-direction: row !important;
    align-items: center !important;
    padding: 0 !important;
    overflow: hidden !important;
    width: 100% !important;
    box-sizing: border-box !important;
    background-color: #050505 !important;
    height: 95px !important;
            }

        
        .story-card {
            display: inline-flex !important;
            flex-direction: column !important;
            align-items: center !important;
            flex-shrink: 0 !important;       
            width: 76px !important;
            text-align: center;
            cursor: pointer;
        }

        .story-avatar-wrapper {
            position: relative;
            width: 72px !important;
            height: 72px !important;
            border-radius: 20px !important;  
            padding: 3px !important;
            box-sizing: border-box !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            background: transparent;
            transition: all 0.3s ease;
        }

        .story-avatar { width: 100% !important; height: 100% !important; border-radius: 16px !important; object-fit: cover !important; }
        .story-card.active-user .story-avatar-wrapper { border: 1px dashed rgba(255, 255, 255, 0.4) !important; }

        .story-card.is-live .story-avatar-wrapper {
            border: 1px solid #ff0000 !important; 
            animation: nexusLivePulse 1.2s infinite ease-in-out !important;
        }

        @keyframes nexusLivePulse {
            0% { border-color: #ff0000 !important; box-shadow: 0 0 4px rgba(255, 0, 0, 0.5); }
            50% { border-color: #ff5555 !important; box-shadow: 0 0 14px rgba(255, 0, 0, 0.8); }
            100% { border-color: #ff0000 !important; box-shadow: 0 0 4px rgba(255, 0, 0, 0.5); }
        }

        .story-card.has-story .story-avatar-wrapper {
            border: 1px solid #fde08d !important;
            box-shadow: 0 0 8px rgba(253, 224, 141, 0.2);
        }

        .add-story-btn {
            position: absolute; bottom: -2px; right: -2px; background: #ffcc00 !important; 
            color: #000 !important; width: 18px; height: 18px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; border: 1px solid #111;
        }

        .live-badge {
            position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%);
            background: #ff0000 !important; color: #fff !important; font-size: 8px !important;
            font-weight: bold !important; padding: 2px 6px !important; border-radius: 4px !important; text-transform: uppercase;
        }

        .story-username {
            font-size: 11px !important; color: #fff !important; margin-top: 5px !important; display: block;
            max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; opacity: 0.9;
        }

      function handleVideoPriority() {
          const videos = document.querySelectorAll('.post-media');
          let focusVideo = null; let minDistance = Infinity;
          const screenCenter = window.innerHeight / 2;

          videos.forEach(video => {
              if (video.tagName === 'VIDEO') {
                  const rect = video.getBoundingClientRect();
                  const videoCenter = rect.top + (rect.height / 2);
                  const distanceFromCenter = Math.abs(screenCenter - videoCenter);
                  if (rect.top < window.innerHeight && rect.bottom > 0) {
                      if (distanceFromCenter < minDistance) { minDistance = distanceFromCenter; focusVideo = video; }
                  }
                  if (video !== focusVideo) { video.pause(); }
              }
          });

function buildProgressBar(count) {
    const bar = document.getElementById('progressBar');
    bar.innerHTML = '';
    for (let i = 0; i < count; i++) {
        bar.innerHTML += `<div class="progress-segment"><div class="progress-fill" id="prog-${i}"></div></div>`;
    }
}

function showSlide(index) {
    clearInterval(progressInterval);
    if (!currentStory) return;
    const slides = currentStory.slides;
    if (index < 0 || index >= slides.length) { closeStoryViewer(); return; }

    currentSlide = index;
    document.getElementById('viewerImage').src = slides[index].img;
    document.getElementById('viewerText').textContent = slides[index].text;

    slides.forEach((_, i) => {
        const fill = document.getElementById('prog-' + i);
        if (fill) fill.style.width = i < index ? '100%' : '0%';
    });

    const fill = document.getElementById('prog-' + index);
    if (!fill) return;

    let width = 0;
    const step = 100 / (SLIDE_DURATION / 100);
    progressInterval = setInterval(() => {
        width += step;
        fill.style.width = Math.min(width, 100) + '%';
        if (width >= 100) { clearInterval(progressInterval); showSlide(index + 1); }
    }, 100);
}

function nextStory() { showSlide(currentSlide + 1); }

  (function initConveyor() {
    const SPEED = 15;
    let offset = 0;
    let lastTime = null;
    let paused = false;
    let singleSetWidth = 0;

    function setup() {
        const belt = document.getElementById('conveyorBelt');
        if (!belt) return;

        // Auna kowane card daidai
        const originals = Array.from(belt.children);
        const gap = 8;
        let measuredWidth = 0;
        originals.forEach(card => {
            measuredWidth += card.offsetWidth + gap;
        });
        singleSetWidth = measuredWidth;

        // Clone 3x don loop seamless
        originals.forEach(card => belt.appendChild(card.cloneNode(true)));
        originals.forEach(card => belt.appendChild(card.cloneNode(true)));
        originals.forEach(card => belt.appendChild(card.cloneNode(true)));

        belt.addEventListener('touchstart', () => { paused = true; }, { passive: true });
        belt.addEventListener('touchend', () => { paused = false; lastTime = null; }, { passive: true });

        requestAnimationFrame(tick);
    }

    function tick(ts) {
        if (!lastTime) lastTime = ts;
        const dt = Math.min((ts - lastTime) / 1000, 0.032);
        lastTime = ts;

        if (!paused && singleSetWidth > 0) {
            offset -= SPEED * dt;
            if (offset <= -singleSetWidth) {
                offset += singleSetWidth;
            }
            const belt = document.getElementById('conveyorBelt');
            if (belt) belt.style.transform = `translateX(${offset}px)`;
        }

        requestAnimationFrame(tick);
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', setup);
    } else {
        setTimeout(setup, 600);
    }
})();
