<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nexus Protocol - 2050 Balanced Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
            /* HEADER DA FOOTER DA SAURAN CSS DIN KA NA ASALI - BAN TABASU BA */
        :root {
            --obsidian: #050505;
            --cyan-neon: #FDE08D; /* Mun mayar da asalin neon din zuwa Gold */
            --emerald-pulse: #50FA7B;
            --glass-bg: rgba(10, 10, 10, 0.8); /* Mun dan rage haske don ya dace da Obsidian */
            --glass-border: rgba(253, 224, 141, 0.2); /* Border din ya koma kalar zinari */
            /* Na kara wannan kalar kawai don Post Card din */
            --premium-gold: #FDE08D;
            --gold-glow: 0 0 15px rgba(226, 176, 74, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--obsidian);
            background-image: radial-gradient(circle at 10% 20%, rgba(226, 176, 74, 0.05) 0%, transparent 50%),
                              radial-gradient(circle at 90% 80%, rgba(253, 224, 141, 0.03) 0%, transparent 50%);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            padding-bottom: 45px;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 50px; 
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 1000;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            line-height: 30px; 
            height: 30px; 
            display: flex;
            align-items: center;
            /* WANNAN SHI NE KALAR DA KAKE SO A HOTON (1000914397.jpg) */
            background: linear-gradient(90deg, #FFFFFF 0%, #FDE08D 50%, #B8860B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: none; 
        }

        .neural-switch-wrapper {
            display: flex;
            align-items: center;
            height: 30px;
        }

        .neural-switch {
            width: 135px;
            height: 30px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            box-shadow: 0 0 15px rgba(253, 224, 141, 0.1);
        }

        .switch-blob {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 42px;
            height: 24px;
            /* Mun canza kalar blob zuwa Gold Gradient */
            background: linear-gradient(45deg, #FDE08D, #B8860B);
            border-radius: 20px;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1;
            box-shadow: 0 0 20px rgba(253, 224, 141, 0.4);
        }

        .switch-active .switch-blob {
            left: 91px;
            background: linear-gradient(45deg, var(--emerald-pulse), #00b09b);
            box-shadow: 0 0 20px var(--emerald-pulse);
        }

        .switch-label {
            flex: 1;
            font-family: 'Orbitron', sans-serif;
            font-size: 8px;
            letter-spacing: 0.5px;
            text-align: center;
            line-height: 28px;
            z-index: 2;
            transition: 0.3s;
            color: #fff;
            mix-blend-mode: overlay;
        }

        .earning-tracker {
            background: rgba(80, 250, 123, 0.05);
            border: 1px solid var(--emerald-pulse);
            padding: 0px 10px;
            height: 25px; 
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 0 10px rgba(80, 250, 123, 0.1);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: var(--emerald-pulse);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
            }
            

        
        /* ---------------------------------------------------- */
        /* CANJIN KAWAI YANA NAN A SASHE NA POST CARD */
        /* ---------------------------------------------------- */
        .feed-container {
            margin-top: 60px;
            padding: 0 10px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .post-card {
            background: rgba(20, 20, 20, 0.95); /* Kalar Obsidian */
            backdrop-filter: blur(10px);
            border: 1px solid var(--premium-gold); /* Kalar Zinari */
            border-radius: 20px;
            margin-bottom: 10px;
            padding: 15px;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--gold-glow);
        }

        /* FULL SCREEN MODE */
        .post-card.immersive-mode {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 5000;
            border-radius: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background: #000;
        }

        .post-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--premium-gold), transparent);
            animation: slide-glow 3s infinite;
        }

        @keyframes slide-glow {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

                .post-header { 
            display: flex; 
            align-items: center; 
            gap: 10px; /* Mun rage nisan dake tsakanin avatar da suna */
            
            /* RAGE TSAVO A NAN */
            padding: 8px 15px; /* Mun rage daga 15px zuwa 8px don ya zama siriri */
            margin: -15px -15px 10px -15px; 
            
            background: linear-gradient(180deg, rgba(253, 224, 141, 0.12) 0%, transparent 100%);
            border-bottom-left-radius: 40px 15px; 
            border-bottom-right-radius: 40px 15px;
            border-bottom: 1px solid rgba(253, 224, 141, 0.2);
            position: relative;
        }

        .avatar { 
            width: 34px; /* Mun rage girman avatar daga 42px zuwa 34px */
            height: 34px; 
            border-radius: 50%; 
            border: 1.5px solid var(--premium-gold); 
            background: #111; 
        }

        .username { 
            font-size: 13px; /* Mun rage girman font din kadan */
            color: #fff; 
            font-weight: 600;
        }
        
        
        .post-media { 
            width: 100%; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            border: 1px solid var(--glass-border); 
        }

        .immersive-mode .post-media {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover;
            border-radius: 0;
            z-index: -1;
        }

        .immersive-mode .post-header, 
        .immersive-mode .post-content,
        .immersive-mode .interaction-bar {
            position: relative;
            z-index: 5001;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 10px 20px;
        }


                .interaction-bar {
            display: flex;
            justify-content: space-between; /* Wannan zai tura Save icon can karshe */
            align-items: center;
            border-top: 1px solid rgba(253, 224, 141, 0.1);
            padding: 12px 5px 5px 5px;
            margin-top: 10px;
        }

        .left-actions {
            display: flex;
            gap: 18px; /* Sarari tsakanin Pulse, Echo, da sauran su */
            align-items: center;
        }

        .btn-nexus {
            background: transparent;
            border: none;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 18px; /* Girman icon din */
            transition: transform 0.2s ease;
        }

        .btn-nexus:active {
            transform: scale(1.2);
        }

        .btn-nexus i {
            color: #fff; /* Icons din su kasance fari ko Gold */
        }

        .btn-nexus span {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 400;
            color: #ccc;
        }

        /* Save Icon dake gefe guda */
        .save-btn {
            color: #fff;
            font-size: 18px;
            cursor: pointer;
        }
        
        /* Pulse (Like) effect */
        .pulsed i {
            color: #ff4757; /* Jaja idan an taba Pulse */
        }
        

        /* FOOTER NA ASALI - BAN TABASU BA */
        .nexus-footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 45px; 
            background: rgba(5, 5, 5, 0.98);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 3000;
            padding: 0;
            transition: transform 0.5s ease;
        }

        .footer-hidden { transform: translateY(100%); }

        .footer-icon {
            color: #fff;
            opacity: 0.5;
            cursor: pointer;
            height: 100%;
            width: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer-icon.active { opacity: 1; filter: drop-shadow(0 0 5px var(--cyan-neon)); }

        .profile-img {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1.5px solid #fff;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Nexus</div>
        <div class="neural-switch-wrapper">
            <div class="neural-switch" id="nexusSwitch">
                <div class="switch-blob"></div>
                <div class="switch-label" onclick="window.location.href='social.html'">SOCIAL</div>
                <div class="switch-label" onclick="window.location.href='shop.html'">SHOP</div>
                <div class="switch-label" onclick="window.location.href='earn.html'">EARN</div>
            </div>
        </div>
        <div class="earning-tracker">
            <div class="pulse-dot"></div>
            <span id="token-count" style="font-family: 'Orbitron'; font-size: 11px;">0.0000 NT</span>
        </div>
    </header>

    <div class="feed-container">
        <div class="post-card" onclick="toggleImmersive(this)">
            <div class="post-header">
                <div class="avatar"></div>
                <div class="username">Sadiq_Alhassan</div>
            </div>
            <div class="post-content">Barka da zuwa sabuwar duniyar Nexus. Wannan shi ne farkon tafiyar mu ta shekarar 3000. 🚀</div>
            <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070&auto=format&fit=crop" alt="Nexus Media" class="post-media">
           
            <div class="interaction-bar">
    <div class="left-actions">
        <button class="btn-nexus" onclick="triggerPulse(this)">
            <i class="fa-regular fa-heart"></i>
            <span>228</span>
        </button>
        
        <button class="btn-nexus">
            <i class="fa-regular fa-comment"></i>
            <span>2</span>
        </button>
        
        <button class="btn-nexus">
            <i class="fa-solid fa-arrows-rotate"></i>
            <span>3</span>
        </button>

        <button class="btn-nexus">
            <i class="fa-regular fa-paper-plane"></i>
            <span>3</span>
        </button>
    </div>

    <div class="save-btn" onclick="this.querySelector('i').classList.toggle('fa-solid'); this.querySelector('i').classList.toggle('fa-regular')">
        <i class="fa-regular fa-bookmark"></i>
    </div>
            </div>


            
        <div class="post-card" onclick="toggleImmersive(this)">
            <div class="post-header">
                <div class="avatar"></div>
                <div class="username">Tech_King_Kano</div>
            </div>
            <div class="post-content">Duba yadda wannan UI din yake yawo tamkar ruwa! #GoldEdition</div>
            <img src="https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?q=80&w=2000&auto=format&fit=crop" alt="Nexus Media" class="post-media">
            <div class="interaction-bar">
                <button class="btn-nexus" onclick="triggerPulse(this)">✦ Pulse</button>
                <button class="btn-nexus">💬 Echo</button>
                <button class="btn-nexus">🔗 Nexus</button>
            </div>
            <span class="earning-badge">+0.005 NT earned for watching</span>
        </div>
    </div>

    <nav class="nexus-footer" id="instaFooter">
        <div class="footer-icon active"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L4 9v12h5v-7h6v7h5V9l-8-6z"/></svg></div>
        <div class="footer-icon" onclick="window.location.href='chats.html'"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 11-7.6-12.7 8.38 8.38 0 013.8.9L21 3z"/></svg></div>
        <div class="footer-icon active"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg></div>
        <div class="footer-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 2v20M8 2v20M2 12h20"/></svg></div>
        <div class="footer-icon" onclick="window.location.href='me.html'"><img src="https://via.placeholder.com/150" alt="Me" class="profile-img"></div>
    </nav>

    <script>
        // AIKIN FULL SCREEN (IMMERSIVE MODE)
        function toggleImmersive(card) {
            card.classList.toggle('immersive-mode');
            const footer = document.getElementById('instaFooter');
            if(card.classList.contains('immersive-mode')) {
                footer.classList.add('footer-hidden');
            } else {
                footer.classList.remove('footer-hidden');
            }
        }

        let tokens = 0.0000;
        const tokenDisplay = document.getElementById('token-count');
        setInterval(() => { tokens += 0.0001; tokenDisplay.innerText = tokens.toFixed(4) + " NT"; }, 5000);

        function triggerPulse(btn, event) {
            // Hana katsalandan din danna card (don kar ya koma full screen idan an danna like)
            if (event) event.stopPropagation(); 
            
            if (navigator.vibrate) navigator.vibrate(50);
            btn.style.color = "#FDE08D";
            btn.innerHTML = "✦ Pulsed!";
            tokens += 0.0005;
            tokenDisplay.innerText = tokens.toFixed(4) + " NT";
            setTimeout(() => { btn.style.color = "#FDE08D"; btn.innerHTML = "✦ Pulse"; }, 2000);
        }

        const footer = document.getElementById('instaFooter');
        let lastScrollTop = 0;
        window.addEventListener('scroll', () => {
            // Kada mu boye footer idan wani post yana full screen
            if (document.querySelector('.immersive-mode')) return;

            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            if (scrollTop > lastScrollTop) { footer.classList.add('footer-hidden'); } 
            else { footer.classList.remove('footer-hidden'); }
            lastScrollTop = scrollTop;
        });
    </script>
</body>
                                            </html>
