        /* HEADER DA FOOTER DA SAURAN CSS DIN KA NA ASALI - BAN TABASU BA */
            /* HEADER DA FOOTER DA SAURAN CSS DIN KA NA ASALI - BAN TABASU BA */
        :root {
            --obsidian: #050505;
            --cyan-neon: #FDE08D; /* Mun mayar da asalin neon din zuwa Gold */
            --emerald-pulse: #50FA7B;
            --glass-bg: rgba(10, 10, 10, 0.8); /* Mun dan rage haske don ya dace da Obsidian */
            --glass-border: rgba(253, 224, 141, 0.2); /* Border din ya koma kalar zinari */
            /* Na kara wannan kalar kawai don Post Card din */
            --premium-gold: #FDE08D;
            --gold-glow: 0 0 15px rgba(226, 176, 74, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--obsidian);
            background-image: radial-gradient(circle at 10% 20%, rgba(226, 176, 74, 0.05) 0%, transparent 50%),
                              radial-gradient(circle at 90% 80%, rgba(253, 224, 141, 0.03) 0%, transparent 50%);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            padding-bottom: 45px;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 50px; 
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 1000;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            line-height: 30px; 
            height: 30px; 
            display: flex;
            align-items: center;
            /* WANNAN SHI NE KALAR DA KAKE SO A HOTON (1000914397.jpg) */
            background: linear-gradient(90deg, #FFFFFF 0%, #FDE08D 50%, #B8860B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: none; 
        }

        .neural-switch-wrapper {
            display: flex;
            align-items: center;
            height: 30px;
        }

        .neural-switch {
            width: 135px;
            height: 30px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            box-shadow: 0 0 15px rgba(253, 224, 141, 0.1);
        }

        .switch-blob {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 42px;
            height: 24px;
            /* Mun canza kalar blob zuwa Gold Gradient */
            background: linear-gradient(45deg, #FDE08D, #B8860B);
            border-radius: 20px;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1;
            box-shadow: 0 0 20px rgba(253, 224, 141, 0.4);
        }

        .switch-active .switch-blob {
            left: 91px;
            background: linear-gradient(45deg, var(--emerald-pulse), #00b09b);
            box-shadow: 0 0 20px var(--emerald-pulse);
        }

        .switch-label {
            flex: 1;
            font-family: 'Orbitron', sans-serif;
            font-size: 8px;
            letter-spacing: 0.5px;
            text-align: center;
            line-height: 28px;
            z-index: 2;
            transition: 0.3s;
            color: #fff;
            mix-blend-mode: overlay;
        }

        .earning-tracker {
            background: rgba(80, 250, 123, 0.05);
            border: 1px solid var(--emerald-pulse);
            padding: 0px 10px;
            height: 25px; 
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 0 10px rgba(80, 250, 123, 0.1);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: var(--emerald-pulse);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
            }
            

        
        /* ---------------------------------------------------- */
        /* CANJIN KAWAI YANA NAN A SASHE NA POST CARD */
        /* ---------------------------------------------------- */
        .feed-container {
            margin-top: 60px;
            padding: 0 10px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .post-card {
            background: rgba(20, 20, 20, 0.95); /* Kalar Obsidian */

            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);

        }

        /* FULL SCREEN MODE */
        .post-card.immersive-mode {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 5000;
            border-radius: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background: #000;
        }

        .post-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--premium-gold), transparent);
            animation: slide-glow 3s infinite;
        }

        @keyframes slide-glow {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

    <script>
        // AIKIN FULL SCREEN (IMMERSIVE MODE)
        function toggleImmersive(card) {
            card.classList.toggle('immersive-mode');
            const footer = document.getElementById('instaFooter');
            if(card.classList.contains('immersive-mode')) {
                footer.classList.add('footer-hidden');
            } else {
                footer.classList.remove('footer-hidden');
            }
        }

        let tokens = 0.0000;
        const tokenDisplay = document.getElementById('token-count');
        setInterval(() => { tokens += 0.0001; tokenDisplay.innerText = tokens.toFixed(4) + " NT"; }, 5000);

        function triggerPulse(btn, event) {
            // Hana katsalandan din danna card (don kar ya koma full screen idan an danna like)
            if (event) event.stopPropagation(); 
            
            if (navigator.vibrate) navigator.vibrate(50);
            btn.style.color = "#FDE08D";
            btn.innerHTML = "✦ Pulsed!";
            tokens += 0.0005;
            tokenDisplay.innerText = tokens.toFixed(4) + " NT";
            setTimeout(() => { btn.style.color = "#FDE08D"; btn.innerHTML = "✦ Pulse"; }, 2000);
        }

        const footer = document.getElementById('instaFooter');
        let lastScrollTop = 0;
        window.addEventListener('scroll', () => {
            // Kada mu boye footer idan wani post yana full screen
            if (document.querySelector('.immersive-mode')) return;

            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            if (scrollTop > lastScrollTop) { footer.classList.add('footer-hidden'); } 
            else { footer.classList.remove('footer-hidden'); }
            lastScrollTop = scrollTop;
        });



        // Wannan yana hana Card din budewa idan an taba icons
function stopProp(e) { e.stopPropagation(); }

// Aikin Like button
function triggerPulse(btn, e) {
    if (e) e.stopPropagation(); 
    const icon = btn.querySelector('i');
    if(icon.classList.contains('fa-regular')) {
        icon.classList.replace('fa-regular', 'fa-solid');
        icon.style.color = "#ff4757"; // Jan Like
        if(navigator.vibrate) navigator.vibrate(50);
    } else {
        icon.classList.replace('fa-solid', 'fa-regular');
        icon.style.color = "#fff";
    }
}
        

// Aikin Save button
function toggleSave(btn) {
    const icon = btn.querySelector('i');
    icon.classList.toggle('fa-solid');
    icon.classList.toggle('fa-regular');
}

        function renderNexusFeed() {
    const feedContainer = document.querySelector('.feed-container');
    feedContainer.innerHTML = ''; // Share tsofaffin posts

    nexusPosts.forEach(post => {
        // 1. Duba ko Image ne ko Video
        let mediaHTML = '';
        if (post.mediaType === 'image') {
            mediaHTML = `<img src="${post.mediaUrl}" class="post-media">`;
        } else if (post.mediaType === 'video') {
            mediaHTML = `
                <video class="post-media" autoplay loop muted playsinline>
                    <source src="${post.mediaUrl}" type="video/mp4">
                </video>`;
        }

        // 2. Duba ko Talla ce domin saka Earning Badge
        let badgeHTML = post.isAd ? `<span class="earning-badge">${post.earningBadge}</span>` : '';

        // 3. Gina Post Card din baki daya
        const cardHTML = `
            <div class="post-card" onclick="toggleImmersive(this)">
                <div class="post-header">
                    <div class="avatar"></div>
                    <div class="username">${post.username}</div>
                </div>
                <div class="post-content" style="margin-bottom:10px; font-size:14px; color:#ddd;">${post.content}</div>
                
                ${mediaHTML}
                
                <div class="interaction-bar" onclick="stopProp(event)">
                    <div class="left-actions">
                        <button class="btn-nexus" onclick="triggerPulse(this, event)">
                            <i class="fa-regular fa-heart"></i>
                            <span>${post.likes}</span>
                        </button>
                        <button class="btn-nexus"><i class="fa-regular fa-comment"></i><span>${post.comments}</span></button>
                        <button class="btn-nexus"><i class="fa-solid fa-arrows-rotate"></i></button>
                        <button class="btn-nexus"><i class="fa-regular fa-paper-plane"></i></button>
                    </div>
                    <div class="save-btn" onclick="toggleSave(this)"><i class="fa-regular fa-bookmark"></i></div>
                </div>
                ${badgeHTML}
            </div>
        `;

        feedContainer.innerHTML += cardHTML;
    });
}

// Kira aikin idan an bude page
window.onload = renderNexusFeed;

function closePostOverlay() {
    document.getElementById('postOverlay').style.display = 'none';
}

// 2. Preview na Media (Zai gane ko hoto ne ko video)
function previewMedia(input) {
    const preview = document.getElementById('mediaPreview');
    const file = input.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
        if (file.type.includes('video')) {
            preview.innerHTML = `<video src="${e.target.result}" autoplay loop muted></video>`;
        } else {
            preview.innerHTML = `<img src="${e.target.result}">`;
        }
    }
    reader.readAsDataURL(file);
}

// 3. Publish Post (Zai saka sabon post a saman Feed dinka)
function publishPost() {
    const text = document.getElementById('postText').value;
    const mediaContainer = document.getElementById('mediaPreview');
    const mediaElement = mediaContainer.querySelector('img, video');
    
    if (!text && !mediaElement) return alert("Saka rubutu ko hoto!");

    const newPost = {
        username: "Sadiq_Alhassan", // User dinka
        content: text,
        mediaType: mediaElement && mediaElement.tagName === 'VIDEO' ? 'video' : 'image',
        mediaUrl: mediaElement ? mediaElement.src : '',
        isAd: false,
        likes: "0",
        comments: "0"
    };

    // Saka post din a saman list (nexusPosts array din da muka yi dā)
    nexusPosts.unshift(newPost);
    
    // Sake nuna feed din (re-render)
    renderNexusFeed();
    
    // Rufe overlay da share bayanan dā

    };
