<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --obsidian: #050505;
            --cyan-neon: #FDE08D; 
            --emerald-pulse: #50FA7B;
            --glass-bg: rgba(10, 10, 10, 0.8); 
            --glass-border: rgba(253, 224, 141, 0.2); 
            --premium-gold: #ffd700;
            --gold-glow: 0 0 15px rgba(226, 176, 74, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #050505 !important; 
            background-image: none !important;    
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            padding-bottom: 60px;
        } 

        /* ====== GYARAN HEADER DOMIN YA RIKE MENU ICON A GEFEN DAMA ====== */
        header {
            position: fixed;
            top: 0;
            width: 100vw; 
            height: 50px; 
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            box-sizing: border-box;
            background: rgba(245, 245, 247, 0.35) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12) !important;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4) !important;
        }     
            
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            line-height: 30px; 
            height: 30px; 
            display: flex;
            align-items: center;
            background: linear-gradient(90deg, #FFFFFF 0%, #FDE08D 50%, #B8860B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: none; 
        }

        .neural-switch-wrapper {
            display: flex;
            align-items: center;
            height: 30px;
        }

        .neural-switch {
            width: 135px;
            height: 30px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            box-shadow: 0 0 15px rgba(253, 224, 141, 0.1);
        }

        .switch-blob {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 42px;
            height: 24px;
            background: linear-gradient(45deg, #FDE08D, #B8860B);
            border-radius: 20px;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1;
            box-shadow: 0 0 20px rgba(253, 224, 141, 0.4);
        }

        .switch-active .switch-blob {
            left: 91px;
            background: linear-gradient(45deg, var(--emerald-pulse), #00b09b);
            box-shadow: 0 0 20px var(--emerald-pulse);
        }

        .switch-label {
            flex: 1;
            font-family: 'Orbitron', sans-serif;
            font-size: 8px;
            letter-spacing: 0.5px;
            text-align: center;
            line-height: 28px;
            z-index: 2;
            transition: 0.3s;
            color: #fff;
            mix-blend-mode: overlay;
        }

        /* Wannan sashen ne ke rike da Earning tracker da Menu Icon a jere */
        .header-right-cluster {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .earning-tracker {
            background: rgba(80, 250, 123, 0.05);
            border: 1px solid var(--emerald-pulse);
            padding: 0px 10px;
            height: 30px; /* Mun gyara tsayinsa ya daidaita da Menu Icon */
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 0 10px rgba(80, 250, 123, 0.1);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: var(--emerald-pulse);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ====== STYLE NA MENU ICON DIN KA ====== */
        .menu-container {
            position: relative;
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(253, 224, 141, 0.2);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .menu-container::before {
            content: '';
            position: absolute;
            inset: -1.5px;
            border-radius: 9px;
            background: linear-gradient(135deg, #00f2fe, #FDE08D, #050505, #00f2fe);
            background-size: 300% 300%;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease, filter 0.4s ease;
        }

        .menu-trigger {
            position: relative;
            width: 18px;
            height: 14px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .menu-line {
            display: block;
            height: 2px;
            background: linear-gradient(90deg, #ffffff, #FDE08D);
            border-radius: 10px;
            transition: all 0.4s cubic-bezier(0.68, -0.60, 0.32, 1.60);
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.1);
        }

        .line-top { width: 65%; align-self: flex-start; }
        .line-middle { width: 100%; background: linear-gradient(90deg, #FDE08D, #B8860B); }
        .line-bottom { width: 65%; align-self: flex-end; }

        .menu-container:hover {
            transform: scale(1.05);
            border-color: rgba(253, 224, 141, 0.5);
            box-shadow: 0 0 12px rgba(253, 224, 141, 0.3);
        }

        .menu-container:hover::before {
            opacity: 1;
            filter: blur(4px);
            animation: pulseGlow 4s linear infinite;
        }

        .menu-container:hover .line-top,
        .menu-container:hover .line-bottom { width: 100%; }

        .menu-container.is-active .line-top {
            width: 100%;
            transform: translateY(6px) rotate(45deg);
            background: linear-gradient(90deg, #FDE08D, #ffffff);
        }

        .menu-container.is-active .line-middle {
            width: 0%; opacity: 0; transform: translateX(-10px);
        }

        .menu-container.is-active .line-bottom {
            width: 100%;
            transform: translateY(-6px) rotate(-45deg);
            background: linear-gradient(90deg, #FDE08D, #ffffff);
        }

        @keyframes pulseGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
            
        /* ====== PREFERENCES NA FEED DA POST CARDS ====== */
        .feed-container {
            margin-top: 4px;
            padding: 0 10px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        
        .nexus-footer {
            position: fixed; bottom: 0; width: 100%; height: 50px; 
            background: rgba(5, 5, 5, 0.95); border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 9999; padding: 0; transition: transform 0.4s ease;
            backdrop-filter: blur(10px);
        }
        .footer-hidden { transform: translateY(100%); }
        .footer-icon { color: #fff; opacity: 0.5; cursor: pointer; height: 100%; width: 50px; display: flex; align-items: center; justify-content: center; }
        .footer-icon.active { opacity: 1; filter: drop-shadow(0 0 5px var(--cyan-neon)); }
        .profile-img { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid #fff; object-fit: cover; }
        
        .post-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 6000;
        }

        .overlay-content {
            background: var(--obsidian);
            width: 90%;
            max-width: 450px;
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 20px;
            box-shadow: var(--gold-glow);
            max-height: 90vh; 
            overflow-y: auto; 
            position: relative;
        }

        .overlay-header {
            position: sticky;
            top: 0;
            background: var(--obsidian);
            z-index: 10;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .overlay-header h3 { font-family: 'Orbitron'; font-size: 14px; color: var(--premium-gold); }
        .close-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }

        #postText {
            width: 100%;
            height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 15px;
            color: white;
            padding: 15px;
            font-family: 'Inter';
            resize: none;
        }

        .media-preview {
            margin-top: 15px;
            border-radius: 15px;
            overflow: hidden;
            width: 100%;
            max-height: 250px; 
            background: rgba(0,0,0,0.2);
            display: flex;
            border: 1px dashed var(--glass-border);
        }

        .media-preview img {
            width: 100%;
            height: 250px; 
            object-fit: cover;
        }
        
        .overlay-actions {
            margin: 20px 0;
            display: flex;
            gap: 15px;
        }

        .action-item {
            background: rgba(253, 224, 141, 0.1);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--premium-gold);
            font-size: 13px;
        }

        .publish-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #FDE08D, #B8860B);
            border: none;
            border-radius: 30px;
            color: black;
            font-weight: bold;
            font-family: 'Orbitron';
            cursor: pointer;
        }

        .post-category-selector { margin-top: 15px; }
        .category-options { display: flex; gap: 10px; }
        .cat-chip input { display: none; }
        .cat-chip span {
            padding: 8px 15px;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            display: inline-block;
            transition: 0.3s;
        }
        .cat-chip input:checked + span {
            background: var(--premium-gold);
            color: black;
            border-color: var(--premium-gold);
            box-shadow: var(--gold-glow);
        }

        
        /* STORIES STRUCTURE */
        .nexus-stories-container {
    margin-top: 50px !important;
    position: relative !important;
    z-index: 100 !important;
    display: flex !important;
    flex-direction: row !important;
    align-items: center !important;
    padding: 0 !important;
    overflow: hidden !important;

    box-sizing: border-box !important;
    background-color: #050505 !important;
    height: 95px !important;
            }

        
        .story-card {
            display: inline-flex !important;
            flex-direction: column !important;
            align-items: center !important;
            flex-shrink: 0 !important;       
            width: 76px !important;
            text-align: center;
            cursor: pointer;
        }

        .story-avatar-wrapper {
            position: relative;
            width: 72px !important;
            height: 72px !important;
            border-radius: 20px !important;  
            padding: 3px !important;
            box-sizing: border-box !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            background: transparent;
            transition: all 0.3s ease;
        }

        .story-avatar { width: 100% !important; height: 100% !important; border-radius: 16px !important; object-fit: cover !important; }
        .story-card.active-user .story-avatar-wrapper { border: 1px dashed rgba(255, 255, 255, 0.4) !important; }

        .story-card.is-live .story-avatar-wrapper {
            border: 1px solid #ff0000 !important; 
            animation: nexusLivePulse 1.2s infinite ease-in-out !important;
        }

        @keyframes nexusLivePulse {
            0% { border-color: #ff0000 !important; box-shadow: 0 0 4px rgba(255, 0, 0, 0.5); }
            50% { border-color: #ff5555 !important; box-shadow: 0 0 14px rgba(255, 0, 0, 0.8); }
            100% { border-color: #ff0000 !important; box-shadow: 0 0 4px rgba(255, 0, 0, 0.5); }
        }

        .story-card.has-story .story-avatar-wrapper {
            border: 1px solid #fde08d !important;
            box-shadow: 0 0 8px rgba(253, 224, 141, 0.2);
        }

        .add-story-btn {
            position: absolute; bottom: -2px; right: -2px; background: #ffcc00 !important; 
            color: #000 !important; width: 18px; height: 18px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; border: 1px solid #111;
        }

        .live-badge {
            position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%);
            background: #ff0000 !important; color: #fff !important; font-size: 8px !important;
            font-weight: bold !important; padding: 2px 6px !important; border-radius: 4px !important; text-transform: uppercase;
        }

        .story-username {
            font-size: 11px !important; color: #fff !important; margin-top: 5px !important; display: block;
            max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; opacity: 0.9;
        }

        
        /* ================= DROPDOWN MAFI TSAFTA ================= */
.Cyber-Dropdown {

    z-index: 999;

}

/* Idan an danna icon, wannan class din zai fito da shi */
.Cyber-Dropdown.Active {

}

/* 1. PROGRESS BAR: Mannewa tsaf 100% ba tare da wani sarari ba gaba daya */
.story-progress-bar {
    display: flex;
    gap: 2px; /* Rage tazarar tsakanin segment din don professional look */
    padding: 0 !important; 
    margin: 0 !important;
    position: absolute;
    top: 0 !important; 
    left: 0 !important;

        const BACKEND_URL = 'https://oryzon-backend-ed1q.onrender.com';
        
      let userSavedPosts = [];

      const currentUser = localStorage.getItem("nexus_user_session");

      if (!currentUser) {
          window.location.href = "login.html";
      }

      function openPostOverlay() { document.getElementById('postOverlay').style.display = 'flex'; }
      function closePostOverlay() { document.getElementById('postOverlay').style.display = 'none'; }

      function previewMedia(input) {
          const preview = document.getElementById('mediaPreview');
          const file = input.files[0];
          const reader = new FileReader();
          reader.onload = function(e) {
              if (file.type.includes('video')) {
                  preview.innerHTML = `<video src="${e.target.result}" autoplay loop muted style="width:100%; border-radius:10px;"></video>`;
              } else {
                  preview.innerHTML = `<img src="${e.target.result}" style="width:100%; border-radius:10px;">`;
              }
          }
          reader.readAsDataURL(file);
      }
              
      async function publishPost() { 
          const text = document.getElementById('postText').value;
          const fileInput = document.getElementById('fileUpload');
          const file = fileInput.files[0];
          const publishBtn = document.querySelector('.publish-btn');

          if (!text && !file) return alert("Saka rubutu ko bidiyo!");
          publishBtn.innerText = "Ina turawa (Uploading)...";
          publishBtn.disabled = true;

          try {
              let mediaUrl = ""; let mediaType = "none";
              if (file) {
                  const formData = new FormData();
                  formData.append('file', file);
                  formData.append('type', 'feed'); 
                  formData.append('username', currentUser);

                  // Mun cire Cloudinary, mun dawo da shi zuwa Backend na Render dinku mai dauke da Storj
                  const response = await fetch(`${BACKEND_URL}/upload`, { method: 'POST', body: formData });
                  if (!response.ok) throw new Error("Storj upload via Render failed");
                  const data = await response.json();
                  
                  if (data.success) {
                      mediaUrl = data.url;
                      mediaType = file.type.includes('video') ? 'video' : 'image';
                  } else {
                      throw new Error(data.error || "Sabar ta gaza turawa zuwa Storj.");
                  }
              }

              const selectedCategory = document.querySelector('input[name="postType"]:checked').value;

              await db.collection("posts").add({
    username: currentUser,
    userProfilePic: localStorage.getItem('userProfilePic') || '',
    content: text,
    mediaUrl: mediaUrl,
    mediaType: mediaType,
    category: selectedCategory,
    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
    likes: 0
});
              
              alert("Your Post has been Published! 🚀");
              location.reload();
          } catch (error) {
              console.error(error); alert("An samu matsala: " + error.message);
          } finally {
              publishBtn.innerText = "Publish Post"; publishBtn.disabled = false;
          }
                      }
              
    </script>

        slides: [{ img: 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=600&q=80', text: 'Daily Trust latest news 📰' }]
    }
};

function openStory(storyId) {
    const story = storyMap[storyId];
    if (!story) return;

    currentStory = story;
    currentStory._id = storyId;
    currentSlide = 0;
    isPaused = false;

    document.getElementById('viewerAvatar').src = story.avatar;
    document.getElementById('viewerName').textContent = story.name;
    document.getElementById('viewerTime').textContent = story.time;

    buildProgressBar(story.slides.length);
    showSlide(0);

    document.getElementById('storyViewer').classList.add('open');
    document.body.style.overflow = 'hidden';
    document.getElementById('instaFooter').style.display = 'none';

    if (navigator.vibrate) navigator.vibrate(15);
}

function closeStoryViewer() {
    document.getElementById('storyViewer').classList.remove('open');
    document.body.style.overflow = '';
    clearInterval(progressInterval);
    currentStory = null;
    isPaused = false;
    document.getElementById('instaFooter').style.display = 'flex';
}

function buildProgressBar(count) {
    const bar = document.getElementById('progressBar');
    bar.innerHTML = '';
    for (let i = 0; i < count; i++) {
        bar.innerHTML += `<div class="progress-segment"><div class="progress-fill" id="prog-${i}"></div></div>`;
    }
}

function showSlide(index) {
    clearInterval(progressInterval);
    if (!currentStory) return;

    const slides = currentStory.slides;

    // Idan slides din wannan member sun kare, je next member
    if (index >= slides.length) {
        goToNextMember();
        return;
    }
    // Idan ya koma baya fiye da kashi na farko, rufe
    if (index < 0) {
        closeStoryViewer();
        return;
    }

    currentSlide = index;
    isPaused = false;

    document.getElementById('viewerImage').src = slides[index].img;
    document.getElementById('viewerText').textContent = slides[index].text;

    // Cike bars da suka gabata, share na gaba
    slides.forEach((_, i) => {
        const fill = document.getElementById('prog-' + i);
        if (fill) fill.style.width = i < index ? '100%' : '0%';
    });

    // Fara progress na wannan slide
    progressWidth = 0;
    const fill = document.getElementById('prog-' + index);
    if (!fill) return;

    const step = 100 / (SLIDE_DURATION / 100);
    progressInterval = setInterval(() => {
        if (isPaused) return; // ← PAUSE yana aiki nan
        progressWidth += step;
        fill.style.width = Math.min(progressWidth, 100) + '%';
        if (progressWidth >= 100) {
            clearInterval(progressInterval);
            showSlide(index + 1);
        }
    }, 100);
}

function goToNextMember() {
    const currentIndex = storyOrder.indexOf(currentStory._id);
    const nextId = storyOrder[currentIndex + 1];
    if (nextId && storyMap[nextId]) {
        openStory(nextId);
    } else {
        closeStoryViewer(); // Karshen dukan stories
    }
}

function nextStory() { showSlide(currentSlide + 1); }
function prevStory() { showSlide(currentSlide - 1); }

// ===== TAP TO PAUSE / RESUME =====
// Mun cire tap zones na prev/next, mun sanya hold logic a maimakon
const viewer = document.getElementById('storyViewer');

let holdTimer = null;
let isHolding = false;

viewer.addEventListener('touchstart', (e) => {
    // Kar a pause idan suna danna close btn ko input
    if (e.target.closest('.story-close-btn') || e.target.closest('.hud-footer-capsule')) return;
    
    holdTimer = setTimeout(() => {
        isHolding = true;
        isPaused = true; // ← PAUSE
    }, 150); // Hold 150ms = pause
}, { passive: true });

viewer.addEventListener('touchend', (e) => {
    clearTimeout(holdTimer);
    
    if (isHolding) {
        // Saki yatsa = resume
        isPaused = false;
        isHolding = false;
        return;
    }

    // Gajeren danna = prev/next
    if (e.target.closest('.story-close-btn') || e.target.closest('.hud-footer-capsule')) return;

    const x = e.changedTouches[0].clientX;
    const halfScreen = window.innerWidth / 2;
    if (x < halfScreen) {
        prevStory();
    } else {
        nextStory();
    }
}, { passive: true });

// Swipe down don rufe
let touchStartY = 0;
viewer.addEventListener('touchstart', e => {
    touchStartY = e.touches[0].clientY;
}, { passive: true });
viewer.addEventListener('touchend', e => {
    const swipeDown = e.changedTouches[0].clientY - touchStartY;
    if (swipeDown > 80 && !isHolding) closeStoryViewer();
});

function toggleMinimalMenu() {
    const dropdown = document.getElementById('CyberDropdown');
    dropdown.classList.toggle('Active');
}

// Idan aka danna ko'ina a allon bayan dropdown din yana bude, zai rufe da kansa
document.addEventListener('click', function(event) {
    const dropdown = document.getElementById('CyberDropdown');
    const menuBtn = document.getElementById('cyberMenu');
    
    if (!dropdown.contains(event.target) && !menuBtn.contains(event.target)) {
        dropdown.classList.remove('Active');
        menuBtn.classList.remove('is-active');
    }
});



  (function initConveyor() {
    const SPEED = 15;
    let offset = 0;
    let lastTime = null;
    let paused = false;
    let singleSetWidth = 0;

    function setup() {
        const belt = document.getElementById('conveyorBelt');
        if (!belt) return;

        // Auna kowane card daidai
        const originals = Array.from(belt.children);
        const gap = 8;
        let measuredWidth = 0;
        originals.forEach(card => {
            measuredWidth += card.offsetWidth + gap;
        });
        singleSetWidth = measuredWidth;

        // Clone 3x don loop seamless
        originals.forEach(card => belt.appendChild(card.cloneNode(true)));
        originals.forEach(card => belt.appendChild(card.cloneNode(true)));
        originals.forEach(card => belt.appendChild(card.cloneNode(true)));

        belt.addEventListener('touchstart', () => { paused = true; }, { passive: true });
        belt.addEventListener('touchend', () => { paused = false; lastTime = null; }, { passive: true });

        requestAnimationFrame(tick);
    }

    function tick(ts) {
        if (!lastTime) lastTime = ts;
        const dt = Math.min((ts - lastTime) / 1000, 0.032);
        lastTime = ts;

        if (!paused && singleSetWidth > 0) {
            offset -= SPEED * dt;
            if (offset <= -singleSetWidth) {
                offset += singleSetWidth;
            }
            const belt = document.getElementById('conveyorBelt');
            if (belt) belt.style.transform = `translateX(${offset}px)`;
        }

        requestAnimationFrame(tick);
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', setup);
    } else {
        setTimeout(setup, 600);
    }
})();
