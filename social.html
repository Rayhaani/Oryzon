        .switch-blob {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 42px;
            height: 24px;

            background: linear-gradient(45deg, #FDE08D, #B8860B);

            z-index: 1;

        }

        .switch-active .switch-blob {

/* Nexus Ultimate Gold Badge */
.nexus-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 14px;
    height: 14px;
    background: linear-gradient(135deg, #FDE08D 0%, #B8860B 100%);
    border-radius: 3px;
    margin-left: 6px;
    position: relative;
    transform: rotate(45deg);
    box-shadow: 0 0 10px rgba(253, 224, 141, 0.4);
    vertical-align: middle;
    border: 0.5px solid rgba(255, 255, 255, 0.4);
}

.nexus-badge i {
    transform: rotate(-45deg);
    font-size: 8px;
    color: #000;
    font-weight: 900;
}

/* Neural Pulse Effect */
.nexus-badge::after {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    border-radius: 3px;
    background: inherit;
    z-index: -1;
    animation: badgePulse 2s infinite ease-out;
}

@keyframes badgePulse {
    0% { transform: scale(1) rotate(0deg); opacity: 0.8; }
    100% { transform: scale(2.2) rotate(0deg); opacity: 0; }
}

/* Premium Shimmer Line */
.nexus-badge::before {
    content: '';
    position: absolute;
    top: -150%; left: -150%; width: 300%; height: 300%;
    background: linear-gradient(45deg, transparent, rgba(255,255,255,0.8), transparent);
    animation: nexusShimmer 3s infinite;
}

@keyframes nexusShimmer {
    0% { transform: translate(-100%, -100%) rotate(45deg); }
    100% { transform: translate(100%, 100%) rotate(45deg); }
    }

        function triggerPulse(btn, event) {
            // Hana katsalandan din danna card (don kar ya koma full screen idan an danna like)
            if (event) event.stopPropagation(); 
            
            if (navigator.vibrate) navigator.vibrate(50);

            btn.innerHTML = "✦ Pulsed!";

        }

        const footer = document.getElementById('instaFooter');
        let lastScrollTop = 0;
        window.addEventListener('scroll', () => {
            // Kada mu boye footer idan wani post yana full screen
            if (document.querySelector('.immersive-mode')) return;

            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            if (scrollTop > lastScrollTop) { footer.classList.add('footer-hidden'); } 
            else { footer.classList.remove('footer-hidden'); }
            lastScrollTop = scrollTop;

// Preview na Media (Hoton ko Video zai fito kafin ka yi posting)
function previewMedia(input) {
    const preview = document.getElementById('mediaPreview');
    const file = input.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
        // System din zai duba: Idan Video ne zai nuna Video Player, idan Hoto ne zai nuna Image
        if (file.type.includes('video')) {
            preview.innerHTML = `<video src="${e.target.result}" autoplay loop muted style="width:100%; border-radius:10px;"></video>`;
        } else {
            preview.innerHTML = `<img src="${e.target.result}" style="width:100%; border-radius:10px;">`;
        }
    }
    reader.readAsDataURL(file);
}

  async function publishPost() {
    const text = document.getElementById('postText').value;
    const fileInput = document.getElementById('fileUpload');
    const file = fileInput.files[0];
    const publishBtn = document.querySelector('.publish-btn');

    if (!text && !file) return alert("Saka rubutu ko bidiyo!");

    // Nuna cewa aiki yana tafiya
    publishBtn.innerText = "Ina turawa (Uploading)...";
    publishBtn.disabled = true;

    try {
        let mediaUrl = "";
        let mediaType = "none";

        if (file) {
            // Bayanan Cloudinary dinka
            const cloudName = "diixjieyp";
            const uploadPreset = "oryzon_media"; 

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', uploadPreset);

            // Tura fayil din zuwa Cloudinary
            const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/upload`, {
                method: 'POST',
                body: formData
            });

            if (!response.ok) throw new Error("Cloudinary upload failed");

            const data = await response.json();
            mediaUrl = data.secure_url; // Link din hoto ko bidiyo
            mediaType = file.type.includes('video') ? 'video' : 'image';
        }

        // Adana bayanan a Firestore
        await db.collection("posts").add({
            username: "Sadiq_Alhassan", // Za ka iya sa dynamic username anan
            content: text,
            mediaUrl: mediaUrl,
            mediaType: mediaType,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            likes: 0
        });

        alert("An riga an tura saƙon naka! 🚀");
        location.reload();

    } catch (error) {
        console.error(error);
        alert("An samu matsala: " + error.message);
    } finally {
        publishBtn.innerText = "Publish Post";
        publishBtn.disabled = false;
    }
        }
