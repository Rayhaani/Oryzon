    <script>

    
        // AIKIN FULL SCREEN (IMMERSIVE MODE)
        function toggleImmersive(card) {
            card.classList.toggle('immersive-mode');
            const footer = document.getElementById('instaFooter');
            if(card.classList.contains('immersive-mode')) {
                footer.classList.add('footer-hidden');
            } else {
                footer.classList.remove('footer-hidden');
            }
        }

        let tokens = 0.0000;
        const tokenDisplay = document.getElementById('token-count');
        setInterval(() => { tokens += 0.0001; tokenDisplay.innerText = tokens.toFixed(4) + " NT"; }, 5000);

        function triggerPulse(btn, event) {
            // Hana katsalandan din danna card (don kar ya koma full screen idan an danna like)
            if (event) event.stopPropagation(); 
            
            if (navigator.vibrate) navigator.vibrate(50);
            btn.style.color = "#FDE08D";
            btn.innerHTML = "✦ Pulsed!";
            tokens += 0.0005;
            tokenDisplay.innerText = tokens.toFixed(4) + " NT";
            setTimeout(() => { btn.style.color = "#FDE08D"; btn.innerHTML = "✦ Pulse"; }, 2000);
        }

        const footer = document.getElementById('instaFooter');
        let lastScrollTop = 0;
        window.addEventListener('scroll', () => {
            // Kada mu boye footer idan wani post yana full screen
            if (document.querySelector('.immersive-mode')) return;

            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            if (scrollTop > lastScrollTop) { footer.classList.add('footer-hidden'); } 
            else { footer.classList.remove('footer-hidden'); }
            lastScrollTop = scrollTop;
        });



        // Wannan yana hana Card din budewa idan an taba icons
function stopProp(e) { e.stopPropagation(); }

// Aikin Like button
function triggerPulse(btn, e) {
    if (e) e.stopPropagation(); 
    const icon = btn.querySelector('i');
    if(icon.classList.contains('fa-regular')) {
        icon.classList.replace('fa-regular', 'fa-solid');
        icon.style.color = "#ff4757"; // Jan Like
        if(navigator.vibrate) navigator.vibrate(50);
    } else {
        icon.classList.replace('fa-solid', 'fa-regular');
        icon.style.color = "#fff";
    }
}
        

// Aikin Save button
function toggleSave(btn) {
    const icon = btn.querySelector('i');
    icon.classList.toggle('fa-solid');
    icon.classList.toggle('fa-regular');
}

function renderNexusFeed() {
    const feedContainer = document.querySelector('.feed-container');

    db.collection("posts").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
        let allPostsHTML = ''; 

        // 1. Janyo posts daga Cloud tare da Optimization
        snapshot.forEach((doc) => {
            const post = doc.data();
            let mediaHTML = '';

            if (post.mediaUrl) {
                // Wannan layin zai sa Cloudinary ya rage nauyin hoto/bidiyo don ya bude INSTANTLY
                const optimizedUrl = post.mediaUrl.replace("/upload/", "/upload/f_auto,q_auto,w_800/");
                
                if (post.mediaType === 'image') {
                    mediaHTML = `<img src="${optimizedUrl}" class="post-media" loading="lazy">`;
                } else {
                    // Gyaran aspect-ratio don bidiyo ya nuna da kyau tun kafin ya loda
                   mediaHTML = `
                        <div style="width:100%; background: #000; border-radius: 15px; overflow: hidden;">
                            <video src="${optimizedUrl}" class="post-media" 
                                   style="width:100%; height:auto; object-fit: cover;"
                                   autoplay loop muted playsinline preload="metadata"></video>
                        </div>`;
                }
            }
                    
            allPostsHTML += `
                <div class="post-card" onclick="toggleImmersive(this)">

                    <div class="post-content" style="margin-bottom:10px;">${post.content}</div>
                    ${mediaHTML}
                    <div class="interaction-bar" onclick="stopProp(event)">
                        <div class="left-actions">
                            <button class="btn-nexus" onclick="triggerPulse(this, event)"><i class="fa-regular fa-heart"></i><span>${post.likes || 0}</span></button>
                            <button class="btn-nexus"><i class="fa-regular fa-comment"></i><span>0</span></button>
                        </div>
                    </div>
                </div>`;
        });

        // 2. Tsofaffin posts (Hardcoded)
        nexusPosts.forEach(post => {
            let mediaHTML = post.mediaType === 'image' 
                ? `<img src="${post.mediaUrl}" class="post-media" loading="lazy">`

            allPostsHTML += `
                <div class="post-card" onclick="toggleImmersive(this)">
                    <div class="post-header">
                        <div class="avatar"></div>

// Preview na Media (Hoton ko Video zai fito kafin ka yi posting)
function previewMedia(input) {
    const preview = document.getElementById('mediaPreview');
    const file = input.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
        // System din zai duba: Idan Video ne zai nuna Video Player, idan Hoto ne zai nuna Image
        if (file.type.includes('video')) {
            preview.innerHTML = `<video src="${e.target.result}" autoplay loop muted style="width:100%; border-radius:10px;"></video>`;
        } else {
            preview.innerHTML = `<img src="${e.target.result}" style="width:100%; border-radius:10px;">`;
        }
    }
    reader.readAsDataURL(file);
}

  async function publishPost() {
    const text = document.getElementById('postText').value;
    const fileInput = document.getElementById('fileUpload');
    const file = fileInput.files[0];
    const publishBtn = document.querySelector('.publish-btn');

    if (!text && !file) return alert("Saka rubutu ko bidiyo!");

    // Nuna cewa aiki yana tafiya
    publishBtn.innerText = "Ina turawa (Uploading)...";
    publishBtn.disabled = true;

    try {
        let mediaUrl = "";
        let mediaType = "none";

        if (file) {
            // Bayanan Cloudinary dinka
            const cloudName = "diixjieyp";
            const uploadPreset = "oryzon_media"; 

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', uploadPreset);

            // Tura fayil din zuwa Cloudinary
            const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/upload`, {
                method: 'POST',
                body: formData
            });

            if (!response.ok) throw new Error("Cloudinary upload failed");

            const data = await response.json();
            mediaUrl = data.secure_url; // Link din hoto ko bidiyo
            mediaType = file.type.includes('video') ? 'video' : 'image';
        }

        // Adana bayanan a Firestore
        await db.collection("posts").add({
            username: "Sadiq_Alhassan", // Za ka iya sa dynamic username anan
            content: text,
            mediaUrl: mediaUrl,
            mediaType: mediaType,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            likes: 0
        });

        alert("An riga an tura saƙon naka! 🚀");
        location.reload();

    } catch (error) {
        console.error(error);
        alert("An samu matsala: " + error.message);
    } finally {
        publishBtn.innerText = "Publish Post";
        publishBtn.disabled = false;
    }
        }
