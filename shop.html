<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Protocol - Global Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #050505;
            --cyan-neon: #00F2FF;
            --emerald-pulse: #50FA7B;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--obsidian);
            background-image: radial-gradient(circle at 10% 20%, rgba(98, 114, 164, 0.1) 0%, transparent 50%),
                              radial-gradient(circle at 90% 80%, rgba(0, 242, 255, 0.05) 0%, transparent 50%);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            padding-bottom: 45px; 
        }

        /* 1. BALANCED NEURAL HEADER (EXACT CLONE) */
        header {
            position: fixed;
            top: 0; width: 100%; height: 50px; 
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 0 15px; z-index: 1000;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem; line-height: 30px; height: 30px; 
            display: flex; align-items: center;
            background: linear-gradient(90deg, #fff, var(--cyan-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: none;
        }

        .neural-switch-wrapper { display: flex; align-items: center; height: 30px; }

        .neural-switch {
            width: 135px; height: 30px; background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--glass-border); border-radius: 30px;
            position: relative; cursor: pointer; overflow: hidden; display: flex;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }

        .switch-blob {
            position: absolute; top: 2px; 
            left: 46px; /* SHOP Position */
            width: 42px; height: 24px;
            background: linear-gradient(45deg, #fff, var(--cyan-neon));
            border-radius: 20px; transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1; box-shadow: 0 0 20px #fff;
        }

        .pos-social .switch-blob { left: 2px; background: linear-gradient(45deg, var(--cyan-neon), #0072ff); box-shadow: 0 0 20px var(--cyan-neon); }
        .pos-shop .switch-blob { left: 46px; background: linear-gradient(45deg, #fff, var(--cyan-neon)); box-shadow: 0 0 20px #fff; }
        .pos-earn .switch-blob { left: 91px; background: linear-gradient(45deg, var(--emerald-pulse), #00b09b); box-shadow: 0 0 20px var(--emerald-pulse); }

        .switch-label {
            flex: 1; font-family: 'Orbitron', sans-serif; font-size: 8px;
            letter-spacing: 0.5px; text-align: center; line-height: 28px;
            z-index: 2; transition: 0.3s; color: #fff; mix-blend-mode: overlay;
        }

        .earning-tracker {
            background: rgba(80, 250, 123, 0.05);
            border: 1px solid var(--emerald-pulse);
            padding: 0px 10px; height: 25px; 
            border-radius: 8px; display: flex;
            align-items: center; gap: 6px;
            box-shadow: 0 0 10px rgba(80, 250, 123, 0.1);
        }

        /* 2. MARKET NAV (UNTOUCHED) */
        .market-nav {
            margin-top: 60px;
            display: flex;
            justify-content: space-between;
            padding: 0 10px; 
            gap: 8px;
            margin-bottom: 10px;
        }

        .nav-pill {
            flex: 1; background: var(--glass-bg); border: 1px solid var(--glass-border);
            padding: 8px 2px; border-radius: 20px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        .pill-text { font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 600; color: #fff; }

        /* 3. MARKET GRID (UNTOUCHED) */
        .market-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 10px; padding: 0 10px; max-width: 500px;
            margin-left: auto; margin-right: auto;
        }

        .product-card {
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 10px; position: relative; overflow: hidden;
        }

        .image-container { position: relative; width: 100%; aspect-ratio: 1/1; margin-bottom: 8px; }
        .product-image { width: 100%; height: 100%; background: #111; border-radius: 15px; object-fit: cover; border: 1px solid var(--glass-border); }

        .price-badge {
            position: absolute; bottom: 8px; right: 8px;
            background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(5px);
            border: 1px solid var(--emerald-pulse); padding: 4px 8px;
            border-radius: 10px; color: var(--emerald-pulse);
            font-family: 'Orbitron'; font-size: 9px; box-shadow: 0 0 10px rgba(80, 250, 123, 0.2);
        }

        .product-footer { display: flex; justify-content: space-between; align-items: center; gap: 5px; overflow: hidden; }
        .product-name { font-family: 'Montserrat', sans-serif; font-size: 11px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .product-location { font-family: 'Inter', sans-serif; font-size: 9px; color: var(--cyan-neon); white-space: nowrap; opacity: 0.8; }

        /* 4. FOOTER (UNTOUCHED) */
        .nexus-footer {
            position: fixed; bottom: 0; width: 100%; height: 45px; 
            background: rgba(5, 5, 5, 0.98); border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: space-around; align-items: center; z-index: 3000;
        }

        .footer-icon { color: #fff; opacity: 0.5; cursor: pointer; }
        .footer-icon.active { opacity: 1; filter: drop-shadow(0 0 5px var(--cyan-neon)); }
        .profile-img { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid #fff; }
    </style>
</head>
<body class="pos-shop">

   <div class="market-nav">

    <div class="nav-pill" onclick="window.location.href='search.html'">

   </div>
    

    <div class="market-grid">

        <div class="product-card">

                <div class="price-badge">₦150,000</div>
            </div>
            <div class="product-footer">
                <span class="product-name">Quantum Mining Core</span>

        </div>

        <div class="product-card">
            <div class="image-container">
                <img src="https://via.placeholder.com/300/111/ffffff?text=Item+3" class="product-image">
                <div class="price-badge">₦45,000</div>
            </div>
            <div class="product-footer">
                <span class="product-name">Cyber Suit v2.0 Limited</span>

        </div>

        <div class="product-card">
            <div class="image-container">
                <img src="https://via.placeholder.com/300/111/FFD700?text=Item+4" class="product-image">
                <div class="price-badge">₦10,000</div>
            </div>
            <div class="product-footer">
                <span class="product-name">Master AI Access Key</span>
                <span class="product-location">Abuja</span>
            </div>
        </div>

        <div class="product-card">
            <div class="image-container">
                <img src="https://via.placeholder.com/300/111/FF5555?text=Item+5" class="product-image">
                <div class="price-badge">₦85,000</div>
            </div>
            <div class="product-footer">
                <span class="product-name">Core X Processor</span>
                <span class="product-location">Kano</span>
            </div>
        </div>

        <div class="product-card">
            <div class="image-container">
                <img src="https://via.placeholder.com/300/111/BD93F9?text=Item+6" class="product-image">
                <div class="price-badge">₦60,000</div>
            </div>
            <div class="product-footer">
                <span class="product-name">Surveillance Drone</span>

        </div>
    </div>

    <nav class="nexus-footer" id="instaFooter">
        <div class="footer-icon active"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L4 9v12h5v-7h6v7h5V9l-8-6z"/></svg></div>
        <div class="footer-icon" onclick="window.location.href='social.html'"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 11-7.6-12.7 8.38 8.38 0 013.8.9L21 3z"/></svg></div>
        <div class="footer-icon active"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg></div>
        <div class="footer-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 2v20M8 2v20M2 12h20"/></svg></div>
        <div class="footer-icon" onclick="window.location.href='me.html'"><img src="https://via.placeholder.com/150" alt="Me" class="profile-img"></div>
    </nav>
    <script>
        function moveSwitch(dest) {
            document.body.className = 'pos-' + dest;
            setTimeout(() => {
                if (dest === 'social') window.location.href = 'social.html';
                if (dest === 'shop') window.location.href = 'shop.html';
                if (dest === 'earn') window.location.href = 'earn.html';
            }, 300);
        }
    </script>
</body>
