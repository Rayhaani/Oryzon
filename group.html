<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Neural Group Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;600&family=Orbitron:wght=700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --obsidian: #050505;
            --cyan-neon: #00F2FF;
            --purple-neon: #BD93F9;
            --green-neon: #50FA7B;
            --glass-border: rgba(255, 255, 255, 0.08);
            --user-bubble: linear-gradient(135deg, rgba(0, 242, 255, 0.15), rgba(0, 114, 255, 0.05));
            --member-bubble: rgba(255, 255, 255, 0.04);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--obsidian);
            background-image: radial-gradient(circle at 50% 100%, rgba(0, 242, 255, 0.06), transparent);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            height: 65px;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            padding: 0 12px;
            position: fixed;
            top: 0; left: 0; width: 100%;
            z-index: 9999;
            gap: 10px;
        }

        .back-btn {
            width: 34px; height: 34px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .group-avatar-wrapper {
            width: 40px; height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--cyan-neon), #0072FF);
            padding: 1.5px;
            flex-shrink: 0;
        }

        .group-avatar { width: 100%; height: 100%; border-radius: 11px; object-fit: cover; border: 2px solid #050505; }

        .group-info { flex: 1; overflow: hidden; }
        .group-name { font-size: 14px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .group-status { font-size: 10px; color: var(--cyan-neon); font-family: 'Orbitron', sans-serif; margin-top: 1px; }

        .header-actions { display: flex; gap: 8px; }
        .action-icon {
            width: 36px; height: 36px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #fff; font-size: 14px;
        }

        #chat-flow {
            flex: 1;
            padding: 80px 15px 110px 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scrollbar-width: none;
        }
        #chat-flow::-webkit-scrollbar { display: none; }

        .message {
            max-width: 80%;
            padding: 10px 12px 6px 12px;
            border-radius: 16px;
            font-size: 13px;
            line-height: 1.4;
            position: relative;
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            word-wrap: break-word;
        }

        .incoming { align-self: flex-start; background: var(--member-bubble); border-top-left-radius: 4px; }
        .outgoing { align-self: flex-end; background: var(--user-bubble); border-top-right-radius: 4px; border-color: rgba(0, 242, 255, 0.2); }

        /* ADVANCED GROUP FEATURES ELEMENTS */
        .sender-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .sender-name { font-size: 11px; font-weight: 600; color: var(--purple-neon); }
        .sender-role {
            font-size: 8px; font-weight: bold; padding: 1px 5px; 
            border-radius: 8px; background: rgba(189, 147, 249, 0.15); 
            color: var(--purple-neon); text-transform: uppercase;
            border: 0.5px solid rgba(189, 147, 249, 0.3);
        }
        
        .trust-label {
            display: inline-flex; align-items: center; gap: 3px;
            font-size: 9px; font-weight: bold; margin-top: 6px; padding: 2px 6px;
            border-radius: 6px; background: rgba(80, 250, 123, 0.1); 
            color: var(--green-neon); border: 0.5px solid rgba(80, 250, 123, 0.2);
        }

        .timestamp {
            font-size: 7.5px; color: rgba(255,255,255,0.35);
            display: block; text-align: right; font-family: 'Orbitron', sans-serif;
            margin-top: 4px;
        }

        /* GEMINI INPUT BLOCK AREA SETUP */
        .input-area {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 16px 16px 24px 16px;
            background: transparent;
            display: flex; justify-content: center;
            z-index: 100;
        }

        .neural-search-bar {
            width: 100%; max-width: 600px;
            background: #1e1e24;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px; padding: 6px 12px 6px 18px;
            display: flex; align-items: center; min-height: 52px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .plus-icon {
            color: #fff; font-size: 18px; display: flex; align-items: center;
            cursor: pointer; margin-right: 12px; font-weight: 300;
        }

        .neural-search-bar textarea {
            background: transparent; border: none; outline: none; color: white;
            flex: 1; font-size: 15px; padding: 10px 0;
            resize: none; max-height: 120px; line-height: 1.4;
            font-family: 'Inter', sans-serif; overflow-y: auto;
        }
        .neural-search-bar textarea::placeholder { color: rgba(255, 255, 255, 0.4); }
        .neural-search-bar textarea::-webkit-scrollbar { display: none; }

        .right-action-wrapper { display: flex; align-items: center; gap: 14px; padding-left: 8px; }
        .icon-btn { color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .action-trigger {
            width: 36px; height: 36px; background: #3b4252; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: none; cursor: pointer; flex-shrink: 0; color: #fff;
        }

        #sendBtn { display: none; background: #4c566a; }
    </style>
</head>
<body>

    <header>
        <div class="back-btn" onclick="history.back()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
        </div>

        <div class="group-avatar-wrapper">
            <img class="group-avatar" src="https://via.placeholder.com/100/050505/00F2FF">
        </div>

        <div class="group-info">
            <div class="group-name" id="groupNameDisplay">KanoMart Devs</div>
        </div>

        <div class="header-actions">
            <div class="action-icon"><i class="fa-solid fa-phone"></i></div>
            <div class="action-icon"><i class="fa-solid = fa-layer-group"></i></div>
            <div class="action-icon"><i class="fa-solid fa-sliders"></i></div>
        </div>
    </header>

    <div id="chat-flow">
        
        <div class="message incoming">
            <div class="sender-meta">
                <span class="sender-name">Ali_Developer</span>
                <span class="sender-role" style="color: #00F2FF; background: rgba(0,242,255,0.1); border-color: rgba(0,242,255,0.2);"></span>
            </div>
            We have finished mapping the Kantin Kwari market directory database sync. Everything looks stable.
            <div>
                <span class="trust-label"><i class="fa-solid fa-shield-halved"></i></span>
            </div>
            <span class="timestamp">02:14 PM</span>
        </div>

        <div class="message outgoing">
            <div class="sender-meta">
                <span class="sender-name" style="color: var(--cyan-neon);">You</span>
                <span class="sender-role" style="color: var(--green-neon); background: rgba(80,250,123,0.1); border-color: rgba(80,250,123,0.2);"></span>
            </div>
            Excellent work. Make sure the Sabon Gari wholesalers database has the exact same consistency layer.
            <span class="timestamp">02:18 PM</span>
        </div>

    </div>

    <div class="input-area">
        <div class="neural-search-bar">
            <div class="plus-icon"><i class="fa-solid fa-plus"></i></div>
            <textarea id="msgInput" placeholder="Ask Gemini" rows="1" oninput="autoExpand(this); toggleButtons()"></textarea>
            <div class="right-action-wrapper">
                <div class="icon-btn" id="micBtn">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                </div>
                <button id="voiceBtn" class="action-trigger">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                </button>
                <button id="sendBtn" class="action-trigger" onclick="sendGroupMessage()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        function autoExpand(field) {
            field.style.height = 'inherit';
            field.style.height = field.scrollHeight + 'px';
        }

        function toggleButtons() {
            const input = document.getElementById('msgInput');
            const micBtn = document.getElementById('micBtn');
            const voiceBtn = document.getElementById('voiceBtn');
            const sendBtn = document.getElementById('sendBtn');
            
            if (input && input.value.trim().length > 0) {
                micBtn.style.display = 'none';
                voiceBtn.style.display = 'none';
                sendBtn.style.display = 'flex';
            } else {
                micBtn.style.display = 'flex';
                voiceBtn.style.display = 'flex';
                sendBtn.style.display = 'none';
            }
        }

        function sendGroupMessage() {
            const input = document.getElementById('msgInput');
            if(input.value.trim() === "") return;
            
            // Logic na tura sakon group dinka zai shiga nan gaba kadan
            input.value = "";
            toggleButtons();
        }
    </script>
</body>
                                                                                                                                                                                                                                                                              </html>
