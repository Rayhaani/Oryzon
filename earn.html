<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Earning Master Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #050505;
            --cyan-neon: #00F2FF;
            --emerald-pulse: #50FA7B;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--obsidian);
            background-image: radial-gradient(circle at 10% 20%, rgba(98, 114, 164, 0.1) 0%, transparent 50%),
                              radial-gradient(circle at 90% 80%, rgba(0, 242, 255, 0.05) 0%, transparent 50%);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            padding-bottom: 70px; /* An kara fili a kasa don footer ta fito fili */
        }

        /* 1. HEADER */
        header {
            position: fixed;
            top: 0; width: 100%; height: 50px; 
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 0 15px; z-index: 1000;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem; line-height: 30px; height: 30px; 
            display: flex; align-items: center;
            background: linear-gradient(90deg, #fff, var(--cyan-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: none;
        }

        .neural-switch-wrapper { display: flex; align-items: center; height: 30px; }

        .neural-switch {
            width: 135px; height: 30px; background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--glass-border); border-radius: 30px;
            position: relative; cursor: pointer; overflow: hidden; display: flex;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }

        .switch-blob {
            position: absolute; top: 2px; 
            left: 91px; 
            width: 42px; height: 24px;
            background: linear-gradient(45deg, var(--emerald-pulse), #00b09b);
            border-radius: 20px; transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1; box-shadow: 0 0 20px var(--emerald-pulse);
        }

        .pos-social .switch-blob { left: 2px; background: linear-gradient(45deg, var(--cyan-neon), #0072ff); box-shadow: 0 0 20px var(--cyan-neon); }
        .pos-shop .switch-blob { left: 46px; background: linear-gradient(45deg, #fff, var(--cyan-neon)); box-shadow: 0 0 20px #fff; }
        .pos-earn .switch-blob { left: 91px; background: linear-gradient(45deg, var(--emerald-pulse), #00b09b); box-shadow: 0 0 20px var(--emerald-pulse); }

        .switch-label {
            flex: 1; font-family: 'Orbitron', sans-serif; font-size: 8px;
            letter-spacing: 0.5px; text-align: center; line-height: 28px;
            z-index: 2; transition: 0.3s; color: #fff; mix-blend-mode: overlay;
        }

        .earning-tracker {
            background: rgba(80, 250, 123, 0.05);
            border: 1px solid var(--emerald-pulse);
            padding: 0px 10px; height: 25px; 
            border-radius: 8px; display: flex;
            align-items: center; gap: 6px;
            box-shadow: 0 0 10px rgba(80, 250, 123, 0.1);
        }

        .pulse-dot {
            width: 6px; height: 6px; background-color: var(--emerald-pulse);
            border-radius: 50%; animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 2. NAVIGATION & CONTENT */
        .earning-nav {
            margin-top: 60px; display: flex; gap: 12px; overflow-x: auto;
            padding: 0 15px 10px 15px; scrollbar-width: none;
        }

        .nav-item {
            flex: 0 0 auto; padding: 8px 16px; border-radius: 12px;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            color: #fff; font-family: 'Orbitron', sans-serif; font-size: 9px;
            cursor: pointer; transition: 0.3s;
        }

        .nav-item.active {
            background: var(--cyan-neon); color: #000;
            box-shadow: 0 0 15px var(--cyan-neon);
        }

        .task-container { padding: 0 10px; max-width: 500px; margin: 0 auto; }

        .task-card {
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            margin-bottom: 10px; padding: 15px; position: relative; overflow: hidden;
        }

        .task-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan-neon), transparent);
            animation: slide-glow 3s infinite;
        }

        @keyframes slide-glow { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .mining-card { border-left: 4px solid var(--emerald-pulse); }
        .task-type { font-family: 'Orbitron', sans-serif; font-size: 8px; color: var(--cyan-neon); margin-bottom: 5px; display: block; }
        .task-title { font-family: 'Montserrat', sans-serif; font-size: 15px; font-weight: 600; margin-bottom: 8px; color: #fff; }
        .task-reward { display: flex; align-items: center; gap: 5px; color: var(--emerald-pulse); font-family: 'Orbitron', sans-serif; font-size: 11px; margin-bottom: 15px; }
        .task-btn { width: 100%; padding: 12px; border-radius: 12px; background: rgba(255, 255, 255, 0.05); color: #fff; font-family: 'Orbitron', sans-serif; font-size: 10px; cursor: pointer; border: 1px solid var(--glass-border); }

        .mining-stats { display: flex; justify-content: space-between; margin-top: 15px; padding-top: 12px; border-top: 1px solid var(--glass-border); }
        .stat-val { display: block; font-family: 'Orbitron'; font-size: 11px; }
        .stat-label { font-size: 8px; color: #777; }

        /* 3. FOOTER - FIXED VISIBILITY */
        .nexus-footer {
            position: fixed; bottom: 0; width: 100%; height: 50px; 
            background: rgba(5, 5, 5, 0.95); border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 5000; padding: 0; transition: transform 0.4s ease;
            backdrop-filter: blur(10px);
        }
        .footer-hidden { transform: translateY(100%); }
        .footer-icon { color: #fff; opacity: 0.5; cursor: pointer; height: 100%; width: 50px; display: flex; align-items: center; justify-content: center; }
        .footer-icon.active { opacity: 1; filter: drop-shadow(0 0 5px var(--cyan-neon)); }
        .profile-img { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid #fff; object-fit: cover; }
    </style>
</head>
<body class="pos-earn">

    <header>
        <div class="logo">Nexus</div>
        <div class="neural-switch-wrapper">
            <div class="neural-switch" id="nexusSwitch">
                <div class="switch-blob"></div>
                <div class="switch-label" onclick="moveSwitch('social')">SOCIAL</div>
                <div class="switch-label" onclick="moveSwitch('shop')">SHOP</div>
                <div class="switch-label" onclick="moveSwitch('earn')">EARN</div>
            </div>
        </div>
        <div class="earning-tracker">
            <div class="pulse-dot"></div>
            <span id="token-count" style="font-family: 'Orbitron'; font-size: 11px;">0.0000 NT</span>
        </div>
    </header>

    <div class="earning-nav" id="earningNav">
        <div class="nav-item active" onclick="filterTasks('ALL', this)">ALL TASKS</div>
        <div class="nav-item" onclick="filterTasks('VALIDATION', this)">VALIDATION</div>
        <div class="nav-item" onclick="filterTasks('MINING', this)">MINING</div>
        <div class="nav-item" onclick="filterTasks('DAILY', this)">DAILY</div>
    </div>

    <div class="task-container">
        <div class="task-card mining-card" data-category="MINING">
            <span class="task-type">MINING TASKS</span>
            <h3 class="task-title">Nexus Cloud Miner</h3>
            <div class="task-reward">0.0004 NT / Sec</div>
            <button class="task-btn" id="mineBtn" onclick="startMining()">Start Mining Session</button>
            <div class="mining-stats">
                <div style="text-align: center;"><span class="stat-val">2.4 TH/s</span><span class="stat-label">Power</span></div>
                <div style="text-align: center;"><span class="stat-val" id="sessionEarned">0.0000</span><span class="stat-label">Earned</span></div>
                <div style="text-align: center;"><span class="stat-val">Active</span><span class="stat-label">Status</span></div>
            </div>
        </div>

        <div class="task-card" data-category="VALIDATION">
            <span class="task-type">VALIDATION TASKS</span>
            <h3 class="task-title">AI Data Validation</h3>
            <div class="task-reward">+0.0150 NT per task</div>
            <button class="task-btn">Launch Validator</button>
        </div>

        <div class="task-card" data-category="DAILY">
            <span class="task-type">DAILY TASKS</span>
            <h3 class="task-title">Daily Protocol Check-in</h3>
            <div class="task-reward">+0.0500 NT</div>
            <button class="task-btn" onclick="dailyCheckin(this)">Claim Reward</button>
        </div>
    </div>

<nav class="nexus-footer" id="instaFooter">
        <div class="footer-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L4 9v12h5v-7h6v7h5V9l-8-6z"/></svg></div>
        <div class="footer-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></div>
        <div class="footer-icon active"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8M8 12h8"/></svg></div>
        <div class="footer-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 2v20M8 2v20M2 12h20"/></svg></div>
        <div class="footer-icon"><img src="https://via.placeholder.com/150" alt="Me" class="profile-img"></div>
</nav>

    <script>
        function moveSwitch(dest) {
            document.body.className = 'pos-' + dest;
            setTimeout(() => {
                if (dest === 'social') window.location.href = 'social.html';
                if (dest === 'shop') window.location.href = 'shop.html';
                if (dest === 'earn') window.location.href = 'earn.html';
            }, 300);
        }

        let tokens = 0.0000;
        let isMining = false;
        let sessionEarned = 0.0000;
        const tokenDisplay = document.getElementById('token-count');

        const footer = document.getElementById('instaFooter');
        let lastScrollTop = 0;
        window.addEventListener('scroll', () => {
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            if (scrollTop > lastScrollTop) { footer.classList.add('footer-hidden'); } 
            else { footer.classList.remove('footer-hidden'); }
            lastScrollTop = scrollTop;
        });

        function filterTasks(category, element) {
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            element.classList.add('active');
            const cards = document.querySelectorAll('.task-card');
            cards.forEach(card => {
                if (category === 'ALL' || card.getAttribute('data-category') === category) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        function startMining() {
            const btn = document.getElementById('mineBtn');
            if(!isMining) {
                isMining = true;
                btn.innerText = "Mining Protocol Live...";
                setInterval(() => {
                    sessionEarned += 0.0004;
                    tokens += 0.0004;
                    document.getElementById('sessionEarned').innerText = sessionEarned.toFixed(4);
                    tokenDisplay.innerText = tokens.toFixed(4) + " NT";
                }, 1000);
            }
        }

        function dailyCheckin(btn) {
            tokens += 0.0500;
            tokenDisplay.innerText = tokens.toFixed(4) + " NT";
            btn.innerText = "Claimed";
            btn.disabled = true;
            btn.style.opacity = "0.5";
        }
    </script>
</body>
</html>
