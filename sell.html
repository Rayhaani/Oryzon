<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Global Listing Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #050505;
            --cyan-neon: #00F2FF;
            --emerald-pulse: #50FA7B;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--obsidian);
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 242, 255, 0.05), transparent);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow-y: auto;
        }

        /* FUTURISTIC HEADER */
        header {
            position: fixed; top: 0; width: 100%; height: 55px;
            background: rgba(5, 5, 5, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 18px; z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .header-back {
            width: 35px; height: 35px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .header-back:active {
            border-color: var(--cyan-neon);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .header-title {
            font-family: 'Orbitron', sans-serif; 
            font-size: 13px;
            letter-spacing: 3px; 
            background: linear-gradient(90deg, #fff, var(--cyan-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        .header-action {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            color: var(--cyan-neon);
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 8px;
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.2);
        }

        /* CORRECTED SPACING */
        .listing-container {
            margin-top: 70px; /* Adjusted from 75px */
            padding: 0 20px 20px 20px;
            max-width: 500px;
            margin-left: auto; margin-right: auto;
        }

        .upload-zone {
            width: 100%; aspect-ratio: 16/9;
            background: var(--input-bg);
            border: 2px dashed var(--glass-border);
            border-radius: 20px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            margin-bottom: 25px;
            transition: 0.3s;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        #imagePreview {
            width: 100%; height: 100%;
            object-fit: cover;
            display: none;
            position: absolute;
            top: 0; left: 0;
        }

        .upload-zone:active {
            border-color: var(--cyan-neon);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .upload-icon { font-size: 24px; color: var(--cyan-neon); margin-bottom: 8px; }
        .upload-text { font-size: 10px; color: #888; font-family: 'Orbitron'; }

        .input-group { margin-bottom: 18px; }
        
        .label {
            font-family: 'Montserrat', sans-serif;
            font-size: 11px; color: #aaa;
            margin-bottom: 8px; display: block;
            text-transform: capitalize;
        }

        input, select, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 15px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--cyan-neon);
            background: rgba(255, 255, 255, 0.08);
        }

        .dual-input {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }

        .publish-btn {
            width: 100%;
            background: linear-gradient(45deg, #00F2FF, #0072ff);
            border: none; border-radius: 12px;
            padding: 15px;
            color: white; font-family: 'Orbitron', sans-serif;
            font-size: 12px; font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 242, 255, 0.3);
            margin-top: 10px;
        }

        .publish-btn:active { transform: scale(0.98); opacity: 0.9; }

    </style>
</head>
<body>

    <header>
        <div class="header-back" onclick="history.back()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </div>
        <div class="header-title">NEW LISTING</div>
        <div class="header-action">Deploy</div>
    </header>

    <div class="listing-container">
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        
        <div class="upload-zone" id="uploadZone">
            <img id="imagePreview" src="" alt="Preview">
            <div id="uploadPlaceholder" style="text-align: center;">
                <div class="upload-icon">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                </div>
                <div class="upload-text">INITIALIZE MEDIA</div>
            </div>
        </div>

        <div class="input-group">
            <span class="label">Product Identity</span>
            <input type="text" placeholder="What are you selling?">
        </div>

        <div class="dual-input">
            <div class="input-group">
                <span class="label">Category Sector</span>
                <select>
                    <option>Electronics</option>
                    <option>Fashion</option>
                    <option>Home Gear</option>
                    <option>Vehicles</option>
                </select>
            </div>
            <div class="input-group">
                <span class="label">Valuation (₦)</span>
                <input type="number" placeholder="0.00">
            </div>
        </div>

        <div class="input-group">
            <span class="label">Deployment Location</span>
            <input type="text" value="Kano, Nigeria">
        </div>

        <div class="input-group">
            <span class="label">Operational Description</span>
            <textarea rows="4" placeholder="Brief the marketplace about this asset..."></textarea>
        </div>

        <div class="input-group">
            <span class="label">Availability Status</span>
            <select>
                <option>Single Unit Deployment</option>
                <option>In-Stock Protocol</option>
            </select>
        </div>

        <button class="publish-btn">PUBLISH LISTING</button>
    </div>

    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const imagePreview = document.getElementById('imagePreview');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');

        uploadZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    imagePreview.style.display = 'block';
                    uploadPlaceholder.style.display = 'none';
                    uploadZone.style.borderStyle = 'solid';
                }
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
              </html>
