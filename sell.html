<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Global Listing Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #050505;
            --cyan-neon: #00F2FF;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--obsidian);
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 242, 255, 0.05), transparent);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-y: auto;
        }

        header {
            position: fixed; top: 0; width: 100%; height: 55px;
            background: rgba(5, 5, 5, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 18px; z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .header-back {
            width: 35px; height: 35px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }

        .header-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px; letter-spacing: 3px;
            background: linear-gradient(90deg, #fff, var(--cyan-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-action {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px; color: var(--cyan-neon);
            text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; padding: 5px 12px;
            border-radius: 8px;
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.2);
        }

        .listing-container {
            margin-top: 75px;
            padding: 0 20px 40px 20px;
            max-width: 500px;
            margin-left: auto; margin-right: auto;
        }

        .upload-zone {
            width: 100%; aspect-ratio: 16/9;
            background: var(--input-bg);
            border: 2px dashed var(--glass-border);
            border-radius: 20px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            margin-bottom: 25px; transition: 0.3s;
            cursor: pointer; overflow: hidden; position: relative;
        }

        #imagePreview {
            width: 100%; height: 100%; object-fit: cover;
            display: none; position: absolute; top: 0; left: 0;
        }

        .upload-icon { font-size: 24px; color: var(--cyan-neon); margin-bottom: 8px; }
        .upload-text { font-size: 10px; color: #888; font-family: 'Orbitron'; }

        .input-group { margin-bottom: 18px; }

        .label {
            font-family: 'Montserrat', sans-serif;
            font-size: 11px; color: #aaa;
            margin-bottom: 8px; display: block;
            text-transform: capitalize;
        }

        input, select, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 15px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 13px; outline: none; transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--cyan-neon);
            background: rgba(255, 255, 255, 0.08);
        }

        select option { background: #111; color: white; }

        .dual-input { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .publish-btn {
            width: 100%;
            background: linear-gradient(45deg, #00F2FF, #0072ff);
            border: none; border-radius: 12px; padding: 15px;
            color: white; font-family: 'Orbitron', sans-serif;
            font-size: 12px; font-weight: bold; letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 242, 255, 0.3);
            margin-top: 10px; transition: 0.3s;
        }

        .publish-btn:active { transform: scale(0.98); opacity: 0.9; }
        .publish-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ═══════════════════════════════════════
           NOTIFICATION - CENTER SCREEN MODAL
        ═══════════════════════════════════════ */
        @keyframes notifAppear {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.85); }
            to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        @keyframes shimmerMove {
            0%   { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .notif-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 9998;
        }

        .notif-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            width: min(88vw, 360px);

            background: linear-gradient(145deg, #141414, #0d0d0d);
            border-radius: 28px;
            padding: 28px 22px 22px;
            border: 1px solid rgba(253, 224, 141, 0.25);
            box-shadow:
                0 0 0 1px rgba(253, 224, 141, 0.08),
                0 30px 80px rgba(0, 0, 0, 0.8),
                0 0 60px rgba(253, 224, 141, 0.08);
            animation: notifAppear 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            overflow: hidden;
        }

        /* shimmer line a sama */
        .notif-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(253, 224, 141, 0.9) 40%,
                rgba(255, 255, 255, 1) 50%,
                rgba(253, 224, 141, 0.9) 60%,
                transparent 100%);
            background-size: 200% auto;
            animation: shimmerMove 2.5s linear infinite;
        }

        .notif-product-img {
            width: 72px; height: 72px;
            border-radius: 18px;
            object-fit: cover;
            border: 2px solid rgba(253, 224, 141, 0.3);
            flex-shrink: 0;
        }

        .notif-success-icon {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
            flex-shrink: 0;
        }

        .notif-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px; font-weight: 700;
            color: #fff; letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .notif-sub {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.55);
            line-height: 1.4;
        }

        .notif-btn-yes {
            flex: 1;
            background: linear-gradient(135deg, #fde08d, #b8860b);
            border: none; border-radius: 14px;
            padding: 13px 0;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px; font-weight: 800;
            color: #000; cursor: pointer;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(253, 224, 141, 0.3);
            transition: 0.2s;
        }

        .notif-btn-yes:active { transform: scale(0.96); }

        .notif-btn-skip {
            flex: 1;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 13px 0;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px; font-weight: 600;
            color: #888; cursor: pointer;
            letter-spacing: 1px; transition: 0.2s;
        }

        .notif-btn-skip:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <header>
        <div class="header-back" onclick="history.back()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </div>
        <div class="header-title">NEW LISTING</div>
        <div class="header-action" onclick="uploadProduct()">Deploy</div>
    </header>

    <div class="listing-container">
        <input type="file" id="fileInput" accept="image/*" style="display: none;">

        <div class="upload-zone" id="uploadZone">
            <img id="imagePreview" src="" alt="Preview">
            <div id="uploadPlaceholder" style="text-align: center;">
                <div class="upload-icon">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <path d="M21 15l-5-5L5 21"/>
                    </svg>
                </div>
                <div class="upload-text">INITIALIZE MEDIA</div>
            </div>
        </div>

        <div class="input-group">
            <span class="label">Product Identity</span>
            <input type="text" id="productName" placeholder="What are you selling?">
        </div>

        <div class="dual-input">
            <div class="input-group">
                <span class="label">Category Sector</span>
                <select id="productCategory">
                    <option>Electronics</option>
                    <option>Fashion</option>
                    <option>Home Gear</option>
                    <option>Vehicles</option>
                </select>
            </div>
            <div class="input-group">
                <span class="label">Valuation (₦)</span>
                <input type="number" id="productPrice" placeholder="0.00">
            </div>
        </div>

        <div class="input-group">
            <span class="label">Deployment Location</span>
            <input type="text" id="productLocation" value="Kano, Nigeria">
        </div>

        <div class="input-group">
            <span class="label">Operational Description</span>
            <textarea id="productDescription" rows="4" placeholder="Brief the marketplace about this asset..."></textarea>
        </div>

        <div class="input-group">
            <span class="label">Availability Status</span>
            <select id="productStatus">
                <option>Single Unit Deployment</option>
                <option>In-Stock Protocol</option>
            </select>
        </div>

        <button class="publish-btn" id="publishBtn" onclick="uploadProduct()">PUBLISH LISTING</button>
    </div>

    <!-- IMAGE PREVIEW SCRIPT -->
    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput  = document.getElementById('fileInput');
        const imagePreview = document.getElementById('imagePreview');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');

        uploadZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', function () {
            const file = this.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                imagePreview.src = e.target.result;
                imagePreview.style.display = 'block';
                uploadPlaceholder.style.display = 'none';
                uploadZone.style.borderStyle = 'solid';
            };
            reader.readAsDataURL(file);
        });
    </script>

    <!-- FIREBASE + UPLOAD LOGIC -->
    <script type="module">
        import { initializeApp }     from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp }
            from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDExSOnFbN-wJbT1UFgB-kBs37bEa3KiWc",
            authDomain: "oryzon-50ea4.firebaseapp.com",
            projectId: "oryzon-50ea4",
            storageBucket: "oryzon-50ea4.firebasestorage.app",
            messagingSenderId: "782106742622",
            appId: "1:782106742622:web:902d512bfe42dd4cf289cf",
            measurementId: "G-K5085DLL2W"
        };

        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);

        /* ─── UPLOAD PRODUCT ─── */
        async function uploadProduct() {
            const name        = document.getElementById('productName').value.trim();
            const price       = document.getElementById('productPrice').value;
            const location    = document.getElementById('productLocation').value;
            const description = document.getElementById('productDescription').value;
            const category    = document.getElementById('productCategory').value;
            const status      = document.getElementById('productStatus').value;

            const imagePreviewEl = document.getElementById('imagePreview');
            const imageUrl = (imagePreviewEl && imagePreviewEl.style.display !== 'none' && imagePreviewEl.src)
                ? imagePreviewEl.src
                : 'https://via.placeholder.com/300/111/00F2FF?text=Nexus+Item';

            if (!name || !price) {
                alert("Don Allah cika sunan kaya da farashi!");
                return;
            }

            const btn = document.getElementById('publishBtn');
            btn.disabled = true;
            btn.textContent = 'UPLOADING...';

            const formattedPrice = "₦" + Number(price).toLocaleString();

            try {
                // ✅ adana docRef daidai
                const docRef = await addDoc(collection(db, "products"), {
                    name:        name,
                    price:       formattedPrice,
                    location:    location || "Kano, Nigeria",
                    description: description || "",
                    category:    category,
                    status:      status,
                    image:       imageUrl,
                    createdAt:   serverTimestamp(),
                    vendorId:    localStorage.getItem('nexus_user_session') || ''
                });

                // ✅ Nuna notification a tsakiyar page
                showPostToFeedNotif(docRef.id, imageUrl, name, db);

            } catch (e) {
                console.error("Upload kuskure:", e);
                alert("Kuskure wajen tura kaya: " + e.message);
                btn.disabled = false;
                btn.textContent = 'PUBLISH LISTING';
            }
        }

        /* ─── CENTER-SCREEN NOTIFICATION ─── */
        function showPostToFeedNotif(productId, imgUrl, productName, db) {

            // Backdrop
            const backdrop = document.createElement('div');
            backdrop.className = 'notif-backdrop';
            document.body.appendChild(backdrop);

            // Card
            const card = document.createElement('div');
            card.className = 'notif-card';
            card.innerHTML = `
                <!-- Top row: icon + image + text -->
                <div style="display:flex; align-items:center; gap:14px; margin-bottom:22px;">
                    <div class="notif-success-icon">✅</div>
                    <img class="notif-product-img"
                         src="${imgUrl && imgUrl !== 'https://via.placeholder.com/300/111/00F2FF?text=Nexus+Item'
                             ? imgUrl
                             : 'https://via.placeholder.com/72/111/00F2FF?text=N'}"
                         onerror="this.src='https://via.placeholder.com/72/111/00F2FF?text=N'">
                    <div style="flex:1; min-width:0;">
                        <div class="notif-title">LISTED ✓</div>
                        <div class="notif-sub" style="
                            white-space: nowrap;
                            overflow: hidden;
                            text-overflow: ellipsis;
                        ">${productName}</div>
                        <div class="notif-sub" style="margin-top:4px;">
                            Kayan sun shiga shop. Kuma za ka so su bayyana a feed?
                        </div>
                    </div>
                </div>

                <!-- Buttons -->
                <div style="display:flex; gap:10px;">
                    <button class="notif-btn-yes" id="notif-yes">POST TO FEED</button>
                    <button class="notif-btn-skip" id="notif-skip">SKIP</button>
                </div>
            `;
            document.body.appendChild(card);

            // Event listeners
            document.getElementById('notif-yes').onclick = async () => {
                card.remove();
                backdrop.remove();
                await postToSocialFeed(productId, imgUrl, productName, db);
            };

            document.getElementById('notif-skip').onclick = () => {
                card.remove();
                backdrop.remove();
                window.location.href = 'shop.html';
            };
        }

        /* ─── POST TO SOCIAL FEED ─── */
        async function postToSocialFeed(productId, imgUrl, productName, db) {
            const username = localStorage.getItem('nexus_user_session') || '';

            try {
                await addDoc(collection(db, "posts"), {
                    username:      username,
                    content:       productName,
                    mediaUrl:      imgUrl,
                    mediaType:     'image',
                    category:      'showcase',   // ✅ showcase — daidai da me.html filter
                    productId:     productId,
                    likesCount:    0,
                    commentsCount: 0,
                    timestamp:     serverTimestamp()
                });

                window.location.href = 'social.html';

            } catch (err) {
                console.error('Post to feed kuskure:', err);
                window.location.href = 'shop.html';
            }
        }

        window.uploadProduct = uploadProduct;
    </script>
</body>
</html>
