<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus — Global Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <!-- Firebase compat -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg:        #050505;
            --surface:   #0e0e0e;
            --border:    rgba(255,255,255,0.07);
            --cyan:      #00F2FF;
            --gold:      #fde08d;
            --text:      #ffffff;
            --muted:     #888;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding-bottom: 70px;
        }

        /* ── HEADER ── */
        .top-bar {
            position: sticky; top: 0; z-index: 500;
            background: rgba(5,5,5,0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 10px 14px;
        }

        .search-row {
            display: flex; align-items: center; gap: 10px;
        }

        .search-box {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 50px;
            display: flex; align-items: center; gap: 8px;
            padding: 9px 14px;
        }

        .search-box i { color: var(--muted); font-size: 13px; }

        .search-box input {
            background: none; border: none; outline: none;
            color: var(--text); font-size: 13px; width: 100%;
            font-family: 'Inter', sans-serif;
        }

        .search-box input::placeholder { color: var(--muted); }

        .sell-btn {
            background: linear-gradient(135deg, var(--cyan), #0072ff);
            border: none; border-radius: 50px;
            padding: 9px 16px;
            font-family: 'Orbitron', sans-serif;
            font-size: 9px; font-weight: 700;
            color: #fff; cursor: pointer;
            letter-spacing: 1px; white-space: nowrap;
            box-shadow: 0 0 15px rgba(0,242,255,0.2);
        }

        /* ── LAYOUT ── */
        .page-body {
            display: flex;
        }

        /* ── LEFT SIDEBAR ── */
        .sidebar {
            width: 72px;
            flex-shrink: 0;
            position: sticky;
            top: 57px;
            height: calc(100vh - 57px);
            overflow-y: auto;
            scrollbar-width: none;
            background: var(--surface);
            border-right: 1px solid var(--border);
        }

        .sidebar::-webkit-scrollbar { display: none; }

        .sidebar-item {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 14px 4px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: 0.2s;
            gap: 4px;
        }

        .sidebar-item.active {
            border-left-color: var(--cyan);
            background: rgba(0,242,255,0.05);
        }

        .sidebar-item span {
            font-size: 9px; font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
            line-height: 1.2;
        }

        .sidebar-item.active span { color: var(--cyan); }

        /* ── MAIN CONTENT ── */
        .main-content {
            flex: 1;
            min-width: 0;
            padding: 14px 10px;
        }

        /* ── CATEGORY GRID ── */
        .section-title {
            font-size: 14px; font-weight: 700;
            color: var(--text);
            margin-bottom: 12px;
            padding-left: 2px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 28px;
        }

        .cat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.25s;
            aspect-ratio: 1/1;
            position: relative;
            display: flex; flex-direction: column;
        }

        .cat-card:active { transform: scale(0.96); }

        .cat-card-img {
            flex: 1;
            background: #111;
            overflow: hidden;
            position: relative;
        }

        .cat-card-img img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: 0.3s;
        }

        .cat-card-img .placeholder-icon {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            background: linear-gradient(135deg, #111, #1a1a1a);
        }

        .cat-card-label {
            padding: 7px 6px;
            font-size: 11px; font-weight: 700;
            color: var(--text);
            text-align: center;
            background: var(--surface);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* HOT badge */
        .hot-badge {
            position: absolute; top: 6px; right: 6px;
            background: #ff4444;
            color: #fff;
            font-size: 8px; font-weight: 800;
            padding: 2px 6px;
            border-radius: 4px;
            letter-spacing: 0.5px;
            z-index: 2;
        }

        /* ── TRENDING SECTION ── */
        .trending-header {
            display: flex; align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .sort-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 11px; color: var(--muted);
            cursor: pointer; display: flex; align-items: center; gap: 4px;
        }

        .trending-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .product-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.25s;
            position: relative;
        }

        .product-card:active { transform: scale(0.97); }

        .product-img {
            width: 100%;
            aspect-ratio: 1/1;
            background: #111;
            overflow: hidden;
        }

        .product-img img {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .product-img .no-img {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 36px;
            background: linear-gradient(135deg, #0a0a0a, #141414);
        }

        .product-info { padding: 8px 10px 10px; }

        .product-name {
            font-size: 12px; font-weight: 600;
            color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .product-price {
            font-size: 13px; font-weight: 800;
            color: var(--cyan);
        }

        .product-location {
            font-size: 10px; color: var(--muted);
            margin-top: 3px;
            display: flex; align-items: center; gap: 3px;
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--muted);
        }

        .empty-state i { font-size: 40px; margin-bottom: 12px; display: block; opacity: 0.3; }
        .empty-state p { font-size: 13px; }

        /* ── SKELETON LOADER ── */
        @keyframes shimmer {
            0%   { background-position: -400px 0; }
            100% { background-position: 400px 0; }
        }

        .skeleton {
            background: linear-gradient(90deg, #111 25%, #1a1a1a 50%, #111 75%);
            background-size: 400px 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 10px;
        }

        /* ── FOOTER NAV ── */
        .nexus-footer {
            position: fixed; bottom: 0; width: 100%; height: 52px;
            background: rgba(5,5,5,0.95);
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 9999;
            backdrop-filter: blur(15px);
        }

        .footer-icon {
            color: #fff; opacity: 0.4; cursor: pointer;
            height: 100%; width: 52px;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 3px;
            font-size: 18px;
            transition: 0.2s;
        }

        .footer-icon.active { opacity: 1; filter: drop-shadow(0 0 5px var(--cyan)); }
        .footer-icon span { font-size: 8px; font-weight: 600; letter-spacing: 0.5px; }
    </style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
    <div class="search-row">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Search Global Marketplace..." oninput="handleSearch()">
        </div>
        <button class="sell-btn" onclick="window.location.href='sell.html'">+ SELL</button>
    </div>
</div>

<!-- PAGE BODY -->
<div class="page-body">

    <!-- LEFT SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <!-- Filled by JS -->
    </div>

    <!-- MAIN -->
    <div class="main-content">

        <!-- CATEGORY GRID -->
        <div id="category-section">
            <div class="section-title">Shop by Category</div>
            <div class="category-grid" id="category-grid">
                <!-- Skeleton -->
                <div class="cat-card"><div class="cat-card-img skeleton" style="height:100%;"></div></div>
                <div class="cat-card"><div class="cat-card-img skeleton" style="height:100%;"></div></div>
                <div class="cat-card"><div class="cat-card-img skeleton" style="height:100%;"></div></div>
                <div class="cat-card"><div class="cat-card-img skeleton" style="height:100%;"></div></div>
                <div class="cat-card"><div class="cat-card-img skeleton" style="height:100%;"></div></div>
                <div class="cat-card"><div class="cat-card-img skeleton" style="height:100%;"></div></div>
            </div>
        </div>

        <!-- TRENDING ITEMS -->
        <div id="trending-section">
            <div class="trending-header">
                <div class="section-title" style="margin-bottom:0;">Trending Items</div>
                <div class="sort-btn" onclick="toggleSort()">
                    Sort by <i class="fa-solid fa-chevron-down" id="sort-icon" style="font-size:10px;"></i>
                </div>
            </div>
            <div style="height:10px;"></div>
            <div class="trending-grid" id="trending-grid">
                <!-- Skeletons -->
                <div class="product-card"><div class="product-img skeleton" style="aspect-ratio:1/1;"></div></div>
                <div class="product-card"><div class="product-img skeleton" style="aspect-ratio:1/1;"></div></div>
                <div class="product-card"><div class="product-img skeleton" style="aspect-ratio:1/1;"></div></div>
                <div class="product-card"><div class="product-img skeleton" style="aspect-ratio:1/1;"></div></div>
            </div>
        </div>

    </div>
</div>

<!-- FOOTER -->
<nav class="nexus-footer">
    <div class="footer-icon" onclick="window.location.href='index.html'">
        <i class="fa-solid fa-house"></i>
        <span>HOME</span>
    </div>
    <div class="footer-icon active">
        <i class="fa-solid fa-store"></i>
        <span>SHOP</span>
    </div>
    <div class="footer-icon" onclick="window.location.href='social.html'">
        <i class="fa-solid fa-fire"></i>
        <span>FEED</span>
    </div>
    <div class="footer-icon" onclick="window.location.href='me.html'">
        <i class="fa-solid fa-user"></i>
        <span>PROFILE</span>
    </div>
</nav>

<script>
    // ── FIREBASE INIT ──
    const firebaseConfig = {
        apiKey:            "AIzaSyDExSOnFbN-wJbT1UFgB-kBs37bEa3KiWc",
        authDomain:        "oryzon-50ea4.firebaseapp.com",
        projectId:         "oryzon-50ea4",
        storageBucket:     "oryzon-50ea4.firebasestorage.app",
        messagingSenderId: "782106742622",
        appId:             "1:782106742622:web:902d512bfe42dd4cf289cf"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ── CATEGORY CONFIG ──
    // These MUST match the option values in sell.html exactly
    const CATEGORIES = [
        { key: 'Electronics', label: 'Electronics',  icon: '📱' },
        { key: 'Fashion',     label: 'Fashion',       icon: '👗' },
        { key: 'Home Gear',   label: 'Home Gear',     icon: '🏠' },
        { key: 'Vehicles',    label: 'Vehicles',      icon: '🚗' },
    ];

    let allProducts     = [];
    let filteredProducts = [];
    let activeCategory  = 'ALL';
    let sortAsc         = false;
    let categoryCounts  = {};

    // ── BUILD SIDEBAR ──
    function buildSidebar() {
        const sidebar = document.getElementById('sidebar');
        const items = [{ key: 'ALL', label: 'All', icon: '🛍️' }, ...CATEGORIES];

        sidebar.innerHTML = items.map(c => `
            <div class="sidebar-item ${c.key === activeCategory ? 'active' : ''}"
                 onclick="filterByCategory('${c.key}')">
                <span style="font-size:20px;">${c.icon}</span>
                <span>${c.label}</span>
            </div>
        `).join('');
    }

    // ── BUILD CATEGORY GRID ──
    function buildCategoryGrid() {
        const grid = document.getElementById('category-grid');
        grid.innerHTML = '';

        CATEGORIES.forEach(cat => {
            // Get a representative product image for this category
            const sample = allProducts.find(p =>
                p.category === cat.key && p.image && !p.image.includes('placeholder')
            );
            const imgHtml = sample
                ? `<img src="${sample.image}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'placeholder-icon\\'>${cat.icon}</div>'">`
                : `<div class="placeholder-icon">${cat.icon}</div>`;

            const count   = categoryCounts[cat.key] || 0;
            const isHot   = count >= 3;

            grid.insertAdjacentHTML('beforeend', `
                <div class="cat-card" onclick="filterByCategory('${cat.key}')">
                    <div class="cat-card-img">
                        ${imgHtml}
                        ${isHot ? '<div class="hot-badge">HOT</div>' : ''}
                    </div>
                    <div class="cat-card-label">${cat.label}</div>
                </div>
            `);
        });
    }

    // ── RENDER TRENDING GRID ──
    function renderTrending(products) {
        const grid = document.getElementById('trending-grid');

        if (!products.length) {
            grid.innerHTML = `
                <div class="empty-state" style="grid-column:span 2;">
                    <i class="fa-solid fa-box-open"></i>
                    <p>No products found in this category yet.</p>
                </div>`;
            return;
        }

        grid.innerHTML = products.map(p => `
            <div class="product-card" onclick="openProduct('${p.id}')">
                <div class="product-img">
                    ${p.image && !p.image.includes('placeholder')
                        ? `<img src="${p.image}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'no-img\\'>📦</div>'">`
                        : `<div class="no-img">📦</div>`}
                </div>
                <div class="product-info">
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">${p.price}</div>
                    <div class="product-location">
                        <i class="fa-solid fa-location-dot" style="font-size:9px;color:#00F2FF;"></i>
                        ${p.location || 'Nigeria'}
                    </div>
                </div>
            </div>
        `).join('');
    }

    // ── FILTER BY CATEGORY ──
    function filterByCategory(key) {
        activeCategory = key;
        buildSidebar();

        filteredProducts = key === 'ALL'
            ? [...allProducts]
            : allProducts.filter(p => p.category === key);

        // Show/hide category grid
        document.getElementById('category-section').style.display =
            key === 'ALL' ? 'block' : 'none';

        renderTrending(filteredProducts);
    }

    // ── SEARCH ──
    function handleSearch() {
        const q = document.getElementById('searchInput').value.trim().toLowerCase();
        if (!q) {
            filteredProducts = activeCategory === 'ALL'
                ? [...allProducts]
                : allProducts.filter(p => p.category === activeCategory);
        } else {
            filteredProducts = allProducts.filter(p =>
                p.name.toLowerCase().includes(q) ||
                (p.description || '').toLowerCase().includes(q) ||
                (p.category || '').toLowerCase().includes(q)
            );
            document.getElementById('category-section').style.display = 'none';
        }
        renderTrending(filteredProducts);
    }

    // ── SORT TOGGLE ──
    function toggleSort() {
        sortAsc = !sortAsc;
        document.getElementById('sort-icon').className =
            sortAsc ? 'fa-solid fa-chevron-up' : 'fa-solid fa-chevron-down';

        filteredProducts.sort((a, b) => {
            const pa = parseFloat((a.price || '0').replace(/[^0-9.]/g, ''));
            const pb = parseFloat((b.price || '0').replace(/[^0-9.]/g, ''));
            return sortAsc ? pa - pb : pb - pa;
        });

        renderTrending(filteredProducts);
    }

    // ── OPEN PRODUCT ──
    function openProduct(id) {
        window.location.href = `product.html?id=${id}`;
    }

    // ── LOAD ALL PRODUCTS FROM FIREBASE ──
    function loadProducts() {
        db.collection('products')
            .orderBy('createdAt', 'desc')
            .onSnapshot(snapshot => {
                allProducts = [];
                categoryCounts = {};

                snapshot.forEach(doc => {
                    const data = { id: doc.id, ...doc.data() };
                    allProducts.push(data);

                    const cat = data.category || 'Other';
                    categoryCounts[cat] = (categoryCounts[cat] || 0) + 1;
                });

                filteredProducts = [...allProducts];

                buildSidebar();
                buildCategoryGrid();
                renderTrending(filteredProducts);

            }, err => {
                console.error('Firebase error:', err);
                document.getElementById('trending-grid').innerHTML = `
                    <div class="empty-state" style="grid-column:span 2;">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        <p>Failed to load products. Please check your connection.</p>
                    </div>`;
            });
    }

    // ── INIT ──
    loadProducts();
</script>
</body>
</html>
