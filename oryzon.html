<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nexus Protocol - Year 3000</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #050505;
            --cyan-neon: #00F2FF;
            --emerald-pulse: #50FA7B;
            --nebula-purple: #6272a4;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--obsidian);
            background-image: radial-gradient(circle at 10% 20%, rgba(98, 114, 164, 0.1) 0%, transparent 50%),
                              radial-gradient(circle at 90% 80%, rgba(0, 242, 255, 0.05) 0%, transparent 50%);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* 1. THE DYNAMIC HEADER */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            background: linear-gradient(90deg, #fff, var(--cyan-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .earning-tracker {
            background: rgba(80, 250, 123, 0.1);
            border: 1px solid var(--emerald-pulse);
            padding: 5px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 0 10px rgba(80, 250, 123, 0.2);
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: var(--emerald-pulse);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 2. THE CONTENT ARCHITECTURE */
        .feed-container {
            margin-top: 90px;
            padding: 10px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .post-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            margin-bottom: 20px;
            padding: 15px;
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .post-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan-neon), transparent);
            animation: slide-glow 3s infinite;
        }

        @keyframes slide-glow {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--cyan-neon);
            background: #222;
        }

        .username {
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            color: #fff;
        }

        .post-content {
            font-size: 14px;
            line-height: 1.5;
            color: #ccc;
            margin-bottom: 15px;
        }

        .post-media {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid var(--glass-border);
        }

        /* 3. PROOF OF ENGAGEMENT BUTTONS */
        .interaction-bar {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid var(--glass-border);
            padding-top: 12px;
        }

        .btn-nexus {
            background: transparent;
            border: none;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }

        .btn-nexus:active {
            transform: scale(0.9);
            color: var(--cyan-neon);
        }

        .earning-badge {
            font-size: 10px;
            color: var(--emerald-pulse);
            display: block;
            margin-top: 5px;
        }

  
    </style>
</head>
<body>

    <header>
        <div class="logo">NEXUS</div>
        <div class="earning-tracker">
            <div class="pulse-dot"></div>
            <span id="token-count" style="font-family: 'Orbitron'; font-size: 14px;">0.0000 NT</span>
        </div>
    </header>

    <div class="feed-container">
        <div class="post-card">
            <div class="post-header">
                <div class="avatar"></div>
                <div class="username">Sadiq_Alhassan</div>
            </div>
            <div class="post-content">
                Barka da zuwa sabuwar duniyar Nexus. Wannan shi ne farkon tafiyar mu ta shekarar 3000. 🚀
            </div>
            <img src="https://via.placeholder.com/500x300/111/00F2FF?text=Quantum+Visual" alt="Nexus Media" class="post-media">
            
            <div class="interaction-bar">
                <button class="btn-nexus" onclick="triggerPulse(this)">✦ Pulse</button>
                <button class="btn-nexus">💬 Echo</button>
                <button class="btn-nexus">🔗 Nexus</button>
            </div>
            <span class="earning-badge">+0.002 NT earned for viewing</span>
        </div>

        <div class="post-card">
            <div class="post-header">
                <div class="avatar"></div>
                <div class="username">Tech_King_Kano</div>
            </div>
            <div class="post-content">
                Duba yadda wannan UI din yake yawo tamkar ruwa! #NextGen #NexusProtocol
            </div>
            <div style="width:100%; height:400px; background:#111; border-radius:15px; display:flex; align-items:center; justify-content:center; border: 1px solid var(--glass-border);">
                <span style="color:var(--cyan-neon); font-family:'Orbitron';">Video Player Mode</span>
            </div>
            
            <div class="interaction-bar">
                <button class="btn-nexus" onclick="triggerPulse(this)">✦ Pulse</button>
                <button class="btn-nexus">💬 Echo</button>
                <button class="btn-nexus">🔗 Nexus</button>
            </div>
            <span class="earning-badge">+0.005 NT earned for watching</span>
        </div>
    </div>

    <script>
        // SOCIAL MINING LOGIC
        let tokens = 0.0000;
        const tokenDisplay = document.getElementById('token-count');

        // Karawa mutum kudi duk bayan sakan 5 na scrolling
        setInterval(() => {
            tokens += 0.0001;
            tokenDisplay.innerText = tokens.toFixed(4) + " NT";
        }, 5000);

        // HAPTIC FEEDBACK & PULSE ANIMATION
        function triggerPulse(btn) {
            // Kwaikwayon rawar sanyi (vibration)
            if (navigator.vibrate) {
                navigator.vibrate(50); 
            }
            
            btn.style.color = "#00F2FF";
            btn.innerHTML = "✦ Pulsed!";
            
            // Kara wa mutum kudi dan kadan don engagement
            tokens += 0.0005;
            tokenDisplay.innerText = tokens.toFixed(4) + " NT";
            
            setTimeout(() => {
                btn.style.color = "#fff";
                btn.innerHTML = "✦ Pulse";
            }, 2000);
        }

        // Smooth Scroll Animation
        window.addEventListener('scroll', () => {
            const cards = document.querySelectorAll('.post-card');
            cards.forEach(card => {
                const cardTop = card.getBoundingClientRect().top;
                if(cardTop < window.innerHeight - 100) {
                    card.style.opacity = "1";
                    card.style.transform = "translateY(0)";
                }
            });
        });



        <style>
    /* SIDE SMART MENU STYLES */
    .nexus-side-menu {
        position: fixed;
        left: 15px;
        top: 50%; /* Default position */
        transform: translateY(-50%);
        width: 60px;
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px 0;
        gap: 25px;
        z-index: 2000;
        transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55); /* Smooth smart bounce */
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }

    .nav-icon {
        width: 35px;
        height: 35px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        color: rgba(255, 255, 255, 0.6);
        cursor: pointer;
        transition: 0.3s;
        position: relative;
    }

    .nav-icon:hover, .nav-icon.active {
        color: var(--cyan-neon);
        background: rgba(0, 242, 255, 0.1);
        box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
    }

    /* Glow effect for active icon */
    .nav-icon.active::after {
        content: '';
        position: absolute;
        width: 5px;
        height: 5px;
        background: var(--cyan-neon);
        border-radius: 50%;
        bottom: -8px;
        box-shadow: 0 0 10px var(--cyan-neon);
    }

    /* Positions for Smart logic */
    .menu-at-bottom {
        top: 85% !important;
        transform: translateY(-50%) scale(0.9);
        opacity: 0.8;
    }

    .menu-at-top {
        top: 20% !important;
        transform: translateY(-50%) scale(1);
        opacity: 1;
    }
</style>

<nav class="nexus-side-menu" id="smartMenu">
    <div class="nav-icon active" title="Home">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>
    <div class="nav-icon" title="Explore">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
    </div>
    <div class="nav-icon" title="Earnings">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="10" x2="12" y2="10"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
    </div>
    <div class="nav-icon" title="Messages">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></svg>
    </div>
    <div class="nav-icon" title="Profile">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </div>
</nav>

<script>
    const smartMenu = document.getElementById('smartMenu');
    let lastScrollTop = 0;

    window.addEventListener('scroll', () => {
        let scrollTop = window.pageYOffset || document.documentElement.scrollTop;

        if (scrollTop < 50) {
            // Idan muna saman shafi, menu ya koma center
            smartMenu.classList.remove('menu-at-top', 'menu-at-bottom');
        } else if (scrollTop > lastScrollTop) {
            // Idan mutum yana scrolling KASA (Down), Menu ya koma SAMA
            smartMenu.classList.add('menu-at-top');
            smartMenu.classList.remove('menu-at-bottom');
        } else {
            // Idan mutum yana scrolling SAMA (Up), Menu ya koma KASA
            smartMenu.classList.add('menu-at-bottom');
            smartMenu.classList.remove('menu-at-top');
        }
        lastScrollTop = scrollTop;
    });

    // Toggle active class on click
    const icons = document.querySelectorAll('.nav-icon');
    icons.forEach(icon => {
        icon.addEventListener('click', () => {
            icons.forEach(i => i.classList.remove('active'));
            icon.classList.add('active');
            if (navigator.vibrate) navigator.vibrate(30); // Haptic feedback
        });
    });
</script>
    
    </script>
</body>
                                                  </html>
