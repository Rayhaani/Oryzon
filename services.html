                        <div style={{ display: "flex", alignItems: "center", position: "relative" }}>
                            <div className="cyber-input-wrapper">
                                <span style={{ position: "absolute", left: 18, fontSize: 16, pointerEvents: "none", zIndex: 2 }}>🛡️</span>
                                <input
                                    type="text"
                                    value={query}
                                    onChange={e => setQuery(e.target.value)}
                                    onKeyDown={e => e.key === "Enter" && triggerRouterCheck(e)}
                                    className="trustid-typing-bar"
                                    placeholder="TrustID Secured Portal"
                                />
                                <div className="embedded-search-btn" onClick={() => triggerRouterCheck(null)}>
                                    <span style={{ fontSize: 14 }}>🔍</span>
                                </div>
                            </div>
                        </div>

                        {view === "main" && (
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginTop: 24, position: "relative", marginBottom: -10 }}>
                                <div className="glass-btn" onClick={handleNearMeTile}>
                                    <span style={{ fontSize: 18 }}>📍</span>
                                    <span style={{ fontWeight: 700, fontSize: 13, color: "#111827" }}>Pros Near Me</span>
                                </div>
                                <div className="glass-btn" onClick={() => { setView("results"); setSelectedCat(null); }}>
                                    <span style={{ fontSize: 18 }}>🛡️</span>
                                    <span style={{ fontWeight: 700, fontSize: 13, color: "#111827" }}>Verified Pros</span>
                                </div>
                            </div>
                        )}
                    </div>

                    {showSearchRouter && (
                        <div className="router-overlay" onClick={() => setShowSearchRouter(false)}>
                            <div className="router-box" onClick={e => e.stopPropagation()}>
                                <h3 style={{ fontSize: 16, fontWeight: 800, color: "#111827", textAlign: "center" }}>Search Preferences</h3>
                                <p style={{ fontSize: 13, color: "#64748b", textAlign: "center", marginTop: 4, marginBottom: 12 }}>Select a scope context for your query.</p>
                                <div className="router-option" onClick={() => handleRouteSelection("all")}>
                                    <span style={{ fontSize: 18 }}>🌍</span>
                                    <div>Search All Verified Experts</div>
                                </div>
                                <div className="router-option" onClick={() => handleRouteSelection("near")}>
                                    <span style={{ fontSize: 18 }}>📍</span>
                                    <div>Search Experts Near Me</div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* DYNAMIC IMMERSIVE STRECHED FULL PAGE STORY CARD DISPLAY */}
                    {activeStoryFood && (
                        <div className="instagram-story-overlay fade-in">
                            
                            {/* Standard Top HUD Navigation bar placed cleanly over content */}
                            <div className="story-header-area">
                                <div className="story-progress-bar-container">
                                    <div className="story-progress-bg"><div className="story-progress-fill"></div></div>
                                </div>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                                        <span style={{ fontSize: 24 }}>🍳</span>
                                        <div>
                                            <div style={{ fontWeight: 800, fontSize: 14, color: '#fff' }}>{activeStoryFood.name}</div>
                                            <div style={{ fontSize: 11, color: "#94a3b8" }}>Prepared Live Near Me ({activeStoryFood.distance})</div>
                                        </div>
                                    </div>
                                    <button onClick={() => setActiveStoryFood(null)} style={{ background: "rgba(255,255,255,0.1)", border: "none", color: "#fff", fontSize: 16, width:32, height:32, borderRadius:'50%', cursor: "pointer", display:'flex', alignItems:'center', justifyContent:'center' }}>✕</button>
                                </div>
                            </div>

                            {/* Full View Screen Canvas Container Card Block */}
                            <div className="story-food-display-canvas">
                                <div style={{ fontSize: 96, marginBottom: 16 }}>{activeStoryFood.icon}</div>
                                <h2 style={{ fontWeight: 800, fontSize: 28, color: "#ffffff" }}>{activeStoryFood.name}</h2>
                                <div style={{ color: "#34d399", fontWeight: 800, fontSize: 24, marginTop: 6 }}>{activeStoryFood.price}</div>
                                <div style={{ background: "rgba(255,255,255,0.06)", padding: "8px 18px", borderRadius: 14, fontSize: 12, color: "#cbd5e1", marginTop: 14, border: "1px solid rgba(255,255,255,0.1)" }}>
                                    🔥 Freshly Steaming & Available In Perimeter
                                </div>

                                {/* Integrated Control Deck Built Layered Directly INSIDE the Immersive Card Structure */}
                                <div className="story-bottom-action-deck">
                                    <button onClick={() => alert(`Order initialized for ${activeStoryFood.name}`)} style={{ flex: 1, background: "#1d4ed8", color: "#ffffff", border: "none", borderRadius: 16, padding: "16px 0", fontWeight: 800, fontSize: 14, cursor: "pointer", boxShadow: "0 4px 12px rgba(29, 78, 216, 0.3)" }}>
                                        Place Order 🛒
                                    </button>
                                    <button onClick={() => routeFromStoryToProfile(activeStoryFood.proId)} style={{ flex: 1, background: "rgba(255,255,255,0.12)", color: "#ffffff", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 16, padding: "16px 0", fontWeight: 700, fontSize: 14, cursor: "pointer", backdropFilter: "blur(10px)" }}>
                                        Go to Profile 👤
                                    </button>
                                </div>
                            </div>

                        </div>
                    )}

                    {view === "main" && (
                        <div className="fade-in">
                            {locating && (
                                <div style={{ padding: "24px 20px 0", textAlign: "center", color: "#1d4ed8", fontWeight: 600, fontSize: 13 }}>
                                    🔄 Syncing Core GPS Location Engine...
                                </div>
                            )}

                            <div style={{ marginTop: 24 }}>
                                <div style={{ padding: "0 20px", fontWeight: 700, fontSize: 11, color: "#94a3b8", textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: 6 }}>
                                    ⚡ Available Now In Your Area (Instant Pickup)
                                </div>
                                <div className="quantum-story-container">
                                    <div className="quantum-story-track">
                                        {doubleStories.map((item, index) => (
                                            <div key={index} className="futuristic-story-card" onClick={() => setActiveStoryFood(item)}>
                                                <div className="story-cyber-ring">
                                                    <div className="story-avatar-core">
                                                        {item.icon}
                                                    </div>
                                                </div>
                                                <span style={{ fontSize: 11, fontWeight: 700, color: "#1f2937", whiteSpace: "nowrap", width: "100%", overflow: "hidden", textOverflow: "ellipsis" }}>{item.name}</span>
                                                <span style={{ fontSize: 9, fontWeight: 600, color: "#3b82f6", marginTop: 2 }}>{item.distance}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div style={{ padding: "20px 20px 0" }}>
                                <div style={{ fontWeight: 700, fontSize: 11, color: "#94a3b8", marginBottom: 14, textTransform: "uppercase", letterSpacing: "0.5px" }}>Service Categories</div>
                                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10 }}>
                                    {CATEGORIES.map(cat => (
                                        <button key={cat.id} onClick={() => { setSelectedCat(cat.id); setView("results"); }} style={{
                                            background: "#ffffff", border: "1px solid #e2e8f0",
                                            borderRadius: 16, padding: "14px 4px", cursor: "pointer",
                                            display: "flex", flexDirection: "column", alignItems: "center", gap: 6, transition: "all 0.2s"
                                        }}>
                                            <span style={{ fontSize: 22 }}>{cat.icon}</span>
                                            <span style={{ fontSize: 10, fontWeight: 700, color: "#4b5563", textAlign: "center" }}>{cat.label}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div style={{ padding: "28px 20px 0" }}>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                                    <div style={{ fontWeight: 700, fontSize: 12, color: "#94a3b8", textTransform: "uppercase", letterSpacing: "0.5px" }}>⭐ Highly Rated Providers</div>
                                    <button onClick={() => setView("results")} style={{ background: "none", border: "none", color: "#1d4ed8", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>View All</button>
                                </div>
                                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                                    {PROS.map((pro, idx) => (
                                        <div key={pro.id} className="slide-up" style={{ animationDelay: `${idx * 80}ms` }}>
                                            <ProCard pro={pro} onClick={setSelectedPro} />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {view === "results" && (
                        <div className="fade-in" style={{ marginTop: 10 }}>
                            <div style={{ padding: "14px 20px", display: "flex", gap: 8, overflowX: "auto" }}>
                                <button onClick={resetFilters} style={{
                                    flexShrink: 0, background: !selectedCat ? "linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%)" : "#ffffff",
                                    color: !selectedCat ? "#fff" : "#4b5563", border: !selectedCat ? "none" : "1px solid #e2e8f0",
                                    borderRadius: 12, padding: "8px 16px", fontSize: 12, fontWeight: 600, cursor: "pointer"
                                }}>All Trades</button>
                                {CATEGORIES.map(cat => (
                                    <button key={cat.id} onClick={() => setSelectedCat(cat.id)} style={{
                                        flexShrink: 0, background: selectedCat === cat.id ? "linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%)" : "#ffffff",
                                        color: selectedCat === cat.id ? "#fff" : "#4b5563", border: selectedCat === cat.id ? "none" : "1px solid #e2e8f0",
                                        borderRadius: 12, padding: "8px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer"
                                    }}>{cat.icon} {cat.label}</button>
                                ))}
                            </div>

                            {nearMeActive && (
                                <div style={{ margin: "4px 20px 12px", background: "rgba(34, 197, 94, 0.05)", borderRadius: 16, padding: "12px 16px", display: "flex", alignItems: "center", gap: 10, border: "1px solid rgba(34, 197, 94, 0.15)" }}>
                                    <span style={{ fontSize: 16 }}>📍</span>
                                    <div>
                                        <div style={{ fontWeight: 700, fontSize: 12, color: "#16a34a" }}>GPS Live Proximity Active</div>
                                        <div style={{ fontSize: 11, color: "#64748b", marginTop: 1 }}>Strict mathematical filter perimeter constraint locked below 1.5 km.</div>
                                    </div>
                                </div>
                            )}

                            <div style={{ padding: "12px 20px 0" }}>
                                <div style={{ fontWeight: 700, fontSize: 11, color: "#94a3b8", marginBottom: 14, textTransform: "uppercase" }}>
                                    Search Results ({filteredPros.length})
                                </div>
                                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                                    {filteredPros.length > 0 ? filteredPros.map((pro, idx) => (
                                        <div key={pro.id} className="slide-up" style={{ animationDelay: `${idx * 40}ms` }}>
                                            <ProCard pro={pro} onClick={setSelectedPro} />
                                        </div>
                                    )) : (
                                        <div style={{ textAlign: "center", padding: "80px 20px" }}>
                                            <div style={{ fontSize: 36 }}>📍</div>
                                            <div style={{ fontWeight: 700, fontSize: 15, color: "#111827", marginTop: 12 }}>No Matches Near You</div>
                                            <div style={{ color: "#64748b", fontSize: 12, marginTop: 4 }}>Zero results found within your immediate physical radar constraint.</div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {selectedPro && (
                        <div className="full-profile-view">
                            <div style={{ padding: "16px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: "1px solid #f1f5f9", background: "#ffffff", position: "sticky", top: 0, zIndex: 10 }}>
                                <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                                    <button onClick={() => setSelectedPro(null)} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: "#111827" }}>←</button>
                                    <span style={{ fontWeight: 800, fontSize: 16, color: "#111827" }}>Expert Verification File</span>
                                </div>
                                <div>
                                    <span style={{ fontSize:11, color: selectedPro.online ? '#16a34a' : '#dc2626', fontWeight:800 }}>
                                        {selectedPro.online ? 'ONLINE' : 'OFFLINE'}
                                    </span>
                                </div>
                            </div>

                            <div style={{ padding: "24px 20px", background: "linear-gradient(180deg, #f8fafc 0%, #ffffff 100%)", textAlign: "center", borderBottom: "1px solid #f1f5f9" }}>
                                <div style={{ width: 80, height: 80, borderRadius: "50%", background: selectedPro.color, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 800, fontSize: 26, margin: "0 auto 14px", boxShadow: "0 10px 25px rgba(0,0,0,0.1)" }}>{selectedPro.avatar}</div>
                                <h2 style={{ fontWeight: 800, fontSize: 22, color: "#111827", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>{selectedPro.name} {selectedPro.verified && "🛡️"}</h2>
                                <div style={{ color: "#1d4ed8", fontWeight: 700, fontSize: 14, marginTop: 4 }}>{selectedPro.display_cat}</div>
                                <div style={{ display: "flex", justifyContent: "center", marginTop: 8 }}><StarRating rating={selectedPro.rating} /></div>
                            </div>

                            <div style={{ padding: "20px" }}>
                                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 24 }}>
                                    {[["Completed Jobs", selectedPro.jobs], ["Client Reviews", selectedPro.reviews], ["Proximity", `${selectedPro.distance}km`]].map(([label, val]) => (
                                        <div key={label} style={{ background: "#f8fafc", borderRadius: 16, padding: "14px 8px", textAlign: "center", border: "1px solid #f1f5f9" }}>
                                            <div style={{ fontWeight: 800, fontSize: 16, color: "#111827" }}>{val}</div>
                                            <div style={{ fontSize: 11, color: "#64748b", marginTop: 4, fontWeight: 500 }}>{label}</div>
                                        </div>
                                    ))}
                                </div>

                                {selectedPro.category === "chef" && selectedPro.schedule && (
                                    <div style={{ marginBottom: 24, background: "rgba(236, 72, 153, 0.04)", border: "1px solid rgba(236, 72, 153, 0.15)", borderRadius: 16, padding: 16 }}>
                                        <div style={{ fontWeight: 700, fontSize: 11, color: "#be185d", marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.5px" }}>📅 Operational Order Days</div>
                                        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                                            {selectedPro.schedule.map(day => (
                                                <span key={day} style={{ background: "#ffffff", color: "#be185d", border: "1px solid rgba(236, 72, 153, 0.2)", padding: "4px 10px", borderRadius: 10, fontSize: 11, fontWeight: 700 }}>{day}</span>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                <div style={{ marginBottom: 24 }}>
                                    <div style={{ fontWeight: 700, fontSize: 11, color: "#94a3b8", marginBottom: 8, textTransform: "uppercase" }}>Professional Profile</div>
                                    <p style={{ color: "#374151", fontSize: 14, lineHeight: 1.6, margin: 0, textAlign: "justify" }}>{selectedPro.bio}</p>
                                </div>

                                <div style={{ marginBottom: 24 }}>
                                    <div style={{ fontWeight: 700, fontSize: 11, color: "#94a3b8", marginBottom: 10, textTransform: "uppercase" }}>Endorsed Competencies</div>
                                    <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                                        {selectedPro.skills.map(s => <span key={s} style={{ background: "#f1f5f9", color: "#111827", borderRadius: 12, padding: "6px 14px", fontSize: 12, fontWeight: 600 }}>{s}</span>)}
                                    </div>
                                </div>

                                <div style={{ marginBottom: 34 }}>
                                    <div style={{ fontWeight: 700, fontSize: 11, color: "#94a3b8", marginBottom: 4, textTransform: "uppercase" }}>Work Portfolio Showcase</div>
                                    <div className="portfolio-grid">
                                        {(selectedPro.gallery || ["Project Layout Alpha", "System Installation Beta", "Premium Execution Gamma", "Standard Operations Delta"]).map((title, i) => (
                                            <div key={i} className="portfolio-img-card">
                                                <div style={{ textAlign: "center", padding: 8 }}>
                                                    <div style={{ fontSize: 18, marginBottom: 4 }}>📷</div>
                                                    <div>{title}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div style={{ display: "flex", gap: 12, position: "sticky", bottom: 16, background: "rgba(255,255,255,0.9)", backdropFilter: "blur(10px)", padding: "10px 0" }}>
                                    <button style={{ flex: 1, background: "#f1f5f9", color: "#111827", border: "none", borderRadius: 16, padding: "16px 0", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>Secure Chat 📩</button>
                                    <button style={{ flex: 1, background: "linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%)", color: "#fff", border: "none", borderRadius: 16, padding: "16px 0", fontWeight: 800, fontSize: 14, cursor: "pointer", boxShadow: "0 4px 15px rgba(29, 78, 216, 0.3)" }}>Hire Expert 📞</button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
