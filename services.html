<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Hub</title>
    <style>
        /* Taswirar Launuka da Sifofin Shafi */
        :root {
            --bg-dark: #0a0e17;
            --card-bg: #131a26;
            --accent-glow: #00ffcc;
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
            --border-color: #1f2c3f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Tsarin Babban Shafi */
        .container {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        /* Bangaren Gefen Shafi (Sidebar) */
        .sidebar {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            height: fit-content;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .profile-card {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(45deg, #00ffcc, #0077ff);
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }

        .profile-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .profile-handle {
            color: var(--text-muted);
            font-size: 14px;
        }

        .menu-links {
            list-style: none;
        }

        .menu-links li {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-muted);
        }

        .menu-links li:hover, .menu-links li.active {
            background-color: rgba(0, 255, 204, 0.1);
            color: var(--accent-glow);
            transform: translateX(5px);
        }

        /* Bangaren Tsakiya (Main Feed) */
        .main-feed {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Akwatin Rubuta Post */
        .create-post {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
        }

        .post-input {
            width: 100%;
            height: 100px;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px;
            color: var(--text-main);
            font-size: 15px;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
        }

        .post-input:focus {
            border-color: var(--accent-glow);
        }

        .post-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 12px;
        }

        .btn-post {
            background: linear-gradient(135deg, #00ffcc, #0077ff);
            color: #000;
            font-weight: 600;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-post:hover {
            opacity: 0.9;
        }

        /* Akwatin Kallon Posts */
        .feed-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .post-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .mini-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #0077ff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .post-user-info h4 {
            font-size: 15px;
            font-weight: 600;
        }

        .post-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .post-content {
            font-size: 15px;
            line-height: 1.6;
            color: #e1e7f0;
            margin-bottom: 15px;
        }

        .post-footer {
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
            display: flex;
            gap: 20px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .action-btn:hover {
            color: var(--accent-glow);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Wayoyin Salula */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
            .sidebar {
                display: none; /* Za ka iya canza wannan idan kana son mobile menu */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Gefen Shafi -->
        <aside class="sidebar">
            <div class="profile-card">
                <div class="profile-avatar">U</div>
                <h3 class="profile-name">User Account</h3>
                <p class="profile-handle">@username</p>
            </div>
            <ul class="menu-links">
                <li class="active">Home Feed</li>
                <li>Messages</li>
                <li>Notifications</li>
                <li>Settings</li>
            </ul>
        </aside>

        <!-- Tsakiyar Shafi (Feed) -->
        <main class="main-feed">
            <!-- Wurin Rubutu -->
            <div class="create-post">
                <textarea class="post-input" id="postText" placeholder="Mene ne a ranka a yau...?"></textarea>
                <div class="post-actions">
                    <button class="btn-post" onclick="addNewPost()">Post</button>
                </div>
            </div>

            <!-- Gurbin Posts -->
            <div class="feed-box" id="feedBox">
                <!-- Misalin Post na Farko (Static) -->
                <div class="post-card">
                    <div class="post-header">
                        <div class="mini-avatar">S</div>
                        <div class="post-user-info">
                            <h4>Sadiq</h4>
                            <span class="post-time">Yanzu-Yanzu</span>
                        </div>
                    </div>
                    <div class="post-content">
                        Barka da zuwa sabon shafinmu na sadarwa! Wannan tsari ne na musamman da aka gina shi cikin sauki kuma cikin sauri.
                    </div>
                    <div class="post-footer">
                        <button class="action-btn" onclick="likePost(this)">❤️ <span class="count">12</span></button>
                        <button class="action-btn">💬 Comment</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Aikin Kara Sabon Post
        function addNewPost() {
            const postTextArea = document.getElementById('postText');
            const postContent = postTextArea.value.trim();
            
            if (postContent === "") {
                alert("Don Allah rubuta wani abu kafin kayi post!");
                return;
            }

            const feedBox = document.getElementById('feedBox');
            
            // Tsarin HTML na sabon post
            const newPostHTML = `
                <div class="post-card">
                    <div class="post-header">
                        <div class="mini-avatar">U</div>
                        <div class="post-user-info">
                            <h4>You</h4>
                            <span class="post-time">Yanzu-Yanzu</span>
                        </div>
                    </div>
                    <div class="post-content">
                        ${escapeHTML(postContent)}
                    </div>
                    <div class="post-footer">
                        <button class="action-btn" onclick="likePost(this)">❤️ <span class="count">0</span></button>
                        <button class="action-btn">💬 Comment</button>
                    </div>
                </div>
            `;
            
            // Saka sabon post a saman feed
            feedBox.insertAdjacentHTML('afterbegin', newPostHTML);
            
            // Wanke akwatin rubutu
            postTextArea.value = "";
        }

        // Aikin Danna Like
        function likePost(button) {
            const countSpan = button.querySelector('.count');
            let currentLikes = parseInt(countSpan.innerText);
            
            // Karawa ko ragewa idan an riga an danna
            if (button.classList.contains('liked')) {
                currentLikes--;
                button.classList.remove('liked');
                button.style.color = '#8b9bb4';
            } else {
                currentLikes++;
                button.classList.add('liked');
                button.style.color = '#00ffcc';
            }
            
            countSpan.innerText = currentLikes;
        }

        // Kariyar tsaro domin hana rubuta bad kwayoyin cuta (XSS)
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
    </script>
</body>
</html>
