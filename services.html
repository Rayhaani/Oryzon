<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Protocol - TrustID World Class Alpha v9.0</title>
    
    <!-- React and ReactDOM Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel Compiler -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none; /* Prevents long-press context menu during story holds */
        }

        body {
            background-color: #f6f9fc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #111827;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 0px;
            height: 0px;
        }

        @keyframes slideUp {
            from { transform: translateY(24px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes cyberGlow {
            0%, 100% { border-color: rgba(255, 255, 255, 0.25); box-shadow: 0 0 10px rgba(255, 255, 255, 0.05); }
            50% { border-color: rgba(255, 255, 255, 0.5); box-shadow: 0 0 20px rgba(255, 255, 255, 0.15); }
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .slide-up {
            animation: slideUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .fade-in {
            animation: fadeIn 0.35s ease forwards;
        }

        .aurora-header {
            background: linear-gradient(180deg, #1d4ed8 0%, #3b82f6 85%, #f6f9fc 100%);
            padding: 24px 20px 35px;
            color: #ffffff;
            position: relative;
        }

        .cyber-input-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
        }

        .trustid-typing-bar {
            width: 100%;
            height: 48px;
            background: rgba(10, 25, 50, 0.4);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 0 50px 0 45px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            outline: none;
            animation: cyberGlow 6s infinite ease-in-out;
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 14px 16px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(29, 78, 216, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.6);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* World Class Global Standard Card Shadow Engine */
        .premium-pro-card {
            background: #ffffff;
            border-radius: 28px;
            border: 1px solid rgba(226, 232, 240, 0.7);
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: 0 12px 30px rgba(30, 41, 59, 0.04), 0 2px 4px rgba(0, 0, 0, 0.01);
            position: relative;
            overflow: hidden;
            padding: 22px;
        }

        .premium-pro-card:hover, .premium-pro-card:active {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(29, 78, 216, 0.07), 0 4px 12px rgba(29, 78, 216, 0.03);
            border-color: rgba(59, 130, 246, 0.3);
        }

        /* Static Absolute Top-Left Zero-Gap Corner Avatar Match to image 1001020684.jpg */
        .absolute-corner-avatar {
            position: absolute;
            top: 0 !important;
            left: 0 !important;
            width: 58px;
            height: 58px;
            border-radius: 50% !important; /* Perfect Circle */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-weight: 800;
            font-size: 16px;
            z-index: 10;
            /* Dan tudu blending matching avatar structure */
            border-bottom-right-radius: 18px !important;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.04);
            transition: all 0.25s ease;
        }

        /* Two Indicator State Matrix: Online Neon State on the Blended Corner Anchor */
        .avatar-online-anchor-indicator {
            border: 2px solid #22c55e !important;
            background-clip: padding-box;
        }
        
        .avatar-offline-anchor-indicator {
            border: 2px solid #94a3b8 !important;
        }

        /* State Badges Positioned Perfectly At Far Right Upper Deck Above Stars */
        .status-badge-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .status-pill {
            font-size: 10px;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .status-pill.available {
            background: rgba(34, 197, 94, 0.1);
            color: #16a34a;
            border: 1px solid rgba(34, 197, 94, 0.15);
        }

        .status-pill.taken {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.15);
        }

        .pro-description-text {
            font-size: 13.5px;
            color: #4b5563;
            margin: 0;
            line-height: 1.55;
            text-align: justify;
        }

        .quantum-story-container {
            width: 100%;
            overflow: hidden;
            padding: 10px 0;
            position: relative;
        }

        .quantum-story-track {
            display: flex;
            width: max-content;
            animation: marquee 25s linear infinite;
            gap: 12px;
            padding-left: 20px;
        }

        /* IMMERSIVE FIXED OVERLAY CORE CANVAS FRAME */
        .instagram-story-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #090c14;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* Strict WhatsApp Zero-Gap Top Layout Grid */
        .story-header-area {
            padding: 16px 20px 14px;
            background: linear-gradient(to bottom, rgba(9,12,20,0.95) 0%, rgba(9,12,20,0) 100%);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10020;
            box-sizing: border-box;
        }

        /* WhatsApp Standard Zero-Gap Horizontal Alignment Line */
        .story-progress-bar-container {
            display: flex;
            gap: 4px;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10030;
        }

        .story-progress-bg {
            height: 3.5px;
            background: rgba(255, 255, 255, 0.22);
            flex: 1;
            overflow: hidden;
        }

        .story-progress-fill {
            height: 100%;
            background: #ffffff;
            width: 0%;
            transition: width 0.1s linear;
        }

        .story-food-display-canvas {
            width: 100%;
            height: 100%;
            flex: 1;
            background: radial-gradient(circle at center, #1e293b 0%, #0b0f19 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-sizing: border-box;
            padding: 40px;
            cursor: pointer; /* Click-and-Hold Surface */
        }

        /* World-Class Cyber Holographic Glassmorphism Control Deck */
        .story-bottom-action-deck {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 32px 24px 44px;
            background: linear-gradient(to top, rgba(11,15,25,0.98) 75%, rgba(11,15,25,0) 100%);
            display: flex;
            gap: 16px;
            box-sizing: border-box;
            z-index: 10010;
        }

        /* Ultra Premium Professional Grade Action Layout Matrix Buttons */
        .cyber-prime-action-btn {
            flex: 1.3;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 50%, #1e40af 100%);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            padding: 16px 0;
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 0.3px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.35), inset 0 2px 4px rgba(255,255,255,0.2);
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .cyber-prime-action-btn:max-width, .cyber-prime-action-btn:active {
            transform: scale(0.97);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .cyber-secondary-glass-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.07);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 18px;
            padding: 16px 0;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(16px);
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.05);
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .cyber-secondary-glass-btn:active {
            background: rgba(255, 255, 255, 0.12);
        }

        .full-profile-view {
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 4000;
            overflow-y: auto;
            animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px;
        }

        .portfolio-img-card {
            background: #f1f5f9;
            height: 110px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            font-weight: 600;
            font-size: 12px;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const CATEGORIES = [
            { id: "plumber", label: "Plumber", icon: "🔧" },
            { id: "electrician", label: "Electrician", icon: "⚡" },
            { id: "carpenter", label: "Carpenter", icon: "🪚" },
            { id: "chef", label: "Chef / Cook", icon: "🍳" }
        ];

        const LOCAL_STORY_PRODUCTS = [
            { id: 1, name: "Danwake Hot", icon: "🥣", proId: 4, distance: "0.5km", price: "₦1,500" },
            { id: 2, name: "Fried Rice", icon: "🍛", proId: 4, distance: "0.5km", price: "₦2,200" },
            { id: 3, name: "Tuwon Shinkafa", icon: "🌾", proId: 4, distance: "0.5km", price: "₦1,800" }
        ];

        const PROS = [
            {
                id: 1, name: "Malam Sule Ibrahim", category: "plumber", display_cat: "Plumbing Expert",
                rating: 4.9, reviews: 134, distance: 0.8, city: "Kano", verified: true,
                avatar: "SI", color: "linear-gradient(135deg, #059669 0%, #047857 100%)", jobs: 312, price: "₦3,500", 
                bio: "Highly skilled professional with over 12 years of experience in modern plumbing networks and quantum fluid systems.",
                skills: ["Leak Detection", "Pipe Layering"], online: true, available: true,
                gallery: ["Main Pipeline Fit", "Commercial Restroom Set"]
            },
            {
                id: 2, name: "Alhaji Bello Musa", category: "electrician", display_cat: "Electrical Engineer",
                rating: 4.8, reviews: 98, distance: 1.2, city: "Abuja", verified: true,
                avatar: "BM", color: "linear-gradient(135deg, #d97706 0%, #b45309 100%)", jobs: 245, price: "₦5,000", 
                bio: "Certified electrical engineer specializing in industrial solar setups and smart residential home automation.",
                skills: ["Auto-Wiring", "Solar Systems"], online: true, available: false,
                gallery: ["Inverter Bank Hookup", "Smart DB Box Clean Setup"]
            },
            {
                id: 3, name: "Usman Garba", category: "carpenter", display_cat: "Master Carpenter",
                rating: 4.7, reviews: 76, distance: 2.1, city: "Kaduna", verified: false,
                avatar: "UG", color: "linear-gradient(135deg, #78350f 0%, #451a03 100%)", jobs: 189, price: "₦4,200", 
                bio: "Expert artisan dedicated to fabricating luxury furniture architectures and reinforced modern security doors.",
                skills: ["Premium Furniture", "Roof Design"], online: false, available: true,
                gallery: ["Royal Dining Finish", "Mahogany Armor Door"]
            },
            {
                id: 4, name: "Chef Amara Yusuf", category: "chef", display_cat: "Culinary Artist / Chef",
                rating: 5.0, reviews: 215, distance: 0.5, city: "Kano", verified: true,
                avatar: "AY", color: "linear-gradient(135deg, #ec4899 0%, #be185d 100%)", jobs: 410, price: "₦6,000", 
                bio: "Elite chef specializing in upscale local catering, signature gourmet dishes, and customized corporate event banquets.",
                skills: ["Gourmet Catering", "Pastry Art"], online: true, available: true,
                gallery: ["Premium Banqueting Platter", "Pastry Fine Art Design"]
            },
        ];

        function StarRating({ rating }) {
            return (
                <div style={{ display: "flex", alignItems: "center", gap: 3, flexShrink: 0 }}>
                    <span style={{ color: "#f59e0b", fontSize: 12, letterSpacing: -0.5 }}>
                        {"★".repeat(Math.floor(rating)) + "☆".repeat(5 - Math.floor(rating))}
                    </span>
                    <span style={{ color: "#71717a", fontSize: 11, fontWeight: 700, marginLeft: 2 }}>{rating}</span>
                </div>
            );
        }

        function ProCard({ pro, onClick }) {
            return (
                <div onClick={() => onClick(pro)} className="premium-pro-card">
                    
                    {/* Perfect Static Rounded Top-Left Avatar System with Dual State online indicator blending */}
                    <div className={`absolute-corner-avatar ${pro.online ? 'avatar-online-anchor-indicator' : 'avatar-offline-anchor-indicator'}`} style={{ background: pro.color }}>
                        {pro.avatar}
                    </div>

                    {/* Adjusted content grid layout mimicking 1001020684.jpg exact alignment layout specs */}
                    <div style={{ paddingLeft: 48, minHeight: 46, display: "flex", flexDirection: "column", justifyContent: "center" }}>
                        <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 8, width: "100%" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 4, minWidth: 0 }}>
                                <span style={{ mountaineer: "none", fontWeight: 700, fontSize: 15.5, color: "#111827", letterSpacing: "-0.3px", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                                    {pro.name}
                                </span>
                                {pro.verified && <span style={{ fontSize: 12, color: "#1d4ed8" }}>🛡️</span>}
                            </div>
                            
                            {/* Available/Taken Badges Positioned Right On Top Wings of the Far Right Stars Layout */}
                            <div className="status-badge-container">
                                <span className={`status-pill ${pro.available ? 'available' : 'taken'}`}>
                                    {pro.available ? 'Available' : 'Taken'}
                                </span>
                                <StarRating rating={pro.rating} />
                            </div>
                        </div>
                        
                        <div style={{ marginTop: 1 }}>
                            <span style={{ color: "#1d4ed8", fontSize: 12.5, fontWeight: 700 }}>
                                {pro.display_cat}
                            </span>
                        </div>
                    </div>

                    <p className="pro-description-text">{pro.bio}</p>
                    
                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                        {pro.skills.map(s => (
                            <span key={s} style={{ background: "rgba(29, 78, 216, 0.05)", color: "#1d4ed8", border: "1px solid rgba(29, 78, 216, 0.1)", borderRadius: 10, padding: "4px 10px", fontSize: 11, fontWeight: 600 }}>{s}</span>
                        ))}
                    </div>

                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 2, paddingTop: 12, borderTop: "1px solid rgba(0,0,0,0.05)" }}>
                        <div style={{ display: "flex", gap: 12, color: "#64748b", fontSize: 12, fontWeight: 500 }}>
                            <span>📍 {pro.distance}km</span>
                            <span>💼 {pro.jobs} Jobs</span>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            <div style={{ color: "#16a34a", fontSize: 14.5, fontWeight: 800 }}>
                                {pro.price}<span style={{ fontSize: 11, color: "#64748b", fontWeight: 400 }}>/hr</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [view, setView] = useState("main"); 
            const [query, setQuery] = useState("");
            const [selectedCat, setSelectedCat] = useState(null);
            const [selectedPro, setSelectedPro] = useState(null);
            
            // Advanced WhatsApp Hold/Pause Interaction Engine Engine States
            const [activeStoryFood, setActiveStoryFood] = useState(null); 
            const [storyProgress, setStoryProgress] = useState(0);
            const [isPaused, setIsPaused] = useState(false);

            const progressIntervalRef = useRef(null);
            const progressRef = useRef(0);

            // Precision Multi-device Watch Timer Tracking Loop
            useEffect(() => {
                if (activeStoryFood && !isPaused) {
                    progressIntervalRef.current = setInterval(() => {
                        progressRef.current += 2; // Incremental tick speed matching standard 5s duration window
                        if (progressRef.current >= 100) {
                            clearInterval(progressIntervalRef.current);
                            setActiveStoryFood(null);
                            progressRef.current = 0;
                        }
                        setStoryProgress(progressRef.current);
                    }, 100);
                } else {
                    clearInterval(progressIntervalRef.current);
                }

                return () => clearInterval(progressIntervalRef.current);
            }, [activeStoryFood, isPaused]);

            const handleStoryTouchStart = () => {
                setIsPaused(true);
            };

            const handleStoryTouchEnd = () => {
                setIsPaused(false);
            };

            const triggerLaunchStory = (item) => {
                progressRef.current = 0;
                setStoryProgress(0);
                setIsPaused(false);
                setActiveStoryFood(item);
            };

            const filteredPros = PROS.filter(p => {
                if (selectedCat && p.category !== selectedCat) return false;
                if (query) {
                    const q = query.toLowerCase();
                    return p.name.toLowerCase().includes(q) || p.display_cat.toLowerCase().includes(q);
                }
                return true;
            });

            function routeFromStoryToProfile(proId) {
                setActiveStoryFood(null);
                const target = PROS.find(p => p.id === proId);
                if (target) setSelectedPro(target);
            }

            const doubleStories = [...LOCAL_STORY_PRODUCTS, ...LOCAL_STORY_PRODUCTS, ...LOCAL_STORY_PRODUCTS];

            return (
                <div style={{ maxWidth: 430, margin: "0 auto", minHeight: "100vh", background: "#f6f9fc", position: "relative", paddingBottom: 60, boxShadow: "0 0 30px rgba(0,0,0,0.04)" }}>
                    
                    <div className="aurora-header">
                        <div style={{ display: "flex", alignItems: "center" }}>
                            <div className="cyber-input-wrapper">
                                <span style={{ position: "absolute", left: 18, fontSize: 16, zIndex: 2 }}>🛡️</span>
                                <input
                                    type="text"
                                    value={query}
                                    onChange={e => setQuery(e.target.value)}
                                    className="trustid-typing-bar"
                                    placeholder="TrustID Secured Portal"
                                />
                            </div>
                        </div>

                        {view === "main" && (
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginTop: 24, marginBottom: -10 }}>
                                <div className="glass-btn" onClick={() => setView("results")}>
                                    <span style={{ fontSize: 18 }}>📍</span>
                                    <span style={{ fontWeight: 700, fontSize: 13, color: "#111827" }}>Pros Near Me</span>
                                </div>
                                <div className="glass-btn" onClick={() => { setView("results"); setSelectedCat(null); }}>
                                    <span style={{ fontSize: 18 }}>🛡️</span>
                                    <span style={{ fontWeight: 700, fontSize: 13, color: "#111827" }}>Verified Pros</span>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* WHATSAPP STRUCTURAL CORE STORY DISPLAY CANVAS METRIC OVERLAY */}
                    {activeStoryFood && (
                        <div className="instagram-story-overlay fade-in">
                            
                            {/* WhatsApp Zero-Gap Horizontal Alignment Headway Line */}
                            <div className="story-header-area">
                                <div className="story-progress-bar-container">
                                    <div className="story-progress-bg">
                                        <div className="story-progress-fill" style={{ width: `${storyProgress}%` }}></div>
                                    </div>
                                </div>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 4 }}>
                                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                                        <span style={{ fontSize: 22 }}>🍳</span>
                                        <div>
                                            <div style={{ fontWeight: 800, fontSize: 14, color: '#fff' }}>{activeStoryFood.name}</div>
                                            <div style={{ fontSize: 11, color: "#94a3b8" }}>Prepared Live Near Me ({activeStoryFood.distance})</div>
                                        </div>
                                    </div>
                                    <button onClick={() => setActiveStoryFood(null)} style={{ background: "rgba(255,255,255,0.15)", border: "none", color: "#fff", fontSize: 15, width:30, height:30, borderRadius:'50%', cursor: "pointer", display:'flex', alignItems:'center', justifyContent:'center' }}>✕</button>
                                </div>
                            </div>

                            {/* Immersive interactive hold/press controller field */}
                            <div 
                                className="story-food-display-canvas"
                                onMouseDown={handleStoryTouchStart}
                                onMouseUp={handleStoryTouchEnd}
                                onTouchStart={handleStoryTouchStart}
                                onTouchEnd={handleStoryTouchEnd}
                            >
                                <div style={{ fontSize: 92, marginBottom: 16 }}>{activeStoryFood.icon}</div>
                                <h2 style={{ fontWeight: 800, fontSize: 26, color: "#ffffff" }}>{activeStoryFood.name}</h2>
                                <div style={{ color: "#10b981", fontWeight: 800, fontSize: 24, marginTop: 4 }}>{activeStoryFood.price}</div>
                                
                                {isPaused && (
                                    <div style={{ position: 'absolute', top: '22%', background: 'rgba(0,0,0,0.4)', backdropFilter: 'blur(4px)', padding: '6px 12px', borderRadius: 10, fontSize: 11, color: '#fff', fontWeight: 600, letterSpacing: '0.4px' }}>
                                        ⏸️ PAUSED
                                    </div>
                                )}

                                {/* Advanced Professional Action Control Deck Architecture */}
                                <div className="story-bottom-action-deck" onMouseDown={e => e.stopPropagation()} onTouchStart={e => e.stopPropagation()}>
                                    <button onClick={() => alert(`Order placed for ${activeStoryFood.name}`)} className="cyber-prime-action-btn">
                                        Place Order 🛒
                                    </button>
                                    <button onClick={() => routeFromStoryToProfile(activeStoryFood.proId)} className="cyber-secondary-glass-btn">
                                        Go to Profile 👤
                                    </button>
                                </div>
                            </div>

                        </div>
                    )}

                    {view === "main" && (
                        <div className="fade-in">
                            <div style={{ marginTop: 24 }}>
                                <div style={{ padding: "0 20px", fontWeight: 700, fontSize: 11, color: "#94a3b8", textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: 6 }}>
                                    ⚡ Available Now In Your Area (Instant Pickup)
                                </div>
                                <div className="quantum-story-container">
                                    <div className="quantum-story-track">
                                        {doubleStories.map((item, index) => (
                                            <div key={index} className="futuristic-story-card" onClick={() => triggerLaunchStory(item)} style={{ background: '#fff', width: 95, border: '1px solid rgba(59,130,246,0.12)', borderRadius: 20, padding: '10px 6px', display: 'flex', flexDirection: 'column', alignItems: 'center', cursor: 'pointer' }}>
                                                <div style={{ width: 56, height: 56, borderRadius: '50%', background: 'linear-gradient(135deg, #00f2fe 0%, #4facfe 100%)', padding: 2, marginBottom: 6 }}>
                                                    <div style={{ width: '100%', height: '100%', borderRadius: '50%', background: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20 }}>{item.icon}</div>
                                                </div>
                                                <span style={{ fontSize: 11, fontWeight: 700, color: '#1f2937', whiteSpace: 'nowrap', width: '100%', overflow: 'hidden', textOverflow: 'ellipsis', textAlign: 'center' }}>{item.name}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div style={{ padding: "20px 20px 0" }}>
                                <div style={{ fontWeight: 700, fontSize: 11, color: "#94a3b8", marginBottom: 14, textTransform: "uppercase" }}>Service Categories</div>
                                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10 }}>
                                    {CATEGORIES.map(cat => (
                                        <button key={cat.id} onClick={() => { setSelectedCat(cat.id); setView("results"); }} style={{
                                            background: "#ffffff", border: "1px solid #e2e8f0",
                                            borderRadius: 16, padding: "14px 4px", cursor: "pointer",
                                            display: "flex", flexDirection: "column", alignItems: "center", gap: 6
                                        }}>
                                            <span style={{ fontSize: 22 }}>{cat.icon}</span>
                                            <span style={{ fontSize: 10, fontWeight: 700, color: "#4b5563" }}>{cat.label}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div style={{ padding: "28px 20px 0" }}>
                                <div style={{ fontWeight: 700, fontSize: 11, color: "#94a3b8", textTransform: "uppercase", marginBottom: 16 }}>⭐ Highly Rated Providers</div>
                                <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                                    {PROS.map((pro, idx) => (
                                        <div key={pro.id} className="slide-up" style={{ animationDelay: `${idx * 60}ms` }}>
                                            <ProCard pro={pro} onClick={setSelectedPro} />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {view === "results" && (
                        <div className="fade-in" style={{ marginTop: 10 }}>
                            <div style={{ padding: "14px 20px", display: "flex", gap: 8, overflowX: "auto" }}>
                                <button onClick={() => { setSelectedCat(null); setView("main"); }} style={{ flexShrink: 0, background: "#ffffff", border: "1px solid #e2e8f0", borderRadius: 12, padding: "8px 16px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>← Back</button>
                                {CATEGORIES.map(cat => (
                                    <button key={cat.id} onClick={() => setSelectedCat(cat.id)} style={{
                                        flexShrink: 0, background: selectedCat === cat.id ? "linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%)" : "#ffffff",
                                        color: selectedCat === cat.id ? "#fff" : "#4b5563", border: selectedCat === cat.id ? "none" : "1px solid #e2e8f0",
                                        borderRadius: 12, padding: "8px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer"
                                    }}>{cat.icon} {cat.label}</button>
                                ))}
                            </div>

                            <div style={{ padding: "12px 20px 0" }}>
                                <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                                    {filteredPros.map((pro, idx) => (
                                        <div key={pro.id} className="slide-up" style={{ animationDelay: `${idx * 40}ms` }}>
                                            <ProCard pro={pro} onClick={setSelectedPro} />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {selectedPro && (
                        <div className="full-profile-view">
                            <div style={{ padding: "16px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: "1px solid #f1f5f9", background: "#ffffff", position: "sticky", top: 0, zIndex: 10 }}>
                                <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                                    <button onClick={() => setSelectedPro(null)} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer" }}>←</button>
                                    <span style={{ fontWeight: 800, fontSize: 16 }}>Expert Verification File</span>
                                </div>
                            </div>

                            <div style={{ padding: "24px 20px", textAlign: "center", borderBottom: "1px solid #f1f5f9" }}>
                                <div style={{ width: 80, height: 80, borderRadius: "50%", background: selectedPro.color, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 800, fontSize: 26, margin: "0 auto 14px" }}>{selectedPro.avatar}</div>
                                <h2 style={{尊称: "none", fontWeight: 800, fontSize: 22, color: "#111827" }}>{selectedPro.name}</h2>
                                <div style={{ color: "#1d4ed8", fontWeight: 700, fontSize: 14, marginTop: 4 }}>{selectedPro.display_cat}</div>
                            </div>

                            <div style={{ padding: "20px" }}>
                                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 24 }}>
                                    {[["Completed Jobs", selectedPro.jobs], ["Client Reviews", selectedPro.reviews], ["Proximity", `${selectedPro.distance}km`]].map(([label, val]) => (
                                        <div key={label} style={{ background: "#f8fafc", borderRadius: 16, padding: "14px 8px", textAlign: "center", border: "1px solid #f1f5f9" }}>
                                            <div style={{ fontWeight: 800, fontSize: 16 }}>{val}</div>
                                            <div style={{ fontSize: 11, color: "#64748b", marginTop: 4 }}>{label}</div>
                                        </div>
                                    ))}
                                </div>

                                <div style={{ marginBottom: 24 }}>
                                    <div style={{ fontWeight: 700, fontSize: 11, color: "#94a3b8", marginBottom: 8, textTransform: "uppercase" }}>Professional Profile</div>
                                    <p style={{ color: "#374151", fontSize: 14, lineHeight: 1.6 }}>{selectedPro.bio}</p>
                                </div>

                                <div style={{ display: "flex", gap: 12, marginTop: 40 }}>
                                    <button style={{ flex: 1, background: "#f1f5f9", color: "#111827", border: "none", borderRadius: 16, padding: "16px 0", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>Secure Chat 📩</button>
                                    <button style={{ flex: 1, background: "#1d4ed8", color: "#fff", border: "none", borderRadius: 16, padding: "16px 0", fontWeight: 800, fontSize: 14, cursor: "pointer" }}>Hire Expert 📞</button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
