        function App() {
            const [view, setView] = useState("main"); 
            const [query, setQuery] = useState("");
            const [selectedCat, setSelectedCat] = useState(null);
            const [selectedPro, setSelectedPro] = useState(null);
            const [activeStoryIndex, setActiveStoryIndex] = useState(null);
            const [storyProgress, setStoryProgress] = useState(0);
            const [storyPaused, setStoryPaused] = useState(false);
            const [nearMeActive, setNearMeActive] = useState(false);
            const [locating, setLocating] = useState(false);
            const [showSearchRouter, setShowSearchRouter] = useState(false);

            const activeStoryFood = activeStoryIndex !== null ? LOCAL_STORY_PRODUCTS[activeStoryIndex] : null;
            const STORY_DURATION_MS = 5000;
            const STORY_TICK_MS = 50;

            useEffect(() => {
                if (activeStoryIndex === null || storyPaused) return;
                const increment = (STORY_TICK_MS / STORY_DURATION_MS) * 100;
                const interval = setInterval(() => {
                    setStoryProgress(prev => Math.min(prev + increment, 100));
                }, STORY_TICK_MS);
                return () => clearInterval(interval);
            }, [activeStoryIndex, storyPaused]);

            useEffect(() => {
                if (storyProgress < 100 || activeStoryIndex === null) return;
                const nextIndex = activeStoryIndex + 1;
                if (nextIndex < LOCAL_STORY_PRODUCTS.length) {
                    setActiveStoryIndex(nextIndex);
                } else {
                    setActiveStoryIndex(null);
                }
                setStoryProgress(0);
            }, [storyProgress]);

            function toggleStoryPause() {
                setStoryPaused(prev => !prev);
            }
            

            const filteredPros = PROS.filter(p => {
                if (selectedCat && p.category !== selectedCat) return false;
                if (nearMeActive && p.distance > 1.5) return false;
                if (query) {
                    const q = query.toLowerCase();
                    return p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q) || p.display_cat.toLowerCase().includes(q);
                }
                return true;
            });

            function triggerRouterCheck(e) {
                if (e) e.preventDefault();
                if (!query.trim()) return;
                setShowSearchRouter(true);
            }

            function handleRouteSelection(type) {
                setShowSearchRouter(false);
                const q = query.toLowerCase();
                const match = CATEGORIES.find(c => q.includes(c.label.toLowerCase()) || q.includes(c.id));
                
                if (type === "near") {
                    setLocating(true);
                    setTimeout(() => {
                        setLocating(false);
                        setNearMeActive(true);
                        if (match) setSelectedCat(match.id);
                        setView("results");
                    }, 1000);
                } else {
                    setNearMeActive(false);
                    if (match) setSelectedCat(match.id);
                    setView("results");
                }
            }

            function handleNearMeTile() {
                setLocating(true);
                setTimeout(() => {
                    setLocating(false);
                    setNearMeActive(true);
                    setView("results");
                }, 1000);
            }

            function routeFromStoryToProfile(proId) {
                setActiveStoryIndex(null);
                setStoryProgress(0);
                setStoryPaused(false);
                const target = PROS.find(p => p.id === proId);
                if (target) setSelectedPro(target);
            }

            function resetFilters() {
                setSelectedCat(null);
                setQuery("");
                setNearMeActive(false);
                setView("main");
            }

            const doubleStories = [...LOCAL_STORY_PRODUCTS, ...LOCAL_STORY_PRODUCTS];

            return (
                <div style={{ maxWidth: 430, margin: "0 auto", minHeight: "100vh", background: "#f8fafc", position: "relative", paddingBottom: 60, boxShadow: "0 0 30px rgba(0,0,0,0.05)" }}>
                    
                    <div className="aurora-header">
                        <div style={{ display: "flex", alignItems: "center", position: "relative" }}>
                            <div className="cyber-input-wrapper">
                                <span style={{ position: "absolute", left: 18, fontSize: 16, pointerEvents: "none", zIndex: 2 }}>🛡️</span>
                                <input
                                    type="text"
                                    value={query}
                                    onChange={e => setQuery(e.target.value)}
                                    onKeyDown={e => e.key === "Enter" && triggerRouterCheck(e)}
                                    className="trustid-typing-bar"
                                    placeholder="TrustID Secured Portal"
                                />
                                <div className="embedded-search-btn" onClick={() => triggerRouterCheck(null)}>
                                    <span style={{ fontSize: 14 }}>🔍</span>
                                </div>
                            </div>
                        </div>

                        {view === "main" && (
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginTop: 24, position: "relative", marginBottom: -10 }}>
                                <div className="glass-btn" onClick={handleNearMeTile}>
                                    <span style={{ fontSize: 18 }}>📍</span>
                                    <span style={{ fontWeight: 700, fontSize: 13, color: "#111827" }}>Pros Near Me</span>
                                </div>
                                <div className="glass-btn" onClick={() => { setView("results"); setSelectedCat(null); }}>
                                    <span style={{ fontSize: 18 }}>🛡️</span>
                                    <span style={{ fontWeight: 700, fontSize: 13, color: "#111827" }}>Verified Pros</span>
                                </div>
                            </div>
                        )}
                    </div>

                    {showSearchRouter && (

                                    <span style={{ fontSize: 18 }}>🌍</span>
                                    <div>Search All Verified Experts</div>
                                </div>
                                <div className="router-option" onClick={() => handleRouteSelection("near")}>

                                </div>
                            </div>
                        </div>

                            {/* Standard Top HUD Navigation bar placed cleanly over content */}
                            <div className="story-header-area">
                                <div className="story-progress-bar-container">
                                    {LOCAL_STORY_PRODUCTS.map((item, idx) => (
                                        <div key={item.id} className="story-progress-bg">

                                        <span style={{ fontSize: 24 }}>🍳</span>

                                            <div style={{ fontWeight: 800, fontSize: 14, color: '#fff' }}>{activeStoryFood.name}</div>

                                        </div>
                                    </div>
                                    <button onClick={(e) => { e.stopPropagation(); setActiveStoryIndex(null); setStoryProgress(0); setStoryPaused(false); }} style={{ background: "rgba(255,255,255,0.1)", border: "none", color: "#fff", fontSize: 16, width:32, height:32, borderRadius:'50%', cursor: "pointer", display:'flex', alignItems:'center', justifyContent:'center' }}>✕</button>
                                </div>
                            </div>

                            {/* Full View Screen Canvas Container Card Block */}
                            <div className="story-food-display-canvas">
                                <div style={{ fontSize: 96, marginBottom: 16 }}>{activeStoryFood.icon}</div>
                                <h2 style={{ fontWeight: 800, fontSize: 28, color: "#ffffff" }}>{activeStoryFood.name}</h2>
                                <div style={{ color: "#34d399", fontWeight: 800, fontSize: 24, marginTop: 6 }}>{activeStoryFood.price}</div>
                                <div style={{ background: "rgba(255,255,255,0.06)", padding: "8px 18px", borderRadius: 14, fontSize: 12, color: "#cbd5e1", marginTop: 14, border: "1px solid rgba(255,255,255,0.1)" }}>
                                    🔥 Freshly Steaming & Available In Perimeter
                                </div>

                                {/* Integrated Control Deck Built Layered Directly INSIDE the Immersive Card Structure */}
                                <div className="story-bottom-action-deck">
                                    <button onClick={(e) => { e.stopPropagation(); alert(`Order initialized for ${activeStoryFood.name}`); }} style={{ flex: 1, background: "#1d4ed8", color: "#ffffff", border: "none", borderRadius: 16, padding: "16px 0", fontWeight: 800, fontSize: 14, cursor: "pointer", boxShadow: "0 4px 12px rgba(29, 78, 216, 0.3)" }}>
                                        Place Order 🛒
                                    </button>
                                    <button onClick={(e) => { e.stopPropagation(); routeFromStoryToProfile(activeStoryFood.proId); }} style={{ flex: 1, background: "rgba(255,255,255,0.12)", color: "#ffffff", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 16, padding: "16px 0", fontWeight: 700, fontSize: 14, cursor: "pointer", backdropFilter: "blur(10px)" }}>
                                        Go to Profile 👤
                                    </button>
                                </div>
                            </div>

                        </div>
                    )}

                    {view === "main" && (
                        <div className="fade-in">
                            {locating && (
                                <div style={{ padding: "24px 20px 0", textAlign: "center", color: "#1d4ed8", fontWeight: 600, fontSize: 13 }}>
                                    🔄 Syncing Core GPS Location Engine...
                                </div>
                            )}

                            <div style={{ marginTop: 24 }}>
                                <div style={{ padding: "0 20px", fontWeight: 700, fontSize: 11, color: "#94a3b8", textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: 6 }}>
                                    ⚡ Available Now In Your Area (Instant Pickup)
                                </div>
                                <div className="quantum-story-container">
                                    <div className="quantum-story-track">
                                        {doubleStories.map((item, index) => (
                                            <div key={index} className="futuristic-story-card" onClick={() => {
                                                const startIndex = LOCAL_STORY_PRODUCTS.findIndex(p => p.id === item.id);
                                                setActiveStoryIndex(startIndex);
                                                setStoryProgress(0);
                                                setStoryPaused(false);
                                            }}>
                                                <div className="story-cyber-ring">
                                                    <div className="story-avatar-core">
                                                        {item.icon}
                                                    </div>
                                                </div>
                                                <span style={{ fontSize: 11, fontWeight: 700, color: "#1f2937", whiteSpace: "nowrap", width: "100%", overflow: "hidden", textOverflow: "ellipsis" }}>{item.name}</span>
                                                <span style={{ fontSize: 9, fontWeight: 600, color: "#3b82f6", marginTop: 2 }}>{item.distance}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                           <div style={{ padding: "20px 20px 0" }}>
    <div style={{ fontWeight: 700, fontSize: 11, color: "#94a3b8", marginBottom: 14, textTransform: "uppercase", letterSpacing: "0.5px" }}>Service Categories</div>
    <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10 }}>
        {CATEGORIES.map(cat => (
            <div key={cat.id} onClick={() => { setSelectedCat(cat.id); setView("results"); }} className="aero-prism-card">
                
                {/* Minimalist Soft Sphere */}
                <div className="prism-icon-sphere">
                    <span style={{ fontSize: 22 }}>{cat.icon}</span>
                </div>
                
                {/* World Class Typography */}
                <span className="prism-card-label">{cat.label}</span>
                
            </div>
        ))}
    </div>
</div>
                            
                            
                            <div style={{ padding: "28px 20px 0" }}>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                                    <div style={{ fontWeight: 700, fontSize: 12, color: "#94a3b8", textTransform: "uppercase", letterSpacing: "0.5px" }}>⭐ Highly Rated Providers</div>
                                    <button onClick={() => setView("results")} style={{ background: "none", border: "none", color: "#1d4ed8", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>View All</button>
                                </div>
                                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>

                                            <ProCard pro={pro} onClick={setSelectedPro} />

                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {view === "results" && (
                        <div className="fade-in" style={{ marginTop: 10 }}>
                            <div style={{ padding: "14px 20px", display: "flex", gap: 8, overflowX: "auto" }}>
                                <button onClick={resetFilters} style={{
                                    flexShrink: 0, background: !selectedCat ? "linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%)" : "#ffffff",
                                    color: !selectedCat ? "#fff" : "#4b5563", border: !selectedCat ? "none" : "1px solid #e2e8f0",
                                    borderRadius: 12, padding: "8px 16px", fontSize: 12, fontWeight: 600, cursor: "pointer"
                                }}>All Trades</button>
                                {CATEGORIES.map(cat => (
                                    <button key={cat.id} onClick={() => setSelectedCat(cat.id)} style={{
                                        flexShrink: 0, background: selectedCat === cat.id ? "linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%)" : "#ffffff",
                                        color: selectedCat === cat.id ? "#fff" : "#4b5563", border: selectedCat === cat.id ? "none" : "1px solid #e2e8f0",
                                        borderRadius: 12, padding: "8px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer"
                                    }}>{cat.icon} {cat.label}</button>
                                ))}
                            </div>

                            {nearMeActive && (
                                <div style={{ margin: "4px 20px 12px", background: "rgba(34, 197, 94, 0.05)", borderRadius: 16, padding: "12px 16px", display: "flex", alignItems: "center", gap: 10, border: "1px solid rgba(34, 197, 94, 0.15)" }}>
                                    <span style={{ fontSize: 16 }}>📍</span>
                                    <div>
                                        <div style={{ fontWeight: 700, fontSize: 12, color: "#16a34a" }}>GPS Live Proximity Active</div>
                                        <div style={{ fontSize: 11, color: "#64748b", marginTop: 1 }}>Strict mathematical filter perimeter constraint locked below 1.5 km.</div>
                                    </div>
                                </div>
                            )}

                            <div style={{ padding: "12px 20px 0" }}>
                                <div style={{ fontWeight: 700, fontSize: 11, color: "#94a3b8", marginBottom: 14, textTransform: "uppercase" }}>
                                    Search Results ({filteredPros.length})
                                </div>
                                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                                    {filteredPros.length > 0 ? filteredPros.map((pro, idx) => (
                                        <div key={pro.id} className="slide-up" style={{ animationDelay: `${idx * 40}ms` }}>
                                            <ProCard pro={pro} onClick={setSelectedPro} />
                                        </div>
                                    )) : (
                                        <div style={{ textAlign: "center", padding: "80px 20px" }}>
                                            <div style={{ fontSize: 36 }}>📍</div>
                                            <div style={{ fontWeight: 700, fontSize: 15, color: "#111827", marginTop: 12 }}>No Matches Near You</div>
                                            <div style={{ color: "#64748b", fontSize: 12, marginTop: 4 }}>Zero results found within your immediate physical radar constraint.</div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {selectedPro && (

                                <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
