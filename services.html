        /* CSS STYLES */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f1f5f9;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        /* Tace scrollbar domin kyawun tsari */
        ::-webkit-scrollbar {
            width: 0px;
            height: 0px;
        }

        /* Animations */
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .5; transform: scale(1.3); }
        }

        .slide-up {
            animation: slideUp 0.35s ease forwards;
        }

        .fade-in {
            animation: fadeIn 0.3s ease forwards;
        }

        .pulsing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #22c55e;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        .spinner {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        /* Modal open animation */
        @keyframes slideModal {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-content {
            animation: slideModal 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>

                                    <button onClick={() => setView("results")} style={{ background: "none", border: "none", color: "#16a34a", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>Duba Duk</button>
                                </div>
                                <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                                    {PROS.slice(0, 3).map((pro, idx) => (
                                        <div key={pro.id} className="slide-up" style={{ animationDelay: `${idx * 100}ms` }}>
                                            <ProCard pro={pro} onClick={setSelectedPro} />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* VIEW 2: SEARCH & FILTER RESULTS */}
                    {view === "results" && (
                        <div className="fade-in">
                            {/* Header back bar */}
                            <div style={{ padding: "24px 20px 16px", background: "#fff", borderBottom: "1px solid #f1f5f9", sticky: "top" }}>
                                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
                                    <button onClick={resetFilters} style={{ background: "#f1f5f9", border: "none", width: 36, height: 36, borderRadius: "50%", cursor: "pointer", fontSize: 16, fontWeight: "bold" }}>‹</button>
                                    <SearchBar query={query} setQuery={setQuery} onSearch={handleSearch} />
                                </div>

                                {/* Horizontal Categories Filter Bar */}
                                <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 4 }}>
                                    <button onClick={() => setSelectedCat(null)} style={{
                                        flexShrink: 0, background: !selectedCat ? "#0f172a" : "#f8fafc",
                                        color: !selectedCat ? "#fff" : "#64748b", border: `1.5px solid ${!selectedCat ? "#0f172a" : "#e2e8f0"}`,
                                        borderRadius: 20, padding: "8px 16px", fontSize: 12, fontWeight: 700, cursor: "pointer"
                                    }}>Duk Sana'o'i</button>
                                    {CATEGORIES.map(cat => (
                                        <button key={cat.id} onClick={() => setSelectedCat(cat.id)} style={{
                                            flexShrink: 0, background: selectedCat === cat.id ? "#0f172a" : "#f8fafc",
                                            color: selectedCat === cat.id ? "#fff" : "#64748b",
                                            border: `1.5px solid ${selectedCat === cat.id ? "#0f172a" : "#e2e8f0"}`,
                                            borderRadius: 20, padding: "8px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer"
                                        }}>{cat.icon} {cat.label}</button>
                                    ))}
                                </div>
                            </div>

                            {/* GPS Near Me Simulation Indicator */}
                            {nearMeActive && (
                                <div style={{ margin: "16px 20px 0", background: "#f0fdf4", borderRadius: 14, padding: "12px 16px", display: "flex", alignItems: "center", gap: 10, border: "1px solid #bbf7d0" }}>
                                    <span style={{ fontSize: 18 }}>📍</span>
                                    <div>
                                        <div style={{ fontWeight: 800, fontSize: 13, color: "#16a34a" }}>An kunna GPS (Kusa da kai)</div>
                                        <div style={{ fontSize: 11, color: "#64748b" }}>Ana nuna masu gyara dake kusa da tazarar tafiya.</div>
                                    </div>
                                </div>
                            )}

                            {/* Results Section */}
                            <div style={{ padding: "16px 20px 0" }}>
                                <div style={{ fontWeight: 700, fontSize: 12, color: "#94a3b8", marginBottom: 14, textTransform: "uppercase" }}>
                                    An Samo Masu Sana'a ({filteredPros.length})
                                </div>
                                <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                                    {filteredPros.length > 0 ? filteredPros.map((pro, idx) => (
                                        <div key={pro.id} className="slide-up" style={{ animationDelay: `${idx * 50}ms` }}>
                                            <ProCard pro={pro} onClick={setSelectedPro} />
                                        </div>
                                    )) : (
                                        <div style={{ textAlign: "center", padding: "60px 20px" }}>
                                            <div style={{ fontSize: 40 }}>🔍</div>
                                            <div style={{ fontWeight: 800, fontSize: 16, color: "#0f172a", marginTop: 12 }}>Ba a samu kowa ba</div>
                                            <div style={{ color: "#94a3b8", fontSize: 13, marginTop: 4 }}>Gwada rubuta wata sana'ar daban ko canza tacewa.</div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Global Professional Detail Modal */}
                    <ProModal pro={selectedPro} onClose={() => setSelectedPro(null)} />

                </div>
            );
        }

        // Render to Root Element
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
