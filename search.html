<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Neural Search Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #050505;
            --cyan-neon: #00F2FF;
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon-glow: 0 0 12px rgba(0, 242, 255, 0.25);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--obsidian);
            background-image: radial-gradient(circle at 50% 100%, rgba(0, 242, 255, 0.07), transparent);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            height: 70px;
            padding: 0 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: transparent;
            z-index: 100;
        }

        .back-btn {
            cursor: pointer;
            width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            transition: 0.3s;
        }

        .back-btn:active { transform: scale(0.9); border-color: var(--cyan-neon); }

        .search-container {
            flex: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            height: 38px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-container:focus-within {
            border-color: var(--cyan-neon);
            box-shadow: var(--neon-glow);
            background: rgba(255, 255, 255, 0.07);
        }

        .search-container input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            flex: 1;
            font-size: 14px;
            margin-left: 10px;
            font-weight: 300;
        }

        .main-content {
            padding: 15px 20px;
            flex: 1;
            overflow-y: auto;
        }

        .section-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--cyan-neon);
            text-transform: uppercase;
            margin-bottom: 25px;
            opacity: 0.8;
        }

        .recent-list {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .recent-text-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.3s;
        }

        .item-content {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .delete-btn {
            color: rgba(255, 255, 255, 0.3);
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .delete-btn:active { color: #ff4b4b; transform: scale(1.1); }

        .empty-state {
            margin-top: 60px;
            text-align: center;
            opacity: 0.4;
        }

        .neural-ring {
            width: 60px; height: 60px;
            border: 1px solid rgba(0, 242, 255, 0.1);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.5; }
        }

        .empty-state p {
            font-size: 11px;
            max-width: 220px;
            margin: 0 auto;
            font-weight: 300;
        }
    </style>
</head>
<body>

    <header>
        <div class="back-btn" onclick="history.back()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 17l-5-5 5-5M18 12H6"/>
            </svg>
        </div>
        
        <div class="search-container">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--cyan-neon)" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input type="text" placeholder="Neural Search Protocol..." autofocus>
        </div>
    </header>

    <div class="main-content">
        <div class="section-label">Recent Searches</div>
        
        <div class="recent-list">
            <div class="recent-text-item">
                <div class="item-content">Trousers</div>
                <div class="delete-btn">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </div>
            </div>

            <div class="recent-text-item">
                <div class="item-content">Panties</div>
                <div class="delete-btn">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </div>
            </div>

            <div class="recent-text-item">
                <div class="item-content">Hand Bags</div>
                <div class="delete-btn">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </div>
            </div>
        </div>

        <div class="empty-state">
            <div class="neural-ring">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--cyan-neon)" stroke-width="1.5"><path d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/></svg>
            </div>
            <p>Enter parameters to synchronize with the market directory.</p>
        </div>
    </div>

</body>
  </html>
