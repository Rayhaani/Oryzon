<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus - Neural Story Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #050505;
            --cyan-neon: #00F2FF;
            --magenta-neon: #FF0055;
            --glass-border: rgba(0, 242, 255, 0.15);
            --glass-bg: rgba(5, 5, 5, 0.65);
            --text-dim: rgba(255, 255, 255, 0.6);
        }

        /* GYARA NA 1: Hana duka shafin rawa ko juya-juya ta gefe (Anti-horizontal scroll) */
        html, body {
            overflow: hidden;
            width: 100%;
            height: 100vh;
            background-color: var(--obsidian);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .story-matrix-container {
            width: 100%;
            height: 100%;
            max-width: 460px;
            position: relative;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.05);
            overflow: hidden; /* Karfafa kulle duk wani abu da zai fita waje */
        }

        /* Ambient Bio-Glow Matrix */
        .ambient-projector {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(50px) brightness(0.35);
            z-index: 1;
            transform: scale(1.3);
            transition: background-image 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            animation: bioPulse 8s infinite alternate;
            pointer-events: none; /* Hana shi karbar taba da zai sa gidan rawa */
        }

        @keyframes bioPulse {
            0% { transform: scale(1.2) rotate(0deg); filter: blur(50px) brightness(0.3); }
            100% { transform: scale(1.35) rotate(3deg); filter: blur(60px) brightness(0.4); }
        }

        /* Scan Overlay Grid */
        .scan-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 242, 255, 0.03) 50%, rgba(0, 0, 0, 0) 50%), linear-gradient(90deg, rgba(0, 242, 255, 0.03) 50%, rgba(0, 0, 0, 0) 50%);
            background-size: 16px 16px;
            z-index: 2;
            pointer-events: none;
            opacity: 0.4;
            transition: opacity 0.3s;
        }
        .story-matrix-container.paused .scan-overlay {
            opacity: 0.8;
            background-color: rgba(0, 242, 255, 0.02);
        }

        /* Layin Progress a sama */
        .hud-progress-timeline {
            position: absolute;
            top: 0; left: 0; right: 0;
            display: flex; gap: 4px; z-index: 10;
            padding: 4px 6px 0 6px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0));
        }

        .hud-bar {
            flex: 1; height: 2.5px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 0px;
            overflow: hidden;
        }

        .hud-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #00C8FF, var(--cyan-neon));
            box-shadow: 0 0 10px var(--cyan-neon);
        }

        /* HUD Top Header Area */
        .hud-header {
            position: absolute;
            top: 14px; left: 16px; right: 16px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 10;
            transition: opacity 0.3s;
        }

        .cyber-user-node { display: flex; align-items: center; gap: 10px; }
        .cyber-avatar-ring {
            position: relative;
            width: 38px; height: 38px;
            border-radius: 50%;
            padding: 1.5px;
            background: linear-gradient(45deg, var(--cyan-neon), var(--magenta-neon));
        }
        .cyber-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #000; }
        
        .node-meta { display: flex; align-items: center; gap: 6px; }
        .node-meta h2 { font-size: 14px; font-weight: 600; color: #fff; text-shadow: 1px 1px 4px rgba(0,0,0,0.8); }
        .node-meta .story-time { font-size: 12px; color: rgba(255, 255, 255, 0.65); text-shadow: 1px 1px 4px rgba(0,0,0,0.8); }
        .node-meta .story-time::before { content: " • "; margin-right: 2px; }

        /* Core Media Canvas */
        .viewport-canvas {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 4;
            position: relative;
        }

        .matrix-media-frame {
            width: 100%;
            max-height: 100vh;
            object-fit: contain;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Touch Control Interfaces */
        .cyber-touch-grids {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; z-index: 5;
        }
        .grid-left, .grid-right { flex: 1; height: 100%; }

        /* Floating Interactive Aura Slider Widget */
        .aura-slider-panel {
            position: absolute; bottom: 130px; right: 16px;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            padding: 10px; border-radius: 20px; display: none;
            flex-direction: column; align-items: center; gap: 8px; z-index: 12;
            backdrop-filter: blur(15px);
        }
        .aura-slider-panel.active { display: flex; }
        .aura-slider {
            writing-mode: bt-lr; -webkit-appearance: slider-vertical;
            width: 8px; height: 100px; background: rgba(255,255,255,0.1);
            outline: none; border-radius: 4px;
        }

        /* GYARA NA 2: An daga typing bar container ya dawo sama (bottom: 65px) domin kar ya hade da navigation keys na waya */
        .hud-footer-capsule {
            position: absolute;
            bottom: 65px; /* An gyara daga 25px zuwa 65px domin ya hau sama */
            left: 16px; right: 16px;
            padding: 10px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex; gap: 8px; align-items: center; /* An canza zuwa center domin daidaiton abubuwan cikin akwatin */
            z-index: 10;
            backdrop-filter: blur(20px);
            box-shadow: 0 -5px 25px rgba(0,0,0,0.3);
            transition: opacity 0.3s;
        }

        /* GYARA NA 3: An daidaita tsarin akwatin rubutu domin magance matsalar hoto na biyu */
        .cyber-input {
            flex: 1; 
            height: 40px; /* Tsayayyen tsawo wanda ba zai rushe zane ba */
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 10px 16px;
            color: white; 
            font-size: 13px;
            outline: none; 
            transition: 0.3s;
            resize: none; 
            overflow-y: auto; /* Idan rubutu ya yi yawa zai yi scroll a cikinsa lafiya ba tare da ya haure sama ba */
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.4;
        }
        .cyber-input:focus { border-color: var(--cyan-neon); background: rgba(0,242,255,0.03); }

        .hud-action-node {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.08);
            transition: 0.3s; position: relative;
            flex-shrink: 0;
        }
        .hud-action-node:hover {
            background: rgba(0, 242, 255, 0.15);
            border-color: var(--cyan-neon);
            box-shadow: 0 0 12px rgba(0, 242, 255, 0.3);
        }
        .hud-action-node.tip-btn:hover {
            background: rgba(255, 0, 85, 0.15);
            border-color: var(--magenta-neon);
            box-shadow: 0 0 12px rgba(255, 0, 85, 0.3);
        }

        .hud-action-node.ghost-active {
            border-color: #25d366;
            background: rgba(37, 211, 102, 0.15);
        }

        /* SYSTEM DISMISS FOR CLEAN VIEW HOLD */
        .story-matrix-container.hud-hidden .hud-header,
        .story-matrix-container.hud-hidden .hud-footer-capsule,
        .story-matrix-container.hud-hidden .hud-progress-timeline {
            opacity: 0; pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="story-matrix-container" id="matrixContainer">
        <div class="ambient-projector" id="ambientProjector"></div>
        <div class="scan-overlay"></div>

        <div class="hud-progress-timeline" id="hudTimeline"></div>

        <div class="hud-header">
            <div class="cyber-user-node">
                <div class="cyber-avatar-ring">
                    <img src="" class="cyber-avatar" id="hudAvatar">
                </div>
                <div class="node-meta">
                    <h2 id="hudUsername">System Booting...</h2>
                    <span class="story-time" id="hudTimeLabel">1h ago</span>
                </div>
            </div>
        </div>

        <div class="cyber-touch-grids">
            <div class="grid-left" id="touchLeft"></div>
            <div class="grid-right" id="touchRight"></div>
        </div>

        <div class="viewport-canvas">
            <img src="" class="matrix-media-frame" id="matrixMedia">
        </div>

        <div class="aura-slider-panel" id="auraPanel">
            <input type="range" min="0" max="100" value="75" class="aura-slider" id="auraSlider">
            <span style="font-size: 9px; font-family: monospace; color: var(--cyan-neon);" id="auraValue">75% AURA</span>
        </div>

        <div class="hud-footer-capsule">
            <div class="hud-action-node" id="ghostNode" onclick="toggleGhostInfiltration()" title="Ghost Mode (Incognito View)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </div>

            <div class="hud-action-node tip-btn" onclick="triggerSynergyTip()" title="Tip Synergy Token">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--magenta-neon)" stroke-width="2.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>

            <textarea class="cyber-input" placeholder="Type a message..." rows="1"></textarea>

            <div class="hud-action-node" onclick="toggleAuraPanel()" title="Rate Aura Level">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--cyan-neon)" stroke-width="2.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            </div>

            <div class="hud-action-node" onclick="executeMediaDownload()" title="Download Status to Storage">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            </div>
        </div>
    </div>

    <script>
        const cyberNetworkFeed = {
            'ramatu': {
                user: "Ramatu Arahman",
                avatar: "https://via.placeholder.com/40/111/00F2FF?text=RA",
                timeLabel: "1h ago",
                nodes: [
                    { url: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600' },
                    { url: 'https://images.unsplash.com/photo-1614741118887-7a4ee193a5fa?w=600' }
                ]
            },
            'ahmad': {
                user: "Ahmad Tech Hub",
                avatar: "https://via.placeholder.com/40/222/FF0055?text=AT",
                timeLabel: "2h ago",
                nodes: [
                    { url: 'https://images.unsplash.com/photo-1639762681485-074b7f938ba0?w=600' }
                ]
            }
        };

        let currentActiveUser = 'ramatu';
        let currentMediaIndex = 0;
        let hudTimerClock;
        let trackingProgress = 0;
        const matrixStepDuration = 6000;
        let isGhostModeActive = false;

        function loadMatrixNode() {
            clearInterval(hudTimerClock);
            const activeProfile = cyberNetworkFeed[currentActiveUser];
            const activeNode = activeProfile.nodes[currentMediaIndex];

            document.getElementById('hudUsername').innerText = activeProfile.user;
            document.getElementById('hudTimeLabel').innerText = activeProfile.timeLabel || "1h ago";
            document.getElementById('hudAvatar').src = activeProfile.avatar;
            document.getElementById('matrixMedia').src = activeNode.url;
            document.getElementById('ambientProjector').style.backgroundImage = `url('${activeNode.url}')`;

            const timeline = document.getElementById('hudTimeline');
            timeline.innerHTML = '';
            activeProfile.nodes.forEach((_, idx) => {
                const bar = document.createElement('div');
                bar.className = 'hud-bar';
                const fill = document.createElement('div');
                fill.className = 'hud-fill';
                if(idx < currentMediaIndex) fill.style.width = '100%';
                bar.appendChild(fill);
                timeline.appendChild(bar);
            });

            beginTimelineSweep();
        }

        function beginTimelineSweep() {
            trackingProgress = 0;
            const fills = document.querySelectorAll('.hud-fill');
            const targetFill = fills[currentMediaIndex];

            hudTimerClock = setInterval(() => {
                trackingProgress += (100 / (matrixStepDuration / 40));
                if(targetFill) targetFill.style.width = `${trackingProgress}%`;

                if (trackingProgress >= 100) {
                    clearInterval(hudTimerClock);
                    triggerNavigationPipeline(1);
                }
            }, 40);
        }

        function triggerNavigationPipeline(direction) {
            const currentProfile = cyberNetworkFeed[currentActiveUser];
            
            if (direction === 1) { 
                if (currentMediaIndex < currentProfile.nodes.length - 1) {
                    currentMediaIndex++;
                    loadMatrixNode();
                } else {
                    const profileKeys = Object.keys(cyberNetworkFeed);
                    const currentKeyPos = profileKeys.indexOf(currentActiveUser);
                    if (currentKeyPos < profileKeys.length - 1) {
                        currentActiveUser = profileKeys[currentKeyPos + 1];
                        currentMediaIndex = 0;
                        loadMatrixNode();
                    } else {
                        disconnectMatrix();
                    }
                }
            } else { 
                if (currentMediaIndex > 0) {
                    currentMediaIndex--;
                    loadMatrixNode();
                } else {
                    const profileKeys = Object.keys(cyberNetworkFeed);
                    const currentKeyPos = profileKeys.indexOf(currentActiveUser);
                    if (currentKeyPos > 0) {
                        currentActiveUser = profileKeys[currentKeyPos - 1];
                        currentMediaIndex = cyberNetworkFeed[currentActiveUser].nodes.length - 1;
                        loadMatrixNode();
                    }
                }
            }
        }

        function triggerSynergyTip() {
            alert(`⚡ Transaction Initiated: Sending 0.5 SYNERGY Tokens directly to ${cyberNetworkFeed[currentActiveUser].user}.`);
        }

        function toggleAuraPanel() {
            const panel = document.getElementById('auraPanel');
            panel.classList.toggle('active');
        }

        function executeMediaDownload() {
            alert("📥 Downloader Core: Status saver triggered! Media downloading in original quality directly to your system storage.");
        }

        function toggleGhostInfiltration() {
            isGhostModeActive = !isGhostModeActive;
            const node = document.getElementById('ghostNode');
            if(isGhostModeActive) {
                node.classList.add('ghost-active');
                alert("👁️ Ghost Infiltration Mode: Activated. You can view all statuses anonymously.");
            } else {
                node.classList.remove('ghost-active');
            }
        }

        document.getElementById('auraSlider').addEventListener('input', (e) => {
            document.getElementById('auraValue').innerText = `${e.target.value}% AURA`;
        });

        document.getElementById('touchLeft').addEventListener('click', () => triggerNavigationPipeline(-1));
        document.getElementById('touchRight').addEventListener('click', () => triggerNavigationPipeline(1));

        const mainContainer = document.getElementById('matrixContainer');
        window.addEventListener('touchstart', (e) => {
            if(['grid-left', 'grid-right'].includes(e.target.className)) {
                clearInterval(hudTimerClock);
                mainContainer.classList.add('paused', 'hud-hidden');
            }
        });
        window.addEventListener('touchend', (e) => {
            if(['grid-left', 'grid-right'].includes(e.target.className)) {
                beginTimelineSweep();
                mainContainer.classList.remove('paused', 'hud-hidden');
            }
        });

        function disconnectMatrix() {
            window.location.href = 'chats.html';
        }

        const params = new URLSearchParams(window.location.search);
        const targetUser = params.get('user');
        if(targetUser && cyberNetworkFeed[targetUser]) currentActiveUser = targetUser;
        
        loadMatrixNode();
    </script>
</body>
</html>
