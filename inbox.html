<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Unified Inbox</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #050505;
            --cyan-neon: #00F2FF;
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-dim: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--obsidian);
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 242, 255, 0.05), transparent);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 15px 15px 5px; /* Tight padding */
            background: transparent;
            backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 100;
        }

        .header-top {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px; /* Reduced gap */
        }

        .back-trigger { cursor: pointer; display: flex; align-items: center; }
        h1 { font-size: 15px; font-weight: 600; color: white; }
        .search-trigger { cursor: pointer; color: var(--text-dim); }

        /* ULTRA-SLIM CAPSULE BUTTONS */
        .smart-btn-group {
            display: flex;
            gap: 8px;
            justify-content: flex-start;
            padding-bottom: 5px;
        }

        .smart-btn {
            padding: 5px 16px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-dim);
            cursor: pointer;
            transition: 0.3s;
        }

        .smart-btn.active {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--cyan-neon);
            color: var(--cyan-neon);
            box-shadow: 0 0 8px rgba(0, 242, 255, 0.2);
        }

        /* COMPACT CHAT LIST */
        .chat-list {
            flex: 1; overflow-y: auto; padding-top: 0;
            scrollbar-width: none;
        }
        .chat-list::-webkit-scrollbar { display: none; }

        .chat-item {
            display: flex; align-items: center;
            padding: 8px 15px; 
            text-decoration: none; color: inherit;
            height: 60px;
        }

        .chat-item:active { background: rgba(255, 255, 255, 0.05); }

        .profile-stack { 
            position: relative; 
            margin-right: 12px; 
            display: flex; 
            align-items: center;
        }

        .user-img {
            width: 44px; height: 44px; border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chat-details { 
            flex: 1; 
            overflow: hidden; 
            height: 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .chat-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
        .name { font-size: 13px; font-weight: 600; color: #fff; line-height: 1; }
        .time { font-size: 9px; color: var(--text-dim); }
        .preview-text {
            font-size: 11.5px; color: var(--text-dim);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            line-height: 1;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div class="back-trigger" onclick="history.back()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </div>
            <h1>Inbox</h1>
            <div class="search-trigger">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
                </svg>
            </div>
        </div>

        <div class="smart-btn-group">
            <div class="smart-btn active" onclick="activateBtn(this)">Buying</div>
            <div class="smart-btn" onclick="activateBtn(this)">Selling</div>
        </div>
    </header>

    <div class="chat-list">
        <a href="chat-interior.html" class="chat-item">
            <div class="profile-stack">
                <img src="https://via.placeholder.com/44/111/00F2FF?text=A" class="user-img">
            </div>
            <div class="chat-details">
                <div class="chat-header">
                    <span class="name">Ahmad Tech Hub</span>
                    <span class="time">2:45 PM</span>
                </div>
                <p class="preview-text">Is the Nexus Cloud Miner still available for deployment?</p>
            </div>
        </a>
        <a href="chat-interior.html" class="chat-item">
            <div class="profile-stack">
                <img src="https://via.placeholder.com/44/111/00F2FF?text=B" class="user-img">
            </div>
            <div class="chat-details">
                <div class="chat-header">
                    <span class="name">Bello Electronics</span>
                    <span class="time">Yesterday</span>
                </div>
                <p class="preview-text">The protocol update has been finalized.</p>
            </div>
        </a>
    </div>

    <script>
        function activateBtn(element) {
            document.querySelectorAll('.smart-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
