<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Luxury | Final Stable Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');

        body {
            background: #E3DAC9; 
            font-family: 'Outfit', sans-serif;
            height: 100dvh; overflow: hidden;
            display: flex; flex-direction: column; margin: 0;
            position: fixed; width: 100%;
        }

        .slim-slider {
            height: 110px; background: #E3DAC9; overflow: hidden;
            position: relative; border-bottom: 1px solid rgba(212, 175, 55, 0.2); flex-shrink: 0;
        }
        .slide-track { display: flex; width: max-content; animation: scroll 40s linear infinite; height: 100%; align-items: center; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .slide-card { 
            width: 140px; height: 85px; margin: 0 10px; border-radius: 12px; overflow: hidden; flex-shrink: 0; 
            border: 1px solid rgba(212, 175, 55, 0.4); background: #FDF5E6; cursor: pointer;
        }
        .slide-card img { width: 100%; height: 100%; object-fit: cover; mix-blend-mode: multiply; }

        .chat-space { flex: 1; padding: 15px; overflow-y: auto; scrollbar-width: none; padding-bottom: 140px; }
        .bubble { max-width: 82%; padding: 11px 15px; margin-bottom: 12px; font-size: 14.5px; line-height: 1.4; position: relative; white-space: pre-wrap; }
        .v-bubble { background: #1A0F0D; color: #D4AF37; border-radius: 4px 18px 18px 18px; border-left: 5px solid #FFD700; }
        .u-bubble { 
            background: #FFFFFF; color: #333; border-radius: 18px 18px 4px 18px; 
            margin-left: auto; border: 1px solid #EAEAEA; border-right: 5px solid #D4AF37;
            box-shadow: 0 2px 5px rgba(212, 175, 55, 0.2);
        }

        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: #E3DAC9; padding: 10px 10px 25px; 
            display: flex; align-items: flex-end; gap: 8px; z-index: 1000; 
        }
        
        .input-container {
            flex: 1; background: #E3DAC9; border-radius: 25px;
            display: flex; align-items: flex-end; padding: 5px 12px;
            box-shadow: inset 4px 4px 8px #c9c2b3, inset -4px -4px 8px #fdf2df;
        }

        .icon-btn { color: #888; font-size: 22px; padding: 10px 5px; cursor: pointer; display: flex; align-items: center; }

        #userInput {
            flex: 1; background: transparent; border: none !important; outline: none !important;
            padding: 10px 8px; max-height: 120px; font-size: 16px; font-family: 'Outfit', sans-serif;
            resize: none; color: #000;
        }

        .action-circle {
            width: 50px; height: 50px; background: #1A0F0D; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: #D4AF37; font-size: 20px; flex-shrink: 0; cursor: pointer;
        }
    </style>
</head>
<body>

    <section class="slim-slider">
        <div class="slide-track" id="product-slider"></div>
    </section>

    <main class="chat-space" id="chat">
        <div class="bubble v-bubble">Sannu abokina! Barka da zuwa Infinity Luxury 👑 Ina nan don taimaka maka. Me kake so ka gani yau?</div>
    </main>

    <footer class="bottom-nav">
        <div class="input-container">
            <div class="icon-btn"><i class="fa-regular fa-face-smile"></i></div>
            <textarea id="userInput" placeholder="Message" rows="1" oninput="toggleInputUI(this)"></textarea>
            
            <div class="icon-btn" onclick="document.getElementById('galleryInput').click()"><i class="fa-solid fa-paperclip"></i></div>
            <div class="icon-btn" id="camBtn"><i class="fa-solid fa-camera"></i></div>
            <input type="file" id="galleryInput" accept="image/*" style="display:none" onchange="handleImage(this)">
        </div>
        
        <div id="actionBtn" class="action-circle" onclick="handleAction()">
            <i id="actionIcon" class="fa-solid fa-microphone"></i>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
    const firebaseConfig = {
        apiKey: "AIzaSyDExSOnFbN-wJbT1UFgB-kBs37bEa3KiWc",
        authDomain: "oryzon-50ea4.firebaseapp.com",
        projectId: "oryzon-50ea4",
        storageBucket: "oryzon-50ea4.firebasestorage.app",
        messagingSenderId: "782106742622",
        appId: "1:782106742622:web:902d512bfe42dd4cf289cf"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ⚠️ Duba sakon da ke ƙasa game da wannan key
    const GROQ_API_KEY = "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";
    const GROQ_MODEL = "openai/gpt-oss-120b";

    let chatHistory = [];
    let pendingImageBase64 = null;
    let pendingImageMime = null;
    let isSending = false;
    let storeName = "Infinity Luxury";

    function pick(name, img) {
        const chat = document.getElementById('chat');
        chat.innerHTML += `
            <div class="u-bubble bubble">
                <div style="background:rgba(212,175,55,0.08);padding:8px;border-radius:10px;display:flex;align-items:center;gap:10px;border-left:3px solid #D4AF37;margin-bottom:8px;">
                    <img src="${img}" style="width:45px;height:45px;border-radius:8px;object-fit:cover;">
                    <span style="font-size:12px;font-weight:600;color:#B8860B;">${name}</span>
                </div>
                Ina son wannan...
            </div>`;
        chat.scrollTop = chat.scrollHeight;
        sendMessage(true);
    }

    async function loadFirestoreProducts() {
        const track = document.getElementById('product-slider');
        const vendorId = new URLSearchParams(window.location.search).get('vendorId') || '';
        try {
            let snapshot;
            if (vendorId) {
                snapshot = await db.collection('products').where('vendorId', '==', vendorId).get();
                if (snapshot.empty) snapshot = await db.collection('products').where('vendor', '==', vendorId).get();
                if (snapshot.empty) snapshot = await db.collection('products').where('sellerId', '==', vendorId).get();
            } else {
                snapshot = await db.collection('products').limit(10).get();
            }
            let list = [];
            snapshot.forEach(doc => {
                const d = doc.data();
                const imgUrl = d.image || d.img || d.imageUrl || '';
                const name = d.name || d.title || 'Product';
                if (imgUrl) list.push({ img: imgUrl, name });
            });
            if (list.length > 0) {
                track.innerHTML = [...list, ...list].map(p => `
                    <div class="slide-card" onclick="pick('${p.name.replace(/'/g,"\\'")}', '${p.img}')">
                        <img src="${p.img}" onerror="this.style.display='none'">
                    </div>`).join('');
            }
        } catch(err) {
            console.error('Firebase error:', err);
        }
    }

    function toggleInputUI(el) {
        el.style.height = 'auto';
        el.style.height = (el.scrollHeight) + 'px';
        const icon = document.getElementById('actionIcon');
        const cam = document.getElementById('camBtn');
        if (el.value.trim() !== "") {
            icon.className = "fa-solid fa-paper-plane";
            cam.style.display = "none";
        } else {
            icon.className = "fa-solid fa-microphone";
            cam.style.display = "flex";
        }
    }

    function handleImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                pendingImageBase64 = e.target.result.split(',')[1];
                pendingImageMime = input.files[0].type;
                document.getElementById('chat').innerHTML += `
                    <div class="bubble u-bubble">
                        <img src="${e.target.result}" style="max-width:100%;border-radius:10px;">
                    </div>`;
                document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
                sendMessage();
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function handleAction() {
        const icon = document.getElementById('actionIcon');
        if (icon.classList.contains('fa-paper-plane')) sendMessage();
        else alert("Voice...");
    }

    (function loadIncomingMsg() {
        const msg   = localStorage.getItem('vc_msg');
        const name  = localStorage.getItem('vc_name');
        const price = localStorage.getItem('vc_price');
        const img   = localStorage.getItem('vc_img');
        if (!msg) return;
        const chat = document.getElementById('chat');
        chat.innerHTML += `
            <div class="u-bubble bubble">
                <div style="background:rgba(212,175,55,0.1);padding:8px;border-radius:10px;display:flex;align-items:center;gap:10px;border-left:3px solid #D4AF37;margin-bottom:8px;">
                    <img src="${img}" style="width:45px;height:45px;border-radius:8px;object-fit:cover;flex-shrink:0;">
                    <div>
                        <div style="font-size:12px;font-weight:700;color:#B8860B;">${name}</div>
                        <div style="font-size:11px;color:#888;margin-top:2px;">${price}</div>
                    </div>
                </div>
                ${msg}
            </div>`;
        chat.scrollTop = chat.scrollHeight;
    })();

    async function sendMessage(auto) {
        if (isSending) return;
        const input = document.getElementById('userInput');
        const text = auto ? "Ina son sanin ƙarin bayani kan wannan kaya, kuma yaya zan yi oda." : input.value.trim();
        if (!text && !pendingImageBase64) return;

        isSending = true;
        const chat = document.getElementById('chat');

        if (text && !auto) chat.innerHTML += `<div class="bubble u-bubble">${text}</div>`;
        input.value = '';
        input.style.height = 'auto';
        toggleInputUI(input);
        chat.scrollTop = chat.scrollHeight;

        const loadingId = 'load' + Date.now();
        chat.innerHTML += `<div class="bubble v-bubble" id="${loadingId}">⏳...</div>`;
        chat.scrollTop = chat.scrollHeight;

        let productList = "Babu kayan da aka saka tukuna.";
        try {
            const snap = await db.collection('products').limit(30).get();
            let items = [];
            snap.forEach(doc => {
                const d = doc.data();
                items.push(`- ${d.name || d.title || 'Kaya'}: ₦${d.price || '?'} | ${d.description || d.desc || ''}`);
            });
            if (items.length > 0) productList = items.join('\n');
        } catch(e) {}

        const systemPrompt = `Kai ne "Ali", babban jami'in sayarwa (top sales closer) na shago mai suna "${storeName}". Kai NE mutum, ba robot ba — kana magana kai tsaye da customer kamar yadda gwanin sayarwa a WhatsApp ke yi: da hankali, da natsuwa, da kwarin gwiwa, kuma ba tare da yin roƙo ba.

MUHIMMAN DOKOKI:
1. HARSHE: Ka gano yarukan da customer yake amfani da shi a sakon nasa (Hausa, Turanci, Yoruba, Igbo, Faransanci, Larabci, ko kowane yare) sannan KA AMSA DA WANNAN YARE DAIDAI. Kada ka canza yare sai idan customer ya canza. Idan Hausa ce, ka rubuta Hausa TSAFTATACCE, ta gaske, kamar yadda ɗan Hausa na asali yake magana — ba fassarar Turanci ba (misali: kada ka ce "Ina za ku so mu tura muku daya ko biyu" a jere mai kaushi; ka rubuta a sauƙaƙe kamar: "Ka so mu tura maka ɗaya ko biyu?").
2. MISALAN SALON HAUSA NA GASKIYA (KA KWAIKWAYI WANNAN SALON, KADA KA KWAFA KALMA DAYA):
   - Customer: "Nawa ne farashi" → Kai: "Wannan [suna] farashinta ₦[X] ce kacal. Kina/kana son mu tura maka guda daya?"
   - Customer: "Ina jinkirin biya" → Kai: "Babu matsala abokina, mun fahimce ka. Ka gaya mana lokacin da za ka iya, mu tsare maka kayan."
   - Customer: "Kayan din inganci ne?" → Kai: "Wallahi ingancinsu ba abin shakka bane, mun sayar da yawa kuma customer dinmu koyaushe suna godiya."
3. KASANCE MAI SAURI, TAKAITACCE: Kada ka rubuta babban paragraph. Ka rubuta kamar yadda ake rubutu a WhatsApp — gajerun jimla, kai tsaye kan batu.
4. KA SANI GA DUKKAN KAYAYYAKI: Ga jerin kayan da shago ke da su a yanzu:
${productList}
Ka yi amfani da wannan bayani KAWAI don amsa farashi, bayanin kaya, da samuwa. Kada ka ƙirƙiri farashi ko kaya da babu shi a jerin.
4b. MUHIMMI — KADA KA DANGANTA ABUBUWA DABAN-DABAN: Idan customer ya ambaci sunan wani kaya (misali "shadda") wanda BAI BAYYANA A SARARI a jerin kayanka ba a matsayin iri ɗaya da wani abu da kake dashi (misali "lace"), KADA KA CE "eh muna da shi" ta hanyar danganta shi da wani kaya daban. Maimakon haka, ka tambaya don tabbatarwa, misali: "Ba mu da 'shadda' a yanzu, amma muna da [X] — shin wannan kake nufi ne, ko wani abu ne daban?" Kada ka taɓa ɗauka cewa sunaye biyu daban-daban suna nufin iri kaya ɗaya sai dai idan customer ya tabbatar, ko kuma yana bayyane a cikin jerin kayanka.
5. IDAN AN AIKA HOTO: Ka duba hoton da kyau, ka bayyana abinda kake gani (misali irin tufa, launi, salo), sannan ka danganta shi da kayayyakin da ke jerinka idan akwai kama, ko ka tambaya idan customer yana son irin wannan.
6. KASANCE MAI RUFE SAYARWA (CLOSER): Bayan ka bayyana wa customer bayanin kaya, KA TAMBAYE SHI kai tsaye idan yana son ya yi oda.
7. IDAN CUSTOMER YANA SHAKKA: Ka amsa masa da tabbaci — ba tare da ƙarya ba.
8. DON KAMMALA ODA: Idan customer ya ce yana so ya saya, ka tambaye shi: (1) cikakken suna, (2) lambar waya, (3) adireshin isarwa/jiha, (4) yawan kaya — TAMBAYA DAYA A LOKACI.
9. KADA KA TAMBAYI TAMBAYA FIYE DA DAYA a sako daya.
10. Ka kasance mai kirki, mai godiya, kuma mai kwarin gwiwa.`;

        let userContent = [];
        if (pendingImageBase64) {
            userContent.push({ type: "image_url", image_url: { url: `data:${pendingImageMime};base64,${pendingImageBase64}` } });
            pendingImageBase64 = null;
            pendingImageMime = null;
        }
        if (text) userContent.push({ type: "text", text: text });
        chatHistory.push({ role: "user", content: userContent.length === 1 && userContent[0].type === "text" ? text : userContent });

        try {
            const res = await fetch(
                `https://api.groq.com/openai/v1/chat/completions`,
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${GROQ_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: GROQ_MODEL,
                        messages: [
                            { role: "system", content: systemPrompt },
                            ...chatHistory
                        ],
                        temperature: 0.8,
                        max_completion_tokens: 500
                    })
                }
            );

            const data = await res.json();
            console.log("Groq response:", data);
            let reply = data.choices?.[0]?.message?.content;
            if (!reply) {
                const apiErr = data.error?.message || JSON.stringify(data).slice(0, 200);
                reply = "⚠️ API Error: " + apiErr;
            }
            chatHistory.push({ role: "assistant", content: reply });
            document.getElementById(loadingId).innerHTML = reply;

        } catch(e) {
            document.getElementById(loadingId).innerHTML = "⚠️ Fetch Error: " + e.message;
        }

        isSending = false;
        chat.scrollTop = chat.scrollHeight;
    }

    document.addEventListener('DOMContentLoaded', loadFirestoreProducts);

    </script>
</body>
</html>
