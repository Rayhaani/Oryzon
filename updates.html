<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus - Neural Updates</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #050505;
            --cyan-neon: #00F2FF;
            --magenta-neon: #FF0055;
            --glass-border: rgba(0, 242, 255, 0.15);
            --glass-bg: rgba(5, 5, 5, 0.75);
            --text-dim: rgba(255, 255, 255, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--obsidian);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .nexus-updates-container {
            width: 100%;
            height: 100vh;
            max-width: 460px;
            background: #000;
            border: 1px solid rgba(0, 242, 255, 0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding-bottom: 80px; /* Don hutu daga maballan kasa */
        }

        /* HEADER */
        .updates-header {
            padding: 20px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .updates-header h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .header-icons {
            display: flex;
            gap: 16px;
        }

        /* SUB-SECTION HEADINGS */
        .section-title-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 16px 10px 16px;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
        }

        /* MABALLIN CREATE PAGE */
        .btn-create-page {
            font-size: 12px;
            color: var(--cyan-neon);
            background: rgba(0, 242, 255, 0.1);
            padding: 6px 12px;
            border-radius: 14px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-create-page:hover {
            background: rgba(0, 242, 255, 0.2);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        /* NEW CARD DESIGN - HORIZONTAL REEL */
        .status-horizontal-reel {
            display: flex;
            gap: 4px; /* An rage tazarar tsakanin katunan zuwa 4px domin su matsu */
            padding: 10px 16px 20px 16px;
            overflow-x: auto;
            scroll-behavior: smooth;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            touch-action: pan-x; /* Hana katunan yin sama da kasa lokacin turawa (Static) */
        }
        .status-horizontal-reel::-webkit-scrollbar {
            display: none; /* Boye scrollbar din */
        }

        /* SABON TSARIN KATUNA (VERTICAL CARDS LIKE WHATSAPP) */
        .status-node-circle {
            display: flex;
            flex-direction: column;
            position: relative;
            min-width: 95px; /* Tsarin fadin katin preview */
            height: 145px;   /* Tsarin tsayin katin preview */
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Background image ko placeholder na katin */
        .status-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            filter: brightness(0.75); /* Taimakawa sunan kasa ya fito fili */
        }

        /* Karamin Profile Ring dake saman katin - Yanzu ya manne a TOP LEFT CORNER */
        .avatar-ring-status {
            position: absolute;
            top: 0;
            left: 0;
            width: 32px;
            height: 32px;
            border-radius: 0 0 12px 0; /* Kyautata kwana madaidaiciya don katin */
            padding: 2px;
            background: linear-gradient(45deg, var(--cyan-neon), var(--magenta-neon));
            z-index: 3;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
        .avatar-ring-status.viewed {
            background: rgba(255,255,255,0.4) !important; /*大 Dole ya zama madaidaici idan an kalla */
        }
        .avatar-ring-status.my-node {
            background: rgba(255,255,255,0.2);
            border-bottom: 1px dashed rgba(255,255,255,0.5);
            border-right: 1px dashed rgba(255,255,255,0.5);
            padding: 0;
        }

        /* Karamin profile image a cikin da'irar sama - Na bar shi a da'ira domin fito da hoto */
        .avatar-ring-status img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        /* Maballin Plus na My Status */
        .add-node-plus {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--cyan-neon);
            border: 1px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 9px;
            font-weight: bold;
        }

        /* Sunan mai status din a kasan katin */
        .status-username {
            position: absolute;
            bottom: 8px;
            left: 8px;
            right: 8px;
            font-size: 11px;
            font-weight: 600;
            color: #fff;
            text-align: left;
            z-index: 3;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8); /* Kyautata karanta suna a kan hoto */
        }

        /* Gradient overlay don duhun kasan katin */
        .status-node-circle::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 50%);
            z-index: 2;
        }

        /* PAGES SECTION (VERTICAL JERE) */
        .pages-vertical-list {
            display: flex;
            flex-direction: column;
            padding: 0 16px;
        }

        .page-list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            cursor: pointer;
        }

        .page-info-block {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-avatar {
            width: 48px;
            height: 48px;
            border-radius: 12px; /* Square mai siffa kadan maimakon da'ira don bambanta su */
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .page-text-meta h3 {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 2px;
        }
        .page-text-meta p {
            font-size: 12px;
            color: var(--text-dim);
        }

        .page-action-view {
            font-size: 12px;
            color: #fff;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="nexus-updates-container">
        
        <div class="updates-header">
            <h1>Updates</h1>
            <div class="header-icons">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
            </div>
        </div>

        <div class="section-title-area">
            <span class="section-title">Status</span>
        </div>

        <div class="status-horizontal-reel" id="statusReelContainer"></div>

        <div class="section-title-area">
            <span class="section-title">Pages</span>
            <div class="btn-create-page" onclick="createNewPageCore()">Create Page</div>
        </div>

        <div class="pages-vertical-list">
            
            <div class="page-list-item" onclick="viewPageMatrix('sirrin-rike-miji')">
                <div class="page-info-block">
                    <img src="https://via.placeholder.com/50/111?text=SRM" class="page-avatar">
                    <div class="page-text-meta">
                        <h3>Sirrin rike miji 🌍</h3>
                        <p>Kece Kike Bukatar Namiji Mai Gemu...</p>
                    </div>
                </div>
                <div class="page-action-view">10m ago</div>
            </div>

            <div class="page-list-item" onclick="viewPageMatrix('simon-updates')">
                <div class="page-info-block">
                    <img src="https://via.placeholder.com/50/222?text=SU" class="page-avatar">
                    <div class="page-text-meta">
                        <h3>Simon's Updates.</h3>
                        <p>If you have issue or concern. You can...</p>
                    </div>
                </div>
                <div class="page-action-view">Yesterday</div>
            </div>

            <div class="page-list-item" onclick="viewPageMatrix('annahjul-hameed')">
                <div class="page-info-block">
                    <img src="https://via.placeholder.com/50/333?text=ATV" class="page-avatar">
                    <div class="page-text-meta">
                        <h3>Annahjul-Hameed TV</h3>
                        <p>Addu'ar Sujuda🇲🇳🇲🇳...</p>
                    </div>
                </div>
                <div class="page-action-view">2 days ago</div>
            </div>

        </div>

    </div>

    <input type="file" id="hiddenCameraInput" accept="image/*,video/*" style="display: none;" onchange="handleStatusUpload(this)">

    <script>

        // 1. Shigo da Firestore Core kawai (Ba ma bukatar Storage yanzu)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

// 2. Lambobin da ka bayar na Oryzon
const firebaseConfig = {
  apiKey: "AIzaSyDExSOnFbN-wJbT1UFgB-kBs37bEa3KiWc",
  authDomain: "oryzon-50ea4.firebaseapp.com",
  projectId: "oryzon-50ea4",
  storageBucket: "oryzon-50ea4.firebasestorage.app",
  messagingSenderId: "782106742622",
  appId: "1:782106742622:web:902d512bfe42dd4cf289cf",
  measurementId: "G-K5085DLL2W"
};

// Kaddamar da Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 3. GYARAN AIKIN UPLOAD (Canza Hoto zuwa Rubutun Base64 don ya adanu a Database)
async function handleStatusUpload(input) {
    if (input.files && input.files[0]) {
        const file = input.files[0];
        
        // Duba girman hoto don kar ya yi nauyi a database (Kada ya wuce 1MB)
        if (file.size > 1048576) { 
            alert("Hoton ya yi nauyi sosai, da fatan ka zabi hoto mara nauyi don loda shi cikin sauri.");
            return;
        }

        console.log("Ana sarrafa hoto zuwa rumbun Oryzon Database...");

        // Juyar da hoton kyamara zuwa Rubutu (Base64)
        const reader = new FileReader();
        reader.onload = async function (e) {
            const base64Image = e.target.result; // Wannan shi ne hoton ya zama rubutu

            try {
                // Shirya bayanan da zasu tafi Firestore
                const newStatusDoc = {
                    username: "Sadiq", 
                    profileImg: "https://via.placeholder.com/40/111?text=Me", 
                    previewImg: base64Image, // Rubutun hotonmu yana tafiya Firestore kai tsaye anan
                    timestamp: Date.now(), 
                    totalUpdates: 1,
                    viewedCount: 0,
                    isMe: false 
                };

                // Turawa zuwa Firestore collection mai suna "statusData"
                await addDoc(collection(db, "statusData"), newStatusDoc);
                console.log("An adana a database daram!");

                // Sake wartsake fuska don sabon status ya fito
                fetchStatusesFromFirebase();

            } catch (error) {
                console.error("Kasa adana hoto a Firestore: ", error);
                alert("An samu akasi wajen hadawa da Firestore Database, duba tsarin blocked rules dinki.");
            }
        };

        reader.readAsDataURL(file); // Fara juyar da hoton
    }
}
        
        // LISSAFIN DATA NA KOWANE STATUS (Yanzu da tsarin adadin hotuna da lokaci)
        const statusData = [
            {
                id: "my-status",
                username: "My Status",
                isMe: true,
                profileImg: "https://via.placeholder.com/40/111?text=Me",
                previewImg: "https://via.placeholder.com/150x250/111?text=My+Story",
                timestamp: Date.now(), // Ko da yaushe yana gaba
                totalUpdates: 1,
                viewedCount: 0
            },
            {
                id: "ramatu",
                username: "Ramatu Arahman",
                isMe: false,
                profileImg: "https://via.placeholder.com/40/111/00F2FF?text=RA",
                previewImg: "https://via.placeholder.com/150x250/002233?text=Ramatu+Update",
                timestamp: Date.now() - 3600000, // Awa daya da ta wuce
                totalUpdates: 3,
                viewedCount: 2 // Ta kalli guda 2, ya rage 1 (Ba zai koma karshe ba!)
            },
            {
                id: "ahmad",
                username: "Ahmad Tech Hub",
                isMe: false,
                profileImg: "https://via.placeholder.com/40/222/FF0055?text=AT",
                previewImg: "https://via.placeholder.com/150x250/330011?text=Ahmad+Node",
                timestamp: Date.now() - 600000, // Minti 10 da suka wuce (Sabon status)
                totalUpdates: 2,
                viewedCount: 0 // Bai kalla ko daya ba
            },
            {
                id: "fateema",
                username: "Fatima Ahmad",
                isMe: false,
                profileImg: "https://via.placeholder.com/40/333?text=FA",
                previewImg: "https://via.placeholder.com/150x250/222222?text=Fatima+Story",
                timestamp: Date.now() - 7200000, // Awa biyu da suka wuce
                totalUpdates: 1,
                viewedCount: 1 // Ta gama kallo gaba daya (Zai koma can karshe!)
            }
        ];

        // LOGIC DIN JERA STATUS KAMAR WHATSAPP (SORTING ENGINE)
        function sortAndRenderStatus() {
            // Raba My Status daban saboda shi koyaushe yana nan daram a farko
            const myStatusNode = statusData.find(s => s.isMe);
            const others = statusData.filter(s => !s.isMe);

            others.sort((a, b) => {
                const aFullyViewed = a.viewedCount >= a.totalUpdates;
                const bFullyViewed = b.viewedCount >= b.totalUpdates;

                // 1. Idan daya ya cika kallo daya bai cika ba, wanda bai cika ba ya dawo gaba
                if (aFullyViewed && !bFullyViewed) return 1;
                if (!aFullyViewed && bFullyViewed) return -1;

                // 2. Idan duka matakin daya ne (ko duka an kalla, ko duka basu kammala ba), na kusa (Newest) ya dawo gaba
                return b.timestamp - a.timestamp;
            });

            // Gwamfata jerin: My Status sannan sauran mutane da suka tantance
            const finalSortedList = [myStatusNode, ...others];

            // RENDER ENGINE
            const container = document.getElementById('statusReelContainer');
            container.innerHTML = '';

            finalSortedList.forEach(status => {
                const card = document.createElement('div');
                card.className = 'status-node-circle';
                
                if (status.isMe) {
                    card.setAttribute('onclick', 'triggerAddStatus()');
                } else {
                    card.setAttribute('onclick', `openStatusMatrix('${status.id}')`);
                }

                let ringClass = 'avatar-ring-status';
                if (status.isMe) {
                    ringClass += ' my-node';
                } else if (status.viewedCount >= status.totalUpdates) {
                    ringClass += ' viewed'; // Idan an kalla duka gaba daya
                }

                const plusIcon = status.isMe ? '<div class="add-node-plus">+</div>' : '';

                card.innerHTML = `
                    <div class="${ringClass}">
                        <img src="${status.profileImg}">
                        ${plusIcon}
                    </div>
                    <img src="${status.previewImg}" class="status-img">
                    <span class="status-username">${status.username}</span>
                `;
                container.appendChild(card);
            });
        }

        // BUDE CAMERA KO FILE SYSTEM DA GASKE
        function triggerAddStatus() {
            document.getElementById('hiddenCameraInput').click();
        }

        
        // LOKACIN DANNA STATUS NA SAURAN MUTANE
        function openStatusMatrix(userKey) {
            const targetStatus = statusData.find(s => s.id === userKey);
            if (targetStatus) {
                // Kwaikwayon cewa ka kara kallon hoto guda daya (Simulate viewing an item)
                if (targetStatus.viewedCount < targetStatus.totalUpdates) {
                    targetStatus.viewedCount++;
                    // Zaka iya canza timestamp din idan kana so ya dawo sabo, amma WhatsApp baya canza na tsohon status
                }
            }
            
            // Sake gina tsarin katunan
            sortAndRenderStatus();

            // Tura mutum zuwa shafin kallo bayan seconds kadan
            setTimeout(() => {
                window.location.href = `status.html?user=${userKey}`;
            }, 180);
        }

        function createNewPageCore() {
            const pageName = prompt("Enter a unique name for your new Nexus Page:");
            if(pageName) {
                alert(`🚀 Core Registered: Your page "${pageName}" has been successfully created on the Synergy Network Node!`);
            }
        }

        function viewPageMatrix(pageKey) {
            alert(`📂 Loading Hub: Accessing digital ledger for page code [${pageKey}].`);
        }

        // Kaddamar da gina katunan da zaran shafi ya gama lodi
        window.onload = sortAndRenderStatus;
    </script>
</body>
</html>
