        header {

        .outgoing { align-self: flex-end; background: var(--user-bubble); border-bottom-right-radius: 4px; border-color: rgba(0, 242, 255, 0.2); }

        .timestamp {

            left: 0;
            right: 0;

  <script>
    
    // Asalin sunanka na aiki a kan platform ɗin (Sadiq)

      const myId = localStorage.getItem("nexus_user_session");
if (!myId) window.location.href = "login.html";

const partnerAvatar = `https://api.dicebear.com/7.x/bottts/svg?seed=${chatWith}`;

// Universal chatRoomId - works for everyone
function getChatRoomId(user1, user2) {
    return [user1, user2].sort().join('__');
}
let chatRoomId = getChatRoomId(myId, chatWith);


      document.addEventListener("DOMContentLoaded", () => {
    const msgInput = document.getElementById("msgInput");
    const sendBtn = document.getElementById("sendBtn");
    
    if (msgInput) {
        msgInput.addEventListener("input", function() {
            autoExpand(this);
            toggleButtons();
        });
        msgInput.addEventListener("keypress", (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendNeuralMessage();
            }
        });
    }
    if (sendBtn) sendBtn.addEventListener("click", sendNeuralMessage);
    
    if (typeof db !== "undefined" && chatRoomId) {
        listenToNexusMessages();
    }
});
      
function listenToNexusMessages() {
    db.collection("personalChats")
      .doc(chatRoomId)
      .collection("messages")
      .orderBy("timestamp", "asc")
      .onSnapshot((snapshot) => {
          const chatFlow = document.getElementById("chat-flow");
          if (!chatFlow) return;
          chatFlow.innerHTML = '';

          snapshot.forEach((doc) => {
              const msgData = doc.data();
              const isMe = msgData.senderId === myId;

              let formattedTime = "Just Now";
              if (msgData.timestamp) {
                  const date = new Date(msgData.timestamp);
                  formattedTime = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
              }

              const msgBubble = document.createElement("div");
              msgBubble.className = `message ${isMe ? 'outgoing' : 'incoming'}`;
              msgBubble.innerHTML = `
                  ${msgData.text}
                  <span class="timestamp">${formattedTime}</span>
              `;
              chatFlow.appendChild(msgBubble);
          });

          chatFlow.scrollTop = chatFlow.scrollHeight;
      });
}


      // Scroll to bottom always
function scrollToBottom() {
    const chatFlow = document.getElementById("chat-flow");
    if (chatFlow) {
        setTimeout(() => {
            chatFlow.scrollTop = chatFlow.scrollHeight;
        }, 100);
    }
}

// Idan keyboard ya buɗe, scroll to bottom
window.addEventListener('resize', () => {
    scrollToBottom();
});

      
function sendNeuralMessage() {
    const inputField = document.getElementById("msgInput");
    if (!inputField) return;

    const messageText = inputField.value.trim();
    if (messageText === "") return;

    const packet = {
        senderId: myId,
        receiverId: chatWith,
        text: messageText,
        timestamp: Date.now()
    };

    db.collection("personalChats")
      .doc(chatRoomId)
      .collection("messages")
      .add(packet)
      .then(() => {
          return db.collection("personalChats").doc(chatRoomId).set({
              lastMessage: messageText.substring(0, 60),
              lastMessageTime: Date.now(),
              members: [myId, chatWith]
          }, { merge: true });
      })
      .then(() => {
          inputField.value = "";
          autoExpand(inputField);
          toggleButtons();
      })
      .catch((err) => {
          console.error("Error:", err);
      });
}



function autoExpand(field) {
    field.style.height = 'inherit';
    field.style.height = field.scrollHeight + 'px';
}

function toggleButtons() {
    const input = document.getElementById('msgInput');
    const voiceBtn = document.getElementById('voiceBtn');
    const sendBtn = document.getElementById('sendBtn');
    
    if (!input || !voiceBtn || !sendBtn) return;
    
    if (input.value.trim().length > 0) {
        voiceBtn.style.display = 'none';
        sendBtn.style.display = 'flex';
    } else {
        voiceBtn.style.display = 'flex';
        sendBtn.style.display = 'none';
    }
}

function toggleEmojiPanel() {

    if (container.style.display === 'none') {
        container.style.display = 'block';
        
        // Load picker ɗaya kawai
        if (!emojiPickerLoaded) {
            const picker = new EmojiMart.Picker({
                onEmojiSelect: (emoji) => {
                    insertEmoji(emoji.native);
                },
                theme: 'dark',
                previewPosition: 'none',
                skinTonePosition: 'none',
                locale: 'en',
            });
            container.appendChild(picker);
            emojiPickerLoaded = true;
        }
    } else {
        container.style.display = 'none';
    }
}

function loadEmojiCategory(cat) {
    currentCategory = cat;
    const grid = document.getElementById('emojiGrid');
    const tabs = document.getElementById('emojiTabs');
    
    // Update tab styles
    Array.from(tabs.children).forEach((tab, i) => {
        const tabCat = Object.keys(emojiCategories)[i];
        tab.style.opacity = tabCat === cat ? '1' : '0.4';
        tab.style.background = tabCat === cat ? 'rgba(255,255,255,0.1)' : 'transparent';
    });
    
    // Load emojis
    grid.innerHTML = '';
    emojiCategories[cat].forEach(emoji => {
        const span = document.createElement('span');
        span.textContent = emoji;
        span.style.cssText = `
            font-size: 26px;
            padding: 6px;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            transition: background 0.15s;
        `;
        span.onmouseenter = () => span.style.background = 'rgba(255,255,255,0.1)';
        span.onmouseleave = () => span.style.background = 'transparent';
        span.onclick = () => {
            insertEmoji(emoji);
            // Save to recent (optional)
        };
        grid.appendChild(span);
    });
    
    grid.scrollTop = 0;
}

function toggleEmojiPanel() {
    const panel = document.getElementById('emojiPanel');
    
    if (panel.style.display === 'none' || !panel.style.display) {
        panel.style.display = 'flex';
        buildEmojiPanel();
        
        // Close keyboard
        document.getElementById('msgInput').blur();
    } else {
        panel.style.display = 'none';
        document.getElementById('msgInput').focus();
    }
}

// Close panel idan an danna waje
document.addEventListener('click', (e) => {
    const panel = document.getElementById('emojiPanel');
    const btn = document.getElementById('emojiToggleBtn');
    if (panel && btn && !panel.contains(e.target) && !btn.contains(e.target)) {
        panel.style.display = 'none';
    }
});
