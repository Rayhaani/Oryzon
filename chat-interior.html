<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Neural Message Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #050505;
            --cyan-neon: #00F2FF;
            --glass-border: rgba(255, 255, 255, 0.08);
            --user-bubble: linear-gradient(135deg, rgba(0, 242, 255, 0.15), rgba(0, 114, 255, 0.05));
            --vendor-bubble: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--obsidian);
            background-image: radial-gradient(circle at 50% 100%, rgba(0, 242, 255, 0.07), transparent);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            height: 60px;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            padding: 0 15px;
            z-index: 100;
        }

        .header-profile {
            width: 38px; height: 38px;
            border-radius: 50%;
            border: 1.5px solid var(--cyan-neon);
            position: relative;
            overflow: hidden;
            margin-right: 12px;
            cursor: pointer;
        }

        .header-profile img { width: 100%; height: 100%; object-fit: cover; display: block; }

        #chat-flow {
            flex: 1;
            padding: 12px 15px 100px 15px; /* Reduced top padding to 12px to match gap */
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: none;
        }

        .message {
            max-width: 78%;
            padding: 8px 12px 2px 12px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.4;
            position: relative;
            backdrop-filter: blur(5px);
            border: 1px solid var(--glass-border);
            word-wrap: break-word;
            word-break: break-word;
        }

        .incoming { align-self: flex-start; background: var(--vendor-bubble); border-bottom-left-radius: 4px; }
        .outgoing { align-self: flex-end; background: var(--user-bubble); border-bottom-right-radius: 4px; border-color: rgba(0, 242, 255, 0.2); }

        .timestamp {
            font-size: 7.5px;
            color: rgba(255,255,255,0.4);
            display: block;
            text-align: right;
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 4px;
        }

        .input-area {
            position: fixed; 
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px 12px 12px 12px; /* Reduced bottom padding to close the space */
            background: transparent; 
            display: flex;
            align-items: flex-end; 
            gap: 8px;
            z-index: 100;
        }

        .neural-search-bar {
            flex: 1;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 22px;
            padding: 0 12px;
            display: flex;
            align-items: flex-end; 
            min-height: 42px; 
            transition: 0.3s;
        }

        .neural-search-bar textarea {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            flex: 1;
            font-size: 15px;
            margin: 0 8px;
            padding: 10px 0;
            resize: none;
            max-height: 130px; 
            line-height: 1.2;
            font-family: 'Inter', sans-serif;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .neural-search-bar textarea::-webkit-scrollbar { display: none; }

        .icon-btn { color: #aaa; display: flex; align-items: center; cursor: pointer; padding-bottom: 11px; }
        
        .action-trigger {
            width: 42px; height: 42px;
            background: var(--cyan-neon);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 12px rgba(0, 242, 255, 0.2);
            border: none;
            cursor: pointer;
            flex-shrink: 0;
        }

        #sendBtn { display: none; }
    </style>
</head>
<body>

    <header>
        <div onclick="history.back()" style="margin-right: 15px; cursor: pointer;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </div>
        
        <input type="file" id="profileInput" accept="image/*" style="display: none;">
        <div class="header-profile" onclick="document.getElementById('profileInput').click()">
            <img id="profileDisplay" src="https://via.placeholder.com/150/050505/00F2FF?text=+" alt="Profile">
        </div>

        <div class="vendor-info">
            <div style="font-size: 13px; font-weight: 600;">Nexus Vendor</div>
            <div style="font-size: 9px; color: #00FF88; font-family: 'Orbitron';">Sync Active</div>
        </div>
    </header>

    <div id="chat-flow">
        <div class="message incoming">
            Is the protocol ready for deployment?
            <span class="timestamp">12:02 PM</span>
        </div>
        
        <div class="message outgoing">
            System ready. All parameters finalized.
            <span class="timestamp">12:05 PM</span>
        </div>
    </div>

    <div class="input-area">
        <input type="file" id="galleryInput" accept="image/*" style="display: none;">
        
        <div class="neural-search-bar">
            <textarea id="msgInput" placeholder="Neural Message..." rows="1" oninput="autoExpand(this); toggleButtons()"></textarea>
            
            <div class="icon-btn" onclick="document.getElementById('galleryInput').click()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
            </div>
        </div>

        <button id="voiceBtn" class="action-trigger">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>

        <button id="sendBtn" class="action-trigger">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>
    </div>

    <script>
        const profileInput = document.getElementById('profileInput');
        profileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) { document.getElementById('profileDisplay').src = e.target.result; }
                reader.readAsDataURL(file);
            }
        });

        function autoExpand(field) {
            field.style.height = 'inherit';
            const height = field.scrollHeight;
            field.style.height = height + 'px';
        }

        function toggleButtons() {
            const input = document.getElementById('msgInput');
            const voiceBtn = document.getElementById('voiceBtn');
            const sendBtn = document.getElementById('sendBtn');
            
            if (input.value.trim().length > 0) {
                voiceBtn.style.display = 'none';
                sendBtn.style.display = 'flex';
            } else {
                voiceBtn.style.display = 'flex';
                sendBtn.style.display = 'none';
            }
        }
    </script>
</body>
</html>
