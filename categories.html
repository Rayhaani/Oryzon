<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Categories Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #050505;
            --cyan-neon: #00F2FF;
            --emerald-pulse: #50FA7B;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --sidebar-width: 85px; /* Updated to 85px */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--obsidian);
            background-image: radial-gradient(circle at 10% 20%, rgba(98, 114, 164, 0.1) 0%, transparent 50%),
                              radial-gradient(circle at 90% 80%, rgba(0, 242, 255, 0.05) 0%, transparent 50%);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* 1. FUTURISTIC SEARCH BAR HEADER */
        header {
            position: fixed;
            top: 0; width: 100%; height: 60px; 
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center;
            padding: 0 15px; z-index: 1000;
        }

        .search-container {
            width: 100%;
            height: 38px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.05);
        }

        .search-container input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            width: 100%;
            margin-left: 10px;
        }

        /* 2. MAIN LAYOUT */
        .nexus-main {
            display: flex;
            margin-top: 60px;
            height: calc(100vh - 105px);
        }

        /* EXACT SIDEBAR CSS (UNTOUCHED) */
        .category-sidebar {
            width: var(--sidebar-width);
            background: rgba(255, 255, 255, 0.02);
            border-right: 1px solid var(--glass-border);
            overflow-y: auto;
            scrollbar-width: none;
            display: flex;
            flex-direction: column;
            padding-top: 10px;
        }

        .category-sidebar::-webkit-scrollbar { 
            display: none; 
        }

        .side-link {
            padding: 15px 5px;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 8px;
            letter-spacing: 0.5px;
            color: #666;
            cursor: pointer;
            transition: 0.4s;
            position: relative;
            text-transform: uppercase;
        }

        .side-link.active {
            color: var(--cyan-neon);
            background: rgba(0, 242, 255, 0.05);
        }

        .side-link.active::before {
            content: '';
            position: absolute;
            left: 0; top: 25%;
            height: 50%; width: 3px;
            background: var(--cyan-neon);
            box-shadow: 0 0 10px var(--cyan-neon);
        }

        /* PRODUCT SECTOR (SHOP.HTML STYLE) */
        .category-content {
            flex: 1;
            padding: 15px 10px;
            overflow-y: auto;
            background: transparent;
        }

        .futurist-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .product-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .image-wrapper {
            width: 100%;
            aspect-ratio: 1/1;
            background: #111;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            margin-bottom: 6px;
            position: relative;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.3s;
        }

        .product-label {
            font-family: 'Montserrat', sans-serif;
            font-size: 9px;
            font-weight: 600;
            color: #fff;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        /* 3. FOOTER */
        .nexus-footer {
            position: fixed; bottom: 0; width: 100%; height: 45px; 
            background: rgba(5, 5, 5, 0.98); border-top: 1px solid var(--glass-border);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1000;
        }

        .footer-icon { opacity: 0.5; color: #fff; }
        .footer-icon.active { opacity: 1; filter: drop-shadow(0 0 5px var(--cyan-neon)); }
    </style>
</head>
<body>

    <header>
        <div class="search-container">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input type="text" placeholder="Search Global Marketplace...">
        </div>
    </header>

    <div class="nexus-main">
        <div class="category-sidebar">
            <div class="side-link active" onclick="switchCategory('women', this)">Women</div>
            <div class="side-link" onclick="switchCategory('men', this)">Men</div>
            <div class="side-link" onclick="switchCategory('tech', this)">Tech</div>
            <div class="side-link" onclick="switchCategory('home', this)">Home</div>
            <div class="side-link" onclick="switchCategory('beauty', this)">Beauty</div>
            <div class="side-link" onclick="switchCategory('sports', this)">Sports</div>
            <div class="side-link" onclick="switchCategory('auto', this)">Auto</div>
        </div>

        <div class="category-content" id="contentArea">
            <div class="futurist-grid">
                <div class="product-item">
                    <div class="image-wrapper">
                        <img src="https://via.placeholder.com/150/111/00F2FF?text=Item">
                    </div>
                    <div class="product-label">Dresses</div>
                </div>
                <div class="product-item">
                    <div class="image-wrapper">
                        <img src="https://via.placeholder.com/150/111/50FA7B?text=Item">
                    </div>
                    <div class="product-label">Shoes</div>
                </div>
                <div class="product-item">
                    <div class="image-wrapper">
                        <img src="https://via.placeholder.com/150/111/ffffff?text=Item">
                    </div>
                    <div class="product-label">Bags</div>
                </div>
                <div class="product-item">
                    <div class="image-wrapper">
                        <img src="https://via.placeholder.com/150/111/00F2FF?text=Item">
                    </div>
                    <div class="product-label">Jewelry</div>
                </div>
                <div class="product-item">
                    <div class="image-wrapper">
                        <img src="https://via.placeholder.com/150/111/50FA7B?text=Item">
                    </div>
                    <div class="product-label">Two Pieces</div>
                </div>
                <div class="product-item">
                    <div class="image-wrapper">
                        <img src="https://via.placeholder.com/150/111/ffffff?text=Item">
                    </div>
                    <div class="product-label">Lingerie</div>
                </div>
            </div>
        </div>
    </div>



    <script>
        function switchCategory(cat, el) {
            document.querySelectorAll('.side-link').forEach(link => link.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
