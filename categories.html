<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Categories Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --obsidian: #050505;
            --cyan-neon: #00F2FF;
            --emerald-pulse: #50FA7B;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --sidebar-width: 85px;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        body {
            background-color: var(--obsidian);
            background-image: radial-gradient(circle at 10% 20%, rgba(98,114,164,0.1) 0%, transparent 50%),
                              radial-gradient(circle at 90% 80%, rgba(0,242,255,0.05) 0%, transparent 50%);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* ── HEADER (UNTOUCHED) ── */
        header {
            position: fixed;
            top:0; width:100%; height:60px;
            background: rgba(5,5,5,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display:flex; align-items:center;
            padding:0 15px; z-index:1000;
        }
        .search-container {
            width:100%; height:38px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius:12px;
            display:flex; align-items:center;
            padding:0 12px;
            box-shadow: inset 0 0 10px rgba(0,242,255,0.05);
        }
        .search-container input {
            background:transparent; border:none; outline:none;
            color:white; font-family:'Inter',sans-serif;
            font-size:13px; width:100%; margin-left:10px;
        }

        /* ── MAIN LAYOUT (UNTOUCHED) ── */
        .nexus-main {
            display:flex;
            margin-top:60px;
            height: calc(100vh - 105px);
        }

        /* ── SIDEBAR (UNTOUCHED) ── */
        .category-sidebar {
            width: var(--sidebar-width);
            background: rgba(255,255,255,0.02);
            border-right: 1px solid var(--glass-border);
            overflow-y:auto; scrollbar-width:none;
            display:flex; flex-direction:column;
            padding-top:10px;
        }
        .category-sidebar::-webkit-scrollbar { display:none; }
        .side-link {
            padding:15px 5px; text-align:center;
            font-family:'Orbitron',sans-serif; font-size:8px;
            letter-spacing:0.5px; color:#666;
            cursor:pointer; transition:0.4s;
            position:relative; text-transform:uppercase;
        }
        .side-link.active { color:var(--cyan-neon); background:rgba(0,242,255,0.05); }
        .side-link.active::before {
            content:''; position:absolute;
            left:0; top:25%; height:50%; width:3px;
            background:var(--cyan-neon);
            box-shadow:0 0 10px var(--cyan-neon);
        }

        /* ── CONTENT AREA ── */
        .category-content {
            flex:1; padding:15px 10px;
            overflow-y:auto; background:transparent;
            scrollbar-width:none;
        }
        .category-content::-webkit-scrollbar { display:none; }

        /* ── CATEGORY GRID (UNTOUCHED) ── */
        .futurist-grid {
            display:grid; grid-template-columns:repeat(3,1fr); gap:12px;
        }
        .product-item { display:flex; flex-direction:column; align-items:center; cursor:pointer; }
        .image-wrapper {
            width:100%; aspect-ratio:1/1; background:#111;
            border-radius:15px; overflow:hidden;
            border:1px solid var(--glass-border);
            margin-bottom:6px; position:relative;
        }
        .image-wrapper img { width:100%; height:100%; object-fit:cover; transition:0.3s; }
        .product-label {
            font-family:'Montserrat',sans-serif; font-size:9px; font-weight:600;
            color:#fff; text-align:center; white-space:nowrap;
            overflow:hidden; text-overflow:ellipsis; width:100%;
        }

        /* ── SECTION DIVIDER ── */
        .section-divider {
            height:6px; margin:16px 0;
            background:rgba(255,255,255,0.03);
            border-top:1px solid var(--glass-border);
            border-bottom:1px solid var(--glass-border);
        }

        /* ── TRENDING SECTION (same as shop.html) ── */
        .trending-header {
            display:flex; align-items:center; justify-content:space-between;
            margin-bottom:12px;
        }
        .trending-title { font-size:14px; font-weight:700; color:#fff; font-family:'Montserrat',sans-serif; }
        #sort-btn {
            background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.07);
            border-radius:20px; padding:5px 12px; font-size:11px; color:#888;
            cursor:pointer; display:flex; align-items:center; gap:4px;
        }
        .trending-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }

        .t-card {
            background:#0e0e0e; border:1px solid rgba(255,255,255,0.07);
            border-radius:14px; overflow:hidden; cursor:pointer; transition:0.25s;
        }
        .t-card:active { transform:scale(0.97); }
        .t-img { width:100%; aspect-ratio:1/1; background:#111; overflow:hidden; }
        .t-img img { width:100%; height:100%; object-fit:cover; }
        .t-img .no-img { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:36px; }
        .t-info { padding:8px 10px 10px; }
        .t-name { font-size:12px; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px; }
        .t-price { font-size:13px; font-weight:800; color:var(--cyan-neon); }
        .t-loc { font-size:10px; color:#888; margin-top:3px; display:flex; align-items:center; gap:3px; }

        /* ── FOOTER (UNTOUCHED) ── */
        .nexus-footer {
            position:fixed; bottom:0; width:100%; height:45px;
            background:rgba(5,5,5,0.98); border-top:1px solid var(--glass-border);
            display:flex; justify-content:space-around; align-items:center; z-index:1000;
        }
        .footer-icon { opacity:0.5; color:#fff; cursor:pointer; }
        .footer-icon.active { opacity:1; filter:drop-shadow(0 0 5px var(--cyan-neon)); }
    </style>
</head>
<body>

    <!-- HEADER (UNTOUCHED) -->
    <header>
        <div class="search-container">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input type="text" placeholder="Search Global Marketplace...">
        </div>
    </header>

    <div class="nexus-main">

        <!-- SIDEBAR (UNTOUCHED) -->
        <div class="category-sidebar">
            <div class="side-link active" onclick="switchCategory('women', this)">Women</div>
            <div class="side-link" onclick="switchCategory('men', this)">Men</div>
            <div class="side-link" onclick="switchCategory('tech', this)">Tech</div>
            <div class="side-link" onclick="switchCategory('home', this)">Home</div>
            <div class="side-link" onclick="switchCategory('beauty', this)">Beauty</div>
            <div class="side-link" onclick="switchCategory('sports', this)">Sports</div>
            <div class="side-link" onclick="switchCategory('auto', this)">Auto</div>
        </div>

        <!-- CONTENT AREA -->
        <div class="category-content" id="contentArea">

            <!-- CATEGORY CARDS (UNTOUCHED) -->
            <div class="futurist-grid" id="futuristGrid">
                <div class="product-item">
                    <div class="image-wrapper"><img src="https://via.placeholder.com/150/111/00F2FF?text=Item"></div>
                    <div class="product-label">Dresses</div>
                </div>
                <div class="product-item">
                    <div class="image-wrapper"><img src="https://via.placeholder.com/150/111/50FA7B?text=Item"></div>
                    <div class="product-label">Shoes</div>
                </div>
                <div class="product-item">
                    <div class="image-wrapper"><img src="https://via.placeholder.com/150/111/ffffff?text=Item"></div>
                    <div class="product-label">Bags</div>
                </div>
                <div class="product-item">
                    <div class="image-wrapper"><img src="https://via.placeholder.com/150/111/00F2FF?text=Item"></div>
                    <div class="product-label">Jewelry</div>
                </div>
                <div class="product-item">
                    <div class="image-wrapper"><img src="https://via.placeholder.com/150/111/50FA7B?text=Item"></div>
                    <div class="product-label">Two Pieces</div>
                </div>
                <div class="product-item">
                    <div class="image-wrapper"><img src="https://via.placeholder.com/150/111/ffffff?text=Item"></div>
                    <div class="product-label">Lingerie</div>
                </div>
            </div>

            <!-- TRENDING ITEMS -->
            <div class="trending-header">
                <div class="trending-title">Trending Items</div>
                <div id="sort-btn" onclick="toggleSort()">
                    Sort by <i class="fa-solid fa-chevron-down" id="sort-icon" style="font-size:10px;"></i>
                </div>
            </div>
            <div class="trending-grid" id="trending-grid"></div>

        </div>
    </div>

    <!-- FOOTER -->
    <nav class="nexus-footer">
        <div class="footer-icon" onclick="window.location.href='shop.html'">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L4 9v12h5v-7h6v7h5V9l-8-6z"/></svg>
        </div>
        <div class="footer-icon" onclick="window.location.href='social.html'">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 11-7.6-12.7 8.38 8.38 0 013.8.9L21 3z"/></svg>
        </div>
        <div class="footer-icon active">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
        </div>
        <div class="footer-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 2v20M8 2v20M2 12h20"/></svg>
        </div>
        <div class="footer-icon" onclick="window.location.href='me.html'">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import {
            getFirestore, collection, query,
            orderBy, onSnapshot
        } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDExSOnFbN-wJbT1UFgB-kBs37bEa3KiWc",
            authDomain: "oryzon-50ea4.firebaseapp.com",
            projectId: "oryzon-50ea4",
            storageBucket: "oryzon-50ea4.firebasestorage.app",
            messagingSenderId: "782106742622",
            appId: "1:782106742622:web:902d512bfe42dd4cf289cf",
            measurementId: "G-K5085DLL2W"
        };

        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);

        let allProducts      = [];
        let filteredProducts = [];
        let sortAsc          = false;

        function renderTrending(list) {
            const grid = document.getElementById('trending-grid');
            if (!list.length) {
                grid.innerHTML = `<div style="grid-column:span 2;text-align:center;padding:40px;color:#555;font-size:13px;">No products listed yet.</div>`;
                return;
            }
            grid.innerHTML = list.map(p => `
                <div class="t-card" onclick="window.location.href='products-page.html?id=${p.id}'">
                    <div class="t-img">
                        ${p.image
                            ? `<img src="${p.image}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'no-img\\'>📦</div>'">`
                            : `<div class="no-img">📦</div>`}
                    </div>
                    <div class="t-info">
                        <div class="t-name">${p.name}</div>
                        <div class="t-price">${p.price}</div>
                        <div class="t-loc">
                            <i class="fa-solid fa-location-dot" style="font-size:9px;color:var(--cyan-neon);"></i>
                            ${p.location || 'Nigeria'}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Live Firebase listener
        onSnapshot(
            query(collection(db, "products"), orderBy("createdAt", "desc")),
            snap => {
                allProducts      = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                filteredProducts = [...allProducts];
                renderTrending(filteredProducts);
            },
            err => console.error("Trending error:", err)
        );

        window.toggleSort = function() {
            sortAsc = !sortAsc;
            document.getElementById('sort-icon').className =
                sortAsc ? 'fa-solid fa-chevron-up' : 'fa-solid fa-chevron-down';
            filteredProducts.sort((a, b) => {
                const pa = parseFloat((a.price || '0').replace(/[^0-9.]/g, ''));
                const pb = parseFloat((b.price || '0').replace(/[^0-9.]/g, ''));
                return sortAsc ? pa - pb : pb - pa;
            });
            renderTrending(filteredProducts);
        };

        window.switchCategory = function(cat, el) {
            document.querySelectorAll('.side-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
        };
    </script>
</body>
</html>
