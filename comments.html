<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Comment Protocol - Slim Instagram Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Orbitron:wght@600;800&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --quantum-black: #000000;
            --hologram-cyan: #00f2fe;
            --hologram-gold: #fde08d;
            --premium-bronze: #b8860b;
            --sentiment-positive: rgba(80, 250, 123, 0.15);
            --sentiment-neutral: rgba(255, 255, 255, 0.05);
            --sentiment-alert: rgba(255, 71, 87, 0.15);
            --glass-border: rgba(253, 224, 141, 0.15);
            --text-primary: #f5f5f7;
            --text-secondary: rgba(255, 255, 255, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--quantum-black);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
            padding: 10px;
        }

        .nexus-comment-node {
            width: 100%;
            max-width: 480px;
            height: 100%;
            background: rgba(10, 12, 22, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 10px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 0 2px var(--hologram-gold);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .node-header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 6px;
            margin-bottom: 8px;
            position: relative;
            flex-shrink: 0;
        }

        .node-header::before {
            content: '';
            position: absolute;
            top: -5px;
            width: 35px;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
        }

        .node-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.2px;
            margin-top: 10px;
        }

        .comments-matrix-feed {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 5px;
            scrollbar-width: none;
            margin-bottom: 15px;
        }

        .comments-matrix-feed::-webkit-scrollbar { display: none; }

        .quantum-comment-card {
            position: relative;
            padding: 12px 14px 10px 14px;
            border-radius: 16px;
            margin-bottom: 12px;
            background: var(--sentiment-neutral);
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .quantum-comment-card.positive {
            background: var(--sentiment-positive);
            border-right: 3px solid #50fa7b;
        }

        .quantum-comment-card.alert {
            background: var(--sentiment-alert);
            border-right: 3px solid #ff4757;
        }

        .quantum-comment-card:hover {
            transform: translateX(4px);
            border-color: rgba(253, 224, 141, 0.3);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .comment-core-layout { display: flex; gap: 12px; position: relative; }

        .quantum-avatar-frame { position: relative; width: 36px; height: 36px; flex-shrink: 0; }

        .quantum-avatar {
            width: 100%; height: 100%;
            border-radius: 50%; object-fit: cover;
            border: 1.5px solid var(--hologram-cyan);
            padding: 1px;
        }

        .user-status-node {
            position: absolute; bottom: 0; right: 0;
            width: 8px; height: 8px;
            background: #00f2fe; border-radius: 50%;
            border: 1.5px solid var(--quantum-black);
        }

        .comment-body-cluster {
            flex-grow: 1; display: flex;
            flex-direction: column; position: relative;
        }

        .meta-layer {
            display: flex; align-items: center;
            justify-content: space-between; margin-bottom: 4px;
        }

        .identity-badge { display: flex; align-items: center; gap: 6px; }

        .user-title-name {
            font-size: 12px; font-weight: 600;
            color: white; font-family: 'Montserrat', sans-serif;
        }

        .instagram-author-tag {
            font-family: 'Inter', sans-serif; font-size: 9px; font-weight: 500;
            background: rgba(255, 255, 255, 0.12); color: rgba(255, 255, 255, 0.85);
            padding: 1px 6px; border-radius: 10px; letter-spacing: 0.3px;
        }

        .comment-text-wrap {
            position: relative; display: block; padding-bottom: 6px;
        }

        .comment-text-payload {
            font-size: 12.5px; line-height: 1.5;
            color: rgba(255, 255, 255, 0.9);
            text-align: justify; display: inline-block;
            width: 100%; word-break: break-word;
        }

        .timestamp-quantum {
            font-size: 9px; color: var(--text-secondary);
            position: absolute; bottom: -2px; right: 0;
            z-index: 5; line-height: 1; background: transparent;
        }

        .interaction-capsule-bar {
            display: flex; align-items: center;
            gap: 12px; margin-top: 4px;
        }

        .micro-action-trigger {
            background: transparent; border: none;
            color: var(--text-secondary); font-size: 11px;
            display: flex; align-items: center;
            gap: 4px; cursor: pointer; transition: color 0.2s ease;
        }

        .micro-action-trigger:hover { color: var(--hologram-gold); }

        .micro-action-trigger.liked i {
            color: #ff4757;
            animation: heartPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .quantum-nested-replies {
            margin-top: 10px;
            padding-left: 14px;
            border-left: 1px dashed rgba(253, 224, 141, 0.2);
            display: none;
            max-height: none !important;
            height: auto !important;
            overflow: hidden !important;
            scrollbar-width: none;
            scroll-behavior: smooth;
        }

        .quantum-nested-replies::-webkit-scrollbar { display: none; }
        .quantum-nested-replies.show { display: block; }

        .view-more-trigger-btn {
            font-size: 11px; color: var(--hologram-cyan);
            background: transparent; border: none; cursor: pointer;
            margin-top: 8px; display: none; font-weight: 500;
            text-align: left; transition: color 0.2s;
        }

        .view-more-trigger-btn:hover { color: var(--hologram-gold); }

        .fullscreen-replies-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000000;
            z-index: 200; padding: 10px;
            display: none; flex-direction: column;
            animation: slideUp 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .fullscreen-replies-overlay.active { display: flex; }

        .overlay-header {
            display: grid;
            grid-template-columns: 40px 1fr 40px;
            align-items: center;
            padding-bottom: 10px;
            margin-bottom: 15px;
            flex-shrink: 0;
        }

        .back-node-btn {
            background: transparent; border: none;
            color: var(--hologram-cyan); font-size: 18px;
            cursor: pointer; justify-self: start;
        }

        .overlay-feed-body {
            flex-grow: 1; overflow-y: auto;
            scrollbar-width: none; padding-bottom: 20px;
        }

        .overlay-feed-body::-webkit-scrollbar { display: none; }

        .overlay-replies-holder {
            position: relative; padding-left: 0; margin-top: 10px;
        }

        .overlay-feed-body .overlay-replies-holder .quantum-comment-card {
            margin-left: 35px; width: calc(100% - 35px);
            opacity: 1 !important; visibility: visible !important;
            display: block !important; margin-bottom: 12px;
        }

        .overlay-feed-body .quantum-nested-replies,
        .overlay-feed-body .view-more-trigger-btn { display: none !important; }

        .overlay-replies-holder .interaction-capsule-bar,
        .quantum-nested-replies .interaction-capsule-bar {
            display: flex; align-items: center;
            width: 100%; margin-top: 8px; gap: 12px;
        }

        .overlay-replies-holder .timestamp-quantum,
        .quantum-nested-replies .timestamp-quantum {
            margin-left: auto; margin-top: 0 !important;
            display: inline-block; position: static !important;
        }

        .comment-text-wrap { padding-bottom: 12px !important; }
        .interaction-capsule-bar { margin-top: 0 !important; }

        .fullscreen-replies-overlay .hologram-input-harness {
            background: #000000 !important;
            border-top: 1px solid rgba(255, 255, 255, 0.05) !important;
            padding: 8px 12px !important;
            height: auto !important;
            display: flex !important;
            align-items: center !important;
            box-sizing: border-box !important;
        }

        .fullscreen-replies-overlay .hologram-text-field {
            flex-grow: 1 !important;
            margin: 0 10px !important;
        }

        .hologram-input-harness {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 8px 12px;
            display: flex; align-items: center; gap: 10px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
            flex-shrink: 0; margin-bottom: 5px;
            position: relative; margin-top: auto;
        }

        .current-user-avatar {
            width: 28px; height: 28px;
            border-radius: 50%; border: 1px solid var(--hologram-gold);
        }

        .hologram-text-field {
            flex-grow: 1; background: transparent;
            border: none; outline: none;
            color: white; font-size: 12.5px;
            font-family: 'Inter', sans-serif;
            resize: none; word-break: break-word;
            max-height: 110px; overflow-y: auto;
            line-height: 1.5; padding: 4px 0; scrollbar-width: none;
        }

        .hologram-text-field::-webkit-scrollbar { display: none; }
        .hologram-text-field::placeholder { color: rgba(255, 255, 255, 0.3); }

        .input-actions-cluster { display: flex; align-items: center; gap: 8px; }

        .utility-node-btn {
            background: transparent; border: none;
            color: var(--text-secondary); font-size: 13px;
            cursor: pointer; transition: color 0.2s;
        }

        .utility-node-btn:hover { color: var(--hologram-cyan); }

        .quantum-beam-send {
            background: linear-gradient(135deg, var(--hologram-gold), var(--premium-bronze));
            border: none; width: 28px; height: 28px;
            border-radius: 50%; color: #000; font-size: 11px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 0 10px rgba(253, 224, 141, 0.4);
            transition: transform 0.2s;
        }

        .ai-matrix-popup {
            position: absolute; bottom: 60px; right: 12px;
            background: rgba(15, 20, 35, 0.95);
            border: 1px solid var(--hologram-cyan);
            border-radius: 12px; padding: 6px;
            display: none; flex-direction: column;
            gap: 4px; z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        .ai-matrix-popup.visible { display: flex; }

        .ai-node-option {
            background: transparent; border: none;
            color: white; font-size: 11.5px;
            padding: 6px 12px; text-align: left;
            cursor: pointer; border-radius: 6px;
            white-space: nowrap; transition: background 0.2s;
        }

        .ai-node-option:hover {
            background: rgba(0, 242, 254, 0.15);
            color: var(--hologram-cyan);
        }

        .instagram-mention-tag {
            color: #0095f6 !important; font-weight: 600;
            cursor: pointer; text-decoration: none;
        }

        .instagram-mention-tag:hover { text-decoration: underline; }

        @keyframes heartPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="nexus-comment-node">

        <!-- HEADER - Back button + Title -->
        <div class="node-header" style="position:relative;">
            <button id="mainBackBtn" onclick="history.back()" style="position:absolute; left:0; background:transparent; border:none; color:#fde08d; font-size:18px; cursor:pointer;">
    <i class="fa-solid fa-arrow-left"></i>
</button>

<script>
// Idan an buɗe ta iframe (split-view), boye back button
if (window.self !== window.top) {
    document.getElementById('mainBackBtn').style.display = 'none';
}
</script>
            
            <div class="node-title">Comments</div>
        </div>

        <!-- COMMENTS FEED -->
        <div class="comments-matrix-feed" id="matrixFeed">
            <p style="text-align:center; color:#555; padding:20px; font-size:13px;">Loading comments...</p>
        </div>

        <!-- FULLSCREEN REPLIES OVERLAY -->
        <div class="fullscreen-replies-overlay" id="fullscreenRepliesPanel">
            <div class="overlay-header">
                <button class="back-node-btn" onclick="closeFullScreenReplies()"><i class="fa-solid fa-arrow-left"></i></button>
                <div class="node-title" style="margin-top:0;">Replies</div>
            </div>
            <div class="overlay-feed-body" id="overlayFeedBody"></div>
            <div class="hologram-input-harness" style="margin-top: auto; position: static; width: 100%; box-sizing: border-box;">
                <img id="overlayAvatarImg" src="https://api.dicebear.com/7.x/bottts/svg?seed=user" class="current-user-avatar" alt="">
                <textarea class="hologram-text-field" id="overlayCommentInput" rows="1" placeholder="Write a reply..."></textarea>
                <div class="input-actions-cluster">
                    <button class="utility-node-btn" onclick="toggleOverlayAiMenu()"><i class="fa-solid fa-wand-magic-sparkles"></i></button>
                    <button class="quantum-beam-send" onclick="injectOverlayReply()"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

        <!-- AI POPUP MENU -->
        <div class="ai-matrix-popup" id="aiMatrixMenu">
            <button class="ai-node-option" onclick="applyAiFeature('optimize')"><i class="fa-solid fa-wand-magic-sparkles"></i> Optimize Text</button>
            <button class="ai-node-option" onclick="applyAiFeature('translate')"><i class="fa-solid fa-language"></i> Translate to English</button>
            <button class="ai-node-option" onclick="applyAiFeature('clear')"><i class="fa-solid fa-trash-can"></i> Clear Text</button>
        </div>

        <!-- MAIN COMMENT INPUT -->
        <div class="hologram-input-harness">
            <img id="mainAvatarImg" src="https://api.dicebear.com/7.x/bottts/svg?seed=user" class="current-user-avatar" alt="">
            <textarea class="hologram-text-field" id="nexusCommentInput" rows="1" placeholder="Add a comment..."></textarea>
            <div class="input-actions-cluster">
                <button class="utility-node-btn" id="aiTriggerBtn" onclick="toggleAiMenu()"><i class="fa-solid fa-wand-magic-sparkles"></i></button>
                <button class="quantum-beam-send" onclick="injectComment()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // ============================================================
        // FIREBASE SETUP
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDExSOnFbN-wJbT1UFgB-kBs37bEa3KiWc",
            authDomain: "oryzon-50ea4.firebaseapp.com",
            projectId: "oryzon-50ea4",
            storageBucket: "oryzon-50ea4.firebasestorage.app",
            messagingSenderId: "782106742622",
            appId: "1:782106742622:web:902d512bfe42dd4cf289cf",
            measurementId: "G-K5085DLL2W"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ============================================================
        // KARƁI postId DAGA URL - Misali: comments.html?postId=abc123
        // ============================================================
        const urlParams = new URLSearchParams(window.location.search);
        const CURRENT_POST_ID = urlParams.get('postId');

        if (!CURRENT_POST_ID) { history.back(); }

        // Karɓi logged-in user
        const currentUser = localStorage.getItem("nexus_user_session") || "Anonymous";
        const savedProfilePic = localStorage.getItem('userProfilePic') || 
                                "https://api.dicebear.com/7.x/bottts/svg?seed=" + currentUser;

        // Saka avatar na current user a input bars
        document.getElementById('mainAvatarImg').src = savedProfilePic;
        document.getElementById('overlayAvatarImg').src = savedProfilePic;

        // ============================================================
        // VARIABLES
        // ============================================================
        let targetReplyFeedId = null;
        let activeReplyUser = "";
        let currentOpenContainerId = null;
        let currentOverlayTargetId = "";
        let overlayActiveUser = "";

        const commentInput = document.getElementById('nexusCommentInput');

        commentInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
            if (targetReplyFeedId && !this.value.startsWith(`@${activeReplyUser}`)) {
                targetReplyFeedId = null; activeReplyUser = "";
            }
        });

        commentInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); injectComment(); }
        });

        document.addEventListener('click', function(e) {
            const menu = document.getElementById('aiMatrixMenu');
            const btn = document.getElementById('aiTriggerBtn');
            if (!menu.contains(e.target) && !btn.contains(e.target)) {
                menu.classList.remove('visible');
            }
        });

        // ============================================================
        // LODA COMMENTS NA WANNAN POST KAWAI (LIVE)
        // ============================================================
        window.addEventListener('DOMContentLoaded', () => {
            db.collection("nexus_contributions")
    .where("postId", "==", CURRENT_POST_ID)
    .onSnapshot((snapshot) => {
                    const feedContainer = document.getElementById('matrixFeed');
                    feedContainer.innerHTML = "";

                    let mainComments = [];
                    let repliesMap = {};

                    snapshot.forEach((doc) => {
                        let data = doc.data();
                        data.id = doc.id;
                        if (data.parentId) {
                            if (!repliesMap[data.parentId]) repliesMap[data.parentId] = [];
                            repliesMap[data.parentId].push(data);
                        } else {
                            mainComments.push(data);
                        }
                    });

                    if (mainComments.length === 0) {
                        feedContainer.innerHTML = '<p style="text-align:center; color:#555; padding:30px; font-size:13px;">Babu comments tukuna. Ka zama na farko! 💬</p>';
                        return;
                    }

                    mainComments.forEach((comment) => {
                        let sentimentClass = "";
                        if (comment.text.includes("murna") || comment.text.includes("kyau") || comment.text.includes("santsi")) {
                            sentimentClass = "positive";
                        }

                        let commentHTML = `
                            <div class="quantum-comment-card ${sentimentClass}" id="card-${comment.id}">
                                <div class="comment-core-layout">
                                    <div class="quantum-avatar-frame">
                                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${comment.author}" class="quantum-avatar">
                                    </div>
                                    <div class="comment-body-cluster">
                                        <div class="meta-layer">
                                            <div class="identity-badge">
                                                <span class="user-title-name">${comment.author}</span>
                                                ${comment.author === currentUser ? '<span class="instagram-author-tag">Author</span>' : ''}
                                            </div>
                                            <span class="timestamp-quantum" style="position:static; font-size:10px;">${formatQuantumTimestamp(comment.timestamp)}</span>
                                        </div>
                                        <div class="comment-text-wrap" style="padding-bottom:0;">
                                            <p class="comment-text-payload">${formatMentions(comment.text)}</p>
                                        </div>
                                        <div class="interaction-capsule-bar">
                                            <button class="micro-action-trigger" onclick="pulseLike(this)">
                                                <i class="fa-regular fa-heart"></i> <span class="count">${comment.likes || 0}</span>
                                            </button>
                                            <button class="micro-action-trigger" onclick="triggerReplyAction('${comment.author}', '${comment.id}')">
                                                <i class="fa-regular fa-comment-dots"></i> <span>Reply</span>
                                            </button>
                                            ${comment.author === currentUser ? `<button class="micro-action-trigger" style="color:#ff4757; margin-left:10px;" onclick="requestDestruction('${comment.id}')"><i class="fa-solid fa-trash-can"></i></button>` : ''}
                                        </div>
                                    </div>
                                </div>
                                <div class="quantum-nested-replies show" id="${comment.id}" style="margin-left:48px;"></div>
                                <button class="view-more-trigger-btn" id="viewMoreBtn-${comment.id}" onclick="launchFullScreenReplies('${comment.id}')" style="margin-left:48px;">View more replies</button>
                            </div>`;

                        feedContainer.insertAdjacentHTML('beforeend', commentHTML);

                        const replyContainer = document.getElementById(comment.id);
                        if (repliesMap[comment.id]) {
                            repliesMap[comment.id].forEach((reply) => {
                                let replyHTML = `
                                    <div class="quantum-comment-card">
                                        <div class="comment-core-layout">
                                            <div class="quantum-avatar-frame" style="width:26px; height:26px;">
                                                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${reply.author}" class="quantum-avatar">
                                            </div>
                                            <div class="comment-body-cluster">
                                                <div class="meta-layer">
                                                    <div class="identity-badge">
                                                        <span class="user-title-name" style="font-size:11px;">${reply.author}</span>
                                                        ${reply.author === currentUser ? '<span class="instagram-author-tag" style="font-size:7.5px;">Author</span>' : ''}
                                                    </div>
                                                </div>
                                                <div class="comment-text-wrap" style="padding-bottom:0;">
                                                    <p class="comment-text-payload" style="font-size:11.5px;">${formatMentions(reply.text)}</p>
                                                </div>
                                                <div class="interaction-capsule-bar">
                                                    <button class="micro-action-trigger" onclick="pulseLike(this)">
                                                        <i class="fa-regular fa-heart"></i> <span class="count">0</span>
                                                    </button>
                                                    <button class="micro-action-trigger" onclick="triggerReplyAction('${reply.author}', '${comment.id}')">
                                                        <i class="fa-regular fa-comment-dots"></i> <span>Reply</span>
                                                    </button>
                                                    ${reply.author === currentUser ? `<button class="micro-action-trigger" style="color:#ff4757;" onclick="requestDestruction('${reply.id}')"><i class="fa-solid fa-trash-can"></i></button>` : ''}
                                                    <span class="timestamp-quantum" style="font-size:9px; margin-left:auto; position:static;">${formatQuantumTimestamp(reply.timestamp)}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>`;
                                replyContainer.insertAdjacentHTML('beforeend', replyHTML);
                            });
                        }

                        handleDynamicVisibility(replyContainer);
                        checkReplyCountAndTrigger(comment.id);
                    });

                    feedContainer.scrollTop = feedContainer.scrollHeight;
                });
        });

        // ============================================================
        // AIKA SABON COMMENT - Tare da postId
        // ============================================================
        function injectComment() {
            const commentText = commentInput.value.trim();
            if (!commentText) return;

            const newContribution = {
                author: currentUser,
                text: commentText,
                postId: CURRENT_POST_ID,
                parentId: targetReplyFeedId || null,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                likes: 0
            };

            db.collection("nexus_contributions").add(newContribution)
            .then(() => {
                commentInput.value = targetReplyFeedId ? `@${activeReplyUser} ` : "";
                commentInput.style.height = 'auto';
                if (window.navigator.vibrate) window.navigator.vibrate(30);
            })
            .catch((error) => { console.error("Kuskure: ", error); });
        }

        // ============================================================
        // SAURAN FUNCTIONS - Babu canje-canje daga asali
        // ============================================================
        function triggerReplyAction(username, replyFeedId) {
            targetReplyFeedId = replyFeedId;
            activeReplyUser = username;
            commentInput.value = `@${username} `;
            commentInput.focus();
            commentInput.style.height = 'auto';
            commentInput.style.height = commentInput.scrollHeight + 'px';
            const replyContainer = document.getElementById(replyFeedId);
            if (replyContainer && !replyContainer.classList.contains('show')) {
                replyContainer.classList.add('show');
            }
            if (window.navigator.vibrate) window.navigator.vibrate(15);
        }

        function launchFullScreenReplies(containerId) {
            currentOpenContainerId = containerId;
            currentOverlayTargetId = containerId;
            const sourceContainer = document.getElementById(containerId);
            const parentCard = sourceContainer.closest('.quantum-comment-card');
            const overlay = document.getElementById('fullscreenRepliesPanel');
            const overlayBody = document.getElementById('overlayFeedBody');

            const parentAvatar = parentCard.querySelector('.quantum-avatar').src;
            const parentName = parentCard.querySelector('.user-title-name').innerText;
            const parentText = parentCard.querySelector('.comment-text-payload').innerText;
            const parentTime = parentCard.querySelector('.timestamp-quantum').innerText;
            const isPositive = parentCard.classList.contains('positive') ? 'positive' : '';

            let overlayHTML = `
                <div class="quantum-comment-card ${isPositive}">
                    <div class="comment-core-layout">
                        <div class="quantum-avatar-frame">
                            <img src="${parentAvatar}" class="quantum-avatar">
                        </div>
                        <div class="comment-body-cluster">
                            <div class="meta-layer">
                                <div class="identity-badge">
                                    <span class="user-title-name">${parentName}</span>
                                </div>
                                <span class="timestamp-quantum" style="position:static; font-size:10px;">${parentTime}</span>
                            </div>
                            <div class="comment-text-wrap">
                                <p class="comment-text-payload">${parentText}</p>
                            </div>
                            <div class="interaction-capsule-bar">
                                <button class="micro-action-trigger" onclick="pulseLike(this)">
                                    <i class="fa-regular fa-heart"></i> <span class="count">0</span>
                                </button>
                                <button class="micro-action-trigger" onclick="triggerOverlayReplyAction('${parentName}')">
                                    <i class="fa-regular fa-comment-dots"></i> <span>Reply</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="overlay-replies-holder" id="overlayRepliesContainer">`;

            const replies = sourceContainer.querySelectorAll('.quantum-comment-card');
            replies.forEach(reply => {
                overlayHTML += `<div class="quantum-comment-card">${reply.innerHTML}</div>`;
            });

            overlayHTML += `</div>`;
            overlayBody.innerHTML = overlayHTML;

            const overlayReplyButtons = overlayBody.querySelectorAll('.overlay-replies-holder .micro-action-trigger');
            overlayReplyButtons.forEach(btn => {
                if (btn.querySelector('.fa-comment-dots')) {
                    const card = btn.closest('.quantum-comment-card');
                    const rName = card.querySelector('.user-title-name').innerText;
                    btn.setAttribute('onclick', `triggerOverlayReplyAction('${rName}')`);
                }
            });

            overlay.classList.add('active');
            const overlayInput = document.getElementById('overlayCommentInput');
            overlayInput.value = "";
            if (window.navigator.vibrate) window.navigator.vibrate(25);
        }

        function triggerOverlayReplyAction(username) {
            const overlayInput = document.getElementById('overlayCommentInput');
            overlayActiveUser = username;
            overlayInput.value = `@${username} `;
            overlayInput.focus();
        }

        function closeFullScreenReplies() {
            document.getElementById('fullscreenRepliesPanel').classList.remove('active');
            currentOpenContainerId = null;
            if (window.navigator.vibrate) window.navigator.vibrate(15);
        }

        function injectOverlayReply() {
            const overlayInput = document.getElementById('overlayCommentInput');
            const replyText = overlayInput.value.trim();
            if (!replyText) return;

            const overlayRepliesContainer = document.getElementById('overlayRepliesContainer');
            const realFeedContainer = document.getElementById(currentOverlayTargetId);

            const replyHTML = `
                <div class="quantum-comment-card">
                    <div class="comment-core-layout">
                        <div class="quantum-avatar-frame" style="width:26px; height:26px;">
                            <img src="${savedProfilePic}" class="quantum-avatar">
                        </div>
                        <div class="comment-body-cluster">
                            <div class="meta-layer">
                                <div class="identity-badge">
                                    <span class="user-title-name" style="font-size:11px;">${currentUser}</span>
                                    <span class="instagram-author-tag" style="font-size:7.5px;">Author</span>
                                </div>
                            </div>
                            <div class="comment-text-wrap">
                                <p class="comment-text-payload" style="font-size:11.5px;">${replyText}</p>
                            </div>
                            <div class="interaction-capsule-bar">
                                <button class="micro-action-trigger" onclick="pulseLike(this)">
                                    <i class="fa-regular fa-heart"></i> <span class="count">0</span>
                                </button>
                                <button class="micro-action-trigger" onclick="triggerOverlayReplyAction('${currentUser}')">
                                    <i class="fa-regular fa-comment-dots"></i> <span>Reply</span>
                                </button>
                                <span class="timestamp-quantum" style="font-size:9px; margin-left:auto; position:static;">Just now</span>
                            </div>
                        </div>
                    </div>
                </div>`;

            overlayRepliesContainer.insertAdjacentHTML('beforeend', replyHTML);

            // Adana a Firebase tare da postId
            db.collection("nexus_contributions").add({
                author: currentUser,
                text: replyText,
                postId: CURRENT_POST_ID,
                parentId: currentOverlayTargetId,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                likes: 0
            });

            if (realFeedContainer) {
                realFeedContainer.insertAdjacentHTML('beforeend', replyHTML);
                handleDynamicVisibility(realFeedContainer);
                checkReplyCountAndTrigger(currentOverlayTargetId);
            }

            overlayInput.value = `@${overlayActiveUser} `;
            document.getElementById('overlayFeedBody').scrollTop = document.getElementById('overlayFeedBody').scrollHeight;
            if (window.navigator.vibrate) window.navigator.vibrate(30);
        }

        function checkReplyCountAndTrigger(containerId) {
            const container = document.getElementById(containerId);
            const viewMoreBtn = document.getElementById(`viewMoreBtn-${containerId}`);
            if (!container || !viewMoreBtn) return;
            const cardsCount = container.querySelectorAll('.quantum-comment-card').length;
            if (cardsCount >= 5) {
                viewMoreBtn.style.setProperty('display', 'block', 'important');
            } else {
                viewMoreBtn.style.setProperty('display', 'none', 'important');
            }
        }

        function handleDynamicVisibility(container) {
            if (!container) return;
            const cards = container.querySelectorAll('.quantum-comment-card');
            container.style.setProperty('max-height', '260px', 'important');
            container.style.setProperty('overflow-y', 'auto', 'important');
            container.style.setProperty('display', 'block', 'important');
            cards.forEach((card, index) => {
                if (index < 5) {
                    card.style.setProperty('display', 'block', 'important');
                    card.style.opacity = '1';
                    card.style.visibility = 'visible';
                } else {
                    card.style.setProperty('display', 'none', 'important');
                }
            });
        }

        function toggleAiMenu() {
            document.getElementById('aiMatrixMenu').classList.toggle('visible');
        }

        function toggleOverlayAiMenu() {
            document.getElementById('aiMatrixMenu').classList.toggle('visible');
        }

        function applyAiFeature(action) {
            const menu = document.getElementById('aiMatrixMenu');
            menu.classList.remove('visible');
            if (action === 'clear') {
                commentInput.value = '';
                targetReplyFeedId = null; activeReplyUser = "";
            } else if (action === 'optimize' && commentInput.value.trim()) {
                commentInput.value = commentInput.value.trim() + " ✨ [Optimized via Nexus AI]";
            } else if (action === 'translate' && commentInput.value.trim()) {
                commentInput.value = "AI Translation: " + commentInput.value.trim() + " (Processed)";
            }
            commentInput.style.height = 'auto';
            commentInput.style.height = commentInput.scrollHeight + 'px';
            commentInput.focus();
        }

        function pulseLike(btn) {
            btn.classList.toggle('liked');
            const icon = btn.querySelector('i');
            const countSpan = btn.querySelector('.count');
            let currentCount = parseInt(countSpan.innerText);
            if (btn.classList.contains('liked')) {
                icon.className = 'fa-solid fa-heart';
                countSpan.innerText = currentCount + 1;
                if (window.navigator.vibrate) window.navigator.vibrate([20, 10, 20]);
            } else {
                icon.className = 'fa-regular fa-heart';
                countSpan.innerText = currentCount - 1;
            }
        }

        function requestDestruction(documentId) {
            if (confirm("Kana da tabbas kana son goge wannan?")) {
                db.collection("nexus_contributions").doc(documentId).delete()
                .catch((error) => { console.error("Gogewa kuskure: ", error); });
            }
        }

        function formatQuantumTimestamp(timestampInput) {
            if (!timestampInput) return "Just now";
            let past = timestampInput.toDate ? timestampInput.toDate() : new Date(timestampInput);
            const secondsAgo = Math.floor((Date.now() - past) / 1000);
            if (secondsAgo < 60) return "Just now";
            const minutesAgo = Math.floor(secondsAgo / 60);
            if (minutesAgo < 60) return `${minutesAgo}m`;
            const hoursAgo = Math.floor(minutesAgo / 60);
            if (hoursAgo < 24) return `${hoursAgo}h`;
            const daysAgo = Math.floor(hoursAgo / 24);
            if (daysAgo < 30) return `${daysAgo}d`;
            return `${Math.floor(daysAgo / 30)}mo`;
        }

        function formatMentions(text) {
            if (!text) return "";
            return text.replace(/@([a-zA-Z0-9_\u0600-\u06FF]+(\s+[a-zA-Z0-9_\u0600-\u06FF]+)?)/g, function(match) {
                return `<span class="instagram-mention-tag">${match}</span>`;
            });
        }
    </script>
</body>
</html>
