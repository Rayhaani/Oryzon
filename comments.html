<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Comment Protocol - Slim Instagram Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Orbitron:wght@600;800&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --quantum-black: #000000;
            --hologram-cyan: #00f2fe;
            --hologram-gold: #fde08d;
            --premium-bronze: #b8860b;
            --sentiment-positive: rgba(80, 250, 123, 0.15);
            --sentiment-neutral: rgba(255, 255, 255, 0.05);
            --sentiment-alert: rgba(255, 71, 87, 0.15);
            --glass-border: rgba(253, 224, 141, 0.15);
            --text-primary: #f5f5f7;
            --text-secondary: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--quantum-black);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh; 
            overflow: hidden;
            padding: 10px; 
        }

        /* ====== MAIN PLATFORM CONTAINER ====== */
        .nexus-comment-node {
            width: 100%;
            max-width: 480px;
            height: 100%; 
            background: rgba(10, 12, 22, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 0 2px var(--hologram-gold);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ====== SLIM & SMART INSTAGRAM HEADER ====== */
        .node-header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 6px;  
            margin-bottom: 8px;   
            position: relative;
            flex-shrink: 0;
        }
            
        .node-header::before {
            content: '';
            position: absolute;
            top: -5px;
            width: 35px;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
        }

        .node-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.2px;
            margin-top: 10px;
        }

        /* ====== COMMENTS CORE MATRIX ====== */
        .comments-matrix-feed {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 5px;
            scrollbar-width: none;
            margin-bottom: 15px;
        }

        .comments-matrix-feed::-webkit-scrollbar {
            display: none;
        }

        .quantum-comment-card {
            position: relative;
            padding: 12px 14px 10px 14px; 
            border-radius: 16px;
            margin-bottom: 12px;
            background: var(--sentiment-neutral);
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .quantum-comment-card.positive {
            background: var(--sentiment-positive);
            border-right: 3px solid #50fa7b;
        }

        .quantum-comment-card.alert {
            background: var(--sentiment-alert);
            border-right: 3px solid #ff4757;
        }

        .quantum-comment-card:hover {
            transform: translateX(4px);
            border-color: rgba(253, 224, 141, 0.3);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .comment-core-layout {
            display: flex;
            gap: 12px;
            position: relative;
        }

        .quantum-avatar-frame {
            position: relative;
            width: 36px;
            height: 36px;
            flex-shrink: 0;
        }

        .quantum-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid var(--hologram-cyan);
            padding: 1px;
        }

        .user-status-node {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 8px;
            height: 8px;
            background: #00f2fe;
            border-radius: 50%;
            border: 1.5px solid var(--quantum-black);
        }

        .comment-body-cluster {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .meta-layer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .identity-badge {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .user-title-name {
            font-size: 12px;
            font-weight: 600;
            color: white;
            font-family: 'Montserrat', sans-serif;
        }

        .instagram-author-tag {
            font-family: 'Inter', sans-serif;
            font-size: 9px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.85);
            padding: 1px 6px;
            border-radius: 10px;
            letter-spacing: 0.3px;
        }

        /* ====== FIXED WHATSAPP STYLE TIMESTAMP ENGINE ====== */
        .comment-text-wrap {
            position: relative;
            display: block;
            padding-bottom: 6px; /* Bada fili madaidaci don 50% overlap */
        }

        .comment-text-payload {
            font-size: 12.5px;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.9);
            text-align: justify;
            display: inline-block;
            width: 100%;
            word-break: break-word;
        }

        .timestamp-quantum {
            font-size: 9px;
            color: var(--text-secondary);
            position: absolute;
            bottom: -2px; /* Yana zaunar da shi 50% a cikin layin rubutu, 50% a waje */
            right: 0;
            z-index: 5;
            line-height: 1;
            background: transparent;
        }

        .interaction-capsule-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 4px;
        }

        .micro-action-trigger {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .micro-action-trigger:hover {
            color: var(--hologram-gold);
        }

        .micro-action-trigger.liked i {
            color: #ff4757;
            animation: heartPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* ====== QUANTUM WINDOW FOR NESTED REPLIES ====== */
        .quantum-nested-replies {
            margin-top: 10px;
            padding-left: 14px;
            border-left: 1px dashed rgba(253, 224, 141, 0.2);
            display: none;
            max-height: 240px; 
            overflow-y: auto;
            scrollbar-width: none;
            scroll-behavior: smooth;
        }

        .quantum-nested-replies::-webkit-scrollbar {
            display: none;
        }

        .quantum-nested-replies.show {
            display: block;
        }

        /* VIEW MORE TRIGER LABEL STYLE */
        .view-more-trigger-btn {
            font-size: 11px;
            color: var(--hologram-cyan);
            background: transparent;
            border: none;
            cursor: pointer;
            margin-top: 8px;
            display: none;
            font-weight: 500;
            text-align: left;
            transition: color 0.2s;
        }

        .view-more-trigger-btn:hover {
            color: var(--hologram-gold);
        }

        /* ====== FULL SCREEN OVERLAY VIEW FOR DEEP REPLIES ====== */
        .fullscreen-replies-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 12, 22, 0.98);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: 200;
            padding: 20px;
            display: none;
            flex-direction: column;
            animation: slideUp 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .fullscreen-replies-overlay.active {
            display: flex;
        }

        .overlay-header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 15px;
        }

        .back-node-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .overlay-feed-body {
            flex-grow: 1;
            overflow-y: auto;
            scrollbar-width: none;
            padding-bottom: 20px;
        }

        .overlay-feed-body::-webkit-scrollbar {
            display: none;
        }

        /* ====== INPUT HARNESS ====== */
        .hologram-input-harness {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            margin-bottom: 5px;
            position: relative; 
            margin-top: auto;   
        }

        .current-user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--hologram-gold);
        }

        .hologram-text-field {
            flex-grow: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 12.5px;
            font-family: 'Inter', sans-serif;
            resize: none;
            word-break: break-word;
            max-height: 110px; 
            overflow-y: auto;
            line-height: 1.5;
            padding: 4px 0;
            scrollbar-width: none;
        }

        .hologram-text-field::-webkit-scrollbar {
            display: none;
        }

        .hologram-text-field::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .input-actions-cluster {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .utility-node-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .utility-node-btn:hover {
            color: var(--hologram-cyan);
        }

        .quantum-beam-send {
            background: linear-gradient(135deg, var(--hologram-gold), var(--premium-bronze));
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            color: #000;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(253, 224, 141, 0.4);
            transition: transform 0.2s;
        }

        /* ====== SMART FUTURISTIC AI POPUP MENU ====== */
        .ai-matrix-popup {
            position: absolute;
            bottom: 60px;
            right: 12px;
            background: rgba(15, 20, 35, 0.95);
            border: 1px solid var(--hologram-cyan);
            border-radius: 12px;
            padding: 6px;
            display: none;
            flex-direction: column;
            gap: 4px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        .ai-matrix-popup.visible {
            display: flex;
        }

        .ai-node-option {
            background: transparent;
            border: none;
            color: white;
            font-size: 11.5px;
            padding: 6px 12px;
            text-align: left;
            cursor: pointer;
            border-radius: 6px;
            white-space: nowrap;
            transition: background 0.2s;
        }

        .ai-node-option:hover {
            background: rgba(0, 242, 254, 0.15);
            color: var(--hologram-cyan);
        }

        @keyframes heartPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }


/* ====== QUANTUM CONSISTENT OVERLAY VIEW FOR REPLIES ====== */
.fullscreen-replies-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000000; /* An mayar da shi baki sosai */
    z-index: 200;
    padding: 15px;
    display: none;
    flex-direction: column;
    animation: slideUp 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
}

.fullscreen-replies-overlay.active {
    display: flex;
}

/* Siririyar futuristik header a sama */
.overlay-header {
    display: grid;
    grid-template-columns: 40px 1fr 40px;
    align-items: center;
    padding-bottom: 10px;
    margin-bottom: 15px;
    flex-shrink: 0;
}

.back-node-btn {
    background: transparent;
    border: none;
    color: var(--hologram-cyan);
    font-size: 18px;
    cursor: pointer;
    justify-self: start;
}

.node-title {
    color: #ffffff;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    margin: 0;
    font-family: 'Montserrat', sans-serif;
}

.overlay-feed-body {
    flex-grow: 1;
    overflow-y: auto;
    scrollbar-width: none;
    padding-bottom: 20px;
}

.overlay-feed-body::-webkit-scrollbar {
    display: none;
}


/* Tazarar replies daga hagu domin parent comment ya fi su tsawo */
.overlay-replies-holder {
    position: relative;
    padding-left: 0;
    margin-top: 10px;
}

/* Wannan zai ba kowane katin reply tazara daga hagu kamar na Facebook */
.overlay-feed-body .overlay-replies-holder .quantum-comment-card {
    margin-left: 35px; /* Tazara daga hagu */
    width: calc(100% - 35px); /* Rage tsawonsa domin ya daidaita */
    opacity: 1 !important;
    visibility: visible !important;
    display: block !important;
    margin-bottom: 12px;
}

/* Tabbatar cewa tsofaffin abubuwan basu fito ba a cikin overlay */
.overlay-feed-body .quantum-nested-replies,
.overlay-feed-body .view-more-trigger-btn {
    display: none !important;
}
        
        
        
        
    </style>
</head>
<body>

    <div class="nexus-comment-node">
        <div class="node-header">
            <div class="node-title">Comments</div>
        </div>

        
            <div class="comments-matrix-feed" id="matrixFeed">
            
            <div class="quantum-comment-card positive" id="comment-card-1">
                <div class="comment-core-layout">
                    <div class="quantum-avatar-frame">
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Kabir" class="quantum-avatar" alt="">
                        <div class="user-status-node"></div>
                    </div>
                    
                    <div class="comment-body-cluster">
                        <div class="meta-layer">
                            <div class="identity-badge">
                                <span class="user-title-name">Kabir Kano</span>
                            </div>
                            <!-- Timestamp ya koma can karshen dama daidai hoton 1000987203_2.jpg -->
                            <span class="timestamp-quantum" style="position: static; font-size: 10px;">2m</span>
                        </div>
                        <div class="comment-text-wrap">
                            <p class="comment-text-payload">Wannan tsarin ya dace da canjin zaman katin da muke bukata a Arewacin Najeriya. Tsarin UI din nan yana da matukar santsi!</p>
                        </div>
                        
                        <div class="interaction-capsule-bar">
                            <button class="micro-action-trigger" onclick="pulseLike(this)">
                                <i class="fa-regular fa-heart"></i> <span class="count">14</span>
                            </button>
                            <button class="micro-action-trigger" onclick="triggerReplyAction('Kabir Kano', 'reply-node-1')">
                                <i class="fa-regular fa-comment-dots"></i> <span>Reply</span>
                            </button>
                        </div>

                        <div class="quantum-nested-replies" id="reply-node-1" onscroll="handleDynamicVisibility(this)">
                            </div>
                        <button class="view-more-trigger-btn" id="viewMoreBtn-reply-node-1" onclick="launchFullScreenReplies('reply-node-1')">View more replies</button>

                    </div>
                </div>
            </div>

            <div class="quantum-comment-card" id="comment-card-2">
                <div class="comment-core-layout">
                    <div class="quantum-avatar-frame">
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Sadiya" class="quantum-avatar" alt="">
                    </div>
                    
                    <div class="comment-body-cluster">
                        <div class="meta-layer">
                            <div class="identity-badge">
                                <span class="user-title-name">Sadiya Barka</span>
                            </div>
                            <!-- Timestamp ya koma can karshen dama daidai hoton 1000987203_2.jpg -->
                            <span class="timestamp-quantum" style="position: static; font-size: 10px;">12m</span>
                        </div>
                        <div class="comment-text-wrap">
                            <p class="comment-text-payload">Ina son yadda kuka hada tsarin samun kudaden Oryzon Rewards a cikin menu na gefe.</p>
                        </div>
                        
                        <div class="interaction-capsule-bar">
                            <button class="micro-action-trigger" onclick="pulseLike(this)">
                                <i class="fa-regular fa-heart"></i> <span class="count">3</span>
                            </button>
                            <button class="micro-action-trigger" onclick="triggerReplyAction('Sadiya Barka', 'reply-node-2')">
                                <i class="fa-regular fa-comment-dots"></i> <span>Reply</span>
                            </button>
                        </div>

                        <div class="quantum-nested-replies" id="reply-node-2" onscroll="handleDynamicVisibility(this)"></div>
                        <button class="view-more-trigger-btn" id="viewMoreBtn-reply-node-2" onclick="launchFullScreenReplies('reply-node-2')">View more replies</button>
                    </div>
                </div>
            </div>

        </div>

        <div class="fullscreen-replies-overlay" id="fullscreenRepliesPanel">
            <div class="overlay-header">
                <button class="back-node-btn" onclick="closeFullScreenReplies()"><i class="fa-solid fa-arrow-left"></i></button>
                <div class="node-title" style="margin-top:0;">Replies</div>
            </div>
            <div class="overlay-feed-body" id="overlayFeedBody"></div>
        </div>

        <div class="ai-matrix-popup" id="aiMatrixMenu">
            <button class="ai-node-option" onclick="applyAiFeature('optimize')"><i class="fa-solid fa-wand-magic-sparkles"></i> Optimize Text</button>
            <button class="ai-node-option" onclick="applyAiFeature('translate')"><i class="fa-solid fa-language"></i> Translate to English</button>
            <button class="ai-node-option" onclick="applyAiFeature('clear')"><i class="fa-solid fa-trash-can"></i> Clear Text</button>
        </div>

        <div class="hologram-input-harness">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Sadiq" class="current-user-avatar" alt="Sadiq">
            <textarea class="hologram-text-field" id="nexusCommentInput" rows="1" placeholder="Add quantum contribution..."></textarea>
            <div class="input-actions-cluster">
                <button class="utility-node-btn" id="aiTriggerBtn" onclick="toggleAiMenu()"><i class="fa-solid fa-wand-magic-sparkles"></i></button>
                <button class="quantum-beam-send" onclick="injectComment()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        let targetReplyFeedId = null; 
        let activeReplyUser = ""; 
        let currentOpenContainerId = null;

        const commentInput = document.getElementById('nexusCommentInput');
        commentInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';

            if (targetReplyFeedId && !this.value.startsWith(`@${activeReplyUser}`)) {
                targetReplyFeedId = null;
                activeReplyUser = "";
            }
        });

        function triggerReplyAction(username, replyFeedId) {
            targetReplyFeedId = replyFeedId;
            activeReplyUser = username; 
            commentInput.value = `@${username} `;
            commentInput.focus();
            
            commentInput.style.height = 'auto';
            commentInput.style.height = commentInput.scrollHeight + 'px';

            const replyContainer = document.getElementById(replyFeedId);
            if (replyContainer && !replyContainer.classList.contains('show')) {
                replyContainer.classList.add('show');
            }

            if (window.navigator.vibrate) window.navigator.vibrate(15);
        }

        
    
        
        function launchFullScreenReplies(containerId) {
    currentOpenContainerId = containerId;
    const sourceContainer = document.getElementById(containerId);
    const parentCard = sourceContainer.closest('.quantum-comment-card');
    const overlay = document.getElementById('fullscreenRepliesPanel');
    const overlayBody = document.getElementById('overlayFeedBody');
    
    // 1. DAUKO BAYANAN PARENT COMMENT
    const parentAvatar = parentCard.querySelector('.quantum-avatar').src;
    const parentName = parentCard.querySelector('.user-title-name').innerText;
    const parentText = parentCard.querySelector('.comment-text-payload').innerText;
    const parentTime = parentCard.querySelector('.timestamp-quantum').innerText;
    
    const isPositive = parentCard.classList.contains('positive') ? 'positive' : '';
    const isAlert = parentCard.classList.contains('alert') ? 'alert' : '';

    // Gina Parent Comment (Timestamp dinsa yana nan a sama kamar yadda yake)
    let overlayHTML = `
        <div class="quantum-comment-card ${isPositive} ${isAlert}">
            <div class="comment-core-layout">
                <div class="quantum-avatar-frame">
                    <img src="${parentAvatar}" class="quantum-avatar">
                </div>
                <div class="comment-body-cluster">
                    <div class="meta-layer">
                        <div class="identity-badge">
                            <span class="user-title-name">${parentName}</span>
                        </div>
                        <span class="timestamp-quantum" style="position: static; font-size: 10px;">${parentTime}</span>
                    </div>
                    <div class="comment-text-wrap" style="padding-bottom: 0;">
                        <p class="comment-text-payload">${parentText}</p>
                    </div>
                    <div class="interaction-capsule-bar" style="margin-top: 5px;">
                        <button class="micro-action-trigger" onclick="pulseLike(this)">
                            <i class="fa-regular fa-heart"></i> <span class="count">0</span>
                        </button>
                        <button class="micro-action-trigger" onclick="triggerReplyAction('${parentName}', '${containerId}')">
                            <i class="fa-regular fa-comment-dots"></i> <span>Reply</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="overlay-replies-holder">
    `;

    // 2. DAUKO DUKKAN REPLIES MASU TSARIN PREVIOUS PAGE (Flat & Consistent)
    const replies = sourceContainer.querySelectorAll('.quantum-comment-card');
    
    replies.forEach(reply => {
        // Muna kwaso ainihin innerHTML na katin reply dinka domin kiyaye daidaiton timestamp 100%
        let replyContent = reply.innerHTML;
        
        overlayHTML += `
            <div class="quantum-comment-card">
                ${replyContent}
            </div>
        `;
    });

    overlayHTML += `</div>`;

    // 3. TURA AKWATIN CIKIN PANEL SANNAN A GYARA INTERACTION ACTIONS
    overlayBody.innerHTML = overlayHTML;
    
    // Gyara dukkan Reply buttons na cikin overlay din su dinga aiki daidai zuwa babban input field
    const overlayReplyButtons = overlayBody.querySelectorAll('.overlay-replies-holder .micro-action-trigger');
    overlayReplyButtons.forEach(btn => {
        if (btn.innerText.includes('Reply') || btn.querySelector('.fa-comment-dots')) {
            const card = btn.closest('.quantum-comment-card');
            const rName = card.querySelector('.user-title-name').innerText;
            
            // Sanya masa ainihin trigger action dinka na asali
            btn.setAttribute('onclick', `triggerReplyAction('${rName}', '${containerId}')`);
        }
    });

    overlay.classList.add('active');
    if (window.navigator.vibrate) window.navigator.vibrate(25);
        }
        
            
    

        function checkReplyCountAndTrigger(containerId) {
            const container = document.getElementById(containerId);
            const viewMoreBtn = document.getElementById(`viewMoreBtn-${containerId}`);
            if(!container || !viewMoreBtn) return;

            const cardsCount = container.querySelectorAll('.quantum-comment-card').length;
            if(cardsCount >= 5) {
                viewMoreBtn.style.display = 'block';
            } else {
                viewMoreBtn.style.display = 'none';
            }
        }

        function handleDynamicVisibility(container) {
            const cards = container.querySelectorAll('.quantum-comment-card');
            if (cards.length <= 3) {
                cards.forEach(card => {
                    card.style.opacity = '1';
                    card.style.visibility = 'visible';
                });
                return;
            }

            const containerTop = container.scrollTop;
            const containerBottom = containerTop + container.clientHeight;

            cards.forEach(card => {
                const cardTop = card.offsetTop - container.offsetTop;
                const cardBottom = cardTop + card.clientHeight;

                if (cardBottom >= containerTop - 2 && cardTop <= containerBottom + 2) {
                    card.style.opacity = '1';
                    card.style.visibility = 'visible';
                } else {
                    card.style.opacity = '0';
                    card.style.visibility = 'hidden';
                }
            });
        }

        function toggleAiMenu() {
            const menu = document.getElementById('aiMatrixMenu');
            menu.classList.toggle('visible');
        }

        function applyAiFeature(action) {
            const currentText = commentInput.value.trim();
            const menu = document.getElementById('aiMatrixMenu');
            menu.classList.remove('visible');

            if (action === 'clear') {
                commentInput.value = '';
                targetReplyFeedId = null;
                activeReplyUser = "";
            } else if (action === 'optimize' && currentText) {
                commentInput.value = currentText + " ✨ [Optimized via Nexus AI]";
            } else if (action === 'translate' && currentText) {
                commentInput.value = "AI Translation: " + currentText + " (Processed)";
            }

            commentInput.style.height = 'auto';
            commentInput.style.height = commentInput.scrollHeight + 'px';
            commentInput.focus();
        }

        function pulseLike(btn) {
            btn.classList.toggle('liked');
            const icon = btn.querySelector('i');
            const countSpan = btn.querySelector('.count');
            let currentCount = parseInt(countSpan.innerText);

            if (btn.classList.contains('liked')) {
                icon.className = 'fa-solid fa-heart';
                countSpan.innerText = currentCount + 1;
                if (window.navigator.vibrate) window.navigator.vibrate([20, 10, 20]);
            } else {
                icon.className = 'fa-regular fa-heart';
                countSpan.innerText = currentCount - 1;
            }
        }

        function injectComment() {
            const feedContainer = document.getElementById('matrixFeed');
            const commentText = commentInput.value.trim();

            if (!commentText) return;

            let sentimentClass = "";
            if(commentText.includes("murna") || commentText.includes("kyau") || commentText.includes("santsi") || commentText.includes("da kyau")) {
                sentimentClass = "positive";
            }

            const uniqueId = 'reply-node-' + Date.now();

            if (targetReplyFeedId) {
                const targetFeed = document.getElementById(targetReplyFeedId);
                const replyHTML = `
                    <div class="quantum-comment-card">
                        <div class="comment-core-layout">
                            <div class="quantum-avatar-frame" style="width: 26px; height: 26px;">
                                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Sadiq" class="quantum-avatar" alt="">
                            </div>
                            <div class="comment-body-cluster">
                                <div class="meta-layer">
                                    <div class="identity-badge">
                                        <span class="user-title-name" style="font-size: 11px;">Sadiq Alhassan</span>
                                        <span class="instagram-author-tag" style="font-size: 7.5px;">Author</span>
                                    </div>
                                </div>
                                <div class="comment-text-wrap">
                                    <p class="comment-text-payload" style="font-size: 11.5px;">${commentText}</p>
                                    <span class="timestamp-quantum">Just now</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                targetFeed.insertAdjacentHTML('beforeend', replyHTML);
                
                commentInput.value = `@${activeReplyUser} `; 
                handleDynamicVisibility(targetFeed);
                checkReplyCountAndTrigger(targetReplyFeedId);

                // Idan panel overlay din yana bude, mu sabunta shi live
                if (currentOpenContainerId === targetReplyFeedId) {
                    launchFullScreenReplies(targetReplyFeedId);
                }

                targetFeed.scrollTop = targetFeed.scrollHeight; 
            } else {
                const commentHTML = `
                    <div class="quantum-comment-card ${sentimentClass}">
                        <div class="comment-core-layout">
                            <div class="quantum-avatar-frame">
                                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Sadiq" class="quantum-avatar" alt="">
                                <div class="user-status-node" style="background: #50fa7b;"></div>
                            </div>
                            <div class="comment-body-cluster">
                                
                                                               <div class="meta-layer">
                                    <div class="identity-badge">
                                        <span class="user-title-name">Sadiq Alhassan</span>
                                        <span class="instagram-author-tag">Author</span>
                                    </div>
                                    <span class="timestamp-quantum" style="position: static; font-size: 10px;">Just now</span>
                                </div>
                                <div class="comment-text-wrap" style="padding-bottom: 0;">
                                    <p class="comment-text-payload">${commentText}</p>
                                </div>
                                
                                
                                
                                <div class="interaction-capsule-bar">
                                    <button class="micro-action-trigger" onclick="pulseLike(this)">
                                        <i class="fa-regular fa-heart"></i> <span class="count">0</span>
                                    </button>
                                    <button class="micro-action-trigger" onclick="triggerReplyAction('Sadiq Alhassan', '${uniqueId}')">
                                        <i class="fa-regular fa-comment-dots"></i> <span>Reply</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="quantum-nested-replies" id="${uniqueId}" onscroll="handleDynamicVisibility(this)" style="margin-left: 48px;"></div>
                        <button class="view-more-trigger-btn" id="viewMoreBtn-${uniqueId}" onclick="launchFullScreenReplies('${uniqueId}')" style="margin-left: 48px;">View more replies</button>
                    </div>
                `;
                feedContainer.insertAdjacentHTML('beforeend', commentHTML);
                commentInput.value = "";
            }

            commentInput.style.height = 'auto'; 
            feedContainer.scrollTop = feedContainer.scrollHeight;

            if (window.navigator.vibrate) window.navigator.vibrate(30);
        }

        commentInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault(); 
                injectComment();
            }
        });

        document.addEventListener('click', function(e) {
            const menu = document.getElementById('aiMatrixMenu');
            const btn = document.getElementById('aiTriggerBtn');
            if (!menu.contains(e.target) && !btn.contains(e.target)) {
                menu.classList.remove('visible');
            }
        });

        // Setup baseline seed replies don gwajin lissafi
        window.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('reply-node-1');
            let baselineHTML = '';
            for(let i=1; i<=6; i++) {
                baselineHTML += `
                    <div class="quantum-comment-card">
                        <div class="comment-core-layout">
                            <div class="quantum-avatar-frame" style="width: 26px; height: 26px;">
                                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=user${i}" class="quantum-avatar">
                            </div>
                            <div class="comment-body-cluster">
                                <div class="meta-layer"><span class="user-title-name" style="font-size: 11px;">Nested User ${i}</span></div>
                                <div class="comment-text-wrap">
                                    <p class="comment-text-payload" style="font-size: 11.5px;">Wannan shi ne reply na ${i} da ke tabbatar da lissafin mu.</p>
                                    <span class="timestamp-quantum">${i}m</span>
                                </div>
                            </div>
                        </div>
                    </div>`;
            }
            container.innerHTML = baselineHTML;
            container.classList.add('show');
            handleDynamicVisibility(container);
            checkReplyCountAndTrigger('reply-node-1');
        });
    </script>
</body>
</html>
