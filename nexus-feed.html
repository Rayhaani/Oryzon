<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus 2050 Holographic Matrix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --quantum-bg: #020202;
            --card-base: #0a0a0a;
            --glass-core: rgba(255, 255, 255, 0.03);
            --active-glow: rgba(255, 215, 0, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #8a8a8a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        
            body {
    background-color: var(--quantum-bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow-x: hidden;
}

.hologram-grid-canvas {
    perspective: 1000px;
}
            

        .nexus-2050-wrapper {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: var(--quantum-bg);
            min-height: 100vh;
            position: relative;
            padding-bottom: 80px;
        }

        /* ===== HEADER ===== */
        .neural-header {
            padding: 14px;
            position: sticky;
            top: 0;
            background: rgba(2, 2, 2, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 5000;
        }
        .neural-search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 12px 18px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.02);
        }
        .neural-search-box i {
            color: var(--text-secondary);
            margin-right: 12px;
            font-size: 15px;
        }
        .neural-search-box input {
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            width: 100%;
            font-size: 15px;
            letter-spacing: 0.3px;
        }

        /* ===== GRID ===== */
        .hologram-grid-canvas {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            padding: 4px;
        }

        .quantum-tile {
            position: relative;
            background: var(--card-base);
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 1 / 1.45;
            cursor: pointer;
            border: 1px solid var(--glass-core);
            transform-style: preserve-3d;
            transition: transform 0.1s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .quantum-tile:hover {
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .quantum-tile img,
        .quantum-tile video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            transition: transform 0.3s ease;
        }

        .quantum-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 50%);
            display: flex;
            align-items: flex-end;
            padding: 10px;
            z-index: 5;
        }

        .quantum-badge {
            color: #ffffff;
            font-size: 12.5px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .video-indicator {
            position: absolute;
            top: 8px; right: 8px;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center;
            z-index: 6;
            font-size: 10px;
            color: #fff;
        }

        .quantum-skeleton {
            background: linear-gradient(90deg, #0a0a0a 25%, #141414 50%, #0a0a0a 75%);
            background-size: 200% 100%;
            animation: skeletonShimmer 1.5s infinite;
            border-radius: 8px;
            aspect-ratio: 1 / 1.45;
        }

        @keyframes skeletonShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .hidden-neural-payload { display: none; }

        /* ===== IMMERSIVE FIX — EXPLORE PAGE ONLY ===== */
#nexus-immersive-card {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100vw !important;
    height: 100dvh !important;
    z-index: 8000 !important;
    background: #000 !important;
    overflow: hidden !important;
}

#nexus-immersive-card .post-card {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100vw !important;
    height: 100dvh !important;
    z-index: 8001 !important;
    border-radius: 0 !important;
    margin: 0 !important;
}
        
    </style>
</head>
<body>

<div class="nexus-2050-wrapper">
    <div class="neural-header">
        <div class="neural-search-box">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            <input type="text" placeholder="Search With Neural AI..." readonly />
        </div>
    </div>

    <div class="hologram-grid-canvas" id="quantumGrid">
        <div class="quantum-skeleton"></div>
        <div class="quantum-skeleton"></div>
        <div class="quantum-skeleton"></div>
        <div class="quantum-skeleton"></div>
        <div class="quantum-skeleton"></div>
        <div class="quantum-skeleton"></div>
    </div>


<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    // ===== FIREBASE =====
    const firebaseConfig = {
        apiKey: "AIzaSyDExSOnFbN-wJbT1UFgB-kBs37bEa3KiWc",
        authDomain: "oryzon-50ea4.firebaseapp.com",
        projectId: "oryzon-50ea4",
        storageBucket: "oryzon-50ea4.firebasestorage.app",
        messagingSenderId: "782106742622",
        appId: "1:782106742622:web:902d512bfe42dd4cf289cf",
        measurementId: "G-K5085DLL2W"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const currentUser = localStorage.getItem('nexus_user_session');
    if (!currentUser) window.location.href = 'login.html';

     
function openImmersiveFromGrid(index) {
    const post = allPosts[index];
    if (!post) return;

    const existing = document.getElementById('nexus-immersive-card');
    if (existing) existing.remove();

    if (typeof generatePostHTML !== 'function') return;

    const wrapper = document.createElement('div');
    wrapper.id = 'nexus-immersive-card';
    wrapper.innerHTML = generatePostHTML(post);
    document.body.appendChild(wrapper);

    const card = wrapper.querySelector('.post-card');
    if (!card) return;

    const footer = document.getElementById('instaFooter');

    // ===== GYARAN SCROLL NA GASKIYA =====
    // Maimakon mu canza body ya koma fixed (wanda ke janyo matsalar rabon hoto),
    // Zamu kulle tsayin body ne kawai sannan mu boye scrollbar din.
    const scrollY = window.scrollY; 
    document.documentElement.style.overflow = 'hidden';
    document.body.style.overflow = 'hidden';

    card.classList.add('immersive-mode');
    card.style.height = '100dvh';
    if (footer) footer.classList.add('footer-hidden');

    // Fix hoto ya cika screen (An saka top: 0 da left: 0 don kada scroll na baya ya shafe shi)
    const img = card.querySelector('img.post-media');
    if (img) {
        img.style.cssText = `
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            width: 100vw !important; height: 100vh !important;
            object-fit: cover !important;
            border-radius: 0 !important;
            z-index: 4999 !important;
            margin: 0 !important;
        `;
    }

    // Fix video ya cika screen
    const video = card.querySelector('video');
    if (video) {
        video.style.cssText = `
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            width: 100vw !important; height: 100vh !important;
            object-fit: cover !important;
            border-radius: 0 !important;
            z-index: 4999 !important;
            margin: 0 !important;
        `;
        video.muted = false;
        video.play().catch(()=>{});
    }

    // Back button
    const backBtn = document.createElement('div');
    backBtn.className = 'immersive-back-btn';
    backBtn.innerHTML = `<i class="fa-solid fa-chevron-left"></i>`;
    backBtn.style.cssText = `
        position: fixed; top: 15px; left: 15px;
        width: 36px; height: 36px;
        background: rgba(0,0,0,0.6); border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        color: white; font-size: 16px;
        z-index: 9999; cursor: pointer;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.3);
    `;
    backBtn.onclick = function(e) {
    e.stopPropagation();
    card.classList.remove('immersive-mode');
    if (footer) footer.classList.remove('footer-hidden');
    backBtn.remove();
    if (img) img.style.cssText = '';
    if (video) { video.style.cssText = ''; video.pause(); }

    // Maida scroll
    document.documentElement.style.overflow = '';
    document.body.style.overflow = '';
    window.scrollTo(0, scrollY);

    card.style.height = '';

        setTimeout(() => wrapper.remove(), 300);
    };
    document.body.appendChild(backBtn);

    // Back button na browser
    history.pushState({ immersive: true }, '');
    window.onpopstate = function() {
        backBtn.click();
        window.onpopstate = null;
    };
}
    
    
    
    // ===== GLOW PALETTE =====
    const glowPalette = [
        'rgba(255, 115, 0, 0.6)',
        'rgba(0, 191, 255, 0.6)',
        'rgba(186, 85, 211, 0.6)',
        'rgba(255, 0, 60, 0.6)',
        'rgba(255, 215, 0, 0.6)',
        'rgba(0, 230, 118, 0.6)',
        'rgba(255, 64, 129, 0.6)',
        'rgba(0, 229, 255, 0.6)',
    ];
    function getGlow(i) { return glowPalette[i % glowPalette.length]; }

    function formatTime(ts) {
        if (!ts) return '';
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        const diff = Math.floor((Date.now() - d) / 1000);
        if (diff < 60) return 'just now';
        if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
        if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
        return Math.floor(diff / 86400) + 'd ago';
    }

    function formatCount(n) {
        n = parseInt(n) || 0;
        if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
        if (n >= 1000) return (n/1000).toFixed(1) + 'K';
        return n.toString();
    }

    // ===== DATA =====
    let allPosts = [];
    let activeVideoTiles = new Map(); // tile el => IntersectionObserver entry

    window.addEventListener('DOMContentLoaded', () => {
        db.collection('posts')
            .orderBy('timestamp', 'desc')
            .limit(30)
            .onSnapshot(snap => {
                allPosts = [];
                snap.forEach(doc => allPosts.push({ id: doc.id, ...doc.data() }));
                renderGrid();
            }, err => {
                console.error('Firebase error:', err);
                renderGrid();
            });
    });

    
    // ===== RENDER GRID =====
function renderGrid() {
    const grid = document.getElementById('quantumGrid');

    if (allPosts.length === 0) {
        grid.innerHTML = `<div class="empty-state">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            <p>No posts yet in the matrix</p>
        </div>`;
        return;
    }

    grid.innerHTML = allPosts.map((post, index) => {
        const avatar = post.userProfilePic || `https://api.dicebear.com/7.x/bottts/svg?seed=${post.username}`;
        const likes = formatCount(post.likes || 0);
        const isVideo = post.mediaType === 'video';

        let mediaHTML = '';
        if (post.mediaUrl) {
            if (isVideo) {
                mediaHTML = `<video 
                    src="${post.mediaUrl}" 
                    muted loop playsinline 
                    preload="metadata"
                    class="grid-video">
                </video>
                <div class="video-indicator"><i class="fa-solid fa-play"></i></div>`;
            } else {
                mediaHTML = `<img src="${post.mediaUrl}" loading="lazy" alt="">`;
            }
        } else {
            mediaHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:12px;background:linear-gradient(145deg,#0d0d0d,#1a1a1a);">
                <p style="font-size:11px;color:rgba(255,255,255,0.7);text-align:center;line-height:1.4;">${(post.content||'').substring(0,60)}${post.content&&post.content.length>60?'...':''}</p>
            </div>`;
        }

        return `
        <div class="quantum-tile"
            data-index="${index}"
            onmousemove="runParallaxEngine(event,this)"
            onmouseleave="resetParallaxEngine(this)"
            onclick="openImmersiveFromGrid(${index})">
            ${mediaHTML}
            <div class="quantum-overlay">
                <div class="quantum-badge">
                    <i class="fa-solid fa-bolt"></i>
                    <span>${likes}</span>
                </div>
            </div>
            <div class="hidden-neural-payload"
                data-post-id="${post.id}"
                data-user="${post.username||'unknown'}"
                data-avatar="${avatar}"
                data-caption="${(post.content||'').replace(/"/g,'&quot;')}"
                data-glow="${getGlow(index)}"
                data-time="${formatTime(post.timestamp)}"
                data-likes="${post.likes||0}"
                data-comments="${post.commentCount||0}"
                data-media-url="${post.mediaUrl||''}"
                data-media-type="${post.mediaType||'image'}">
            </div>
        </div>`;
    }).join('');

    setupVideoAutoPlay();
    
        // Load real avatars
        allPosts.forEach(post => {
            if (!post.username) return;
            db.collection('users').doc(post.username).get().then(userDoc => {
                if (!userDoc.exists) return;
                const pic = userDoc.data().userProfilePic;
                if (!pic) return;
                document.querySelectorAll('.quantum-tile').forEach(tile => {
                    const payload = tile.querySelector('.hidden-neural-payload');
                    if (payload && payload.dataset.user === post.username) {
                        payload.dataset.avatar = pic;
                    }
                });
            }).catch(()=>{});
        });
    }

    // ===== AUTO PLAY VIDEOS (IntersectionObserver — kamar Instagram) =====
    let videoObserver = null;
    
    function setupVideoAutoPlay() {
        if (videoObserver) videoObserver.disconnect();

        videoObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target;
                if (entry.isIntersecting && entry.intersectionRatio >= 0.5) {
                    video.play().catch(()=>{});
                } else {
                    video.pause();
                    video.currentTime = 0;
                }
            });
        }, {
            threshold: [0, 0.5, 1.0],
            rootMargin: '0px'
        });

        document.querySelectorAll('.grid-video').forEach(video => {
            videoObserver.observe(video);
        });
    }

    // ===== PARALLAX =====
    function runParallaxEngine(event, tile) {
        const bb = tile.getBoundingClientRect();
        const ax = event.clientX - bb.left - bb.width/2;
        const ay = event.clientY - bb.top - bb.height/2;
        tile.style.transform = `rotateX(${-(ay/(bb.height/2))*14}deg) rotateY(${(ax/(bb.width/2))*14}deg) scale(1.03)`;
        const g = tile.querySelector('img, video');
        if (g) g.style.transform = `scale(1.08) translateX(${-ax*0.06}px) translateY(${-ay*0.06}px)`;
    }
    function resetParallaxEngine(tile) {
        tile.style.transform = '';
        const g = tile.querySelector('img, video');
        if (g) g.style.transform = '';
    }
</script>     
    
<script src="post-card-template.js"></script>
<script src="grid-immersive-scroll.js"></script>
</body>
</html>
