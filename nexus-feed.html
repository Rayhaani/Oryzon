<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Explore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --quantum-bg: #020202;
            --card-base: #0a0a0a;
            --premium-gold: #fde08d;
            --deep-gold: #b8860b;
            --text-sec: #8a8a8a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--quantum-bg);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
        }

        /* ===== WRAPPER ===== */
        .nexus-wrapper {
            width: 100%; max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            padding-bottom: 70px;
        }

        /* ===== HEADER ===== */
        .neural-header {
            padding: 12px 14px;
            position: sticky; top: 0;
            background: rgba(2,2,2,0.9);
            backdrop-filter: blur(24px);
            z-index: 500;
        }
        .neural-search-box {
            display: flex; align-items: center;
            background: rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 11px 16px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .neural-search-box i { color: var(--text-sec); margin-right: 10px; font-size: 14px; }
        .neural-search-box input {
            background: transparent; border: none; outline: none;
            color: #fff; width: 100%; font-size: 14px;
        }

        /* ===== GRID ===== */
        .hologram-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px; padding: 3px;
        }
        .q-tile {
            position: relative;
            background: var(--card-base);
            border-radius: 6px;
            overflow: hidden;
            aspect-ratio: 1 / 1.45;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.03);
            transform-style: preserve-3d;
            transition: transform 0.1s ease;
        }
        .q-tile img, .q-tile video {
            width: 100%; height: 100%;
            object-fit: cover; pointer-events: none;
        }
        .q-tile-overlay {
            position: absolute; bottom: 0; left: 0;
            width: 100%; padding: 8px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            display: flex; align-items: flex-end; z-index: 3;
        }
        .q-tile-badge {
            display: flex; align-items: center; gap: 4px;
            font-size: 11.5px; font-weight: 700; color: #fff;
        }
        .q-tile-badge i { font-size: 10px; color: var(--premium-gold); }
        .video-pip {
            position: absolute; top: 7px; right: 7px;
            background: rgba(0,0,0,0.55);
            border-radius: 50%; width: 22px; height: 22px;
            display: flex; align-items: center; justify-content: center;
            z-index: 4; font-size: 9px; color: #fff;
        }
        .q-payload { display: none; }

        /* Skeleton */
        .q-skeleton {
            background: linear-gradient(90deg, #0a0a0a 25%, #141414 50%, #0a0a0a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 6px;
            aspect-ratio: 1 / 1.45;
        }
        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ===== IMMERSIVE MODE — EXACT COPY of social.html toggleImmersive style ===== */

        /* The post-card when in immersive */
        .post-card {
            display: none; /* hidden by default in explore — only shown when immersive */
        }

        /* Immersive container */
        #immersiveContainer {
            display: none;
        }
        #immersiveContainer.active {
            display: block;
        }

        /* THE ACTUAL CARD — matches social.html post-card.immersive-mode exactly */
        .im-card {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 8000;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
        }

        /* Media — fills entire screen, behind everything */
        .im-card .im-media {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0;
            background: #000;
        }
        .im-card .im-media img,
        .im-card .im-media video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Gradient over media bottom — for text readability */
        .im-card .im-grad {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 65%;
            background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* Back button — top left */
        .im-card .im-back {
            position: absolute;
            top: 15px; left: 15px;
            width: 36px; height: 36px;
            background: rgba(0,0,0,0.55);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 16px;
            z-index: 10; cursor: pointer;
            backdrop-filter: blur(10px);
        }

        /* Nav arrows — top right */
        .im-card .im-nav {
            position: absolute;
            top: 15px; right: 15px;
            display: flex; flex-direction: column; gap: 8px;
            z-index: 10;
        }
        .im-card .im-nav-btn {
            width: 32px; height: 32px;
            background: rgba(0,0,0,0.55);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 11px;
            cursor: pointer; backdrop-filter: blur(8px);
            transition: opacity 0.2s;
        }
        .im-card .im-nav-btn.hide { opacity: 0; pointer-events: none; }

        /* Counter — top center */
        .im-card .im-counter {
            position: absolute;
            top: 18px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.45);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px; padding: 4px 12px;
            font-size: 11px; color: rgba(255,255,255,0.72);
            z-index: 10; white-space: nowrap;
        }

        /* Bottom content — overlays on top of media */
        .im-card .im-bottom {
            position: relative;
            z-index: 5;
            padding: 0 0 22px;
        }

        /* POST HEADER row — avatar + username + follow + gift + dots */
        .im-card .im-post-header {
            display: flex;
            align-items: center;
            padding: 0 15px 0 52px;
            height: 46px;
            position: relative;
            margin-bottom: 0;
        }
        .im-card .im-avatar {
            position: absolute;
            left: 0px; top: 0px;
            width: 42px; height: 42px;
            border-radius: 50%;
            border: 1.5px solid var(--premium-gold);
            object-fit: cover;
            z-index: 10;
        }
        .im-card .im-user-info {
            flex: 1;
            display: flex; flex-direction: column; justify-content: center;
        }
        .im-card .im-username-row {
            display: flex; align-items: center; gap: 4px;
        }
        .im-card .im-username {
            font-size: 15px; font-weight: 800; color: #fff;
        }
        .im-card .im-time {
            font-size: 9px; font-weight: 700;
            color: rgba(255,255,255,0.45);
            margin-top: 2px; display: block;
        }
        .im-card .im-actions-right {
            display: flex; align-items: center; gap: 8px;
        }
        .im-card .im-follow-btn {
            padding: 5px 14px;
            border: 1.5px solid var(--premium-gold);
            border-radius: 50px;
            background: rgba(255,255,255,0.06);
            color: var(--premium-gold);
            font-size: 10px; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }
        .im-card .im-follow-btn.following {
            background: var(--premium-gold); color: #000;
        }
        .im-card .im-gift-btn {
            display: flex; align-items: center; gap: 4px;
            background: linear-gradient(145deg,#1a1a1a,#0d0d0d);
            border: 1px solid rgba(253,224,141,0.25);
            border-radius: 8px; padding: 5px 9px;
            font-size: 10px; color: #fff; cursor: pointer;
        }
        .im-card .im-dots {
            display: flex; align-items: center; gap: 2.5px;
            cursor: pointer; padding: 4px;
        }
        .im-card .im-dot {
            width: 4px; height: 4px; border-radius: 50%;
            background: rgba(255,255,255,0.5);
        }

        /* Caption */
        .im-card .im-caption {
            padding: 6px 15px 12px;
            font-size: 13.5px; color: rgba(255,255,255,0.88);
            line-height: 1.5;
        }

        /* Interaction bar — pill exactly like social.html */
        .im-card .im-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8px;
            gap: 6px;
        }
        .im-card .im-capsules {
            display: flex; gap: 4px;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px; padding: 3px;
            backdrop-filter: blur(16px);
        }
        .im-card .im-cap {
            display: flex; align-items: center; gap: 5px;
            padding: 6px 11px; border-radius: 50px;
            height: 32px; cursor: pointer; color: #fff;
            transition: background 0.15s;
        }
        .im-card .im-cap:active { background: rgba(255,255,255,0.1); }
        .im-card .im-cap i { font-size: 15px; color: #fff; }
        .im-card .im-cap span { font-size: 11px; font-weight: 600; color: #fff; }
        .im-card .im-cap.liked i { color: #ff4d6d !important; }
        .im-card .im-cap.liked.fa-solid { color: #ff4d6d !important; }

        .im-card .im-save-wrap {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px; padding: 3px;
            backdrop-filter: blur(16px);
        }
        .im-card .im-save-cap {
            display: flex; align-items: center; gap: 5px;
            padding: 6px 13px; height: 32px;
            border-radius: 50px; cursor: pointer; color: #fff;
        }
        .im-card .im-save-cap i { font-size: 14px; }
        .im-card .im-save-cap span { font-size: 11px; font-weight: 600; }

        /* Slide animations */
        @keyframes slideFromBottom {
            from { transform: translateY(60px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        @keyframes slideFromTop {
            from { transform: translateY(-60px); opacity: 0; }
            to   { transform: translateY(0);     opacity: 1; }
        }
        .slide-up   { animation: slideFromBottom 0.28s cubic-bezier(0.34,1.2,0.64,1) forwards; }
        .slide-down { animation: slideFromTop    0.28s cubic-bezier(0.34,1.2,0.64,1) forwards; }

        video::-webkit-media-controls { display: none !important; }

        /* ===== FOOTER NAV ===== */
        .bottom-nav {
            position: fixed; bottom: 0;
            left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 500px;
            height: 58px;
            background: rgba(2,2,2,0.92);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 400; backdrop-filter: blur(12px);
        }
        .nav-item { color: #fff; font-size: 20px; opacity: 0.3; cursor: pointer; }
        .nav-item.active { opacity: 1; }

        .empty-state {
            grid-column: 1/-1; text-align: center;
            padding: 50px 20px; color: var(--text-sec);
        }
        .empty-state i { font-size: 36px; opacity: 0.25; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="nexus-wrapper">

        <!-- Nav arrows -->
        <div class="im-nav">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// ===== FIREBASE =====
const firebaseConfig = {
    apiKey: "AIzaSyDExSOnFbN-wJbT1UFgB-kBs37bEa3KiWc",
    authDomain: "oryzon-50ea4.firebaseapp.com",
    projectId: "oryzon-50ea4",
    storageBucket: "oryzon-50ea4.firebasestorage.app",
    messagingSenderId: "782106742622",
    appId: "1:782106742622:web:902d512bfe42dd4cf289cf"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const currentUser = localStorage.getItem('nexus_user_session');
if (!currentUser) location.href = 'login.html';

// ===== HELPERS =====
function fmtTime(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const s = Math.floor((Date.now() - d) / 1000);
    if (s < 60) return 'just now';
    if (s < 3600) return Math.floor(s/60) + 'm ago';
    if (s < 86400) return Math.floor(s/3600) + 'h ago';
    return Math.floor(s/86400) + 'd ago';
}
function fmtNum(n) {
    n = parseInt(n)||0;
    if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
    if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
    return ''+n;
}

// ===== DATA =====
let allPosts = [];
let vidObs = null;

window.addEventListener('DOMContentLoaded', () => {
    db.collection('posts')
        .orderBy('timestamp','desc')
        .limit(30)
        .onSnapshot(snap => {
            allPosts = [];
            snap.forEach(doc => allPosts.push({ id: doc.id, ...doc.data() }));
            renderGrid();
        }, () => renderGrid());
});

// ===== RENDER GRID =====
function renderGrid() {
    const grid = document.getElementById('quantumGrid');
    if (!allPosts.length) {
        grid.innerHTML = `<div class="empty-state">
            <i class="fa-solid fa-wand-magic-sparkles"></i><p>No posts yet</p>
        </div>`;
        return;
    }
    grid.innerHTML = allPosts.map((post, i) => {
        const avatar = post.userProfilePic || `https://api.dicebear.com/7.x/bottts/svg?seed=${post.username}`;
        const isVid = post.mediaType === 'video';
        let media = '';
        if (post.mediaUrl) {
            media = isVid
                ? `<video src="${post.mediaUrl}" muted loop playsinline preload="metadata" class="gvid"></video>
                   <div class="video-pip"><i class="fa-solid fa-play"></i></div>`
                : `<img src="${post.mediaUrl}" loading="lazy" alt="">`;
        } else {
            media = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;
                padding:10px;background:linear-gradient(145deg,#0d0d0d,#1a1a1a);">
                <p style="font-size:10px;color:rgba(255,255,255,0.65);text-align:center;line-height:1.4;">
                ${(post.content||'').slice(0,55)}${(post.content||'').length>55?'...':''}</p></div>`;
        }
        return `<div class="q-tile" data-i="${i}"
            onmousemove="tilt(event,this)" onmouseleave="untilt(this)"
            onclick="openIm(${i})">
            ${media}
            <div class="q-tile-overlay">
                <div class="q-tile-badge">
                    <i class="fa-solid fa-bolt"></i>
                    <span>${fmtNum(post.likes||0)}</span>
                </div>
            </div>
            <div class="q-payload" style="display:none"
                data-id="${post.id}"
                data-user="${post.username||'unknown'}"
                data-avatar="${avatar}"
                data-caption="${(post.content||'').replace(/"/g,'&quot;')}"
                data-time="${fmtTime(post.timestamp)}"
                data-likes="${post.likes||0}"
                data-comments="${post.commentCount||0}"
                data-url="${post.mediaUrl||''}"
                data-type="${post.mediaType||'image'}">
            </div>
        </div>`;
    }).join('');

    setupGridVids();

    // Real avatars
    allPosts.forEach(post => {
        if (!post.username) return;
        db.collection('users').doc(post.username).get().then(d => {
            if (!d.exists) return;
            const pic = d.data().userProfilePic;
            if (!pic) return;
            document.querySelectorAll('.q-payload').forEach(p => {
                if (p.dataset.user === post.username) p.dataset.avatar = pic;
            });
        }).catch(()=>{});
    });
}

// ===== GRID VIDEO AUTOPLAY — IntersectionObserver =====
function setupGridVids() {
    if (vidObs) vidObs.disconnect();
    vidObs = new IntersectionObserver(entries => {
        entries.forEach(e => {
            if (e.isIntersecting && e.intersectionRatio >= 0.5)
                e.target.play().catch(()=>{});
            else { e.target.pause(); e.target.currentTime = 0; }
        });
    }, { threshold: [0, 0.5] });
    document.querySelectorAll('.gvid').forEach(v => vidObs.observe(v));
}

// ===== PARALLAX TILT =====
function tilt(e, t) {
    const r = t.getBoundingClientRect();
    const x = e.clientX - r.left - r.width/2;
    const y = e.clientY - r.top  - r.height/2;
    t.style.transform = `rotateX(${-(y/(r.height/2))*12}deg) rotateY(${(x/(r.width/2))*12}deg) scale(1.04)`;
}
function untilt(t) { t.style.transform = ''; }

// ===== IMMERSIVE =====
let curIdx   = -1;
let curPostId = null;
let tsY = 0;

function openIm(index, dir) {
    curIdx = index;
    fillIm(index, dir||null);

    const container = document.getElementById('immersiveContainer');
    container.style.display = 'block';

    document.addEventListener('touchstart', imTouchStart, {passive:true});
    document.addEventListener('touchend',   imTouchEnd,   {passive:true});

    if (navigator.vibrate) navigator.vibrate(12);
}

function closeImmersive() {
    stopImVid();
    document.getElementById('immersiveContainer').style.display = 'none';
    document.removeEventListener('touchstart', imTouchStart);
    document.removeEventListener('touchend',   imTouchEnd);
}

function fillIm(index, dir) {
    if (index < 0 || index >= allPosts.length) return;
    const post = allPosts[index];
    curPostId = post.id;

    // Payload (for live avatar)
    const tiles = document.querySelectorAll('.q-tile');
    const p = tiles[index] ? tiles[index].querySelector('.q-payload') : null;
    const avatar   = (p && p.dataset.avatar)   || post.userProfilePic || `https://api.dicebear.com/7.x/bottts/svg?seed=${post.username}`;
    const comments = (p && p.dataset.comments) || '0';

    document.getElementById('imAvatar').src         = avatar;
    document.getElementById('imUsername').textContent = post.username || 'unknown';
    document.getElementById('imTime').textContent    = fmtTime(post.timestamp);
    document.getElementById('imCaption').textContent = post.content || '';
    document.getElementById('imLikeCount').textContent   = fmtNum(post.likes||0);
    document.getElementById('imCommentCount').textContent = comments;
    document.getElementById('imCounter').textContent = `${index+1} / ${allPosts.length}`;

    document.getElementById('imNavUp').classList.toggle('hide', index === 0);
    document.getElementById('imNavDown').classList.toggle('hide', index === allPosts.length-1);

    // Reset follow + save
    const fb = document.getElementById('imFollowBtn');
    fb.textContent = 'Follow'; fb.classList.remove('following');
    const sb = document.getElementById('imSaveBtn');
    sb.querySelector('i').className = 'fa-regular fa-bookmark';
    sb.querySelector('span').textContent = 'Save';

    loadImMedia(post, dir);
    checkImLike(post.id);
}

function loadImMedia(post, dir) {
    stopImVid();
    const wrap = document.getElementById('imMedia');

    // Remove old media el
    wrap.querySelectorAll('.im-el').forEach(el => el.remove());

    let el;
    if (post.mediaUrl) {
        if (post.mediaType === 'video') {
            el = document.createElement('video');
            el.src = post.mediaUrl;
            el.autoplay = true; el.loop = true;
            el.muted = false; el.playsInline = true;
            el.play().catch(()=>{});
        } else {
            el = document.createElement('img');
            el.src = post.mediaUrl;
        }
        // Exact same style as social.html immersive-mode .post-media
        el.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:block;z-index:0;';
    } else {
        el = document.createElement('div');
        el.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:40px;background:linear-gradient(145deg,#0d0d0d,#1a1a1a);z-index:0;';
        el.innerHTML = `<p style="font-size:20px;font-weight:700;color:rgba(255,255,255,0.9);text-align:center;line-height:1.6;">${post.content||''}</p>`;
    }

    el.classList.add('im-el');
    if (dir === 1)  el.classList.add('slide-up');
    if (dir === -1) el.classList.add('slide-down');

    wrap.appendChild(el);
}

function stopImVid() {
    const v = document.querySelector('#imMedia video');
    if (v) { v.pause(); v.src = ''; }
}

function navIm(dir) {
    const next = curIdx + dir;
    if (next < 0 || next >= allPosts.length) return;
    curIdx = next;
    fillIm(next, dir);
    if (navigator.vibrate) navigator.vibrate(8);
}

// Swipe
function imTouchStart(e) { tsY = e.touches[0].clientY; }
function imTouchEnd(e) {
    const diff = tsY - e.changedTouches[0].clientY;
    if (Math.abs(diff) < 55) return;
    navIm(diff > 0 ? 1 : -1);
}

// Keyboard
document.addEventListener('keydown', e => {
    if (document.getElementById('immersiveContainer').style.display !== 'block') return;
    if (e.key === 'ArrowDown') navIm(1);
    if (e.key === 'ArrowUp')   navIm(-1);
    if (e.key === 'Escape')    closeImmersive();
});

// ===== ACTIONS =====
function toggleImFollow(btn) {
    const f = btn.classList.toggle('following');
    btn.textContent = f ? 'Following' : 'Follow';
    if (navigator.vibrate) navigator.vibrate(10);
}

function checkImLike(postId) {
    const btn  = document.getElementById('imLikeBtn');
    const icon = btn.querySelector('i');
    btn.classList.remove('liked');
    icon.className = 'fa-regular fa-heart';
    if (!currentUser) return;
    db.collection('likes').doc(`${postId}_${currentUser}`).get().then(d => {
        if (d.exists) { btn.classList.add('liked'); icon.className = 'fa-solid fa-heart'; }
    }).catch(()=>{});
}

function toggleImLike() {
    if (!curPostId) return;
    const btn   = document.getElementById('imLikeBtn');
    const icon  = btn.querySelector('i');
    const cnt   = document.getElementById('imLikeCount');
    const liked = btn.classList.toggle('liked');
    const n     = parseInt(cnt.textContent)||0;
    if (liked) {
        icon.className = 'fa-solid fa-heart';
        cnt.textContent = fmtNum(n+1);
        db.collection('likes').doc(`${curPostId}_${currentUser}`).set({
            postId: curPostId, user: currentUser,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }).catch(()=>{});
    } else {
        icon.className = 'fa-regular fa-heart';
        cnt.textContent = fmtNum(Math.max(0,n-1));
        db.collection('likes').doc(`${curPostId}_${currentUser}`).delete().catch(()=>{});
    }
    if (navigator.vibrate) navigator.vibrate(25);
}

function toggleImSave(btn) {
    const icon = btn.querySelector('i');
    const text = btn.querySelector('span');
    const saved = icon.classList.contains('fa-regular');
    icon.className = saved ? 'fa-solid fa-bookmark' : 'fa-regular fa-bookmark';
    text.textContent = saved ? 'Saved' : 'Save';
    if (navigator.vibrate) navigator.vibrate(15);
}

function goComments() {
    if (!curPostId) return;
    closeImmersive();
    location.href = `comments.html?postId=${curPostId}`;
}
</script>
</body>
