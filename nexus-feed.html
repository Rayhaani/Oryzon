<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus 2050 Holographic Matrix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --quantum-bg: #020202;
            --card-base: #0a0a0a;
            --glass-core: rgba(255, 255, 255, 0.03);
            --active-glow: rgba(255, 215, 0, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #8a8a8a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--quantum-bg);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            perspective: 1000px;
            overflow-x: hidden;
        }

        .nexus-2050-wrapper {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: var(--quantum-bg);
            min-height: 100vh;
            position: relative;
            padding-bottom: 80px;
            box-sizing: border-box;
        }

        /* ===== HEADER ===== */
        .neural-header {
            padding: 14px;
            position: sticky;
            top: 0;
            background: rgba(2, 2, 2, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 5000;
        }
        .neural-search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 12px 18px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.02);
        }
        .neural-search-box i {
            color: var(--text-secondary);
            margin-right: 12px;
            font-size: 15px;
        }
        .neural-search-box input {
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            width: 100%;
            font-size: 15px;
            letter-spacing: 0.3px;
        }

        /* ===== GRID ===== */
        .hologram-grid-canvas {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            padding: 4px;
            box-sizing: border-box;
        }

        .quantum-tile {
            position: relative;
            background: var(--card-base);
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 1 / 1.45;
            cursor: pointer;
            border: 1px solid var(--glass-core);
            transform-style: preserve-3d;
            transition: transform 0.1s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .quantum-tile:hover {
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .quantum-tile img,
        .quantum-tile video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            transition: transform 0.3s ease;
        }

        .quantum-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 50%);
            display: flex;
            align-items: flex-end;
            padding: 10px;
            box-sizing: border-box;
            transform: translateZ(20px);
            z-index: 5;
        }

        .quantum-badge {
            color: #ffffff;
            font-size: 12.5px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Video play icon */
        .video-indicator {
            position: absolute;
            top: 8px; right: 8px;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center;
            z-index: 6;
            font-size: 10px;
            color: #fff;
        }

        /* Skeleton loader */
        .quantum-skeleton {
            background: linear-gradient(90deg, #0a0a0a 25%, #141414 50%, #0a0a0a 75%);
            background-size: 200% 100%;
            animation: skeletonShimmer 1.5s infinite;
            border-radius: 8px;
            aspect-ratio: 1 / 1.45;
        }

        @keyframes skeletonShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .hidden-neural-payload { display: none; }

        /* ===== MODAL ===== */
        .neural-fluid-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.96);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .neural-fluid-modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-quantum-card {
            width: 90%;
            max-width: 380px;
            background: #0f0f0f;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            transform: scale(0.9) translateY(20px);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1.5px solid var(--active-glow);
            box-shadow: 0 0 30px var(--active-glow);
        }
        .neural-fluid-modal.active .modal-quantum-card {
            transform: scale(1) translateY(0);
        }

        .quantum-close-trigger {
            position: absolute;
            top: 14px; right: 14px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
            z-index: 100;
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-viewport {
            width: 100%;
            aspect-ratio: 1 / 1.15;
            background: #000000;
            overflow: hidden;
        }
        .modal-viewport img,
        .modal-viewport video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-meta-zone {
            padding: 18px;
            background: #0f0f0f;
        }
        .quantum-user-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .quantum-user-row img {
            width: 36px; height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .quantum-user-row h4 {
            color: #ffffff;
            margin: 0;
            font-size: 14.5px;
            font-weight: 600;
        }
        .modal-user-time {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .quantum-caption-field p {
            color: #e5e5e5;
            font-size: 14px;
            line-height: 1.5;
            margin: 0 0 16px 0;
        }

        .quantum-control-dock {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .dock-capsules {
            display: flex;
            gap: 20px;
        }
        .quantum-action-node {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #ffffff;
            font-size: 13.5px;
            cursor: pointer;
        }
        .quantum-action-node i { font-size: 18px; }
        .quantum-action-node.node-liked i {
            color: #ff4d6d !important;
            text-shadow: 0 0 10px rgba(255, 77, 109, 0.4);
        }

        /* Comment btn sa'an nan redirect */
        .modal-comment-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 6px 16px;
            color: #fff;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ===== FOOTER ===== */
        .bottom-nav-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            height: 60px;
            background: rgba(2, 2, 2, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(10px);
        }
        .nav-item {
            color: #ffffff;
            font-size: 20px;
            opacity: 0.3;
            cursor: pointer;
        }
        .nav-item.active { opacity: 1; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            grid-column: 1 / -1;
        }
        .empty-state i { font-size: 40px; margin-bottom: 12px; opacity: 0.3; }
        .empty-state p { font-size: 14px; }
    </style>
</head>
<body>

<div class="nexus-2050-wrapper">
    
    <div class="neural-header">
        <div class="neural-search-box">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            <input type="text" placeholder="Search With Neural AI..." readonly />
        </div>
    </div>

    <!-- GRID — posts za su loda nan -->
    <div class="hologram-grid-canvas" id="quantumGrid">
        <!-- Skeleton loaders -->
        <div class="quantum-skeleton"></div>
        <div class="quantum-skeleton"></div>
        <div class="quantum-skeleton"></div>
        <div class="quantum-skeleton"></div>
        <div class="quantum-skeleton"></div>
        <div class="quantum-skeleton"></div>
    </div>

    <div class="bottom-nav-bar">
        <div class="nav-item" onclick="window.location.href='social.html'">
            <i class="fa-solid fa-house"></i>
        </div>
        <div class="nav-item active">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
        </div>
        <div class="nav-item" onclick="window.location.href='social.html'">
            <i class="fa-solid fa-square-plus"></i>
        </div>
        <div class="nav-item">
            <i class="fa-solid fa-bolt"></i>
        </div>
        <div class="nav-item" onclick="window.location.href='me.html'">
            <i class="fa-solid fa-circle-user"></i>
        </div>
    </div>
</div>

<!-- MODAL -->
<div class="neural-fluid-modal" id="quantumModal" onclick="closeQuantumModal()">
    <div class="modal-quantum-card" id="modalTargetCard" onclick="event.stopPropagation()">
        <button class="quantum-close-trigger" onclick="closeQuantumModal()">&times;</button>
        
        <div class="modal-viewport" id="modalMediaContainer"></div>
        
        <div class="modal-meta-zone">
            <div class="quantum-user-row">
                <img src="" id="modalUserAvatar" alt="Avatar" />
                <div>
                    <h4 id="modalUsername">User Node</h4>
                    <div class="modal-user-time" id="modalUserTime"></div>
                </div>
            </div>
            
            <div class="quantum-caption-field">
                <p id="modalCaptionText"></p>
            </div>
            
            <div class="quantum-control-dock">
                <div class="dock-capsules">
                    <div class="quantum-action-node" id="modalLikeBtn" onclick="toggleNodeLike(this)">
                        <i class="fa-regular fa-heart"></i>
                        <span id="modalLikeCount">0</span>
                    </div>
                    <div class="quantum-action-node" id="modalCommentBtn">
                        <i class="fa-regular fa-comment"></i>
                        <span id="modalCommentCount">0</span>
                    </div>
                </div>
                <button class="modal-comment-btn" id="modalGoComments">
                    <i class="fa-regular fa-message"></i> Comments
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    // ===== FIREBASE SETUP =====
    const firebaseConfig = {
        apiKey: "AIzaSyDExSOnFbN-wJbT1UFgB-kBs37bEa3KiWc",
        authDomain: "oryzon-50ea4.firebaseapp.com",
        projectId: "oryzon-50ea4",
        storageBucket: "oryzon-50ea4.firebasestorage.app",
        messagingSenderId: "782106742622",
        appId: "1:782106742622:web:902d512bfe42dd4cf289cf",
        measurementId: "G-K5085DLL2W"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ===== AUTH CHECK =====
    const currentUser = localStorage.getItem('nexus_user_session');
    if (!currentUser) window.location.href = 'login.html';

    // ===== GLOW COLORS — random don kowane post =====
    const glowPalette = [
        'rgba(255, 115, 0, 0.45)',
        'rgba(0, 191, 255, 0.45)',
        'rgba(186, 85, 211, 0.45)',
        'rgba(255, 0, 60, 0.45)',
        'rgba(255, 215, 0, 0.45)',
        'rgba(0, 230, 118, 0.45)',
        'rgba(255, 64, 129, 0.45)',
        'rgba(0, 229, 255, 0.45)',
    ];

    function getGlow(index) {
        return glowPalette[index % glowPalette.length];
    }

    function formatTime(ts) {
        if (!ts) return '';
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        const diff = Math.floor((Date.now() - d) / 1000);
        if (diff < 60) return 'just now';
        if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
        if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
        return Math.floor(diff / 86400) + 'd ago';
    }

    function formatCount(n) {
        n = parseInt(n) || 0;
        if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
        if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
        return n.toString();
    }

    // ===== LOAD POSTS DAGA FIREBASE =====
    let allPosts = [];

    window.addEventListener('DOMContentLoaded', () => {
        db.collection('posts')
            .orderBy('timestamp', 'desc')
            .limit(30)
            .onSnapshot(snap => {
                allPosts = [];
                snap.forEach(doc => allPosts.push({ id: doc.id, ...doc.data() }));
                renderGrid();
            }, err => {
                console.error('Firebase error:', err);
                renderGrid(); // render empty state
            });

        // Load user avatars daga users collection
        loadUserAvatars();
    });

    function loadUserAvatars() {
        // Za a loda avatar daga users collection bayan posts sun fito
    }

    // ===== RENDER GRID =====
    function renderGrid() {
        const grid = document.getElementById('quantumGrid');

        if (allPosts.length === 0) {
            grid.innerHTML = `
                <div class="empty-state">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    <p>No posts yet in the matrix</p>
                </div>`;
            return;
        }

        grid.innerHTML = allPosts.map((post, index) => {
            const avatar = post.userProfilePic || `https://api.dicebear.com/7.x/bottts/svg?seed=${post.username}`;
            const likes = formatCount(post.likes || 0);
            const glow = getGlow(index);
            const timeStr = formatTime(post.timestamp);
            const isVideo = post.mediaType === 'video';

            let mediaHTML = '';
            if (post.mediaUrl) {
                if (isVideo) {
                    mediaHTML = `<video src="${post.mediaUrl}" muted loop playsinline preload="metadata"></video>
                                 <div class="video-indicator"><i class="fa-solid fa-play"></i></div>`;
                } else {
                    mediaHTML = `<img src="${post.mediaUrl}" loading="lazy" alt="">`;
                }
            } else {
                // Text-only post — nuna background tare da rubutu
                mediaHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:12px;box-sizing:border-box;background:linear-gradient(145deg,#0d0d0d,#1a1a1a);">
                    <p style="font-size:11px;color:rgba(255,255,255,0.7);text-align:center;line-height:1.4;">${(post.content || '').substring(0, 60)}${post.content && post.content.length > 60 ? '...' : ''}</p>
                </div>`;
            }

            return `
            <div class="quantum-tile"
                onmousemove="runParallaxEngine(event, this)"
                onmouseleave="resetParallaxEngine(this)"
                onclick="openQuantumModal(this)">
                ${mediaHTML}
                <div class="quantum-overlay">
                    <div class="quantum-badge">
                        <i class="fa-solid fa-bolt"></i>
                        <span>${likes}</span>
                    </div>
                </div>
                <div class="hidden-neural-payload"
                    data-post-id="${post.id}"
                    data-user="${post.username || 'unknown'}"
                    data-avatar="${avatar}"
                    data-caption="${(post.content || '').replace(/"/g, '&quot;')}"
                    data-glow="${glow}"
                    data-time="${timeStr}"
                    data-likes="${post.likes || 0}"
                    data-comments="${post.commentCount || 0}"
                    data-media-url="${post.mediaUrl || ''}"
                    data-media-type="${post.mediaType || 'image'}">
                </div>
            </div>`;
        }).join('');

        // Loda avatars na gaskiya daga users collection
        allPosts.forEach(post => {
            if (!post.username) return;
            db.collection('users').doc(post.username).get().then(userDoc => {
                if (!userDoc.exists) return;
                const pic = userDoc.data().userProfilePic;
                if (!pic) return;
                // Update hidden payload avatar
                const tiles = document.querySelectorAll('.quantum-tile');
                tiles.forEach(tile => {
                    const payload = tile.querySelector('.hidden-neural-payload');
                    if (payload && payload.dataset.user === post.username) {
                        payload.dataset.avatar = pic;
                    }
                });
            }).catch(() => {});
        });
    }

    // ===== PARALLAX ENGINE =====
    function runParallaxEngine(event, tile) {
        const boundingBox = tile.getBoundingClientRect();
        const axisX = event.clientX - boundingBox.left - (boundingBox.width / 2);
        const axisY = event.clientY - boundingBox.top - (boundingBox.height / 2);
        const computeTiltX = -(axisY / (boundingBox.height / 2)) * 14;
        const computeTiltY = (axisX / (boundingBox.width / 2)) * 14;
        tile.style.transform = `rotateX(${computeTiltX}deg) rotateY(${computeTiltY}deg) scale(1.03)`;
        const graphicLayer = tile.querySelector('img, video');
        if (graphicLayer) {
            graphicLayer.style.transform = `scale(1.08) translateX(${-axisX*0.06}px) translateY(${-axisY*0.06}px)`;
        }
    }

    function resetParallaxEngine(tile) {
        tile.style.transform = `rotateX(0deg) rotateY(0deg) scale(1)`;
        const graphicLayer = tile.querySelector('img, video');
        if (graphicLayer) {
            graphicLayer.style.transform = `scale(1) translateX(0px) translateY(0px)`;
        }
    }

    // ===== OPEN MODAL =====
    let currentPostId = null;

    function openQuantumModal(tileElement) {
        const modal = document.getElementById('quantumModal');
        const targetCard = document.getElementById('modalTargetCard');
        const mediaViewport = document.getElementById('modalMediaContainer');
        const payload = tileElement.querySelector('.hidden-neural-payload');

        const username = payload.dataset.user;
        const avatar = payload.dataset.avatar;
        const caption = payload.dataset.caption;
        const targetColorGlow = payload.dataset.glow;
        const timeStr = payload.dataset.time;
        const likes = payload.dataset.likes;
        const comments = payload.dataset.comments;
        const mediaUrl = payload.dataset.mediaUrl;
        const mediaType = payload.dataset.mediaType;
        currentPostId = payload.dataset.postId;

        document.getElementById('modalUsername').textContent = username;
        document.getElementById('modalUserAvatar').src = avatar;
        document.getElementById('modalCaptionText').textContent = caption;
        document.getElementById('modalUserTime').textContent = timeStr;
        document.getElementById('modalLikeCount').textContent = formatCount(parseInt(likes));
        document.getElementById('modalCommentCount').textContent = comments;

        // Dynamic glow color
        targetCard.style.borderColor = targetColorGlow;
        targetCard.style.boxShadow = `0 0 30px ${targetColorGlow}`;

        // Media
        mediaViewport.innerHTML = '';
        if (mediaUrl) {
            if (mediaType === 'video') {
                const vid = document.createElement('video');
                vid.src = mediaUrl;
                vid.autoplay = true;
                vid.loop = true;
                vid.muted = false;
                vid.playsInline = true;
                vid.controls = false;
                vid.style.cssText = 'width:100%;height:100%;object-fit:cover;';
                mediaViewport.appendChild(vid);
                vid.play().catch(() => {});
            } else {
                const img = document.createElement('img');
                img.src = mediaUrl;
                img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
                mediaViewport.appendChild(img);
            }
        } else {
            // Text post
            mediaViewport.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;background:linear-gradient(145deg,#0d0d0d,#1a1a1a);">
                <p style="font-size:16px;color:rgba(255,255,255,0.85);text-align:center;line-height:1.6;">${caption}</p>
            </div>`;
        }

        // Comment button redirect
        document.getElementById('modalGoComments').onclick = () => {
            closeQuantumModal();
            window.location.href = `comments.html?postId=${currentPostId}`;
        };

        // Check like status
        checkLikeStatus(currentPostId);

        modal.style.display = 'flex';
        setTimeout(() => modal.classList.add('active'), 20);
        if (navigator.vibrate) navigator.vibrate(15);
    }

    function closeQuantumModal() {
        const modal = document.getElementById('quantumModal');
        modal.classList.remove('active');
        // Stop any playing video
        const vid = modal.querySelector('video');
        if (vid) { vid.pause(); vid.src = ''; }
        setTimeout(() => modal.style.display = 'none', 250);
    }

    // ===== LIKE SYSTEM =====
    function checkLikeStatus(postId) {
        const likeBtn = document.getElementById('modalLikeBtn');
        const icon = likeBtn.querySelector('i');
        likeBtn.classList.remove('node-liked');
        icon.className = 'fa-regular fa-heart';

        db.collection('likes').doc(`${postId}_${currentUser}`).get().then(doc => {
            if (doc.exists) {
                likeBtn.classList.add('node-liked');
                icon.className = 'fa-solid fa-heart';
            }
        }).catch(() => {});
    }

    function toggleNodeLike(btn) {
        if (!currentPostId) return;
        const icon = btn.querySelector('i');
        const countEl = document.getElementById('modalLikeCount');
        const liked = btn.classList.toggle('node-liked');
        let count = parseInt(countEl.textContent.replace(/[KM]/g, m => m === 'K' ? '000' : '000000')) || 0;

        if (liked) {
            icon.className = 'fa-solid fa-heart';
            countEl.textContent = formatCount(count + 1);
            db.collection('likes').doc(`${currentPostId}_${currentUser}`).set({
                postId: currentPostId,
                user: currentUser,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).catch(() => {});
        } else {
            icon.className = 'fa-regular fa-heart';
            countEl.textContent = formatCount(Math.max(0, count - 1));
            db.collection('likes').doc(`${currentPostId}_${currentUser}`).delete().catch(() => {});
        }

        if (navigator.vibrate) navigator.vibrate(30);
    }
</script>

</body>
</html>
