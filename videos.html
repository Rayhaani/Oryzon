<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus — Videos</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- ✅ Template.js — injects ALL post-card CSS + helpers globally -->
    <script src="post-card-template.js"></script>

    <style>
        /* ===== PAGE-LEVEL ONLY — No post card CSS here ===== */
        :root {
            --gold:      #fde08d;
            --deep-gold: #b8860b;
            --emerald:   #50fa7b;
            --bg:        #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            padding-bottom: 60px;
        }

        /* ── HEADER ── */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 50px;
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            background: rgba(245,245,247,0.35);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 4px 30px rgba(0,0,0,0.4);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            background: linear-gradient(90deg,#fff 0%,#fde08d 50%,#b8860b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .videos-tab-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            letter-spacing: 2px;
            color: rgba(253,224,141,0.8);
            text-transform: uppercase;
            border: 1px solid rgba(253,224,141,0.3);
            border-radius: 20px;
            padding: 3px 10px;
            background: rgba(253,224,141,0.06);
        }

        .header-right-cluster { display: flex; align-items: center; gap: 10px; }

        .earning-tracker {
            background: rgba(80,250,123,0.05);
            border: 1px solid var(--emerald);
            padding: 0 10px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 0 10px rgba(80,250,123,0.1);
        }

        .pulse-dot {
            width: 6px; height: 6px;
            background: var(--emerald);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%,100% { transform:scale(1); opacity:1; }
            50%      { transform:scale(1.5); opacity:0.5; }
        }

        /* ── MENU ICON ── */
        .menu-container {
            width: 32px; height: 32px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(253,224,141,0.2);
            border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        .menu-container:hover { transform: scale(1.05); border-color: rgba(253,224,141,0.5); }

        .menu-trigger {
            width: 18px; height: 14px;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .menu-line {
            display: block; height: 2px;
            background: linear-gradient(90deg,#fff,#fde08d);
            border-radius: 10px;
            transition: all 0.4s cubic-bezier(0.68,-0.60,0.32,1.60);
        }
        .line-top    { width: 65%; align-self: flex-start; }
        .line-middle { width: 100%; background: linear-gradient(90deg,#fde08d,#b8860b); }
        .line-bottom { width: 65%; align-self: flex-end; }

        .menu-container.is-active .line-top    { width:100%; transform: translateY(6px) rotate(45deg); }
        .menu-container.is-active .line-middle { width:0;    opacity:0; transform: translateX(-10px); }
        .menu-container.is-active .line-bottom { width:100%; transform: translateY(-6px) rotate(-45deg); }

        /* ── DROPDOWN ── */
        .Cyber-Dropdown {
            position: fixed;
            top: 65px; right: -300px;
            width: 260px;
            background: rgba(10,15,28,0.75);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 0 1px rgba(255,255,255,0.2);
            backdrop-filter: blur(15px);
            z-index: 999;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            opacity: 0;
        }
        .Cyber-Dropdown.Active { right: 15px; opacity: 1; }

        .Drop-User-Section {
            display: flex; align-items: center; gap: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 12px;
        }
        .Drop-Avatar-Wrapper {
            position: relative; width: 32px; height: 32px;
            background: rgba(255,255,255,0.05); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(0,242,254,0.3);
        }
        .Drop-Avatar-Pulse {
            position: absolute; width:100%; height:100%;
            border-radius: 50%; background: rgba(0,242,254,0.1);
            animation: avatarPulse 2s infinite;
        }
        @keyframes avatarPulse { 0%{transform:scale(1);opacity:1} 100%{transform:scale(1.4);opacity:0} }
        .Drop-Avatar-Icon { font-size:14px; z-index:1; }
        .Drop-User-Meta h5 { color:#fff; margin:0; font-size:0.9rem; font-weight:500; }
        .Drop-User-Meta span { color:#00f2fe; font-size:0.7rem; display:block; letter-spacing:0.5px; }

        .Drop-Links-Grid { display:flex; flex-direction:column; gap:6px; }
        .Drop-Item {
            display:flex; align-items:center; gap:12px;
            padding:10px 12px; border-radius:10px;
            text-decoration:none; background:transparent;
            transition:all 0.2s ease;
        }
        .Drop-Item:hover { background:rgba(255,255,255,0.03); border-left:2px solid #00f2fe; padding-left:16px; }
        .Drop-Icon  { font-size:16px; opacity:0.8; }
        .Drop-Text  { color:rgba(255,255,255,0.85); font-size:0.85rem; font-weight:400; }
        .Drop-Footer {
            text-align:center; font-size:0.65rem;
            color:rgba(255,255,255,0.2); margin-top:12px;
            padding-top:8px; border-top:1px solid rgba(255,255,255,0.06);
            letter-spacing:0.5px;
        }

        /* ── FILTER BAR ── */
        .videos-filter-bar {
            position: fixed;
            top: 50px; left: 0; right: 0;
            z-index: 4000;
            display: flex;
            gap: 8px;
            padding: 8px 14px;
            overflow-x: auto;
            scrollbar-width: none;
            background: rgba(5,5,5,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(253,224,141,0.08);
        }
        .videos-filter-bar::-webkit-scrollbar { display: none; }

        .filter-chip {
            flex-shrink: 0;
            padding: 5px 14px;
            border-radius: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
        }
        .filter-chip.active {
            color: #000;
            background: linear-gradient(135deg,#fde08d,#b8860b);
            border-color: transparent;
            box-shadow: 0 0 12px rgba(253,224,141,0.35);
        }

        /* ── FEED ── */
        #videoFeed {
            margin-top: 92px; /* header 50 + filter 42 */
            padding: 0 10px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Ensure proper spacing between cards */
        #videoFeed .post-card { margin-bottom: 0 !important; }

        /* ── LOAD MORE SPINNER ── */
        .load-more-trigger {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            gap: 8px;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }
        .spinner-ring {
            width: 20px; height: 20px;
            border: 2px solid rgba(253,224,141,0.2);
            border-top-color: #fde08d;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── EMPTY STATE ── */
        .empty-videos {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.25);
        }
        .empty-videos i {
            font-size: 48px;
            color: rgba(253,224,141,0.2);
            margin-bottom: 14px;
            display: block;
        }
        .empty-videos p { font-size: 13px; line-height: 1.6; }

        /* ── FOOTER NAV ── */
        .nexus-footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 50px;
            background: rgba(5,5,5,0.95);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 9999;
            backdrop-filter: blur(10px);
            transition: transform 0.4s ease;
        }
        .footer-hidden { transform: translateY(100%); }

        .footer-icon {
            color: #fff; opacity: 0.5; cursor: pointer;
            height: 100%; width: 50px;
            display: flex; align-items: center; justify-content: center;
        }
        .footer-icon.active {
            opacity: 1;
            filter: drop-shadow(0 0 5px #fde08d);
        }
        .profile-img {
            width: 26px; height: 26px;
            border-radius: 50%; border: 1.5px solid #fff;
            object-fit: cover;
        }
  
    </style>
</head>
<body>

<!-- ── FEED ── -->
<div id="videoFeed"></div>

<!-- ── LOAD MORE (sentinel) ── -->
<div class="load-more-trigger" id="loadMoreTrigger" style="display:none;">
    <div class="spinner-ring"></div>
    <span>Loading</span>
</div>

<!-- ── FOOTER NAV ── -->
<nav class="nexus-footer" id="instaFooter">
    <div class="footer-icon" onclick="location.href='social.html'">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L4 9v12h5v-7h6v7h5V9l-8-6z"/></svg>
    </div>
    <div class="footer-icon" onclick="location.href='chats.html'">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 11-7.6-12.7 8.38 8.38 0 013.8.9L21 3z"/>
        </svg>
    </div>
    <div class="footer-icon" onclick="location.href='social.html'">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 8v8M8 12h8"/>
        </svg>
    </div>
    <!-- Videos tab — active -->
    <div class="footer-icon active">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 10l4.553-2.069A1 1 0 0121 8.882v6.236a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
        </svg>
    </div>
    <div class="footer-icon" onclick="location.href='index.html'">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="2" width="20" height="20" rx="5"/>
            <path d="M16 2v20M8 2v20M2 12h20"/>
        </svg>
    </div>
    <div class="footer-icon" onclick="location.href='me.html'">
        <img src="https://via.placeholder.com/150" alt="Me" class="profile-img" id="footerProfileImg">
    </div>
</nav>

<!-- ── FIREBASE ── -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>

<script>
// ── FIREBASE INIT ──
firebase.initializeApp({
    apiKey:            "AIzaSyDExSOnFbN-wJbT1UFgB-kBs37bEa3KiWc",
    authDomain:        "oryzon-50ea4.firebaseapp.com",
    projectId:         "oryzon-50ea4",
    storageBucket:     "oryzon-50ea4.firebasestorage.app",
    messagingSenderId: "782106742622",
    appId:             "1:782106742622:web:902d512bfe42dd4cf289cf",
    measurementId:     "G-K5085DLL2W"
});
const db      = firebase.firestore();
const storage = firebase.storage();
firebase.analytics();

// ── AUTH GUARD ──
if (!localStorage.getItem('nexus_user_session')) location.href = 'login.html';

// ── STATE ──
let activeFilter = 'all';
let lastVisible  = null;
let isLoading    = false;
let allLoaded    = false;
const PAGE_SIZE  = 8;

const feedEl          = document.getElementById('videoFeed');
const loadMoreTrigger = document.getElementById('loadMoreTrigger');

// ── BOOT ──
window.addEventListener('DOMContentLoaded', () => {
    // Footer profile pic
    const savedPic = localStorage.getItem('userProfilePic');
    const img = document.getElementById('footerProfileImg');
    const u = localStorage.getItem('nexus_user_session') || 'user';
if (savedPic && img) img.src = savedPic;
else if (img) img.src = `https://api.dicebear.com/7.x/bottts/svg?seed=${u}`;
    loadVideos(true);
    setupInfiniteScroll();
});

// ── FILTER ──
window.setFilter = function(chip, filter) {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = filter;
    lastVisible  = null;
    allLoaded    = false;
    feedEl.innerHTML = '';
    loadVideos(true);
};

// ── QUERY BUILDER ──
function buildQuery() {
    let q = db.collection('posts')
              .where('mediaType', '==', 'video');
    
    if (activeFilter !== 'all') {
        q = q.where('category', '==', activeFilter);
    }
    
    return q;
}
// ── LOAD VIDEOS ──
async function loadVideos(reset = false) {
    if (isLoading || allLoaded) return;
    isLoading = true;
    loadMoreTrigger.style.display = 'flex';

    try {
        let q = buildQuery().limit(PAGE_SIZE);
        if (!reset && lastVisible) q = q.startAfter(lastVisible);

        const snap = await q.get();

        // Sort client-side (babu index needed)
        const docs = snap.docs.sort((a, b) => {
            const tA = a.data().timestamp?.seconds || 0;
            const tB = b.data().timestamp?.seconds || 0;
            return tB - tA;
        });

        if (snap.empty) {
            allLoaded = true;
            loadMoreTrigger.style.display = 'none';
            if (reset) feedEl.innerHTML = `
                <div class="empty-videos">
                    <i class="fa-solid fa-video-slash"></i>
                    <p>Babu videos har yanzu.<br>Zama na farko da kai!</p>
                </div>`;
            return;
        }

        lastVisible = docs[docs.length - 1];
        
        // ✅ Use template.js generatePostHTML — exactly as social.html does
        let html = '';
        snap.forEach(doc => html += generatePostHTML({ id: doc.id, ...doc.data() }));
        feedEl.insertAdjacentHTML('beforeend', html);

        // Restore likes
        setTimeout(() => {
            if (typeof postCard_restoreLikes === 'function') postCard_restoreLikes(feedEl);
        }, 400);

        // Load real avatars from users collection
        snap.forEach(doc => {
            const post = doc.data();
            if (!post.username) return;
            db.collection('users').doc(post.username).get().then(userDoc => {
                if (!userDoc.exists) return;
                const pic = userDoc.data().userProfilePic;
                if (!pic) return;
                const card = feedEl.querySelector(`.post-card[data-post-id="${doc.id}"]`);
                if (card) {
                    const av = card.querySelector('.post-avatar');
                    if (av) av.src = pic;
                }
            });
        });

        // Live comment counts
        snap.forEach(doc => {
            db.collection('nexus_contributions')
              .where('postId',   '==', doc.id)
              .where('parentId', '==', null)
              .onSnapshot(s => {
                  const el = document.getElementById(`comment-count-${doc.id}`);
                  if (el) el.textContent = s.size;
              });
        });

        // ✅ Observe new videos (template.js IntersectionObserver)
        if (typeof postCard_observeVideos === 'function') postCard_observeVideos();
        setTimeout(() => {
            if (typeof postCard_handleVideoPriority === 'function') postCard_handleVideoPriority();
        }, 500);

        loadMoreTrigger.style.display = 'none';
        if (snap.size < PAGE_SIZE) allLoaded = true;

    } catch (err) {
        console.error('[videos] loadVideos error:', err);
        loadMoreTrigger.style.display = 'none';
    } finally {
        isLoading = false;
    }
}

// ── INFINITE SCROLL ──
function setupInfiniteScroll() {
    const sentinel = document.createElement('div');
    sentinel.style.height = '1px';
    document.body.appendChild(sentinel);

    new IntersectionObserver(entries => {
        if (entries[0].isIntersecting && !isLoading && !allLoaded) loadVideos(false);
    }, { rootMargin: '250px' }).observe(sentinel);
}

// ── SCROLL → VIDEO PRIORITY ──
let _scrollT;
window.addEventListener('scroll', () => {
    clearTimeout(_scrollT);
    _scrollT = setTimeout(() => {
        if (typeof postCard_handleVideoPriority === 'function') postCard_handleVideoPriority();
    }, 150);
}, { passive: true });


// ===== AUTO-IMMERSIVE: Fara reels kamar social.html =====
// Bari template.js toggleImmersive ya yi duk aiki — mu kira shi kawai

function startFirstImmersive() {
    const cards = document.querySelectorAll('#videoFeed .post-card');
    if (!cards.length) return;
    
    // Kira toggleImmersive na template.js akan card na farko
    const firstCard = cards[0];
    if (typeof window.toggleImmersive === 'function') {
        window.toggleImmersive(firstCard);
    }
}

// Kira bayan videos sun loda
const _origInsertAdj = HTMLElement.prototype.insertAdjacentHTML;
HTMLElement.prototype.insertAdjacentHTML = function(pos, html) {
    _origInsertAdj.call(this, pos, html);
    if (this.id === 'videoFeed') {
        clearTimeout(window._reelStartTimer);
        window._reelStartTimer = setTimeout(() => {
            if (!document.querySelector('.post-card.immersive-mode')) {
                startFirstImmersive();
            }
        }, 700);
    }
};
    
</script>
</body>
</html>
