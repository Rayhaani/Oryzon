<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus — Videos</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- ✅ Template.js — injects ALL post-card CSS + helpers globally -->
    <script src="post-card-template.js"></script>

    <style>
        /* ===== PAGE-LEVEL ONLY — No post card CSS here ===== */
        :root {
            --gold:      #fde08d;
            --deep-gold: #b8860b;
            --emerald:   #50fa7b;
            --bg:        #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            padding-bottom: 60px;
        }

        /* ── HEADER ── */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 50px;
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            background: rgba(245,245,247,0.35);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 4px 30px rgba(0,0,0,0.4);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            background: linear-gradient(90deg,#fff 0%,#fde08d 50%,#b8860b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .videos-tab-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            letter-spacing: 2px;
            color: rgba(253,224,141,0.8);
            text-transform: uppercase;
            border: 1px solid rgba(253,224,141,0.3);
            border-radius: 20px;
            padding: 3px 10px;
            background: rgba(253,224,141,0.06);
        }

        .header-right-cluster { display: flex; align-items: center; gap: 10px; }

        .earning-tracker {
            background: rgba(80,250,123,0.05);
            border: 1px solid var(--emerald);
            padding: 0 10px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 0 10px rgba(80,250,123,0.1);
        }

        .pulse-dot {
            width: 6px; height: 6px;
            background: var(--emerald);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%,100% { transform:scale(1); opacity:1; }
            50%      { transform:scale(1.5); opacity:0.5; }
        }

        /* ── MENU ICON ── */
        .menu-container {
            width: 32px; height: 32px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(253,224,141,0.2);
            border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        .menu-container:hover { transform: scale(1.05); border-color: rgba(253,224,141,0.5); }

        .menu-trigger {
            width: 18px; height: 14px;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .menu-line {
            display: block; height: 2px;
            background: linear-gradient(90deg,#fff,#fde08d);
            border-radius: 10px;
            transition: all 0.4s cubic-bezier(0.68,-0.60,0.32,1.60);
        }
        .line-top    { width: 65%; align-self: flex-start; }
        .line-middle { width: 100%; background: linear-gradient(90deg,#fde08d,#b8860b); }
        .line-bottom { width: 65%; align-self: flex-end; }

        .menu-container.is-active .line-top    { width:100%; transform: translateY(6px) rotate(45deg); }
        .menu-container.is-active .line-middle { width:0;    opacity:0; transform: translateX(-10px); }
        .menu-container.is-active .line-bottom { width:100%; transform: translateY(-6px) rotate(-45deg); }

        /* ── DROPDOWN ── */
        .Cyber-Dropdown {
            position: fixed;
            top: 65px; right: -300px;
            width: 260px;
            background: rgba(10,15,28,0.75);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 0 1px rgba(255,255,255,0.2);
            backdrop-filter: blur(15px);
            z-index: 999;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            opacity: 0;
        }
        .Cyber-Dropdown.Active { right: 15px; opacity: 1; }

        .Drop-User-Section {
            display: flex; align-items: center; gap: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 12px;
        }
        .Drop-Avatar-Wrapper {
            position: relative; width: 32px; height: 32px;
            background: rgba(255,255,255,0.05); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(0,242,254,0.3);
        }
        .Drop-Avatar-Pulse {
            position: absolute; width:100%; height:100%;
            border-radius: 50%; background: rgba(0,242,254,0.1);
            animation: avatarPulse 2s infinite;
        }
        @keyframes avatarPulse { 0%{transform:scale(1);opacity:1} 100%{transform:scale(1.4);opacity:0} }
        .Drop-Avatar-Icon { font-size:14px; z-index:1; }
        .Drop-User-Meta h5 { color:#fff; margin:0; font-size:0.9rem; font-weight:500; }
        .Drop-User-Meta span { color:#00f2fe; font-size:0.7rem; display:block; letter-spacing:0.5px; }

        .Drop-Links-Grid { display:flex; flex-direction:column; gap:6px; }
        .Drop-Item {
            display:flex; align-items:center; gap:12px;
            padding:10px 12px; border-radius:10px;
            text-decoration:none; background:transparent;
            transition:all 0.2s ease;
        }
        .Drop-Item:hover { background:rgba(255,255,255,0.03); border-left:2px solid #00f2fe; padding-left:16px; }
        .Drop-Icon  { font-size:16px; opacity:0.8; }
        .Drop-Text  { color:rgba(255,255,255,0.85); font-size:0.85rem; font-weight:400; }
        .Drop-Footer {
            text-align:center; font-size:0.65rem;
            color:rgba(255,255,255,0.2); margin-top:12px;
            padding-top:8px; border-top:1px solid rgba(255,255,255,0.06);
            letter-spacing:0.5px;
        }

        /* ── FILTER BAR ── */
        .videos-filter-bar {
            position: fixed;
            top: 50px; left: 0; right: 0;
            z-index: 4000;
            display: flex;
            gap: 8px;
            padding: 8px 14px;
            overflow-x: auto;
            scrollbar-width: none;
            background: rgba(5,5,5,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(253,224,141,0.08);
        }
        .videos-filter-bar::-webkit-scrollbar { display: none; }

        .filter-chip {
            flex-shrink: 0;
            padding: 5px 14px;
            border-radius: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
        }
        .filter-chip.active {
            color: #000;
            background: linear-gradient(135deg,#fde08d,#b8860b);
            border-color: transparent;
            box-shadow: 0 0 12px rgba(253,224,141,0.35);
        }

        /* ── FEED ── */
        #videoFeed {
            margin-top: 92px; /* header 50 + filter 42 */
            padding: 0 10px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Ensure proper spacing between cards */
        #videoFeed .post-card { margin-bottom: 0 !important; }

        /* ── LOAD MORE SPINNER ── */
        .load-more-trigger {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            gap: 8px;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }
        .spinner-ring {
            width: 20px; height: 20px;
            border: 2px solid rgba(253,224,141,0.2);
            border-top-color: #fde08d;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── EMPTY STATE ── */
        .empty-videos {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.25);
        }
        .empty-videos i {
            font-size: 48px;
            color: rgba(253,224,141,0.2);
            margin-bottom: 14px;
            display: block;
        }
        .empty-videos p { font-size: 13px; line-height: 1.6; }

        /* ── FOOTER NAV ── */
        .nexus-footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 50px;
            background: rgba(5,5,5,0.95);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 9999;
            backdrop-filter: blur(10px);
            transition: transform 0.4s ease;
        }
        .footer-hidden { transform: translateY(100%); }

        .footer-icon {
            color: #fff; opacity: 0.5; cursor: pointer;
            height: 100%; width: 50px;
            display: flex; align-items: center; justify-content: center;
        }
        .footer-icon.active {
            opacity: 1;
            filter: drop-shadow(0 0 5px #fde08d);
        }
        .profile-img {
            width: 26px; height: 26px;
            border-radius: 50%; border: 1.5px solid #fff;
            object-fit: cover;
        }


        /* ===== AUTO-IMMERSIVE ON VIDEOS PAGE ===== */

/* Boye header da filter bar a immersive mode */
body.immersive-active header,
body.immersive-active .videos-filter-bar {
    opacity: 0 !important;
    pointer-events: none !important;
    transition: opacity 0.3s ease !important;
}

/* Feed ya zama fullscreen swipe container */
body.immersive-active #videoFeed {
    margin-top: 0 !important;
    padding: 0 !important;
    max-width: 100% !important;
    position: fixed !important;
    inset: 0 !important;
    z-index: 4000 !important;
    overflow: hidden !important;
    display: flex !important;
    flex-direction: column !important;
    background: #000 !important;
}

/* Kowane card ya zama fullscreen */
body.immersive-active .post-card {
    position: fixed !important;
    inset: 0 !important;
    width: 100vw !important;
    height: 100dvh !important;
    border-radius: 0 !important;
    border: none !important;
    margin: 0 !important;
    z-index: 4001 !important;
    display: flex !important;
    flex-direction: column !important;
    justify-content: flex-end !important;
    background: #000 !important;
    opacity: 0 !important;
    pointer-events: none !important;
    transform: translateY(100%) !important;
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1),
                opacity 0.35s ease !important;
}

/* Active card kawai ya bayyana */
body.immersive-active .post-card.reel-active {
    opacity: 1 !important;
    pointer-events: all !important;
    transform: translateY(0) !important;
}

/* Gobe card — a ƙasa ta shirya */
body.immersive-active .post-card.reel-next {
    opacity: 0 !important;
    pointer-events: none !important;
    transform: translateY(100%) !important;
}

/* Baya card — a sama ta shirya */
body.immersive-active .post-card.reel-prev {
    opacity: 0 !important;
    pointer-events: none !important;
    transform: translateY(-100%) !important;
}

/* Video ya cika screen gaba ɗaya */
body.immersive-active .post-card video {
    position: absolute !important;
    inset: 0 !important;
    width: 100vw !important;
    height: 100dvh !important;
    object-fit: cover !important;
    z-index: 0 !important;
}

/* Overlay gradient a ƙasa */
body.immersive-active .post-card::after {
    content: '' !important;
    position: absolute !important;
    bottom: 0; left: 0; right: 0 !important;
    height: 55% !important;
    background: linear-gradient(transparent, rgba(0,0,0,0.85)) !important;
    z-index: 1 !important;
    pointer-events: none !important;
}

/* Header, content, interaction bar — a kan video */
body.immersive-active .post-card .post-header,
body.immersive-active .post-card .post-content,
body.immersive-active .post-card .post-interaction-bar {
    position: relative !important;
    z-index: 2 !important;
    background: transparent !important;
    backdrop-filter: none !important;
    border: none !important;
}

/* Boye post header a reels mode */
body.immersive-active .post-card .post-header {
    display: none !important;
}

/* Caption + username a ƙasa */
body.immersive-active .post-card .post-content {
    padding: 0 16px 4px !important;
    font-size: 13px !important;
    color: rgba(255,255,255,0.9) !important;
}

/* Interaction bar ta lagu ƙasan screen */
body.immersive-active .post-card .post-interaction-bar {
    padding: 8px 16px 28px !important;
    position: relative !important;
    bottom: unset !important;
}

/* Mute button a ƙasa dama */
body.immersive-active .post-mute-toggle {
    bottom: 100px !important;
    right: 16px !important;
    z-index: 50 !important;
}

/* Progress dots a saman screen */
.reel-progress {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    z-index: 9000;
    display: flex;
    gap: 3px;
    padding: 0 10px;
    background: transparent;
    pointer-events: none;
}
.reel-dot {
    flex: 1;
    height: 2px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
    transition: background 0.3s ease;
}
.reel-dot.active {
    background: #fff;
}

/* Back button don fita */
.reel-exit-btn {
    position: fixed;
    top: 14px; left: 14px;
    width: 36px; height: 36px;
    background: rgba(0,0,0,0.55);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 18px;
    z-index: 9001; cursor: pointer;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
}

/* Username overlay a ƙasan video */
.reel-user-overlay {
    position: absolute;
    bottom: 100px; left: 16px;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 10px;
}
.reel-user-overlay img {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 2px solid #fde08d;
    object-fit: cover;
}
.reel-user-overlay span {
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }
        
    </style>

<script>
// ── FIREBASE INIT ──
firebase.initializeApp({
    apiKey:            "AIzaSyDExSOnFbN-wJbT1UFgB-kBs37bEa3KiWc",
    authDomain:        "oryzon-50ea4.firebaseapp.com",
    projectId:         "oryzon-50ea4",
    storageBucket:     "oryzon-50ea4.firebasestorage.app",
    messagingSenderId: "782106742622",
    appId:             "1:782106742622:web:902d512bfe42dd4cf289cf",
    measurementId:     "G-K5085DLL2W"
});
const db      = firebase.firestore();
const storage = firebase.storage();
firebase.analytics();

// ── AUTH GUARD ──
if (!localStorage.getItem('nexus_user_session')) location.href = 'login.html';

// ── STATE ──
let activeFilter = 'all';
let lastVisible  = null;
let isLoading    = false;
let allLoaded    = false;
const PAGE_SIZE  = 8;

const feedEl          = document.getElementById('videoFeed');
const loadMoreTrigger = document.getElementById('loadMoreTrigger');

// ── BOOT ──
window.addEventListener('DOMContentLoaded', () => {
    // Show username in dropdown
    const u = localStorage.getItem('nexus_user_session') || '—';
    document.getElementById('dropUsername').textContent = u;

    // Footer profile pic
    const savedPic = localStorage.getItem('userProfilePic');
    const img = document.getElementById('footerProfileImg');
    if (savedPic && img) img.src = savedPic;
    else if (img) img.src = `https://api.dicebear.com/7.x/bottts/svg?seed=${u}`;

    loadVideos(true);
    setupInfiniteScroll();
});

// ── FILTER ──
window.setFilter = function(chip, filter) {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = filter;
    lastVisible  = null;
    allLoaded    = false;
    feedEl.innerHTML = '';
    loadVideos(true);
};

// ── QUERY BUILDER ──
function buildQuery() {
    let q = db.collection('posts')
              .where('mediaType', '==', 'video');
    
    if (activeFilter !== 'all') {
        q = q.where('category', '==', activeFilter);
    }
    
    return q;
}
// ── LOAD VIDEOS ──
async function loadVideos(reset = false) {
    if (isLoading || allLoaded) return;
    isLoading = true;
    loadMoreTrigger.style.display = 'flex';

    try {
        let q = buildQuery().limit(PAGE_SIZE);
        if (!reset && lastVisible) q = q.startAfter(lastVisible);

        const snap = await q.get();

        // Sort client-side (babu index needed)
        const docs = snap.docs.sort((a, b) => {
            const tA = a.data().timestamp?.seconds || 0;
            const tB = b.data().timestamp?.seconds || 0;
            return tB - tA;
        });

        if (snap.empty) {
            allLoaded = true;
            loadMoreTrigger.style.display = 'none';
            if (reset) feedEl.innerHTML = `
                <div class="empty-videos">
                    <i class="fa-solid fa-video-slash"></i>
                    <p>Babu videos har yanzu.<br>Zama na farko da kai!</p>
                </div>`;
            return;
        }

        lastVisible = docs[docs.length - 1];
        
        // ✅ Use template.js generatePostHTML — exactly as social.html does
        let html = '';
        snap.forEach(doc => html += generatePostHTML({ id: doc.id, ...doc.data() }));
        feedEl.insertAdjacentHTML('beforeend', html);

        // Restore likes
        setTimeout(() => {
            if (typeof postCard_restoreLikes === 'function') postCard_restoreLikes(feedEl);
        }, 400);

        // Load real avatars from users collection
        snap.forEach(doc => {
            const post = doc.data();
            if (!post.username) return;
            db.collection('users').doc(post.username).get().then(userDoc => {
                if (!userDoc.exists) return;
                const pic = userDoc.data().userProfilePic;
                if (!pic) return;
                const card = feedEl.querySelector(`.post-card[data-post-id="${doc.id}"]`);
                if (card) {
                    const av = card.querySelector('.post-avatar');
                    if (av) av.src = pic;
                }
            });
        });

        // Live comment counts
        snap.forEach(doc => {
            db.collection('nexus_contributions')
              .where('postId',   '==', doc.id)
              .where('parentId', '==', null)
              .onSnapshot(s => {
                  const el = document.getElementById(`comment-count-${doc.id}`);
                  if (el) el.textContent = s.size;
              });
        });

        // ✅ Observe new videos (template.js IntersectionObserver)
        if (typeof postCard_observeVideos === 'function') postCard_observeVideos();
        setTimeout(() => {
            if (typeof postCard_handleVideoPriority === 'function') postCard_handleVideoPriority();
        }, 500);

        loadMoreTrigger.style.display = 'none';
        if (snap.size < PAGE_SIZE) allLoaded = true;

    } catch (err) {
        console.error('[videos] loadVideos error:', err);
        loadMoreTrigger.style.display = 'none';
    } finally {
        isLoading = false;
    }
}

// ── INFINITE SCROLL ──
function setupInfiniteScroll() {
    const sentinel = document.createElement('div');
    sentinel.style.height = '1px';
    document.body.appendChild(sentinel);

    new IntersectionObserver(entries => {
        if (entries[0].isIntersecting && !isLoading && !allLoaded) loadVideos(false);
    }, { rootMargin: '250px' }).observe(sentinel);
}

// ── SCROLL → VIDEO PRIORITY ──
let _scrollT;
window.addEventListener('scroll', () => {
    clearTimeout(_scrollT);
    _scrollT = setTimeout(() => {
        if (typeof postCard_handleVideoPriority === 'function') postCard_handleVideoPriority();
    }, 150);
}, { passive: true });

// ── DROPDOWN ──
function toggleDropdown() {
    document.getElementById('CyberDropdown').classList.toggle('Active');
}
document.addEventListener('click', e => {
    const dd  = document.getElementById('CyberDropdown');
    const btn = document.getElementById('cyberMenu');

        dd.classList.remove('Active');

});


    // ===== NEXUS REELS ENGINE =====
(function() {
    let reelIndex = 0;
    let reelCards = [];
    let isReelMode = false;
    let touchStartY = 0;
    let isSwiping = false;

    // Fara reels mode kai tsaye bayan videos sun loda
    window.nexusStartReels = function() {
        reelCards = Array.from(document.querySelectorAll('#videoFeed .post-card'));
        if (!reelCards.length) return;

        isReelMode = true;
        reelIndex = 0;
        document.body.classList.add('immersive-active');

        // Cire existing onclick na cards — mu sanya namu
        reelCards.forEach((card, i) => {
            card.onclick = null;
            // Sanya reel-next ga duk da farko
            card.classList.remove('reel-active','reel-next','reel-prev');
            if (i === 0) card.classList.add('reel-active');
            else card.classList.add('reel-next');
        });

        // Kara progress dots
        const prog = document.createElement('div');
        prog.className = 'reel-progress';
        prog.id = 'reelProgress';
        document.body.appendChild(prog);
        updateProgress();

        // Exit button
        const exitBtn = document.createElement('div');
        exitBtn.className = 'reel-exit-btn';
        exitBtn.id = 'reelExitBtn';
        exitBtn.innerHTML = '<i class="fa-solid fa-chevron-left"></i>';
        exitBtn.onclick = nexusStopReels;
        document.body.appendChild(exitBtn);

        // Play bidiyon farko
        playReelVideo(reelCards[0]);

        // Swipe listeners
        document.addEventListener('touchstart', onTouchStart, { passive: true });
        document.addEventListener('touchend', onTouchEnd, { passive: true });

        // Hide footer
        const footer = document.getElementById('instaFooter');
        if (footer) footer.classList.add('footer-hidden');

        history.pushState({ reel: true }, '');
        window.onpopstate = nexusStopReels;
    };

    window.nexusStopReels = function() {
        if (!isReelMode) return;
        isReelMode = false;

        document.body.classList.remove('immersive-active');

        reelCards.forEach(card => {
            card.classList.remove('reel-active','reel-next','reel-prev');
            const vid = card.querySelector('video');
            if (vid) { vid.pause(); vid.muted = true; }
        });

        document.getElementById('reelProgress')?.remove();
        document.getElementById('reelExitBtn')?.remove();

        document.removeEventListener('touchstart', onTouchStart);
        document.removeEventListener('touchend', onTouchEnd);

        const footer = document.getElementById('instaFooter');
        if (footer) footer.classList.remove('footer-hidden');

        window.onpopstate = null;
    };

    function goToReel(newIndex) {
        if (newIndex < 0 || newIndex >= reelCards.length) return;

        const oldCard = reelCards[reelIndex];
        const newCard = reelCards[newIndex];
        const goingForward = newIndex > reelIndex;

        // Tsayar da bidiyon yanzu
        const oldVid = oldCard.querySelector('video');
        if (oldVid) { oldVid.pause(); oldVid.muted = true; }

        // Animation
        oldCard.classList.remove('reel-active');
        oldCard.classList.add(goingForward ? 'reel-prev' : 'reel-next');

        newCard.classList.remove('reel-next','reel-prev');
        newCard.classList.add('reel-active');

        reelIndex = newIndex;
        playReelVideo(newCard);
        updateProgress();

        // Load more idan kusa da ƙarshe
        if (reelIndex >= reelCards.length - 3) {
            loadVideos(false).then(() => {
                reelCards = Array.from(document.querySelectorAll('#videoFeed .post-card'));
            });
        }

        if (navigator.vibrate) navigator.vibrate(8);
    }

    function playReelVideo(card) {
        const vid = card.querySelector('video');
        if (!vid) return;
        vid.muted = !window.nexusGlobalSound;
        vid.currentTime = 0;
        vid.play().catch(() => {});
    }

    function updateProgress() {
        const prog = document.getElementById('reelProgress');
        if (!prog) return;
        prog.innerHTML = '';
        const show = Math.min(reelCards.length, 8); // Max 8 dots
        for (let i = 0; i < show; i++) {
            const dot = document.createElement('div');
            dot.className = 'reel-dot' + (i === reelIndex ? ' active' : '');
            prog.appendChild(dot);
        }
    }

    function onTouchStart(e) {
        touchStartY = e.touches[0].clientY;
    }

    function onTouchEnd(e) {
        if (isSwiping) return;
        const diff = touchStartY - e.changedTouches[0].clientY;
        if (Math.abs(diff) < 50) return; // Too small

        isSwiping = true;
        if (diff > 0) goToReel(reelIndex + 1); // Swipe up → next
        else           goToReel(reelIndex - 1); // Swipe down → prev
        setTimeout(() => { isSwiping = false; }, 500);
    }

    // Auto-fara reels bayan videos sun loda
    // Sanya wannan a cikin loadVideos() bayan insertAdjacentHTML
    const _origLoad = window.nexusStartReels;
})();

// Kira reels engine bayan load na farko
const _origInsert = HTMLElement.prototype.insertAdjacentHTML;
HTMLElement.prototype.insertAdjacentHTML = function(pos, html) {
    _origInsert.call(this, pos, html);
    if (this.id === 'videoFeed' && !document.body.classList.contains('immersive-active')) {
        setTimeout(() => {
            if (document.querySelectorAll('#videoFeed .post-card').length > 0) {
                window.nexusStartReels();
            }
        }, 600);
    }
};
