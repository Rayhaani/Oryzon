<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Page View</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-void: #030508;
            --card-incoming: rgba(15, 20, 31, 0.75);
            --card-outgoing: rgba(0, 140, 255, 0.12);
            --neon-cyan: #fde08d;
            --neon-purple: #fde08d;
            --neon-green: #10b981;
            --neon-gold: #f59e0b;
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-glow: rgba(253, 224, 141, 0.3);
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #050505 !important;
            background-image: none !important;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            padding-bottom: 30px;
        }

        /* ================= HEADER — simple page-mode header ================= */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 56px;
            background: linear-gradient(180deg, rgba(5,5,5,0.95) 0%, rgba(5,5,5,0.85) 65%, rgba(5,5,5,0.35) 100%);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            display: flex; align-items: center; padding: 0 12px; gap: 10px;
            z-index: 9999; box-sizing: border-box;
        }

        .fb-back-btn {
            width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 15px; cursor: pointer;
        }
        .fb-header-title {
            font-size: 15px; font-weight: 800; color: #fff;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            flex: 1; min-width: 0;
        }
        .header-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .header-icon-btn {
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 15px;
            cursor: pointer; flex-shrink: 0;
        }
        .header-icon-btn:active { background: rgba(253,224,141,0.2); }

        /* ================= PAGE VIEW — Facebook-Page style ================= */
        #pageView {
            padding-top: 56px;
            display: flex;
            flex-direction: column;
        }

        /* ---- Cover photo + overlapping rounded avatar (half up / half down) ---- */
        .page-header-wrap { position: relative; width: 100%; }

        .group-cover-wrap { position: relative; width: 100%; height: 168px; overflow: hidden; }
        .group-cover-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .group-cover-fade {
            position: absolute; inset: 0;
            background: linear-gradient(180deg, transparent 40%, var(--bg-void) 100%);
        }

        .page-avatar-frame {
            position: absolute;
            left: 16px;
            bottom: -45px;              /* rabin sama akan cover, rabin kasa a bangaren info */
            width: 90px; height: 90px;
            border-radius: 50%;
            border: 4px solid var(--bg-void);
            overflow: hidden;
            background: #111;
            z-index: 6;
            box-shadow: 0 4px 14px rgba(0,0,0,0.5);
        }
        .page-avatar-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .group-info-block { padding: 4px 16px 6px 16px; border-bottom: 8px solid rgba(255,255,255,0.03); }

        .page-name-row { padding-left: 106px; min-height: 46px; display: flex; flex-direction: column; justify-content: flex-end; }
        .group-info-title { font-size: 19px; font-weight: 800; color: #fff; letter-spacing: -0.3px; line-height: 1.2; }
        .group-meta-row {
            display: flex; align-items: center; gap: 6px; color: var(--text-sub);
            font-size: 12.5px; margin-top: 4px;
        }

        .page-bio { font-size: 13px; color: #cbd5e1; line-height: 1.5; margin-top: 12px; }

        .page-buttons-row { display: flex; gap: 10px; margin-top: 14px; }
        .invite-btn-fb {
            background: linear-gradient(135deg, #fde08d, #b8860b);
            color: #1e1e1e; font-weight: 800; font-size: 12.5px;
            padding: 9px 16px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; gap: 7px;
            cursor: pointer; border: none; flex: 1;
        }
        .invite-btn-fb:active { transform: scale(0.97); }
        .follow-btn-fb {
            background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border);
            color: #fff; font-weight: 800; font-size: 12.5px;
            padding: 9px 16px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; gap: 7px;
            cursor: pointer; flex: 1;
        }
        .follow-btn-fb:active { transform: scale(0.97); }

        #timeline-area {
            padding-top: 14px !important;
            display: flex; flex-direction: column; gap: 0;
        }

        /* ---- Highlights strip (ported as-is) ---- */
        .smart-box-highlights {
            background: transparent !important;
            border: none !important;
            padding: 0;
            margin: 16px 0 0 0;
        }
        .highlights-scroll {
            display: flex !important;
            gap: 10px !important;
            overflow-x: auto !important;
            scrollbar-width: none !important;
        }
        .highlights-scroll::-webkit-scrollbar { display: none; }
        .highlight-item {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            text-align: center !important;
            min-width: 56px !important;
            flex-shrink: 0 !important;
            position: relative;
        }
        .highlight-ring {
            width: 74px !important;
            height: 80px !important;
            border-radius: 16px !important;
            border: 1px solid #fde08d !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            overflow: hidden !important;
            background: #111;
        }
        .highlight-ring img {
            width: 100% !important;
            height: 100% !important;
            border-radius: 13px !important;
            object-fit: cover !important;
        }
        .highlight-label {
            font-family: 'Plus Jakarta Sans', sans-serif !important;
            font-size: 9px !important;
            font-weight: 700 !important;
            color: #fff !important;
            margin: 3px auto 0 auto !important;
            text-align: center !important;
            max-width: 74px;
            white-space: normal;
            word-wrap: break-word;
            line-height: 1.2;
        }

        /* ---- Story / highlight viewer (ported as-is) ---- */
        .story-viewer-overlay { position: fixed; inset: 0; z-index: 20000; background: #000; display: none; }
        .story-media-wrap { width: 100%; height: 100%; position: relative; }
        .story-slide { position: absolute; inset: 0; }
        .story-slide img, .story-slide video { width: 100%; height: 100%; object-fit: cover; display: block; }
        .story-header {
            position: absolute; top: 0; left: 0; right: 0;
            display: flex; align-items: center; gap: 10px;
            padding: 14px 14px 10px; z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
        }
        .story-header img { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; border: 1.5px solid #fde08d; }
        .story-user-info { flex: 1; display: flex; align-items: baseline; gap: 6px; }
        .story-username { font-size: 13px; font-weight: 700; color: #fff; }
        .story-time { font-size: 11px; color: rgba(255,255,255,0.6); }
        .story-close { color: #fff; font-size: 20px; cursor: pointer; padding: 5px; }
        .story-tap-zone { position: absolute; top: 0; height: 100%; width: 35%; z-index: 5; }
        .story-tap-left { left: 0; }
        .story-tap-right { right: 0; }
        .story-footer {
            position: absolute; bottom: 0; left: 0; right: 0;
            display: flex; align-items: center; gap: 12px;
            padding: 16px 14px calc(16px + env(safe-area-inset-bottom));
            z-index: 10;
            background: linear-gradient(transparent, rgba(0,0,0,0.75));
        }
        .story-reply-input { flex: 1; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: 50px; padding: 10px 18px; color: #fff; font-size: 13px; outline: none; }
        .story-footer i { color: #fff; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- ================= HEADER ================= -->
    <header>
        <div class="fb-back-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></div>
        <span class="fb-header-title">Maijalalaini Islamic Medicine</span>
        <div class="header-actions">
            <div class="header-icon-btn"><i class="fa-solid fa-magnifying-glass"></i></div>
            <div class="header-icon-btn"><i class="fa-solid fa-ellipsis-vertical"></i></div>
        </div>
    </header>

    <!-- ================= PAGE VIEW ================= -->
    <div id="pageView">

        <!-- COVER + OVERLAPPING ROUNDED AVATAR -->
        <div class="page-header-wrap">
            <div class="group-cover-wrap">
                <img class="group-cover-img" src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=900&auto=format&fit=crop&q=80" alt="Page cover">
                <div class="group-cover-fade"></div>
            </div>
            <div class="page-avatar-frame">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=200&auto=format&fit=crop&q=80" alt="Page avatar">
            </div>
        </div>

        <div class="group-info-block">
            <div class="page-name-row">
                <div class="group-info-title">Maijalalaini Islamic Medicine</div>
                <div class="group-meta-row">
                    <span>182K followers · 9 following · 4K posts</span>
                </div>
            </div>

            <div class="page-bio">
                muna bada magungunan masu inganci akan kowacce cuta Insha Allah 08088886...
            </div>

            <div class="page-buttons-row">
                <button class="invite-btn-fb"><i class="fa-brands fa-whatsapp"></i> WhatsApp</button>
                <button class="follow-btn-fb"><i class="fa-solid fa-bell"></i> Following</button>
            </div>

            <!-- HIGHLIGHTS STRIP (ported as-is from feed section) -->
            <div class="smart-box-highlights">
                <div class="highlights-scroll">
                    <div class="highlight-item">
                        <div class="highlight-ring" onclick="viewGroupHighlight(0)"><img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=200&auto=format&fit=crop&q=80" loading="lazy"></div>
                        <p class="highlight-label">Launch</p>
                    </div>
                    <div class="highlight-item">
                        <div class="highlight-ring" onclick="viewGroupHighlight(1)"><img src="https://images.unsplash.com/photo-1580489944761-15a19d654956?w=200&auto=format&fit=crop&q=80" loading="lazy"></div>
                        <p class="highlight-label">Deals</p>
                    </div>
                    <div class="highlight-item">
                        <div class="highlight-ring" onclick="viewGroupHighlight(2)"><img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=200&auto=format&fit=crop&q=80" loading="lazy"></div>
                        <p class="highlight-label">Events</p>
                    </div>
                    <div class="highlight-item">
                        <div class="highlight-ring" onclick="viewGroupHighlight(3)"><img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=200&auto=format&fit=crop&q=80" loading="lazy"></div>
                        <p class="highlight-label">Tech</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- TIMELINE / FEED POSTS AREA (ported as-is — filled via generatePostHTML) -->
        <div id="timeline-area"></div>
    </div>

    <!-- STORY / HIGHLIGHT VIEWER (ported as-is) -->
    <div class="story-viewer-overlay" id="storyViewerOverlay">
        <div class="story-header">
            <img id="storyUserAvatar" src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=100&auto=format&fit=crop&q=80">
            <div class="story-user-info">
                <span class="story-username" id="storyUsername">Maijalalaini Islamic Medicine</span>
                <span class="story-time" id="storyTime"></span>
            </div>
            <i class="fa-solid fa-xmark story-close" onclick="closeGroupStoryViewer()"></i>
        </div>
        <div class="story-media-wrap" id="storyMediaWrap">
            <div class="story-tap-zone story-tap-left" onclick="prevGroupStory()"></div>
            <div class="story-tap-zone story-tap-right" onclick="nextGroupStory()"></div>
        </div>
        <div class="story-footer" id="storyFooter">
            <input type="text" class="story-reply-input" placeholder="Send message">
            <i class="fa-regular fa-paper-plane"></i>
        </div>
    </div>

    <!-- SHARED POST CARD TEMPLATE — single source of truth for generatePostHTML() -->
    <script src="post-card-template.js"></script>

    <script>
        // ============================================================
        // FEED POSTS — generated directly via window.generatePostHTML()
        // (ported as-is from group.html feed section)
        // ============================================================
        function renderFeedPosts() {
            const samplePosts = [
                {
                    id: 'page-post-1',
                    username: 'Ali_Developer',
                    userProfilePic: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&auto=format&fit=crop&q=80',
                    mediaUrl: 'https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=900&auto=format&fit=crop&q=80',
                    mediaType: 'image',
                    content: 'Masha Allah, an kammala tsara jadawalin sabon Super Community Platform dinmu na 2026 gaba daya. Godiya ga dukkan mambobin ƙungiyar!',
                    timestamp: new Date(Date.now() - 1000 * 60 * 42),
                    likesCount: 318,
                    commentsCount: 47
                },
                {
                    id: 'page-post-2',
                    username: 'MmnAfrah',
                    userProfilePic: 'https://images.unsplash.com/photo-1517841905240-472988babdf9?w=100&auto=format&fit=crop&q=80',
                    mediaUrl: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=900&auto=format&fit=crop&q=80',
                    mediaType: 'image',
                    content: `Taron gudanarwa na wannan mako zai gudana ranar Litinin. Duk mai sha'awar shiga Business Deals sector, ku shirya tambayoyinku.`,
                    timestamp: new Date(Date.now() - 1000 * 60 * 60 * 5),
                    likesCount: 142,
                    commentsCount: 19
                },
                {
                    id: 'page-post-3',
                    username: 'Zainab_TrustID',
                    userProfilePic: 'https://images.unsplash.com/photo-1580489944761-15a19d654956?w=100&auto=format&fit=crop&q=80',
                    mediaUrl: 'https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=900&auto=format&fit=crop&q=80',
                    mediaType: 'image',
                    content: 'An sabunta TrustID Audit ga duk membobin da suka kammala verification. Duba profile dinku don cikakken bayani.',
                    timestamp: new Date(Date.now() - 1000 * 60 * 60 * 26),
                    likesCount: 89,
                    commentsCount: 11
                }
            ];

            const container = document.getElementById('timeline-area');
            container.innerHTML = samplePosts.map(post => window.generatePostHTML(post)).join('');

            if (typeof window.postCard_observeVideos === 'function') {
                window.postCard_observeVideos();
            }
        }

        // ============================================================
        // HIGHLIGHTS / STORY VIEWER (ported as-is)
        // ============================================================
        const groupHighlights = [
            { img: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=900&auto=format&fit=crop&q=80', label: 'Launch' },
            { img: 'https://images.unsplash.com/photo-1580489944761-15a19d654956?w=900&auto=format&fit=crop&q=80', label: 'Deals' },
            { img: 'https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=900&auto=format&fit=crop&q=80', label: 'Events' },
            { img: 'https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=900&auto=format&fit=crop&q=80', label: 'Tech' }
        ];
        let groupStoryIndex = 0;
        let groupStoryTimer = null;
        const GROUP_STORY_DURATION = 5000;

        function viewGroupHighlight(index) {
            groupStoryIndex = index;
            document.getElementById('storyViewerOverlay').style.display = 'block';
            showGroupStoryAt(groupStoryIndex);
            history.pushState({ storyViewer: true }, '');
            window.onpopstate = closeGroupStoryViewer;
        }

        function showGroupStoryAt(index, direction = 'next') {
            clearTimeout(groupStoryTimer);
            const wrap = document.getElementById('storyMediaWrap');
            const oldSlide = wrap.querySelector('.story-slide');
            const item = groupHighlights[index];

            const newSlide = document.createElement('div');
            newSlide.className = 'story-slide';
            newSlide.innerHTML = `<img src="${item.img}">`;
            newSlide.style.transform = direction === 'prev' ? 'translateX(-100%)' : 'translateX(100%)';
            newSlide.style.transition = 'none';
            wrap.appendChild(newSlide);
            void newSlide.offsetWidth;

            requestAnimationFrame(() => {
                newSlide.style.transition = 'transform 0.3s ease-out';
                newSlide.style.transform = 'translateX(0)';
                if (oldSlide) {
                    oldSlide.style.transition = 'transform 0.3s ease-out';
                    oldSlide.style.transform = direction === 'prev' ? 'translateX(100%)' : 'translateX(-100%)';
                }
            });
            if (oldSlide) setTimeout(() => oldSlide.remove(), 320);

            document.getElementById('storyUsername').textContent = item.label;
            document.getElementById('storyTime').textContent = 'Now';
            groupStoryTimer = setTimeout(() => nextGroupStory(), GROUP_STORY_DURATION);
        }
        function nextGroupStory() {
            if (groupStoryIndex < groupHighlights.length - 1) {
                groupStoryIndex++;
                showGroupStoryAt(groupStoryIndex, 'next');
            } else {
                closeGroupStoryViewer();
            }
        }
        function prevGroupStory() {
            if (groupStoryIndex > 0) {
                groupStoryIndex--;
                showGroupStoryAt(groupStoryIndex, 'prev');
            }
        }
        function closeGroupStoryViewer() {
            clearTimeout(groupStoryTimer);
            document.getElementById('storyViewerOverlay').style.display = 'none';
            document.getElementById('storyMediaWrap').querySelectorAll('.story-slide').forEach(el => el.remove());
            window.onpopstate = null;
        }

        // Render posts on load
        renderFeedPosts();
    </script>
</body>
</html>
